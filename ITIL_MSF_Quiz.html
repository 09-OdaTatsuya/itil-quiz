<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITIL 4 MSF 模擬試験</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3347;
    --accent: #5b8af5;
    --accent2: #7c5bf5;
    --correct: #3dd68c;
    --wrong: #f55b5b;
    --text: #e8eaf0;
    --text2: #8b91a8;
    --text3: #5c6278;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 760px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .score-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
  }
  .score-badge span { color: var(--accent); font-weight: 700; }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 760px;
    margin-bottom: 28px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Choices */
  .choices {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: left;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(3px);
  }
  .choice-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 20px;
    padding-top: 1px;
  }
  .choice-btn.correct {
    border-color: var(--correct);
    background: rgba(61,214,140,0.08);
  }
  .choice-btn.correct .choice-label { color: var(--correct); }
  .choice-btn.wrong {
    border-color: var(--wrong);
    background: rgba(245,91,91,0.08);
  }
  .choice-btn.wrong .choice-label { color: var(--wrong); }
  .choice-btn:disabled { cursor: default; }

  /* Explanation */
  .explanation {
    width: 100%;
    max-width: 760px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text2);
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .explanation.show { display: block; }
  .explanation-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Buttons */
  .btn-row {
    width: 100%;
    max-width: 760px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text2);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  /* Result screen */
  .result-screen {
    width: 100%;
    max-width: 760px;
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .result-screen.show { display: block; }
  .result-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-score {
    font-family: 'DM Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 24px 0;
  }
  .result-sub {
    font-size: 16px;
    color: var(--text2);
    margin-bottom: 32px;
  }
  .result-pass {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 32px;
  }
  .result-pass.pass { background: rgba(61,214,140,0.15); color: var(--correct); border: 1px solid var(--correct); }
  .result-pass.fail { background: rgba(245,91,91,0.15); color: var(--wrong); border: 1px solid var(--wrong); }

  /* Mode selector */
  .mode-screen {
    width: 100%;
    max-width: 760px;
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    animation: fadeIn 0.4s ease;
  }
  .mode-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .mode-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 36px;
  }
  .mode-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .mode-btn {
    padding: 18px 24px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mode-btn:hover { border-color: var(--accent); background: var(--surface); }
  .mode-btn-sub { font-size: 12px; color: var(--text3); font-weight: 400; margin-top: 3px; }
  .mode-btn-arrow { color: var(--accent); font-size: 18px; }

  @media (max-width: 600px) {
    .card { padding: 22px 18px; }
    .q-text { font-size: 14px; }
    .choice-btn { font-size: 14px; padding: 14px 16px; }
    .result-score { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ITIL 4 MSF — 模擬試験</div>
  <div class="score-badge" id="scoreBadge">正解 <span id="scoreNum">0</span> / <span id="totalNum">0</span></div>
</div>

<!-- モード選択 -->
<div class="mode-screen" id="modeScreen">
  <div class="mode-title">学習モードを選択</div>
  <div class="mode-sub">全120問（模擬試験1：問題001〜060 / 模擬試験2：問題061〜120）</div>
  <div class="mode-buttons">
    <button class="mode-btn" onclick="startQuiz('all')">
      <div>
        <div>全問チャレンジ</div>
        <div class="mode-btn-sub">120問すべてに取り組む</div>
      </div>
      <div class="mode-btn-arrow">→</div>
    </button>
    <button class="mode-btn" onclick="startQuiz('exam1')">
      <div>
        <div>模擬試験 1</div>
        <div class="mode-btn-sub">問題001〜060（60問）</div>
      </div>
      <div class="mode-btn-arrow">→</div>
    </button>
    <button class="mode-btn" onclick="startQuiz('exam2')">
      <div>
        <div>模擬試験 2</div>
        <div class="mode-btn-sub">問題061〜120（60問）</div>
      </div>
      <div class="mode-btn-arrow">→</div>
    </button>
    <button class="mode-btn" onclick="startQuiz('random')">
      <div>
        <div>ランダム 20問</div>
        <div class="mode-btn-sub">120問からランダムに20問</div>
      </div>
      <div class="mode-btn-arrow">→</div>
    </button>
  </div>
</div>

<!-- 問題エリア -->
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-info">
    <span id="progressText">問題 1 / 120</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="card" id="questionCard" style="display:none">
  <div class="q-num" id="qNum">問題 001</div>
  <div class="q-text" id="qText"></div>
</div>

<div class="choices" id="choicesArea" style="display:none"></div>

<div class="explanation" id="explanation">
  <div class="explanation-label">解説</div>
  <div id="explanationText"></div>
</div>

<div class="btn-row" id="btnRow" style="display:none">
  <button class="btn btn-secondary" id="btnBack" onclick="goBack()">← 戻る</button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>次へ →</button>
</div>

<!-- 結果画面 -->
<div class="result-screen" id="resultScreen">
  <div class="result-title">🎉 完了！</div>
  <div class="result-score" id="resultScore">0/0</div>
  <div id="resultPassBadge"></div>
  <div class="result-sub" id="resultSub"></div>
  <div class="btn-row" style="justify-content:center">
    <button class="btn btn-secondary" onclick="showMode()" style="max-width:200px">もう一度</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = 
[
  {
    "num": "001",
    "text": "「インシデントの処理と解決」プロセスのどのステップで、サービスデスク・エージェントはユーザからの問い合わせがインシデントを指していることを確認しますか？",
    "choices": [
      "A. インシデントの分類",
      "B. インシデントの検出",
      "C. インシデントの登録",
      "D. インシデントの診断"
    ],
    "answer": "B",
    "explanation": "サービスデスク・エージェントは、インシデントの処理と解決プロセスの「インシデントの検出」ステップにおいて、ユーザからの問い合わせがインシデントを指していることを確認します。（参照 3.1.1、表 3.2）"
  },
  {
    "num": "002",
    "text": "次の記述のうち、ワークアラウンドを適用する最も適切な理由はどれですか？",
    "choices": [
      "A. インシデントのシステム的な解決策を見つけることが不可能である",
      "B. このインシデントは早急に調整に調整された解決が必要である",
      "C. このインシデントは通常のオペレーションの迅速な回復が必要である",
      "D. 自動化された解決手順が存在しない"
    ],
    "answer": "A",
    "explanation": "「時には、インシデントのシステム的な解決策を見つけることが不可能な場合もあります。このような場合、サービス・プロバイダはワークアラウンドを適用できます。」（参照 2.2.3）"
  },
  {
    "num": "003",
    "text": "ある組織が、新しいサービス構成管理システムを実施しています。インシデント管理プラクティスにはどのようなメリットがありますか？",
    "choices": [
      "A. このシステムは、インシデントの検出に役立ちます",
      "B. このシステムはインシデント・レコードの管理に役立ちます",
      "C. システムはインシデントの診断に役立ちます",
      "D. このシステムは、ユーザのフィードバックを収集するのに役立ちます"
    ],
    "answer": "C",
    "explanation": "構成管理システムは「インシデントの分類と診断」において役立ちます。インシデントの検出・レコード管理・フィードバック収集には使用されません。（参照 表 5.1）"
  },
  {
    "num": "004",
    "text": "インシデントとは何ですか？",
    "choices": [
      "A. バックログにあるすべてのタスクにリソースを割り当てできないこと",
      "B. サービスの品質低下",
      "C. サービスに対する計画的な中断",
      "D. セルフヘルプ・ツールを使用しなければならないエンドユーザ"
    ],
    "answer": "B",
    "explanation": "インシデントの定義は「サービスの計画外の中断、またはサービスの品質の低下」です。「サービスの品質低下」が正解です。（参照 2.2）"
  },
  {
    "num": "005",
    "text": "インシデントの早期発見を可能にするプラクティスは何ですか？",
    "choices": [
      "A. モニタリングおよびイベント管理",
      "B. 問題管理",
      "C. サービス要求管理",
      "D. ナレッジ管理"
    ],
    "answer": "A",
    "explanation": "「モニタリングおよびイベント管理プラクティスによって、インシデントの早期検出が可能になります。」（参照 2.4.1）"
  },
  {
    "num": "006",
    "text": "ある組織が複数の市場で事業を展開し、サービス・プロバイダとの協働で多くのサービスを提供しています。最近、インシデントの解決時間が長くなり、技術チーム間の移管の回数と期間が増加しています。インシデント処理を改善する最善のアプローチは何ですか？",
    "choices": [
      "A. 社内チームのみがインシデントの解決に参加するようにする",
      "B. 技術スペシャリストを製品またはサービス別にグループ化する",
      "C. 外部チームのみがインシデントの解決に参加するようにする",
      "D. 個々の技術スペシャリストに大きな報酬を与えるよう計画する"
    ],
    "answer": "B",
    "explanation": "「アジャイル手法の拡大…階層型のチーム構造ではなく、水平的なチーム構造をより広範に使用することを呼びかけています。よりフラットな構造と、互いに尊重する協働メソッド…協働と情報の自由な流れを促進します。」（参照 4.2.1）"
  },
  {
    "num": "007",
    "text": "組織は、インシデント管理プラクティスを改善している最中です。ビジネス価値を実証する能力を高めたいと考えています。この目標を達成するために使用すべき選択肢として最適なのはどれですか？",
    "choices": [
      "A. 異常かつ複雑で、重大なインシデントの解決を最適化するためにスウォーミングを使用する",
      "B. ダッシュボードや報告書を使用して、サービスパフォーマンスを社内外の関係者に伝える",
      "C. 自動化ツールを活用してナレッジを管理し、可能であれば解決策を自動化します",
      "D. インシデント・モデルを開発し、既知の解決策を再利用します"
    ],
    "answer": "B",
    "explanation": "ビジネス価値をもっとうまく実証できるようになるために最も推奨されるのは、ステータスをダッシュボードで示し、分析と要点を提起的に報告することです。（参照 8、表 8.1）"
  },
  {
    "num": "008",
    "text": "インシデント管理におけるサードパーティの役割に関する記述のうち、正しいものはどれですか？",
    "choices": [
      "A. サードパーティをインシデント管理活動から排除すべきである",
      "B. インシデント・モデルは、インシデント管理におけるサードパーティの関与を定義する必要がある",
      "C. インシデント管理活動は、可能な限りサードパーティに委任すべきである",
      "D. インシデント管理におけるサードパーティとのやりとりは、可能な限り形式化されるべきである"
    ],
    "answer": "B",
    "explanation": "「インシデント・モデルは、サードパーティがどのようにインシデントの解決に関与するか、また、組織が効果的なコラボレーションをどのように保証するかを定義しなければなりません。」（参照 6）"
  },
  {
    "num": "009",
    "text": "インシデントを登録する理由とならないものは何ですか？",
    "choices": [
      "A. 顧客がサービスレベル・アグリーメントに不満を抱いている",
      "B. ユーザが状況を異常と認識している",
      "C. サービスレベル・アグリーメントに違反している",
      "D. 専門家が、サービスが正常に運用されていないと考えている"
    ],
    "answer": "A",
    "explanation": "SLAに対する顧客の不満は通常のサービス運用からの逸脱ではなく、SLAへの潜在的な変更はインシデントとして登録されません。「インシデント管理プラクティスの目的は、可能な限り迅速にサービスを通常のサービスオペレーションに回復して、インシデントの悪影響を最小限に抑えることです」。（参照 2.1）"
  },
  {
    "num": "010",
    "text": "サービスマネジメントチームは、インシデント管理のバリューストリームに注目しており、無駄を特定しようとしています。情報を分析して無駄を見つけるための最良のステップはどれですか？",
    "choices": [
      "A. バリューストリーム・マップを振り返る",
      "B. サービス・バリューストリーム・ウォークを実施する",
      "C. バリューストリーム分析の範囲を特定する",
      "D. 活動と情報の流れをマップする"
    ],
    "answer": "A",
    "explanation": "「バリューストリーム・マップ（VSM）を振り返る：最初は全く分からなかったかもしれない要因を特定します。このステップで収集した情報を使用して無駄を見つけます。」（参照 3.2.3.1）"
  },
  {
    "num": "011",
    "text": "次のうち、「インシデントを迅速かつ効率的に解決する」というプラクティス成功要因の主要な測定基準でないものはどれですか？",
    "choices": [
      "A. インシデントの検出から診断を受け入れるまでの時間",
      "B. インシデントの処理と解決に対するユーザ満足度",
      "C. ユーザから報告を受ける前に解決されたインシデントの割合",
      "D. モニタリングおよびイベント管理を通じて検出されたインシデントの割合"
    ],
    "answer": "D",
    "explanation": "「モニタリングおよびイベント管理を通じて検出されたインシデントの割合」は「インシデントを早期に発見する」というプラクティス成功要因の重要な測定基準であり、「迅速かつ効率的に解決する」のものではありません。（参照 2.5、表 2.6）"
  },
  {
    "num": "012",
    "text": "プラクティス能力レベル 3 に関する説明として、最も適切なものはどれですか？",
    "choices": [

let questions = [];
let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(mode) {
  if (mode === 'all') questions = [...ALL_QUESTIONS];
  else if (mode === 'exam1') questions = ALL_QUESTIONS.slice(0, 60);
  else if (mode === 'exam2') questions = ALL_QUESTIONS.slice(60, 120);
  else if (mode === 'random') questions = shuffle(ALL_QUESTIONS).slice(0, 20);

  current = 0;
  score = 0;
  answered = new Array(questions.length).fill(false);
  userAnswers = new Array(questions.length).fill(null);

  document.getElementById('modeScreen').style.display = 'none';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('choicesArea').style.display = 'flex';
  document.getElementById('btnRow').style.display = 'flex';

  updateScore();
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('qNum').textContent = `問題 ${q.num}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressText').textContent = `問題 ${current + 1} / ${total}`;
  const pct = Math.round((current / total) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const area = document.getElementById('choicesArea');
  area.innerHTML = '';
  q.choices.forEach((c, i) => {
    const label = c.charAt(0);
    const text = c.slice(3);
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${label}</span><span>${text}</span>`;
    btn.onclick = () => selectAnswer(label, btn);
    area.appendChild(btn);
  });

  // 既回答の場合は復元
  const expEl = document.getElementById('explanation');
  expEl.classList.remove('show');
  document.getElementById('btnNext').disabled = true;

  if (answered[current]) {
    const ua = userAnswers[current];
    const correctAns = q.answer;
    const btns = area.querySelectorAll('.choice-btn');
    btns.forEach(btn => {
      const lbl = btn.querySelector('.choice-label').textContent;
      btn.disabled = true;
      if (lbl === correctAns) btn.classList.add('correct');
      else if (lbl === ua && ua !== correctAns) btn.classList.add('wrong');
    });
    document.getElementById('explanationText').textContent = q.explanation;
    expEl.classList.add('show');
    document.getElementById('btnNext').disabled = false;
  }

  document.getElementById('btnBack').disabled = current === 0;
}

function selectAnswer(label, clickedBtn) {
  if (answered[current]) return;
  const q = questions[current];
  answered[current] = true;
  userAnswers[current] = label;

  const correct = label === q.answer;
  if (correct) score++;
  updateScore();

  const btns = document.getElementById('choicesArea').querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const lbl = btn.querySelector('.choice-label').textContent;
    if (lbl === q.answer) btn.classList.add('correct');
    else if (lbl === label && !correct) btn.classList.add('wrong');
  });

  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btnNext').disabled = false;
}

function goNext() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) {
    current--;
    renderQuestion();
  }
}

function updateScore() {
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('totalNum').textContent = answered.filter(Boolean).length;
}

function showResult() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('choicesArea').style.display = 'none';
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('btnRow').style.display = 'none';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const pass = pct >= 65;

  document.getElementById('resultScore').textContent = `${score} / ${total}`;
  document.getElementById('resultPassBadge').innerHTML =
    `<div class="result-pass ${pass ? 'pass' : 'fail'}">${pass ? '✓ 合格ライン達成' : '✗ 合格ライン未達'}</div>`;
  document.getElementById('resultSub').textContent =
    `正解率 ${pct}%（合格ライン：65%）`;

  document.getElementById('resultScreen').classList.add('show');
}

function showMode() {
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('modeScreen').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('choicesArea').style.display = 'none';
  document.getElementById('btnRow').style.display = 'none';
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('totalNum').textContent = '0';
}
</script>
