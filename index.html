<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;--text:#e8eaf0;--text2:#8b91a8;--text3:#5c6278}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}.header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}.score-badge{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:20px}.score-badge span{color:var(--accent);font-weight:700}.progress-wrap{width:100%;max-width:760px;margin-bottom:28px}.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px;font-family:'DM Mono',monospace}.progress-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease}.card{width:100%;max-width:760px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.q-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:14px}.q-text{font-size:16px;line-height:1.8;color:var(--text);white-space:pre-wrap}.choices{width:100%;max-width:760px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}.choice-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;text-align:left;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;cursor:pointer;transition:all .15s ease;display:flex;align-items:flex-start;gap:12px}.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}.choice-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:20px;padding-top:1px}.choice-btn.correct{border-color:var(--correct);background:rgba(61,214,140,.08)}.choice-btn.correct .choice-label{color:var(--correct)}.choice-btn.wrong{border-color:var(--wrong);background:rgba(245,91,91,.08)}.choice-btn.wrong .choice-label{color:var(--wrong)}.choice-btn:disabled{cursor:default}.explanation{width:100%;max-width:760px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:20px 24px;margin-bottom:20px;font-size:14px;line-height:1.8;color:var(--text2);display:none;animation:fadeIn .3s ease}.explanation.show{display:block}.explanation-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}.btn-row{width:100%;max-width:760px;display:flex;gap:12px}.btn{flex:1;padding:14px 20px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.btn-primary:hover{opacity:.88;transform:translateY(-1px)}.btn-secondary{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}.btn-secondary:hover{border-color:var(--accent);color:var(--text)}.btn:disabled{opacity:.35;cursor:default;transform:none}.result-screen{width:100%;max-width:760px;text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:none;animation:fadeIn .4s ease}.result-screen.show{display:block}.result-title{font-size:28px;font-weight:700;margin-bottom:8px}.result-score{font-family:'DM Mono',monospace;font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:24px 0}.result-sub{font-size:16px;color:var(--text2);margin-bottom:32px}.result-pass{display:inline-block;padding:8px 24px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:32px}.result-pass.pass{background:rgba(61,214,140,.15);color:var(--correct);border:1px solid var(--correct)}.result-pass.fail{background:rgba(245,91,91,.15);color:var(--wrong);border:1px solid var(--wrong)}.mode-screen{width:100%;max-width:760px;text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;animation:fadeIn .4s ease}.mode-title{font-size:24px;font-weight:700;margin-bottom:8px}.mode-sub{font-size:14px;color:var(--text2);margin-bottom:36px}.mode-buttons{display:flex;flex-direction:column;gap:12px}.mode-btn{padding:18px 24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;text-align:left;display:flex;justify-content:space-between;align-items:center}.mode-btn:hover{border-color:var(--accent);background:var(--surface)}.mode-btn-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:3px}.mode-btn-arrow{color:var(--accent);font-size:18px}.gp{width:100%;max-width:760px;display:none;animation:fadeIn .4s ease}.gin{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.gtl{font-size:20px;font-weight:700}.gbk{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .15s ease}.gbk:hover{border-color:var(--accent);color:var(--text)}.gl{max-height:70vh;overflow-y:auto;padding-right:4px}.gi{border-bottom:1px solid var(--border);padding:12px 0}.gt{color:var(--accent);font-weight:700;font-size:14px;margin-bottom:3px}.ge{color:var(--text3);font-size:11px;font-weight:400;margin-left:6px}.gd{color:var(--text2);font-size:13px;line-height:1.7}.gs{width:100%;padding:10px 16px;margin-bottom:16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none}.gs:focus{border-color:var(--accent)}.gfb{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;transition:all .15s ease}.gfb:hover{border-color:var(--accent);color:var(--text)}.gfb.active{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:600px){.card{padding:22px 18px}.q-text{font-size:14px}.choice-btn{font-size:14px;padding:14px 16px}.result-score{font-size:48px}}
</style>

<div class="mode-screen" id="modeScreen"><div class="mode-title">学習モードを選択</div><div class="mode-sub">全80問（模擬試験1：001〜040 / 模擬試験2：041〜080）</div><div id="resumeBanner" style="display:none;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:20px;text-align:left"><div style="font-size:14px;color:var(--text);margin-bottom:10px">📌 前回の続きがあります</div><button class="btn btn-primary" onclick="doResume()" style="width:100%;padding:12px">続きから再開する</button><button style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;margin-top:8px;width:100%" onclick="clearState();document.getElementById('resumeBanner').style.display='none'">破棄して最初から</button></div><div class="mode-buttons"><button class="mode-btn" onclick="startQuiz('all')"><div><div>全問チャレンジ</div><div class="mode-btn-sub">80問すべてに取り組む</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('exam1')"><div><div>模擬試験 1</div><div class="mode-btn-sub">問題001〜040（40問）</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('exam2')"><div><div>模擬試験 2</div><div class="mode-btn-sub">問題041〜080（40問）</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('random')"><div><div>ランダム 20問</div><div class="mode-btn-sub">80問からランダムに20問</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="toggleGlossary()" style="border-color:var(--accent2)"><div><div>📖 用語集</div><div class="mode-btn-sub">HVIT公式用語一覧（公式テキストより）</div></div><div class="mode-btn-arrow">→</div></button></div></div>
<div class="gp" id="glossaryPanel"><div class="gin"><div class="gh"><div class="gtl">📖 ITIL 4 HVIT 用語集</div><button class="gbk" onclick="toggleGlossary()">← モード選択に戻る</button></div><input class="gs" id="glossarySearch" placeholder="用語を検索..." oninput="filterGlossary(this.value)"><div class="gl" id="glossaryList"></div></div></div>
<div class="progress-wrap" id="progressWrap" style="display:none"><div class="progress-info"><span id="progressText">問題 1 / 40</span><span id="progressPct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>

<script>
// =====================================================================
// 問題データ（HVIT 模擬試験1 全40問）
// 日本語訳は公式テキスト（2025年4月確認済み）に基づいています
// =====================================================================
const ALL_QUESTIONS=[
{n:"001",t:"ある銀行組織は、ほとんどのサービスをオンラインに移行し、支店を閉鎖しています。\nこれは何の例ですか？",c:["デジタル組織","セーフティ・カルチャ","ハイベロシティIT","継続的デリバリ"],a:0,e:"正解：A　デジタル組織とは「デジタル技術によって、ビジネスのやり方を大幅に変革した、または大幅に異なるビジネスを行うようになった組織」を指します。銀行がサービスをオンライン化し物理的拠点を廃止することは、デジタル技術によるビジネスの根本的な変革であり、デジタル組織の典型例です。（参照 2.3）"},
{n:"002",t:"ある組織がデジタルトランスフォーメーションを進めており、新しい行動パターンの定着を推進しています。調査の結果、一部のチームメンバーは実験を避け、唯一の正解を探したり待ったりする傾向があることが判明しました。\nこの態度によって最も影響を受ける可能性が高い主要な行動パターンは、次のうちどれですか？\n1. 曖昧さと不確実性を受け入れる\n2. 継続的な学習にコミットする\n3. 顧客の仕事の達成を支援する\n4. 信頼し、信頼される",c:["1 および 2","2 および 3","3 および 4","1 および 4"],a:0,e:"正解：A　実験を避ける態度は「曖昧さと不確実性を受け入れる（1）」と「継続的な学習にコミットする（2）」の2つの行動パターンに最も影響します。実験は不確実性への対応と継続的な学習の両方に不可欠であり、これらを避けることでこの2つが損なわれます。「顧客の仕事の達成（3）」や「信頼（4）」への影響は相対的に小さいとされています。（参照 3.1.1, 3.1.5）"},
{n:"003",t:"ある組織は複数のサービス開発バリューストリームを持っています。ユーザが変更内容について十分な情報を得られていないこと、また新サービスに関するユーザからの苦情が適切なチームにエスカレーションされていないことが判明しました。\nこの状況の改善に最も役立つプラクティスはどれですか？",c:["問題管理","リスク管理","サービス設計","サービスデスク"],a:3,e:"正解：D　サービスデスクプラクティスは、サービス・プロバイダとユーザの間の双方向コミュニケーションゲートウェイとして機能し、コミュニケーションを適切なバリューストリームへ記録・統合することに重点を置いています。ユーザへの情報伝達と苦情の適切なエスカレーションはまさにこのプラクティスの役割です。（参照 Service Desk Practice Guide 2.4.2）"},
{n:"004",t:"ある組織は、ソフトウェアを迅速に開発したいと考えています。\n開発作業にセキュリティ要件を組み込む最善の方法はどれですか？",c:["開発者全員を情報セキュリティ管理のトレーニングを受けさせ、自分たちが開発する製品のセキュリティに責任を持てるようにする","各開発チームに情報セキュリティ管理の専門家を配置し、開発者にガイダンスを提供する","開発されたすべての本番ソフトウェアをレビューおよび承認する専任の情報セキュリティ管理チームを維持する","開発速度を上げるために、開発完了後の本番ソフトウェアにセキュリティコントロールを追加する"],a:0,e:"正解：A　ハイベロシティIT環境では、情報セキュリティは開発・運用の日常業務に可能な限り統合されます。実務担当者の日常業務にセキュリティの職責を統合することが最善とされています。適切にトレーニングされたスタッフはセキュリティインシデントの検知・防止・修正に貢献できます。別チームによるレビューや開発後のセキュリティ追加は遅延や機能不全を招きます。（参照 4.5.2）"},
{n:"005",t:"リーンとアジャイルが高パフォーマンスへの障壁とみなすものはどれですか？",c:["大きなバッチサイズの作業","仕掛中の作業（WIP）の制限","プッシュではなくプルによる作業","作業の可視化"],a:0,e:"正解：A　リーンおよびアジャイルでは、大きなバッチサイズの作業がリードタイムを延ばし高パフォーマンスの障壁となるとされています。作業を小さなバッチに分割することがスループット改善の予測因子とされています。WIPの制限・プルシステム・作業の可視化はいずれも推奨される手法であり、障壁ではありません。（参照 2.5.2.1, 2.5.2.2）"},
{n:"006",t:"ハイベロシティITに関する記述として、正しいものはどれですか？",c:["継続的デプロイメントが必須である","常に時間を測定基準として考慮する","製品の保証のみに関連する","常に価値ある投資である"],a:1,e:"正解：B　ハイベロシティITとは「デジタル技術をビジネスの大幅な実現のために活用するもので、市場投入時間・顧客への時間・変更への時間、そして速度全般が重要となる」ものです。時間は常に重要な測定基準です。継続的デプロイメントは必須ではなく規制等により困難な場合もあります。有用性と保証の両方に関連し、常に賢明な投資とは限りません。（参照 2.1）"},
{n:"007",t:"トヨタカタ（Toyota Kata）を最もよく説明しているものはどれですか？",c:["社会にとって何が善かを特定するためのアプローチ","フローを改善し無駄を削減することでスループットを向上させるアプローチ","当事者がどのように協力して価値を共創するかを特定するアプローチ","科学的実験へのアプローチで、新たな習慣の形成と維持を支援するもの"],a:3,e:"正解：D　トヨタカタは「科学的実験への規律あるアプローチで、私たちが誤った結論に飛びつく自然な傾向を減らし、実践とコーチングが新たな習慣の形成と維持を助ける」ものです。選択肢Aは倫理、選択肢Bはリーン、選択肢Cはサービスドミナントロジックの説明です。（参照 3.2.3.3）"},
{n:"008",t:"あるサービスは有用性と保証のすべての要件を満たしていますが、顧客とユーザの体験が良くありません。\nユーザと顧客が価値を感じる体験を理解するのに最も貢献するプラクティスはどれですか？",c:["サービスデスク","サービスカタログ管理","事業分析","ソフトウェア開発・管理"],a:2,e:"正解：C　事業分析プラクティスには「ユーザのニーズを理解し、有用性と保証に関する従来の要件に加えて、顧客体験（CX）またはユーザ体験（UX）の要件に変換する」活動が含まれます。体験要件の理解と変換が目的に最も合致します。（参照 4.4.1, 表4.21）"},
{n:"009",t:"サイロ構造を持ち、コミュニケーションが不十分な組織が、ITシステムのレジリエンスをテストするためにカオス・エンジニアリングツールの使用を開始しました。\nコミュニケーション不足によって最も直接的に影響を受けるプラクティスはどれですか？",c:["問題管理","サービス継続性管理","インフラストラクチャおよびプラットフォーム管理","モニタリングおよびイベント管理"],a:3,e:"正解：D　モニタリングおよびイベント管理ツールは、カオス・エンジニアリングツールが引き起こす停止にフラグを立てたり、技術コンポーネントよりもサービス品質をモニタリングするよう設定できます。コミュニケーション不足はこのモニタリング・対応プロセスに最も直接的な影響を与えます。（参照 4.3.2, 表4.18）"},
{n:"010",t:"ある集中型IT部門が、ITシステムのレジリエンスとパフォーマンスを向上させるためにサイトリライアビリティエンジニアリング（SRE）を採用しています。\nこれは何の例ですか？",c:["ハイベロシティIT","デジタル技術","ITトランスフォーメーション","デジタルトランスフォーメーション"],a:2,e:"正解：C　ビジネスとITが別組織として扱われている組織において、ITサービスの提供方法を大幅に改善する大きな変革は「ITトランスフォーメーション」と呼ばれます。SREはIT運用に焦点を当てたアプローチであり、ハイベロシティITが目指すビジネス実現の速度向上とは直接的に一致しません。デジタルトランスフォーメーションはデジタル技術によるビジネス目標の改善を指します。（参照 2.4.1）"},
{n:"011",t:"レガシー情報システムのモノリシックな構造により、アジャイルやCI/CD（継続的インテグレーション／継続的デリバリ）などの最新ソフトウェアエンジニアリング技術の恩恵を十分に受けられない組織があります。\n小規模で頻繁な変更を可能にする、疎結合のサービス、技術、および情報要素の設計を含むプラクティスはどれですか？",c:["ソフトウェア開発・管理","デプロイメント管理","事業分析","アーキテクチャ管理"],a:3,e:"正解：D　アーキテクチャ管理プラクティスには「疎結合のサービス、技術、および情報アーキテクチャの設計」が含まれます。ソフトウェア開発・管理は疎結合アーキテクチャ上でのコンポーネントの詳細設計・構築、デプロイメント管理は展開範囲の縮小・デプロイパターン、事業分析はコンポーネント要件の理解を担います。（参照 4.2.2, 表4.6）"},
{n:"012",t:"ある組織が2つのビジネス部門向けにサービスを導入しようとしていますが、両部門のサービス稼働時間要件が異なります。その結果、サービスは24時間稼働が必要となり、高レベルの冗長性を持つ設計が求められます。しかし、どちらの顧客もそのようなソリューションへの投資を自分たちの責任とは考えていません。\nこの状況を適切に管理するプラクティスはどれですか？",c:["関係管理","サービスデスク","アーキテクチャ管理","リスク管理"],a:0,e:"正解：A　関係管理プラクティスは「ステークホルダー間で相反する要件を適切に調整する」ことを確実にします。これは競合するステークホルダーの要件の調整であり、リスクではなく（発生可能性のある問題ではなく）既に表面化した課題であるため、リスク管理ではありません。（参照 Relationship Management Practice Guide 2.1）"},
{n:"013",t:"ある組織は、ウェブサイト訪問者が特定のアクション（連絡先情報の提供や購入など）を行う割合を高めたいと考えています。どの機能を変更するかについて絶えず議論が生じており、時間と労力が無駄になっています。\n組織がこの目標を達成しつつ、変更に伴う議論を減らすために利用できるアプローチはどれですか？",c:["最小実行可能プロダクト（MVP）を作成し、顧客から得たフィードバックに基づいて変更する","各機能変更に関連する遅延コストを計算し、それに基づいて優先順位を付ける","デザイン思考を活用し、すべてのステークホルダーのニーズと利益のバランスをとる変更を行う","A/Bテストを使用し、ウェブサイト機能の異なるバージョンへの訪問者の反応に基づいて意思決定する"],a:3,e:"正解：D　A/Bテストは新機能の効果を分離し、ユーザの行動を測定して確かなデータに基づく意思決定を可能にします。一方のグループに旧バージョン、別グループに新バージョンを提供し、測定結果を比較することで、議論ではなくデータが意思決定を主導します。MVPは市場が不安定な場合向け、遅延コストは行動変容の変数特定には使えず、デザイン思考は仮説が相反する場合に有用ですが目標の行動変容には直結しません。（参照 4.1.4）"},
{n:"014",t:"あるビジネスアナリストは、ビジネスマネージャが部門改善ニーズについて相反する仮説を持っており、また自分たちの要件を明確に表現するのが難しいことに気づきました。\n要件を収集する最善のアプローチはどれですか？",c:["詳細な質問の台本に基づいたインタビューを実施する","1週間かけて部門の業務を分析し、論理的な結論を出す","可能なソリューションの複数のプロトタイプを開発し、最も効果的なものを採用する","ビジネスアナリストが最も妥当と考えるソリューションをディレクターに強制するよう依頼する"],a:2,e:"正解：C　相反する仮説と要件の不明確さは「複雑（Complex）」なコンテキストを示しており、クネビン（Cynefin）フレームワークでは「不明確かつ不可知の因果関係があり、安全に失敗できる実験（緊急プラクティス）」が求められます。複数のプロトタイプ開発はこれに対応します。詳細な台本インタビューは「明確（Obvious）」なコンテキスト、分析は「煩雑（Complicated）」なコンテキスト、強制は「混沌（Chaotic）」なコンテキストに対応します。（参照 3.2.3.1）"},
{n:"015",t:"あるチームが、ソフトウェアをより頻繁かつ確実にリリースする方法を模索しています。そのチームは、CI/CD（継続的インテグレーション／継続的デリバリ）と組織の「デプロイメント管理」プラクティスの関係を検討しています。\n継続的デリバリのコンテキストにおいて、「デプロイメント管理」プラクティスに含まれるものはどれですか？",c:["本番環境ですべてのテストに合格した変更のデプロイを自動化する","バージョン管理されたリポジトリを使用して、新規または変更されたサービスコンポーネントをデプロイする","デプロイ失敗後の根本原因分析とポストモーテムを実施する","デプロイを自動化するために必要なアーキテクチャを設計・改善する"],a:1,e:"正解：B　デプロイメント管理プラクティスは「バージョン管理されたリポジトリを使用して、新規または変更されたサービスコンポーネントをデプロイする、あるいは以前のバージョンに戻す」活動を含みます。選択肢Aは継続的デプロイメント（CD）の説明、選択肢Cは問題管理の役割、選択肢Dはアーキテクチャ管理の役割です。（参照 4.3.4, 表4.17）"},
{n:"016",t:"ある組織がカオス・エンジニアリングを導入しようとしています。本番環境でさまざまな実験を行い、システムがどのように応答するかを確認する予定です。\nこの作業方法をサポートするためのサービス継続性管理の追加措置の例はどれですか？",c:["実験期間中の帯域幅・スループット・応答時間などのパフォーマンスデータを記録する","実験結果を調査し、本番環境の潜在的な脆弱性を特定する","バックアップネットワーク接続を検証し、想定される作業負荷に対してテストする","サービス停止がビジネス活動に与える影響を理解するための明確なサービスモデルを提供する"],a:2,e:"正解：C　サービス継続性管理のカオス・エンジニアリングに関する活動として「カオス・エンジニアリングツールによる予期しない停止に対応するための、十分なレジリエンスと冗長性を備えたサービス継続性措置の設計」が挙げられます。バックアップネットワーク接続の検証はこれに該当します。選択肢Aはキャパシティ・パフォーマンス管理、選択肢Bは問題管理、選択肢Dはアーキテクチャ管理の活動です。（参照 4.3.2, 表4.15）"},
{n:"017",t:"あるサービス・プロバイダが、製品に基づくサービスを提供しています。そのサービスは適切な機能性を持ち、顧客が期待するすべてのサービスレベルを満たしています。しかし、スポンサーは業務プロセスのパフォーマンス向上が期待ほどではないと不満を述べています。\nサービス・プロバイダが次に取るべきアクションはどれですか？",c:["サービスの保証をレビューする","サービスの有用性をレビューする","ユーザトレーニングをレビューする","スポンサーのサービスレベルへの理解をレビューする"],a:2,e:"正解：C　サービスは機能性（有用性）とサービスレベル（保証）の両方を満たしていますが、業務プロセスの改善が得られていません。新しい機能性の導入にはユーザトレーニングが必要であり、ユーザが新機能を適切に活用できていない可能性があります。サービス設計プラクティスでは、変更が関連するすべての当事者（顧客、ユーザ、サプライヤ含む）への影響を考慮することが求められています。（参照 Service Design Practice Guide 2.1）"},
{n:"018",t:"あるサービス・プロバイダは、顧客やユーザと時間をかけて丁寧に新サービスの計画・設計を行っています。導入時には顧客・ユーザの満足度は高いものの、本番稼働後1年以内にほとんどのサービスで満足度が大幅に低下します。\nこの状況を改善する最善のアプローチはどれですか？",c:["設計に段階的アプローチを導入する","新サービスの測定指標とメトリクスを改善する","初期のサービス設計活動の期間を延ばす","満足度が低下したとき顧客に無償サービスアップグレードを提供する"],a:0,e:"正解：A　「サービス設計には反復的・段階的アプローチを取ることが重要であり、これにより本番稼働中の製品・サービスが組織と顧客の進化するニーズに継続的に適応できる」とされています。測定の改善は原因の特定に必要ですが行動への変換は不十分です。設計期間の延長は設計が長期間固定化されるという問題を悪化させます。無償アップグレードはコスト増加を招き根本的解決にはなりません。（参照 Service Design Practice Guide 2.1）"},
{n:"019",t:"ある組織はCI/CDを導入し、新機能やバグ修正を継続的にソフトウェアに組み込んでいます。変更を迅速にリリースしなければならないプレッシャーにより、テスト活動に十分な時間が取れないことが多くあります。\n「サービス妥当性確認・テスト」プラクティスが、適切なテストを確保するために推奨するアプローチはどれですか？",c:["開発ライフサイクル全体を通じてテストを継続的に実施する","テスト失敗を引き起こすデプロイを停止する","カオス・エンジニアリングの原則を活用してサービスの信頼性をテストする","テスト環境へのソフトウェアのインストールを自動化する"],a:0,e:"正解：A　サービス妥当性確認・テストプラクティスでは「ユニットテスト、統合テスト、回帰テストが開発ライフサイクル全体を通じて継続的に実施される」ことを推奨しています。デプロイの停止はデプロイメント管理の活動です。カオス・エンジニアリングはCI/CDではなくレジリエントな運用に関連するテスト活動です。テスト環境へのインストール自動化はデプロイメント管理の活動です。（参照 4.2.6, 表4.12）"},
{n:"020",t:"あるフィンテック組織は、デジタル製品の開発・管理にDevOpsアプローチを採用しています。その組織は厳しい規制の対象であり、毎年外部監査を受けています。\n「保証された適合」というHVIT目標を達成するために最も役立つプラクティスはどれですか？",c:["リスク管理","関係管理","可用性管理","インフラストラクチャおよびプラットフォーム管理"],a:0,e:"正解：A　リスク管理プラクティスは「エンタープライズリスク管理、技術的リスク管理、および新しい働き方のバランスのとれた実践的なアプローチの構築」を通じて、保証された適合という目標に貢献します。関係管理はステークホルダーとの関係確立、可用性管理はサービス可用性の確保、インフラストラクチャおよびプラットフォーム管理はインフラの監督が主目的であり、保証された適合への直接的な貢献は限定的です。（参照 4.5.1, 表4.22）"},
{n:"021",t:"あるサービス・プロバイダは、製品の一つに基づくサービスを5年間提供しています。サービス消費者との契約期間の平均は2年間です。\nこれは何の例ですか？",c:["サービスバリューチェーンに対する異なる視点","バリューストリームに対する異なる認識","デジタル製品ライフサイクルに対する異なる視点","関係管理に対する異なる見解"],a:2,e:"正解：C　デジタル製品ライフサイクルにはサービス・プロバイダとサービス消費者の視点があります。プロバイダにとってのライフサイクルは潜在顧客が存在する限り継続し（5年間）、消費者にとってのライフサイクルは製品を使用している間（平均2年間）です。これらは重なり合いますが、それぞれ異なる期間となります。（参照 2.6.2）"},
{n:"022",t:"ある組織は、顧客注文の処理と出荷の速度を大幅に向上させるために、自動化に多額の投資を行いました。\nこれは何の例ですか？",c:["継続的デリバリ","デジタル製品","ITトランスフォーメーション","デジタルトランスフォーメーション"],a:3,e:"正解：D　デジタルトランスフォーメーションは「デジタル技術を利用して、デジタル以外の手段では実現不可能だった組織の達成目標の実現を大幅に改善すること」です。この事例では、デジタル化・ロボット化・自動化への大規模な投資によって業務のやり方を大幅に変えています。継続的デリバリはソフトウェアリリースの方法、ITトランスフォーメーションはITサービスの開発・運用・サポート方法の変革を指します。（参照 2.4）"},
{n:"023",t:"ハイベロシティITのコンテキストにおける「組織と人材」の側面の最善の例はどれですか？",c:["開発（Dev）と運用（Ops）の間のデータフローを自動化する","ビジネスとITのスタッフを単一チームに統合する","コミュニケーションシステムを共有してコラボレーションを改善する","サプライヤがバリューストリームにどのように貢献するかを理解する"],a:1,e:"正解：B　ハイベロシティIT環境では、ITが組織の製品・サービスに不可欠な要素である場合、IT部門は各製品・サービスを担当するビジネス部門に統合されることが多くなります。ビジネスとITスタッフの単一チームへの統合はこの「組織と人材」の側面を最もよく表しています。データフロー自動化・共有コミュニケーションシステムは「情報と技術」、サプライヤのバリューストリームへの貢献は「パートナーとサプライヤ」の側面です。（参照 2.6.7）"},
{n:"024",t:"あるマネージャはリスク回避を重視し、問題が発生したときスタッフを非難します。また、提案に耳を傾けず、実験も認めません。その結果、チームのイノベーションが失われ、ベテランメンバー数名が組織を去りました。\nこのマネージャがイノベーションを高め、より多くのスタッフを引き留めるためのセーフティ・カルチャの行動パターンとして正しい2つはどれですか？\n1. インクルージョン（包摂）を重視し、有害な関係を無視する\n2. 失敗を改善の機会として扱う\n3. 継続的な組織学習を奨励する\n4. コラボレーションを奨励し、対立を抑制する",c:["1 および 2","2 および 3","3 および 4","1 および 4"],a:1,e:"正解：B　セーフティ・カルチャでは「失敗が発生することを認め、人を責めるのではなくシステムを改善の対象とする（2）」ことと「ハイベロシティIT環境では、人々が批判や恥をおそれずに意見を共有し改善のための実験ができることが重要であり、継続的な学習にも必要（3）」とされています。「有害な関係を無視する」は誤りで、むしろ注意を払う必要があります。「対立を抑制する」も誤りで、オープンで誠実なコミュニケーション（対立が伴う場合も含む）がセーフティ・カルチャでは重要です。（参照 3.2.2.2）"},
{n:"025",t:"あるサービス・プロバイダが、速い市場投入と定期的な機能強化が競争優位の構築に不可欠な、新興で変動の大きい市場に向けてモバイルアプリを多数リリースしようとしています。\nこの優位性を達成するために「ソフトウェア開発・管理」プラクティスが貢献できることはどれですか？",c:["ユーザ要件を分析・文書化し、期待が満たされることを確保する","IaC (Infrastructure as Code)を活用してアプリへの迅速な変更ニーズを支援する","「完了の定義」に非機能要件を含めて、アプリが本番環境で失敗する可能性を低減する","開発費用が適切な投資対効果をもたらすようにモバイルアプリの要件を優先順位付けする"],a:1,e:"正解：B　ソフトウェア開発・管理プラクティスは「仮想ハードウェアインフラストラクチャの高速デリバリ・プロビジョニングを活用するためのソフトウェアアーキテクチャとコードの開発」を通じて高速開発に貢献します。IaC (Infrastructure as Code)はこれに直結します。選択肢Aは事業分析、選択肢Cはレジリエントな運用、選択肢Dは価値ある投資への貢献です。（参照 4.2.1, 表4.5, Software Development and Management Practice Guide 2.4.1）"},
{n:"026",t:"ある組織は、主に技術の陳腐化と多くのコンポーネントがベンダーのサポート対象外のバージョンに留まっていることが原因とされる障害を繰り返し経験しています。\nこのような技術的負債の解消を支援するガイダンスを含むプラクティスはどれですか？",c:["モニタリングおよびイベント管理","インフラストラクチャおよびプラットフォーム管理","サービスデスク","インシデント管理"],a:1,e:"正解：B　インフラストラクチャおよびプラットフォーム管理プラクティスには「インフラストラクチャおよびプラットフォームのサービスコンポーネントを作成または変更することにより技術的負債を特定し削減する」活動が含まれます。（参照 4.3.1, 表4.14）"},
{n:"027",t:"ある組織は、ウェブサイトの速度が顧客体験に悪影響を与え、売上損失を招いていることを発見しました。組織は新しいマーケティングキャンペーンの開始前にIT部門にこの問題の解決を求めています。\nこの問題に対処するためにキャパシティ・パフォーマンス管理プラクティスが検討できる最善の技術はどれですか？",c:["ChatOps","サイトリライアビリティエンジニアリング（SRE）","AIOps","カオス・エンジニアリング"],a:2,e:"正解：C　AIOpsは「可用性・パフォーマンスのモニタリング、障害認識、予測分析、イベントの相関分析などの主要なIT運用機能を強化・部分的に代替するプラットフォーム」であり、「パターンと異常の特定、資産のキャパシティと使用率の把握、将来の製品・サービスのキャパシティ計画立案」の機能を提供します。これはプロアクティブなモニタリングとキャンペーンに向けたキャパシティ計画の両方に対応します。（参照 4.3.5, 表4.18）"},
{n:"028",t:"ある組織はバックログの優先順位付けに遅延コスト（Cost of Delay）を使用しています。次のスプリントに含められる項目は4つのうち1つだけです。\nどの項目を含めるべきですか？\nA. 項目Aが遅延した場合：直接コスト£1,000、間接コスト約£2,000、将来の開発に重大な非財務的影響\nB. 項目Bが遅延した場合：直接コスト£800、間接コスト約£3,000、将来の開発に重大な非財務的影響\nC. 項目Cが遅延した場合：直接コスト£1,200、間接コスト約£2,000、重大な非財務的影響なし\nD. 項目Dが遅延した場合：直接コスト£1,000、間接コスト約£3,000、重大な非財務的影響なし",c:["項目A（合計財務コスト£3,000 ＋ 重大な非財務的影響）","項目B（合計財務コスト£3,800 ＋ 重大な非財務的影響）","項目C（合計財務コスト£3,200、非財務的影響なし）","項目D（合計財務コスト£4,000、非財務的影響なし）"],a:1,e:"正解：B　遅延コストは財務的コスト（直接＋間接）と非財務的コストの両方を考慮する必要があります。重大な非財務的影響は回避すべきであり、AとBが該当します。財務的コストはA（£3,000）よりB（£3,800）の方が大きいため、Bを優先すべきです。項目CとDは非財務的影響がないため、非財務的影響のある項目より優先度が低くなります。（参照 Portfolio Management Practice Guide 2.4.1）"},
{n:"029",t:"HVIT目標の「迅速な開発」に最も密接に関連するサービスバリューチェーン活動の2つはどれですか？",c:["「取得/構築」と「設計と移行」","「設計と移行」と「提供とサポート」","「提供とサポート」と「取得/構築」","「設計と移行」と「レジリエントな運用」"],a:0,e:"正解：A　「高速開発目標は、主にサービスバリューチェーンの設計と移行および取得/構築活動の一部として行われるアプリケーション開発とインフラストラクチャエンジニアリングによって達成されます」。選択肢Dの「レジリエントな運用」はサービスバリューチェーン活動ではなく、HVIT目標の一つです。（参照 2.5.1）"},
{n:"030",t:"ハイベロシティITへの変革を検討する際に正しい記述はどれですか？",c:["競争優位につながる可能性のあるリスクを意識的に取ることは許容される","ハイベロシティITは物理デバイスのパフォーマンス向上のためにデータを活用することに焦点を当てている","組織文化への影響を考慮する必要はない","段階的な改善ではなく大きな変更を行うことでリスクを最小化できる"],a:0,e:"正解：A　ハイベロシティITでは「競争優位を獲得または維持するために、意識的にリスクを取る状況があり得る」とされています。ハイベロシティITはビジネス実現に焦点を当てており、物理デバイスの話は運用技術（OT）の説明です。変革には文化的な変化が伴い、組織文化への影響を考慮する必要があります。大きな変更よりも段階的な改善の方がリスクを低く抑えられます。（参照 2.1）"},
{n:"031",t:"ある従業員は職場での懸念を持っていますが、それを他者に伝えると評判や立場が損なわれることを恐れているため、情報を共有しません。\nこの状況の防止を主な目的とするものはどれですか？",c:["デザイン思考","職務の統合（Integration of Duties）","セーフティ・カルチャ","トヨタカタ"],a:2,e:"正解：C　セーフティ・カルチャとは「人々が自分らしくいられ、自分を表現できる居心地のよい雰囲気」であり、そのような文化では人々は「評判や立場が損なわれると恐れたときよりも、リスクを指摘する可能性が高くなります」。（参照 3.2.2.2）"},
{n:"032",t:"あるサービス・プロバイダは最近、アジャイルソフトウェア開発を使用したハイベロシティITアプローチを採用しました。新機能のデリバリ時間は急速に短縮されましたが、関連サービスではインシデントによる中断が急増しています。\nこれらの問題に対処するための最善のアクションはどれですか？",c:["投資が最も緊急の機能要件の開発に使われるよう優先順位付けを改善する","問題の原因が特定されるまでウォーターフォール型ソフトウェア開発アプローチに戻す","価値がどのように共創されるかにより多くの注意を向けるためにサービス消費者とのコラボレーションを強化する","運用上の非機能要件を含めるよう「完了の定義」を拡張する"],a:3,e:"正解：D　インシデントの急増はレジリエントな運用への注力が不足していることを示しています。「完了の定義に非機能要件を含めることはアジャイルアプローチを強化し、運用上の問題に対処する良い方法です。非機能要件を含む完了の定義はレジリエントな運用に貢献し、不必要な手戻りが減るため迅速な開発にも貢献します」。（参照 4.3.3）"},
{n:"033",t:"最近、基幹サービスにエラーが発生し、インシデントにつながっています。サポートチームはサービスを復旧させるためにさまざまな対応策を試みましたが、一部の対応策がさらに別のインシデントを引き起こしました。\nこれらの対応策によって生じた技術的負債の量を将来的に削減するために採用すべき活動はどれですか？",c:["問題分析を実施してインシデントの原因を理解し、サービスデスクが使用した対応策よりも効果的なワークアラウンドを提案する","カオス・エンジニアリングツールを積極的に使用して問題を特定し、最も効果的な方法で冗長性を活用する","このタイプのインシデントをすべてスペシャリストの問題コントロールチームに直接ルーティングし、迅速な問題診断と解決を可能にする","インシデント対応策を分析して最も成功したものを特定し、その対応策を変更要求のベースにする"],a:0,e:"正解：A　「問題コントロールとエラーコントロールの方法を適用して技術的負債を管理する」ことがインフラストラクチャおよびプラットフォーム管理プラクティスの活動として挙げられています。問題分析による根本原因の理解とより効果的なワークアラウンドの提案がこれに対応します。選択肢Dのような不完全な対応策に基づいた変更要求は、根本的な原因を修正せず、さらなる技術的負債の原因になります。（参照 4.3.1, 表4.14）"},
{n:"034",t:"新しい製品・サービスの研究と、既存の製品・サービスの継続的な評価を伴うHVIT目標はどれですか？",c:["価値ある投資","迅速な開発","レジリエントな運用","保証された適合"],a:0,e:"正解：A　「価値ある投資」目標は「デジタル投資を特定・正当化する」ことを含み、「新しいデジタル製品・サービスを収益性の観点から構想・評価すること」と「承認後も継続的に投資を評価すること」が重要とされています。迅速な開発は新しい・改善されたデジタル製品・サービスを頻繁かつ迅速・確実に実現すること、レジリエントな運用は必要なときにデジタル製品を利用可能にすること、保証された適合はガバナンス・リスク・コンプライアンスへの準拠を確保することです。（参照 4.1）"},
{n:"035",t:"あるサービス・プロバイダが新しいサービス消費者のためにアプリケーションを開発しています。潜在的なユーザとのプロトタイピングセッション中に、アプリケーションのコスト増大と実現可能性を脅かす相反する要件が特定されました。\n相反する要件を優先順位付けするのに最も役立つプラクティスはどれですか？",c:["関係管理","サービス妥当性確認・テスト","情報セキュリティ管理","リスク管理"],a:0,e:"正解：A　関係管理プラクティスは「新規または変更された製品・サービスに対する顧客の優先事項の確立への関与」と「苦情への対処と相反する要件の調整への関与」を通じて価値ある投資に貢献します。サービス妥当性確認・テストはMVPのサポート確認、情報セキュリティ管理とリスク管理も価値ある投資を支援しますが、相反するユーザ要件の解決には直接対応しません。（参照 4.1.3, 表4.3）"},
{n:"036",t:"ある組織はIT変更が非常に多く、デプロイメントの速度を心配しています。変更に携わる人々への作業負荷への影響を理解しないまま変更が開始されることが多くあります。\n迅速な開発のためのどの技術がこの状況の解決に最も役立ちますか？",c:["カンバン（Kanban）","レトロスペクティブ（振り返り）","IaC (Infrastructure as Code)","疎結合の情報システム・アーキテクチャ"],a:0,e:"正解：A　カンバンは「作業を可視化し、障害やリソース競合を特定し、進行中の作業を管理するための原則、プラクティス、および定期的な活動のセット」です。作業負荷とリソースの状況を可視化するのに最も効果的です。レトロスペクティブはスプリント後の振り返りですが、既に判明している問題の解決には役立ちません。IaCはデプロイ速度の向上、疎結合アーキテクチャはチーム間の依存関係削減に役立ちますが、人的作業負荷の把握には対応しません。（参照 4.2.7）"},
{n:"037",t:"あるサービス・プロバイダはハイベロシティITアプローチを6ヶ月前に採用し、定期的かつ成功裏にアップデートをデプロイしています。しかし、サービス障害の数が増加しているという証拠があります。開発チームは「完了の定義」の見直しによる問題解決を提案しました。\n可用性管理プラクティスはどのように「完了の定義」の改善に貢献できますか？",c:["リリースが本番環境に移行される際にすべてのソフトウェアコンポーネントが要件を満たしていることを検証する","最新の「完了の定義」に基づいてテスト活動が開発されることを確実にする","達成可能な保証要件を顧客と交渉・合意する","コードが理解可能で保守可能であり、将来の変更をサポートできることを確実にする"],a:2,e:"正解：C　可用性管理プラクティスは「新規または変更されたサービスの詳細な保証要件をステークホルダーと交渉・合意すること」を通じてレジリエントな運用目標に貢献し、これらが「完了の定義」に含まれます。選択肢Aはデプロイメント管理、選択肢Bはサービス妥当性確認・テスト、選択肢Dはソフトウェア開発・管理の役割です。（参照 4.3.3, 表4.16）"},
{n:"038",t:"ある組織はアジャイルな働き方を採用し、CI/CDを使用しています。組織の「事業分析」プラクティスはウォーターフォール型の働き方でモデル化されています。顧客要件の確立から構築・テスト・デプロイ中の要件検証まで、直線的なフローがあります。\n新しい働き方により良く整合するために、「事業分析」プラクティスはどのように変化すべきですか？",c:["顧客要件の確立ステップを維持し、他のすべての活動を最小化する","エンゲージメントの開始時に顧客要件を確立する","事業分析の役割を他の開発ロールと組み合わせる","事業分析の活動をビジネス関係管理者の責任にする"],a:2,e:"正解：C　アジャイルのコンテキストでは「事業分析プラクティスは特定のチームや役割との関連性が薄れ、プロダクトオーナーやサービスオーナーなどの役割を担うマルチスキルな実務担当者に広く適用されるようになっています」。事業分析の活動は開発活動に埋め込まれ、継続的な活動となります。（参照 Business Analysis Practice Guide 2.1）"},
{n:"039",t:"すべてのサービスバリューチェーン活動に適用されるHVIT目標はどれですか？",c:["迅速な開発","価値ある投資","保証された適合","レジリエントな運用"],a:2,e:"正解：C　「5つの目標はサービスバリューチェーンの特定の活動と密接に関連していますが、保証された適合だけはバリューチェーン全体に適用されます」。迅速な開発は主に設計と移行・取得/構築活動、価値ある投資は主に計画活動、レジリエントな運用は主に提供とサポート活動に関連しています。（参照 2.5.1）"},
{n:"040",t:"ある組織は、情報セキュリティインシデントを管理するための計画が有効であることを確認したいと考えています。\nこれを確保するための最善のアプローチはどれですか？",c:["サプライヤに計画の独立したテストを依頼し、改善方法を推奨してもらう","カオス・エンジニアリングを使用し、定期的にセキュリティインシデントを注入して計画をテストする","関連チームとともに計画のウォークスルーを定期的に実施する","セキュリティインシデントを防止・検知・修正するためのコントロールを計画に追加する"],a:2,e:"正解：C　情報セキュリティ管理プラクティスでは「テストはセキュリティ管理の重要な要素であり、選択した計画とコントロールが実際に機能していることを確認する唯一の方法」とされています。計画と手順の定期的なウォークスルーを通じて、チームが欠陥や非効率を発見し、計画とコントロールを更新できます。サプライヤテストは有用ですが、関連チームの参加が重要です。カオス・エンジニアリングはセキュリティ脆弱性の発見には有用ですが、インシデント対応計画の完全なテストにはなりません。（参照 Information Security Management Practice Guide 2.4.3）"},

{n:"041",t:"ある組織が、人間中心的・全体論的・共創的なサービス設計アプローチを採用したいと考えています。\nこのアプローチの「共創的（co-creational）」な側面を表すものはどれですか？",c:["個々の要素を変更する際に、サービス設計のすべての要素を考慮する","設計プロセスに、内部・外部のすべての関連ステークホルダーを参加させる","サービス設計モデルを使用して、設計活動とリソースを調整する","サービス設計時にステークホルダーへの共感を示し、ユーザの感情を考慮する"],a:1,e:"正解：B　「価値共創」とは、サービス消費者、サービス・プロバイダ、その他のステークホルダーにとっての価値を指します。サービス設計プラクティスは目的に適し使用に適した製品・サービスを設計することを目的とし、内外のすべての関連ステークホルダーを設計プロセスに参加させることが「共創的」側面です。選択肢Aは全体論的（holistic）、選択肢Cはリソース調整、選択肢Dはデザイン思考の人間中心的アプローチを表します。（参照 4.4, Service Design Practice Guide 2.1）"},
{n:"042",t:"ある組織が新しいサービスをマイクロサービスとして設計することを決定しました。理由の一つは市場投入時間の短縮です。\nこの状況に対するアーキテクチャ管理プラクティスの最善の貢献はどれですか？",c:["組織のビジネスアーキテクチャをレビューし、リソースの活用方法を把握する","アーキテクチャのテンプレートとガイドラインを提供してサービス設計の作業量を削減する","新しいマイクロサービスのコンポーネント間の相互依存関係を追跡するシステムを維持する","新しいマイクロサービスに関連する顧客要件を理解・解釈する"],a:1,e:"正解：B　アーキテクチャ管理プラクティスの成功要因は「組織のアーキテクチャが目標とする状態に向けて継続的に進化することを確実にする」ことです。関連するアーキテクチャテンプレートとガイドラインを維持することで、サービス設計の作業量と時間を削減できます。選択肢Aはビジネスアーキテクチャのレビューで直接市場投入時間短縮に貢献しません、選択肢Cはサービス構成管理プラクティス、選択肢Dは事業分析プラクティスの役割です。（参照 Architecture Management Practice Guide 2.4.2）"},
{n:"043",t:"あるチームがユーザがオンライン購入できる新しいモバイルアプリを開発しています。\nユーザ体験に最初に貢献すべきプラクティスはどれですか？また、それは製品ライフサイクルのどの時点ですか？",c:["コードが書かれた後、最初のパイロットテストの前に「リリース管理」プラクティスが最初に貢献すべきである","アプリがデプロイされた後、ユーザが問題を抱えるたびに「サービスデスク」プラクティスが最初に貢献すべきである","アプリが設計された後、開発が完了する前に「サービスレベル管理」プラクティスが最初に貢献すべきである","開発作業が開始される前に「サービス設計」プラクティスが最初に貢献すべきである"],a:3,e:"正解：D　サービス設計プラクティスは「ユーザが良い体験をできるよう製品・サービスが作られることを確実にする」ものであり、「効果的な調整、設計への全体的アプローチ、情報フロー、ステークホルダーの参加、サービスライフサイクルの早い段階からの設計モデルの良い計画が成功に不可欠」です。リリース管理・サービスデスクは開発後、サービスレベル管理は設計後では遅すぎます。（参照 Service Design Practice Guide 2.1, 2.4.2）"},
{n:"044",t:"ある組織は、大規模なデプロイメントとリリース後にサービス中断を経験しています。デプロイメントの規模と種類の多様性を両方削減したいと考えています。\nこれを達成する迅速な開発のための技術はどれですか？",c:["IaC (Infrastructure as Code)","疎結合の情報システム・アーキテクチャ","非難なきポストモーテム","カンバン（Kanban）"],a:1,e:"正解：B　疎結合の情報システム・アーキテクチャは、システムをほぼ独立して開発・管理できる部分に分割することで、サービスコンポーネントの独立した開発・テスト・デプロイを可能にします。これによりデプロイメントの規模と多様性が削減されます。IaCは環境のより速いプロビジョニングに貢献しますが規模削減には直接対応しません。非難なきポストモーテムは中断の原因特定に有用ですが、既に対策が特定されています。カンバンは作業フロー管理の方法です。（参照 4.2.2）"},
{n:"045",t:"あるサービス・プロバイダは、価値が共創されることを確実にしたいと考えています。\nこれを達成する最善の方法はどれですか？",c:["ユーザがサービスの使い方を理解し、すべてのサービスのやり取りにおいて良い体験ができることを確実にする","サービス設計中も、サービスのやり取り中も、すべての段階に顧客とユーザを参加させる","サービスが有用性と保証の両方で合意された目標を達成していることを確実にする","サービスレビューに関係管理者を参加させ、顧客フィードバックが確実に理解されるようにする"],a:1,e:"正解：B　「価値の共創はサービスのやり取りだけに関するものではありません。それはサービス設計やさらなる開発への消費者の参加も含みます」。すべての段階で顧客とユーザを参加させることが価値共創の実現に最も貢献します。選択肢Aはサービスのやり取りのみに対応、選択肢Cは有用性・保証の目標達成だけでは価値共創を確保するには不十分、選択肢Dは顧客フィードバックの収集は重要ですがすべての段階への参加には相当しません。（参照 4.4）"},
{n:"046",t:"デジタル技術への有益な投資において、その投資の価値が厳しい期限内に実現される場合を最もよく表す用語はどれですか？",c:["デジタル製品","デジタルトランスフォーメーション","ハイベロシティIT","ITトランスフォーメーション"],a:2,e:"正解：C　ハイベロシティITとは「市場投入時間・顧客への時間・変更への時間、そして速度全般が重要となる、重要なビジネス実現のためのデジタル技術の適用」を指します。デジタル製品はデジタル技術が重要な役割を果たす製品、デジタルトランスフォーメーションはデジタル技術によるビジネス目標の大幅改善、ITトランスフォーメーションはITサービスの提供方法の大規模変革を指します。（参照 2.1）"},
{n:"047",t:"サービス・プロバイダの視点から、デジタル製品ライフサイクルはどのように始まりますか？",c:["顧客のオンボーディングから始まる","市場機会の探索から始まる","価値の共創から始まる","顧客のオフボーディングから始まる"],a:1,e:"正解：B　「製品のライフサイクルは、新製品への投資のための市場機会の探索から始まります」。オンボーディングは市場探索とエンゲージメントの後、価値の共創はオンボーディング後、オフボーディングはライフサイクルの最後に行われます。（参照 2.6.2）"},
{n:"048",t:"予測不可能なため、厳密なプロセスに従うよりも実験から学ぶことが適切なシステムを表す用語はどれですか？",c:["明白（Obvious）","煩雑（Complicated）","複雑（Complex）","混沌（Chaotic）"],a:2,e:"正解：C　「このようなシステムの本質的な予測不可能性は、あらかじめ決められたプロセスで作業することに慣れた人々に課題をもたらします」。クネビン（Cynefin）フレームワークでは「複雑：不明確かつ不可知の因果関係があり、安全に失敗できる実験（創発的プラクティス）が必要」とされます。明白は因果関係が明確でベストプラクティスを適用、煩雑は因果関係が不明確だが分析可能、混沌はすぐに行動が必要な状態です。（参照 3.2.3.1）"},
{n:"049",t:"ある組織の変更実務担当者は、ケースバイケースで各変更に対して受け入れられるリスクレベルを決定する責任を担っています。最近、変更に関連した規制違反が発生しました。\nこの状況に対する最善の改善アクションはどれですか？",c:["実務担当者が変更のカテゴリに応じた許容リスクレベルのモデルを作成する","組織がDevOps監査防衛ツールキットのガイダンスを採用し、IT部門と監査員の間のリスクに関する共通理解を構築する","開発チームが専門知識に基づいて各変更の許容リスクレベルを決定する","許容リスクレベルに関する決定を組織のガバニングボディに移し、決定を変更実務担当者に伝達する"],a:3,e:"正解：D　組織のガバニングボディが組織の許容リスクレベルを決定します。「ハイベロシティはしばしばリスクを取ることと関連しています…ガバニングボディは自分たちの指令が守られていることの保証を受けなければなりません」。実務担当者はガバナンスを行うのではなく、ガバナンスに従います。ガバニングボディの役割をモデル作成や開発チームに委ねることはガバナンス構造に反します。（参照 4.5）"},
{n:"050",t:"あるサービス・プロバイダがシミュレーションシナリオで本番環境をテストしています。「インフラストラクチャおよびプラットフォーム管理」プラクティスは、これらのテストによる重大な停止が生じないことを確実にすることが期待されています。\nこの活動が最も貢献するHVIT目標はどれですか？",c:["レジリエントな運用","価値共創","迅速な開発","価値ある投資"],a:0,e:"正解：A　この問題はカオス・エンジニアリングの例を示しています。カオス・エンジニアリングに関連する「インフラストラクチャおよびプラットフォーム管理」の活動として「カオス・エンジニアリングツールが引き起こす予期しない停止に対応するための十分なレジリエンスと冗長性を持つインフラストラクチャとプラットフォームの設計」が挙げられます。カオス・エンジニアリングに対する耐性（レジリエンス）の構築がこの活動の焦点であるため、レジリエントな運用目標に最も貢献します。（参照 表4.15）"},
{n:"051",t:"マネージャはどのように振る舞えばリーン・カルチャの採用を最もよく示せますか？",c:["実務担当者に、自分たちの作業の意図しない結果を探るよう奨励する","安全へのコミットメントを示し、従業員が自分らしく表現できるよう奨励する","実務担当者に複雑性思考を実践するよう奨励する","実際の作業プロセスを観察し、実務担当者に質問する"],a:3,e:"正解：D　「現場視察はリーン管理哲学の主要な部分です。マネージャは実際の作業プロセスを観察し、作業を理解し、質問し、学びます」。選択肢Aは倫理、選択肢Bはセーフティ・カルチャ、選択肢Cは複雑な環境での作業に関する説明です。（参照 3.2.3.2）"},
{n:"052",t:"ある組織には、ステークホルダーを参加させずに頻繁に意思決定を行い、フィードバックを受け入れなかったプロダクトオーナーがいました。その結果、ユーザは不満を持ち、開発チームも不満であり、製品の価値が低下しています。新しいプロダクトオーナーが任命されました。\n「関係管理」プラクティスが、新しいプロダクトオーナーがステークホルダーの信頼を迅速に回復し、製品の価値を最大化するのに最も貢献できる方法はどれですか？",c:["組織全員が共有できる共通の価値観と原則のセットを採用する","顧客の優先事項を確立し、苦情に対処するために使用できる技法を提供する","適切な投資決定が行われ、リソースが適切に配分されることを確実にする","組織の要件に基づいてチームの製品開発アプローチを改善する"],a:1,e:"正解：B　関係管理プラクティスは「新規または変更された製品・サービスに対する顧客の優先事項の確立への関与」と「苦情への対処と相反する要件の調整への関与」を行います。不満を持つユーザと不満な開発チームの声を確実に聞き（苦情対処）、顧客の優先事項を確立して製品の価値を最大化することに最も直接的に貢献します。選択肢Aは組織文化の変更が必要で時間がかかります、選択肢Cはポートフォリオ管理、選択肢Dはソフトウェア開発・管理プラクティスの役割です。（参照 表4.3, Relationship Management Practice Guide 2.4.3）"},
{n:"053",t:"ある問題管理者が、組織が使用しているサードパーティのソフトウェア製品の深刻な欠陥に対するパッチが利用可能になったという通知を受けました。分析の結果、欠陥のあるバージョンのアプリケーションはすでに廃止されており使用されていないため、その欠陥が組織に影響しないことが判明しました。\n問題管理者は次に何をすべきですか？",c:["将来のインシデントをこの問題と関連付けられるよう、既知のエラーレコードを作成する","実行可能な限り早くパッチをデプロイする計画を立てる","問題レコードを閉鎖する（組織には関係がないため）","緊急性と影響度に基づいて分析のための問題を優先順位付けする"],a:2,e:"正解：C　「組織がそのソフトウェアの脆弱なバージョンを使用していない場合、または脆弱性が組織のサービスに影響しない場合は、分析後に問題レコードを閉鎖することができます」。既知のエラーは「分析されたが解決されていない問題」ですが、この問題は解決不要です。パッチのデプロイは不要です。問題はすでに分析されており、優先順位付けは不要です。（参照 Problem Management Practice Guide 2.2.2）"},
{n:"054",t:"ある組織が新しいサービスのユーザ体験全体を把握したいと考えています。\n新しいサービスの体験に関するデータを収集する最善の方法はどれですか？",c:["新しいサービスのアプリケーションパフォーマンス指標を使用して、ユーザ体験スコアを算出する","ビジネス関係管理者が月次会議で顧客からユーザ体験指標を収集する","サービスデスクがユーザとやり取りするたびに、新しいサービスに対する簡単な評価をユーザに求める","年次調査でITサービスに対するユーザ満足度を評価するデータを収集する"],a:2,e:"正解：C　サービスデスクプラクティスは「サービス体験データ（サービスに満足・不満足なユーザの大まかな見積もり）を収集する」ことによってサービス体験に貢献します。アプリケーションパフォーマンス指標は技術的側面のみを測定します。顧客は全体的なユーザ満足度を把握していない場合があります。年次調査では特定の新サービスへの理解には不十分で、フィードバックが遅すぎます。（参照 4.4.1, 表4.21）"},
{n:"055",t:"デジタル組織の例はどれですか？",c:["ITを使用して戦略的方向性を変える組織","ITを使用して業務プロセスをサポートする組織","ITを使用して「サービスデスク」プラクティスを改善する組織","ITトランスフォーメーションを経た組織"],a:0,e:"正解：A　「デジタル組織はデジタル技術によって実現されています。デジタル技術はこれらの組織の内部プロセスにとって重要な基盤となる実現要素であり、多くの場合、製品・サービスの一部でもあります」。デジタル組織はITを戦略的に活用します。業務プロセスのサポートは運用的な活用に過ぎず、サービスデスクの改善も同様です。ITトランスフォーメーションは必ずしもデジタルトランスフォーメーションとデジタル組織につながるわけではありません。（参照 2.3）"},
{n:"056",t:"ITトランスフォーメーションの例はどれですか？",c:["開発と運用の間の作業フローを自動化する","ビジネス活動のパフォーマンスを大幅に加速する","テクノロジーを使用してパーソナライズされた顧客体験を作成する","デジタル技術を使用してより迅速なビジネス意思決定を可能にする"],a:0,e:"正解：A　「ITトランスフォーメーションは、ITサービスおよび情報システムがどのように開発・運用・サポートされるかに焦点を当てています」。開発と運用の間の作業フローの自動化はデジタルソリューションの提供方法の変更を説明しています。選択肢Bはハイベロシティ ITの説明、選択肢CとDはデジタルトランスフォーメーションの説明です。（参照 2.4.1）"},
{n:"057",t:"仮説をテストするためにプロトタイプを作成することに関係する概念はどれですか？",c:["デザイン思考","セーフティ・カルチャ","継続的改善","複雑性思考"],a:0,e:"正解：A　デザイン思考の典型的な行動パターンは「観察と反省に基づいて仮説を作成し、プロトタイプでそれをテストすること」です。セーフティ・カルチャは人々が自分らしく快適に過ごせる環境、継続的改善は改善実施のための構造化されたアプローチ、複雑性思考はシステムに内在する複雑性の認識と理解に焦点を当てています。（参照 3.2.1.2）"},
{n:"058",t:"あるサービス・プロバイダがクラウドサービスの重大な停止を複数経験しました。これらは予測されない不均一なサービス使用によるものと推測されています。\n「キャパシティ・パフォーマンス管理」プラクティスはこの問題の解決にどのように貢献できますか？",c:["クラウドサービスの最小実行可能プロダクトをサポートするために必要なリソースを特定しコスト算出する","AIOpsツールの出力を分析し、クラウドサービスの作業負荷のパターンと異常を特定する","クラウドサービスの問題解決に投資するか、他のサービスへの支出を配分するかを決定する","クラウドサービスの定期的な更新が必要なコンポーネントを特定し、その実装を自動化する"],a:1,e:"正解：B　「AIOpsは可用性・パフォーマンスのモニタリング、障害認識、予測分析、イベントの相関分析などの主要なIT運用機能を強化・部分的に代替するプラットフォームです」。「AIOpsはパターンと異常の特定、資産のキャパシティと使用率の把握、将来の製品・サービスのキャパシティ計画の機能を提供します」。これはレジリエントな運用へのキャパシティ・パフォーマンス管理の貢献です。（参照 4.3.5, 表4.18）"},
{n:"059",t:"ある組織が複雑なサービスのパフォーマンスと信頼性を改善しようとしています。現状を分析し、達成したい目標もわかっています。\n改善の「どのようにして目標に到達するか？」のステップではどのようなアプローチをとるべきですか？",c:["詳細なギャップ分析に基づく計画を作成し、計画のステップに従う","目標とする将来の状態の指標を定義し、継続的に測定する","最小実行可能プロダクトを定義し、段階的に改善する","仮説を立て、安全に失敗できる実験を実施する"],a:3,e:"正解：D　これは複雑なシステムの改善です。トヨタカタのアプローチでは「次の目標条件に向けて実験する：障害を克服するためのアイデアを考え、そのアイデアで実験を実施する。可能であれば、一度に1つの仮説のみをテストする」とされています。複雑なシステムでは「状況がしばしば予測不可能であり、大規模な変更のための事前に決められた計画を作成・遵守することが困難または無責任になります」。（参照 3.2.3.3）"},
{n:"060",t:"セキュリティ手順をスキップするよう求められるようなジレンマに直面した場合など、自分の行動がもたらす可能性のある結果を想像する能力を人々が高めるために利用できるものはどれですか？",c:["サービス・ドミナント・ロジック","デザイン思考","倫理教育","複雑性思考"],a:2,e:"正解：C　倫理とは「個人および社会にとって何が良いことなのかを定義する原則の体系」です。倫理教育は「人々に倫理的結果への意識を高める」ために使用できます。サービス・ドミナント・ロジックは組織が価値を共創するメンタルモデル、デザイン思考は設計概念を開発する認知的・実践的技術のセット、複雑性思考はシステムの複雑性を認識・理解するシステム思考アプローチです。（参照 3.2.1, 3.2.1.1）"},
{n:"061",t:"ある組織は最近サービス停止を経験しました。組織はサービス・プロバイダに対して、停止への対応が組織に最も利益をもたらす方法で行われなかったと苦情を述べています。\n将来このような状況を防ぐために「可用性管理」プラクティスがどのように貢献できるかの例はどれですか？",c:["サービス継続性活動と連携して、あらゆる停止を排除することを目指してMTBF目標を引き上げる","消費者の視点からサービスを理解し、それに応じてMTRS目標を修正する","サービスパフォーマンスに関連する目標をレビューし、期待される需要が満たせることを確実にする","組織のサービスにとって最も重要なアプリケーションを把握し、より高いレジリエンスを持って設計する"],a:1,e:"正解：B　「MTRS（平均サービス復旧時間）は障害後にどれだけ迅速にサービスが復旧されるかを測定します」。サービス・プロバイダがサービスの使われ方を理解することで、消費者の期待に沿った目標と指標を設定・調整できます。選択肢Aは停止数の削減（MTBF向上）であり、問題の焦点は停止発生後の対応です。選択肢Cはキャパシティ・パフォーマンス管理、選択肢Dはソフトウェア開発・管理プラクティスの貢献であり、いずれも停止の事前防止に焦点を当てています。（参照 Availability Management Practice Guide 2.1, 2.4.1.3）"},
{n:"062",t:"HVIT組織のバリューストリームに関する記述として正しいものはどれですか？",c:["HVIT組織では、バリューストリームのすべてのステップの手順を規定することがしばしば有用である","HVIT組織のバリューストリームは、製品とサービスの多様性を反映している","ITILは各HVITバリューストリームのテンプレートを提供している","バリューストリームは製品とサービスの管理に必要な活動を一般的に記述している"],a:1,e:"正解：B　「HVIT組織は多くの場合、製品・サービス志向であり、その製品とサービスの多様性を反映した複数のバリューストリームを持っています」。HVIT環境では「実行中に行われる『マイクロインタラクション』の結果として活動の順序が生まれることが多く、手順を規定することは有用でも実現可能でもありません」。ITILはバリューストリームのテンプレートを提供せず、バリューストリームは各組織に固有です。選択肢Dはサービスバリューチェーンの説明です。（参照 2.6.4）"},
{n:"063",t:"ある組織は、さまざまな度合いの正式さで管理されている多くの異なるポートフォリオ（製品・プログラム・プロジェクト・アプリケーション）を持っています。組織はこれらのポートフォリオ全体でリソースが適切に活用されることと、ポートフォリオ項目のパフォーマンスに関するより正確なデータを取得することを求めています。\nこれらの目標を達成するために最善のアプローチはどれですか？",c:["各ポートフォリオにチャーターを文書化し、定期的にポートフォリオを優先順位付けするオーナーを確保する","すべてのポートフォリオ項目の価値実現を比較するために使用できるヘルスチェックテンプレートを作成する","ステークホルダーが重要と見なすポートフォリオ項目に十分なリソースが割り当てられるよう方針を確立する","新しいイニシアチブの価値提案と財務健全性をレビューするために使用できる基準を確立する"],a:1,e:"正解：B　ヘルスチェックテンプレートは「組織で有効なすべての価値実現指標（例：財務的・技術的健全性、投資収益率、戦略的整合のレベル、顧客基盤の規模、リスクまたは技術的負債等）を示す主要情報レポートを要求することで、すべてのポートフォリオ項目間の比較を可能にします」。選択肢Aはポートフォリオ間で競合する優先事項を生む可能性があります。選択肢Cは戦略目標の考慮を強調せず、データの正確性にも対応しません。選択肢Dは新しいイニシアチブのみに対応しています。（参照 Portfolio Management Practice Guide 2.4.2）"},
{n:"064",t:"プロダクトチームは0.1%のエラーバジェットをどのように活用すべきですか？",c:["資金の0.1%を欠陥の修正に使用すべきである","ダウンタイムが0.1%に近づいたら、安定性改善により多くの労力を費やすべきである","コーディング時間の0.1%をエラーハンドリングルーティンの開発に費やすべきである","エラーがユーザメッセージの0.1%に近づいたら、エラー削減により多くの時間を費やすべきである"],a:1,e:"正解：B　「エラーバジェットは、適切なキャパシティを開発作業に割り当てて安定性を確保し、適切なバランスを保つコントロールメカニズムです。サービスがエラーバジェットに近づいた場合、プロダクトチームは新機能よりも改善に集中すべきです」。「エラーバジェットはサービスのSLO（サービスレベル目標）から100%を引いたものとして表されます。99.9%のSLOのサービスは0.1%のエラーバジェットを持ちます」。これはダウンタイムのパーセンテージを指します。（参照 4.3.7）"},
{n:"065",t:"ある組織は、一部のリスクは本番環境でテストする必要があることを認識しています（例：負荷テストおよびストレステスト）。\nデプロイ後にユーザへのテストの影響を最小限に抑えるために「サービス妥当性確認・テスト」プラクティスが使用する2つの技術はどれですか？\n1. 継続的インテグレーションパイプライン内で各ソフトウェアモジュールをテストする\n2. 広範なデプロイの前に小グループのユーザに新機能をリリースする\n3. 元の本番環境を変更しないまま、本番環境のコピーに対してリリースする\n4. システム間の統合を手動でテストする",c:["1 および 2","2 および 3","3 および 4","1 および 4"],a:1,e:"正解：B　（2）カナリアテスト（カナリアリリース）は本番環境でのテストの一形態です。「新機能は最初、ターゲットを絞った小グループのユーザにリリースされ、徐々にすべてのユーザへと拡大されます」。（3）ブルーグリーンデプロイメントは本番環境でのテストの影響を最小化する戦略です。「2つの同一の本番環境が同時に稼働し（ブルーとグリーン）、一方のみがライブで全本番トラフィックを処理し、他方は新バージョンのデプロイに使用されます」。（1）はデプロイ前のユニットまたは統合テスト、（4）はデプロイ前の統合テストです。（参照 表4.11）"},
{n:"066",t:"どのような状況では、ハイベロシティITへの変革は望ましくないと考えられますか？",c:["組織がスピードを持ってビジネスの実現をサポートしたいと考えている","組織がすでに迅速かつ効果的に革新・運用することに慣れている","組織が高レベルのデジタル技術を一貫して使用している","組織の価値観とリーダーシップスタイルが変革に適合しないと考えている"],a:3,e:"正解：D　組織は「文化的変革の量が達成困難、または許容できる投資対効果を生み出す可能性が低いと考えるため、速度向上を試みないことを選択する場合があります」。ビジネス実現の速度向上はハイベロシティITの目的、革新と効果的な運用への習熟はHVITへの変革を後押しします。高レベルのデジタル技術の使用もHVITへの移行を支援します。（参照 2.1）"},
{n:"067",t:"デジタル製品に影響を与える破壊的なイベントが発生した場合に、ビジネスサービスを提供し続ける組織の能力を考慮するHVIT目標はどれですか？",c:["価値ある投資","レジリエントな運用","迅速な開発","保証された適合"],a:1,e:"正解：B　「レジリエントな運用目標は、必要なときにデジタル製品が使用可能であることを確実にすることを含みます」。「情報システムは非常に多くのコンポーネントに依存しているため、動作を予測・保証できないことが増えています。フェールセーフシステムは幻想であり、組織は避けられない予期しない障害への備えが必要です。強調点はもはや長い障害間隔の維持ではなく、避けられない問題が発生した際に迅速にサービスを復旧させることにあります」。（参照 4.3）"},
{n:"068",t:"あるストック取引会社がAIを使用して市場を分析し、投資戦略を提案しています。ITスタッフは必要なアルゴリズムの管理のために長時間のプレッシャーの下で働いています。エラーが増加しており、スタッフは意見が合わず互いを非難しています。\nこの状況を改善するために取るべきアプローチはどれですか？",c:["意見を表明し問題を解決するための安全な環境を育成することで信頼を強化する","カオス・エンジニアリングを導入してアルゴリズムのエラーを積極的に検知する","エラーが発生できないことを確実にする新しいバリューストリームを設計する","ITスタッフが各変更により多くの時間をかけられるようアルゴリズム変更の数を削減する"],a:0,e:"正解：A　「ハイベロシティIT環境では、人々が批判や恥をおそれずに意見を共有し改善のための実験ができることが重要」です。これはセーフティ・カルチャの採用を指します。カオス・エンジニアリングは金融取引アルゴリズムのエラーを検知しません（ITシステムのレジリエンステスト用）。ハイベロシティIT環境ですべてのエラーを排除することは不可能です。組織はAIへの投資でビジネスを支援しており、その機能をサポートする必要があります。（参照 3.2.2.2）"},
{n:"069",t:"ある組織は、エラーや不正を防ぐために厳格な職務分離を歴史的に確実にしてきました。官僚主義を削減するために、変更が組織のコンプライアンス要件に確実に準拠するよう自動化されたコントロールを導入しました。\nこの組織が既存の自動化されたコントロールを維持するために定期的に使用できる最善のアプローチはどれですか？",c:["組織のリスクキャパシティとリスク選好を評価する","定量的および定性的なリスク分析を実施する","リスクの軽減を確実にするためにレビューと監査を実施する","受け入れたリスクの発生確率をレビューする"],a:2,e:"正解：C　リスクを管理する決定がなされた場合、適切なコントロールの設計と実装が必要です。「コントロールは、それが関連性を維持し、合意されたレベルの保護を提供するように適切に実装されていることを確実にするために維持されなければなりません。例えば定期的な強化と監査によって」。選択肢AとBはコントロール定義前のリスク分析段階で行うものです。選択肢Dはリスクの受け入れに関するものですが、この組織はコントロールでリスクを管理しています。（参照 Risk Management Practice Guide 2.4.4）"},
{n:"070",t:"ある組織がモバイルアプリを開発するための新チームを立ち上げました。このチームにデジタルトランスフォーメーションの旅を始めさせたいと考えています。\n新しいアプリの要件を分析・文書化するのは誰であるべきですか？",c:["既存の事業分析チームがこの作業を行うべきである","この作業を行うための新しいデジタル事業分析チームを作成すべきである","新しいモバイルアプリのプロダクトオーナーがこの作業を行うべきである","ソフトウェア開発者が反復的にニーズを定義すべきである（事業分析はこの作業には不要）"],a:2,e:"正解：C　「アジャイルのコンテキストでは、事業分析プラクティスは特定のチームや役割との関連性が薄れ、プロダクトオーナーやサービスオーナーなどのマルチスキルな実務担当者に広く適用されるようになっています」。既存チームや新規専門チームはいずれも事業分析を専門機能として維持しており、アジャイルのコンテキストには適合しません。事業分析は引き続き必要ですが、多機能チームのメンバーが担当します。（参照 Business Analysis Practice Guide 2.1）"},
{n:"071",t:"リアルタイムモニタリングソリューションはサービスマネジメントの4つの側面のうちどれの例ですか？",c:["バリューストリームとプロセス","組織と人材","情報と技術","パートナーとサプライヤ"],a:2,e:"正解：C　「情報と技術」の側面には「デジタル製品とサービスを構成する情報と技術を生産するための『生産リソース』として使用される情報と技術」が含まれ、「モニタリングツールはパフォーマンス情報へのリアルタイムアクセスを提供します」。「バリューストリームとプロセス」は価値ストリームの設計に使用される抽象リソース、「組織と人材」はHVITにおける組織・財務・物理リソース・人々、「パートナーとサプライヤ」は外部サービス・プロバイダの関与を扱います。（参照 2.6.6.2）"},
{n:"072",t:"「情報セキュリティ管理」プラクティスが適合の保証の達成に貢献する例はどれですか？",c:["同僚が開発されたコードに情報セキュリティの欠陥がないかチェックするようにする","重大なインシデントに対応し、重要なサービスコンポーネントのアラートしきい値をレビューする","サービスコンポーネントに情報セキュリティコントロールを組み込んだ標準ビルドモデルを作成する","サードパーティの組織のVPN（仮想プライベートネットワーク）へのアクセスに対処する方針を策定する"],a:3,e:"正解：D　「情報セキュリティ管理の方針と計画は、リモートアクセス、組織の情報とリソースへのサプライヤのアクセスなどの側面を対処することができます」。サードパーティのVPNアクセスに関する方針はアクセスを適切に制限することで保証された適合に貢献します。選択肢Aはソフトウェア開発・管理、選択肢Bはモニタリングおよびイベント管理、選択肢Cはサービス構成管理プラクティスの保証された適合への貢献例です。（参照 Information Security Practice Guide 2.4.1）"},
{n:"073",t:"ある組織は従業員に対して「失敗は選択肢にない」と歴史的に伝えてきました。その結果、従業員がミスを隠すことが一般的になっています。\n人々が実験を行えるオープンで信頼できる職場環境を育成するために採用すべきものはどれですか？",c:["セーフティ・カルチャ","デザイン思考","サービス・ドミナント・ロジック","クネビン（Cynefin）"],a:0,e:"正解：A　セーフティ・カルチャは「人々が自分らしく（自分を表現して）快適に過ごせる環境」を作り出すもので、障害が発生した際のようなストレス状況でも自分を表現できることを含みます。「失敗が現実的であることを認める―失敗は起こることを認め、人を責めるのではなくシステムを改善の対象とする」。デザイン思考は設計概念開発のプロセス、サービス・ドミナント・ロジックは価値共創のメンタルモデル、クネビンは意思決定フレームワークです。（参照 3.2.2.2）"},
{n:"074",t:"あるデジタル対応組織が、ITシステムのレジリエンスをテスト・改善するためにカオス・エンジニアリングの規律を導入しています。\nこのコンテキストにおいて、「サービス継続性管理」プラクティスの貢献とならないものはどれですか？",c:["フェールセーフシステムを確実にするためのコントロールを導入する","リスクを考慮し対策を設計する","計画をテストし準備態勢を高めるための演習を実施する","計画と対策を継続的にモニタリングする"],a:0,e:"正解：A　これはサービス継続性管理プラクティスの貢献には「ならない」ものです。「フェールセーフシステムは幻想です。組織は避けられない予期しない障害への備えが必要です」。選択肢Bはサービス継続性管理プラクティスの貢献（「サービス継続性管理プラクティスはリスクの定義・管理のためのコントロールの定義と管理を含みます」）、選択肢Cはサービス継続性管理の重要な部分（「テストは戦略・措置・計画が実際に機能していることを確認する唯一の方法」）、Dもサービス継続性管理の貢献（「継続性計画・措置・レジリエンスメカニズムの継続的なモニタリング」）です。（参照 4.3, Service Continuity Management Practice Guide 2.4.2, 2.4.3, 表4.15）"},
{n:"075",t:"ある組織のITチームが、しきい値を超えた場合に対応することで、インフラストラクチャとソフトウェアコンポーネントに影響するイベントを管理しています。組織が重大なインシデントを初めて知るのは、ユーザがサービスデスクに連絡したときであることがあります。\n取るべき最善の改善アクションはどれですか？",c:["サービス全体に関連するインシデントのための自動ワークアラウンドを作成する","適切な解決グループへの迅速なインシデントエスカレーションルートを作成する","最も頻繁に影響を受けるサービスのサービス継続性計画を改訂する","サービスイベントを含めるようモニタリングツールの設計を変更する"],a:3,e:"正解：D　組織はコンポーネントだけでなくエンドツーエンドのサービスをモニタリングすべきです。「モニタリングおよびイベント管理プラクティスを確立または改善する際には、モニタリングするサービスとサービスコンポーネントの特定と優先順位付け」を考慮すべきとされています。選択肢AとBは反応的な対応であり、モニタリングツールの設計改善によって問題を事前に検出できます。選択肢Cは状況の再発を防ぎません。（参照 Monitoring and Event Management Practice Guide 2.4.1）"},
{n:"076",t:"ある組織の従業員がオンライントレーニングコースを完了した後、デジタルシステムをより効果的に活用できるようになりました。\nこのトレーニングによってサポートされるハイベロシティIT目標はどれですか？",c:["価値ある投資","レジリエントな運用","迅速な開発","価値共創"],a:3,e:"正解：D　「デジタル投資からのリターンは、自動化された情報システムから得られた情報によって意思決定が改善された場合にのみ実現されます。したがって、ユーザはデジタル製品と情報、およびそのコンテキストでの使用方法を理解する必要があります。ユーザは機能を適切に使用し、意思決定を改善するために情報を正確に解釈できるほどの理解が必要です」。これはデジタルシステムの活用による価値共創です。（参照 4.4）"},
{n:"077",t:"あるビジネス・サービス・プロバイダ組織は複数のソフトウェア開発アプローチを使用しています。最大顧客のいくつかが要件と優先事項を伝えており、近い将来それらが満たされなければ離脱する可能性があることを示唆しています。一部の要件は不明確で矛盾しています。\n最大顧客のニーズを満たすために最善のソフトウェア開発アプローチはどれですか？",c:["要件・優先事項・必要なリソースがわかっているため、ウォーターフォールアプローチが適している","小チームが独立して作業できるイテラティブアプローチ","最も優先度の高い項目を最初に開発する能力と迅速なフィードバックを可能にするアジャイルアプローチ","不明確な要件を捉えるためのプロトタイピングを含む並行実験アプローチ"],a:2,e:"正解：C　アジャイルアプローチは不明確な要件に対して迅速なフィードバックを使用して対処し、最も優先度の高い項目を最初に作業することを重視します。「アジャイルとスクラムアプローチは増分的かつイテラティブの組み合わせで、アプリケーションのオーナーとの緊密なコラボレーションに焦点を当てており、迅速なフィードバックと小さな増分の迅速な開発でオーナーが価値を引き出せます」。ウォーターフォールは要件が明確な場合向けです。選択肢Bは不明確な要件に直接対応しません。選択肢Dは良いアプローチですが、最も優先度の高い項目を最初に行うことを重視しません。（参照 Software Development and Management Practice Guide 2.2）"},
{n:"078",t:"ある組織は、製品・サービス・改善に対する価値ある投資を確実にすることを目指しています。\nこの目標を最もよくサポートするイニシアチブはどれですか？",c:["各デプロイメントのコード量を削減し、外部顧客が製品ライフサイクルの早い段階で新機能を利用できるようにする","サービスの技術的および非技術的コンポーネントと、さまざまな不利な状況で運用可能性を維持するための相互連携を文書化する","製品への変更提案がデータ保護規制と組織の情報セキュリティポリシーに準拠していることを確実にする","消費者習慣の変化を理解するための外部フォーカスグループと、アイデアの実現可能性と収益性を検討するための内部ワーキンググループを設立する"],a:3,e:"正解：D　「価値ある投資を行うことは、市場調査と新製品の開発に基づいています。新しいデジタル製品・サービスは収益性の観点から構想・評価されるべきです」。外部フォーカスグループによる消費者習慣の変化把握と内部ワーキンググループによる実現可能性・収益性の検討がこれに最も対応します。選択肢Aは迅速な開発、選択肢Bはレジリエントな運用、選択肢Cは保証された適合の例です。（参照 4.1）"},
{n:"079",t:"ある組織がオンラインバンキングアプリを更新しています。新しいアプリでは、ユーザが最初に登録するときに運転免許証のコピーをアップロードする必要があります。アプリがリリースされた後、多くのユーザが運転免許証を持っていないためにネガティブなフィードバックがありました。\nこの問題を発見すべきだったテストの種類はどれですか？",c:["ユーザインターフェース設計のテスト","ユーザ・ストーリーのテスト","リリースパイプラインのテスト","本番環境でのシステムテスト"],a:1,e:"正解：B　「エピック、ユーザ・ストーリー、受け入れ基準、データフロー図、プロセスフロー図などのアーティファクトをテストすべきです」。ユーザ・ストーリーのテストによって、運転免許証を持っていないユーザがアップロードできないことが特定されます。UIテストは運転免許証が簡単にアップロードできることを検証しますが、対象市場の多くのユーザが運転免許証を持っていないことは検証しません。リリースパイプラインのテストは仮定の欠陥を見つけません。本番環境でのテストは遅すぎます。（参照 4.2.6, 表4.11）"},
{n:"080",t:"ある組織が、顧客とのやり取りの方法を大幅に改善する新しいテクノロジーを実装しています。\nこの状況を最もよく表す用語はどれですか？",c:["デジタル組織","ハイベロシティIT","デジタルトランスフォーメーション","ITトランスフォーメーション"],a:2,e:"正解：C　デジタルトランスフォーメーションとは「デジタル技術を利用して、デジタル以外の手段では実現不可能だった組織の達成目標の実現を大幅に改善すること」です。この組織は顧客とのやり取り方法を大幅に改善する新技術を実装しており、これはデジタルトランスフォーメーションです。デジタル組織は既にデジタル技術によって実現されている組織の説明ですが、ここでは計画的な大幅改善があります。ハイベロシティITは変革が迅速であることを示す必要がありますが、それは示されていません。ITトランスフォーメーションはITサービスの開発・運用・サポート方法の変革ですが、この組織はシステムの使い方を変えています。（参照 2.4）"}
];

{t:"ITIL 継続的改善モデル",en:"ITIL continual improvement model",d:"改善を実施するための体系的なアプローチを組織に提供するモデル。"},

{t:"ITIL サービスバリュー・チェーン活動",en:"ITIL service value chain activity",d:"組織が価値創出において実行する、バリューチェーンのステップ。"},
{t:"ITIL の従うべき原則",en:"ITIL guiding principles",d:"組織の目標、戦略、業務の種類、管理構造が変化したとしても、あらゆる状況で組織を導くことができる推奨事項。"},
{t:"RACI",en:"RACI",d:"役割と責任の定義を支援するために使用されるモデル。Responsible（実行責任者）、Accountable（説明責任者）、Consulted（協議先）およびInformed（情報先）の略称。"},
{t:"アンドン",en:"Andon",d:"品質やプロセス上の課題を作業者や組織の他部門に通知するために使用される、手動または自動化されたシステム。アンドン・システムは製造業で考案されたが、現在ではIT分野で広く使用されている。"},
{t:"運用",en:"operation",d:"活動、製品、サービスまたはその他の構成アイテムを、定型化された方法で実施、管理すること。"},
{t:"運用技術",en:"operational technology",d:"物理デバイスに対するモニタリングまたはコントロール（あるいは両方）において、デジタル技術を適用した変更の検出、または変更を加えること。"},
{t:"運用モデル",en:"operating model",d:"組織が顧客および他の利害関係者とどのように価値を共創するかだけでなく、組織がどのように自らを運営するかを、概念的または視覚的（あるいはその両方）に表現したもの。"},
{t:"エピック",en:"epic",d:"まだ十分に洗練または理解されていない要件定義の概要。最終的には、エピックは洗練されるか、いくつかのユーザ・ストーリーと要件に分割される。"},
{t:"改善",en:"improvement",d:"意図的に導入された変更により、1人以上の利害関係者の価値が高まること。"},
{t:"カオス・エンジニアリング",en:"chaos engineering",d:"システムが不安定な状態に耐えることのできる環境を構築するための検証の規律。"},
{t:"カオス・モンキー",en:"chaos monkey",d:"本番環境のコンポーネントを意図的に停止させ、残ったシステムがその停止にどのように対応するかをテストすることで、ITシステムの対障害弾力性をテストするツール。"},
{t:"カスタマ・ジャーニー",en:"customer journey",d:"タッチポイントおよびサービスのやり取りを通じ、サービス顧客が1つ以上のサービス・プロバイダ、またはその製品（あるいはその両方）に対して持つ、完全なエンドツーエンドの体験。"},
{t:"カタ",en:"Kata",d:"科学的思考およびプラクティスとコーチングのルーティンのためのメンタルモデルと行動パターン。"},
{t:"価値",en:"value",d:"知覚されている便益、便利さおよび何らかの重要性。"},
{t:"価値提案",en:"value proposition",d:"サービス・プロバイダが顧客に対して、特定の一連の便益を提供するという明示的な約束。"},
{t:"ガバナンス",en:"governance",d:"組織を方向付け、コントロールする方法。"},
{t:"カルチャ・フィット",en:"cultural fit",d:"自分の信念、または価値観およびニーズに対応した環境で快適に働くことができる従業員またはチームの能力。"},
{t:"カンバン",en:"Kanban",d:"作業を可視化したり、発生の可能性がある障害やリソース競合を識別したり、進行中の作業を管理したりするための手法。"},
{t:"完了の定義",en:"definition of done",d:"提案された製品またはサービスに対する合意された基準のチェックリスト。"},
{t:"機械学習",en:"machine learning",d:"人工知能の応用形態の一つで、システムがデータに反応し、より多くのデータに継続的にさらされることで、その行動およびアウトプットを適応させるという原理に基づいている。"},
{t:"技術的負債",en:"technical debt",d:"時間のかかるシステム・ソリューションではなくワークアラウンドを選んだ結果として蓄積された、再作業を必要とするバックログ全体。"},
{t:"逆説的介入",en:"paradoxical intervention",d:"スタッフに何かを要求し、反対の結果を得る管理技法。例えば、インパクトを減らすために、より多くのリスクを取るように要求すること。"},
{t:"ギャップ分析",en:"gap analysis",d:"2つのデータ・セットを比較し、違いを特定する活動。例えば、一連の要件と実際に提供したもの、または組織の現在の状態と目標とする将来の状態を比較する。"},
{t:"計画",en:"plan",d:"4つのすべての側面、並びにすべての製品およびサービスに対するビジョン、現在のステータスおよび改善の方向性に関する理解を組織全体で確実に共有するためのバリューチェーン活動。"},
{t:"継続的インテグレーション",en:"continuous integration",d:"ソフトウェア開発環境内でコードを統合し、構築し、テストするためのアプローチ。"},
{t:"継続的デリバリ",en:"continuous delivery",d:"ソフトウェアをいつでも本番環境にリリースできるようにするソフトウェア開発へのアプローチ。頻繁な展開も可能だが、通常、組織はゆっくりとした展開を好むため、展開は個別に決定される。"},
{t:"継続的展開（デプロイメント）",en:"continuous deployment",d:"ソフトウェア開発において、変更がパイプラインを経由して自動的に本番環境に投入され、1日に複数回の本番展開を可能にするアプローチ。継続的展開は継続的デリバリに依存する。"},
{t:"構成管理データベース (CMDB)",en:"configuration management database (CMDB)",d:"構成レコードのライフサイクルを通して構成レコードを保管するために使用されるデータベース。CMDBは構成レコード間の関係も維持する。"},
{t:"顧客指向",en:"customer orientation",d:"顧客の長期的なニーズおよび要望を満たす支援に重点を置く、営業活動と顧客関係へのアプローチ。"},
{t:"顧客体験 (CX)",en:"customer experience (CX)",d:"顧客により認識されている、サービスとサービス・プロバイダとの実務的および感情的なやり取りの積み重ね。"},
{t:"心の知能指数",en:"emotional intelligence",d:"人の気持ちや反応を理解し、そのスキルを使用して適切な判断を下したり、対立を回避または解決したりすることができる能力。"},
{t:"コンテナ化",en:"containerization",d:"開発、出荷および展開のために、標準化され、軽量で、独立し、実行可能な単位にソフトウェアをパッケージ化する技法。"},
{t:"コントロール",en:"control",d:"リスクを管理する手段であり、事業達成目標を確実に実現する手段、またはプロセスに確実に従っているようにする手段。"},
{t:"コンプライアンス",en:"compliance",d:"標準または一連の指針に確実に従っているようにする、または、適切で一貫した会計業務やその他のプラクティスが確実に用いられているようにする活動と結果の両方のこと。"},
{t:"サービス・アジリティ（俊敏性）のための再構築",en:"reconstructing for service agility",d:"複雑で社会的な性質を反映した、知識労働とサービス供給を体系化するアプローチ。"},
{t:"サービス・ドミナント・ロジック",en:"service-dominant logic",d:"組織が互いの利益のために各自のコンピテンシおよびその他のリソースを適用することによって価値を共創する、（経済的）交換のメンタルモデル。"},
{t:"サービス・マインドセット",en:"service mindset",d:"サービス関係における組織の行動を定義する組織のカルチャの重要な要素。サービス・マインドセットには、組織が採用し、従い、共有する価値および従うべき原則が含まれる。"},
{t:"サービスの共感",en:"service empathy",d:"サービス関係を確立、維持および改善するために、他の当事者の利益、ニーズ、意図および経験を認識、理解、予想および予測する能力。"},
{t:"サービスの統合および管理",en:"service integration and management",d:"製品およびサービスの開発と提供に関わるすべてのサプライヤ間の作業の調整および編成。"},
{t:"サービスのやり取り",en:"service interaction",d:"価値を共創するサービス・プロバイダとサービス消費者の間の相互作用。"},
{t:"サービスバリュー・システム (SVS)",en:"service value system (SVS)",d:"価値創出を促進するために、組織のすべてのコンポーネントと活動がどのように連携して機能するかを表すモデル。"},
{t:"サービス品質",en:"service quality",d:"明示的および暗黙的なニーズを満たす能力に関連する、サービスの特性の総体。"},
{t:"サービスマネジメント",en:"service management",d:"顧客にとっての価値をサービスの形で実現する、組織の専門能力の集まり。"},
{t:"サービスレベル",en:"service level",d:"期待または実現されるサービス品質を定義する1つ以上の測定基準。"},
{t:"サービスレベル・アグリーメント (SLA)",en:"service level agreement (SLA)",d:"必要とされるサービスとサービスで期待されるレベルを規定するための、サービス・プロバイダと顧客の間で結ばれる合意文書。"},
{t:"サイクル・タイム",en:"cycle time",d:"入力を出力に変換する、個別の作業単位を完了するために必要な時間。"},
{t:"サイト・リライアビリティ・エンジニアリング (SRE)",en:"site reliability engineering (SRE)",d:"拡張性が極めて高く、信頼性の高いソフトウェア・システムを構築することを最終目標に、ソフトウェア・エンジニアリングの側面を取り入れ、それをインフラストラクチャおよび運用の問題に適用する原理原則。"},
{t:"査読（ピア・レビュー）",en:"peer review",d:"科学的または他の専門的な仕事について、同じ分野で働く他の人が判断すること。ソフトウェア開発に適用される場合、技術的内容と品質を評価するために、開発者と1人以上の同僚によって製品が検査される。これにより、適合性が保証される。"},

// =====================================================================
// クイズロジック
// =====================================================================
let questions=[],current=0,score=0,answered=[],userAnswers=[],shuffledMaps=[],currentMode='';
function saveState(){try{localStorage.setItem('hvitQuiz',JSON.stringify({qn:questions.map(function(q){return q.n}),cur:current,sc:score,ans:answered,ua:userAnswers,sm:shuffledMaps,md:currentMode}))}catch(e){}}
function clearState(){localStorage.removeItem('hvitQuiz')}
function resumeQuiz(){try{var s=JSON.parse(localStorage.getItem('hvitQuiz'));if(!s)return false;questions=s.qn.map(function(n){return ALL_QUESTIONS.find(function(q){return q.n===n})});current=s.cur;score=s.sc;answered=s.ans;userAnswers=s.ua;shuffledMaps=s.sm;currentMode=s.md;return true}catch(e){return false}}
function doResume(){if(resumeQuiz()){document.getElementById('modeScreen').style.display='none';document.getElementById('resumeBanner').style.display='none';document.getElementById('progressWrap').style.display='block';document.getElementById('questionCard').style.display='block';document.getElementById('choicesArea').style.display='flex';document.getElementById('btnRow').style.display='flex';updateScore();renderQuestion()}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function shuffleChoices(q){const idx=[0,1,2,3];for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}const idxMap={};idx.forEach((origIdx,newPos)=>{idxMap[origIdx]=newPos});return{choices:idx.map(i=>q.c[i]),correctIdx:idx.indexOf(q.a),idxMap:idxMap}}
function startQuiz(mode){currentMode=mode;document.getElementById('resumeBanner').style.display='none';let pool;if(mode==='all')pool=[...ALL_QUESTIONS];else if(mode==='exam1')pool=ALL_QUESTIONS.slice(0,40);else if(mode==='exam2')pool=ALL_QUESTIONS.slice(40,80);else pool=shuffle(ALL_QUESTIONS).slice(0,20);questions=shuffle(pool);current=0;score=0;answered=new Array(questions.length).fill(false);userAnswers=new Array(questions.length).fill(null);shuffledMaps=questions.map(q=>shuffleChoices(q));document.getElementById('modeScreen').style.display='none';document.getElementById('resultScreen').classList.remove('show');document.getElementById('progressWrap').style.display='block';document.getElementById('questionCard').style.display='block';document.getElementById('choicesArea').style.display='flex';document.getElementById('btnRow').style.display='flex';updateScore();saveState();window.scrollTo(0,0);renderQuestion()}
function fixExplLabel(expl,correctIdx,idxMap){
  var labels=['A','B','C','D'];
  // 正解ラベルを修正
  var result=expl.replace(/^正解：[ABCD](　|\s)?/,'正解：'+labels[correctIdx]+'　');
  // 選択肢A〜Dをシャッフル後の正しいラベルに一括置換
  // 「選択肢AとB」のような複合表記も1パスで処理し二重変換を防ぐ
  if(idxMap){
    var labelMap={};
    for(var i=0;i<4;i++){labelMap[labels[i]]=labels[idxMap[String(i)]];}
    result=result.replace(/選択肢[ABCD](?:と[ABCD])*/g,function(match){
      var inner=match.slice(3);
      var newInner=inner.replace(/[ABCD]/g,function(l){return labelMap[l];});
      return '選択肢'+newInner;
    });
  }
  return result;
}
function renderQuestion(){const q=questions[current],sm=shuffledMaps[current],total=questions.length;document.getElementById('qNum').textContent='問題 '+q.n;document.getElementById('qText').textContent=q.t;document.getElementById('progressText').textContent='問題 '+(current+1)+' / '+total;const pct=Math.round(current/total*100);document.getElementById('progressPct').textContent=pct+'%';document.getElementById('progressFill').style.width=pct+'%';const area=document.getElementById('choicesArea');area.innerHTML='';const labels=['A','B','C','D'];sm.choices.forEach((c,i)=>{const btn=document.createElement('button');btn.className='choice-btn';btn.innerHTML='<span class="choice-label">'+labels[i]+'</span><span>'+c+'</span>';btn.onclick=()=>selectAnswer(i,btn);area.appendChild(btn)});const expEl=document.getElementById('explanation');expEl.classList.remove('show');document.getElementById('btnNext').disabled=true;if(answered[current]){const ua=userAnswers[current],ci=sm.correctIdx;const btns=area.querySelectorAll('.choice-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===ci)btn.classList.add('correct');else if(i===ua&&ua!==ci)btn.classList.add('wrong')});document.getElementById('explanationText').textContent=fixExplLabel(q.e,sm.correctIdx,sm.idxMap);expEl.classList.add('show');document.getElementById('btnNext').disabled=false}document.getElementById('btnBack').disabled=current===0}
function selectAnswer(idx,clickedBtn){if(answered[current])return;const q=questions[current],sm=shuffledMaps[current];answered[current]=true;userAnswers[current]=idx;const correct=idx===sm.correctIdx;if(correct)score++;updateScore();const btns=document.getElementById('choicesArea').querySelectorAll('.choice-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===sm.correctIdx)btn.classList.add('correct');else if(i===idx&&!correct)btn.classList.add('wrong')});document.getElementById('explanationText').textContent=fixExplLabel(q.e,sm.correctIdx,sm.idxMap);document.getElementById('explanation').classList.add('show');document.getElementById('btnNext').disabled=false;saveState()}
// 次へボタンのみスクロール、回答ボタンはスクロールしない
function goNext(){if(current<questions.length-1){current++;saveState();window.scrollTo(0,0);renderQuestion()}else showResult()}
function goBack(){if(current>0){current--;saveState();renderQuestion()}}
function updateScore(){document.getElementById('scoreNum').textContent=score;document.getElementById('totalNum').textContent=answered.filter(Boolean).length}
function showResult(){clearState();document.getElementById('progressWrap').style.display='none';document.getElementById('questionCard').style.display='none';document.getElementById('choicesArea').style.display='none';document.getElementById('explanation').classList.remove('show');document.getElementById('btnRow').style.display='none';const total=questions.length,pct=Math.round(score/total*100),pass=pct>=70;document.getElementById('resultScore').textContent=score+' / '+total;document.getElementById('resultPassBadge').innerHTML='<div class="result-pass '+(pass?'pass':'fail')+'">'+(pass?'✓ 合格ライン達成':'✗ 合格ライン未達')+'</div>';document.getElementById('resultSub').textContent='正解率 '+pct+'%（合格ライン：70%）';document.getElementById('resultScreen').classList.add('show')}
function showMode(){clearState();document.getElementById('resumeBanner').style.display='none';document.getElementById('glossaryPanel').style.display='none';document.getElementById('resultScreen').classList.remove('show');document.getElementById('modeScreen').style.display='block';document.getElementById('progressWrap').style.display='none';document.getElementById('questionCard').style.display='none';document.getElementById('choicesArea').style.display='none';document.getElementById('btnRow').style.display='none';document.getElementById('explanation').classList.remove('show');document.getElementById('scoreNum').textContent='0';document.getElementById('totalNum').textContent='0'}

// 用語集
function renderGlossary(items){var h='';items=items||GLOSSARY;for(var i=0;i<items.length;i++){var g=items[i];h+='<div class="gi"><div class="gt">'+g.t+(g.en?'<span class="ge">'+g.en+'</span>':'')+'</div><div class="gd">'+g.d+'</div></div>'}document.getElementById('glossaryList').innerHTML=h}
function filterGlossary(q){if(!q){renderGlossary();return}q=q.toLowerCase();var f=GLOSSARY.filter(function(g){return g.t.toLowerCase().indexOf(q)!==-1||(g.en&&g.en.toLowerCase().indexOf(q)!==-1)||g.d.toLowerCase().indexOf(q)!==-1});renderGlossary(f)}
function toggleGlossary(){var p=document.getElementById('glossaryPanel');var m=document.getElementById('modeScreen');if(p.style.display==='block'){p.style.display='none';m.style.display='block'}else{p.style.display='block';m.style.display='none';renderGlossary()}}

if(localStorage.getItem('hvitQuiz')){document.getElementById('resumeBanner').style.display='block'}
</script>
