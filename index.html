<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Salesforce Service Cloud コンサルタント 模擬試験</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--text:#e6e8ee;--muted:#9aa3b2;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',-apple-system,sans-serif;line-height:1.75;-webkit-font-smoothing:antialiased;}
.wrap{max-width:820px;margin:0 auto;padding:32px 20px 80px;}
h1{font-size:1.5rem;font-weight:700;margin:0 0 4px;}
.sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mode-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:18px 16px;cursor:pointer;text-align:left;transition:.15s;font-family:inherit;}
.mode-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
.mode-btn b{display:block;font-size:1.05rem;margin-bottom:4px;}
.mode-btn span{color:var(--muted);font-size:.82rem;}
.bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:18px;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem;margin-bottom:12px;}
.mono{font-family:'DM Mono',monospace;}
.qtext{font-size:1.05rem;font-weight:500;white-space:pre-wrap;margin-bottom:20px;}
.choice{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-family:inherit;font-size:.97rem;transition:.15s;}
.choice:hover:not(:disabled){border-color:var(--accent);}
.choice:disabled{cursor:default;}
.choice .lab{display:inline-block;font-weight:700;font-family:'DM Mono',monospace;margin-right:10px;color:var(--accent);}
.choice.correct{border-color:var(--correct);background:rgba(61,214,140,.12);}
.choice.correct .lab{color:var(--correct);}
.choice.wrong{border-color:var(--wrong);background:rgba(245,91,91,.12);}
.choice.wrong .lab{color:var(--wrong);}
.expl{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-top:14px;animation:fadeIn .3s ease;}
.expl h4{margin:0 0 10px;font-size:.85rem;color:var(--muted);letter-spacing:.04em;}
.expl .row{font-size:.9rem;margin-bottom:10px;}
.expl .row:last-child{margin-bottom:0;}
.expl .row .lab{font-weight:700;font-family:'DM Mono',monospace;margin-right:8px;}
.expl .row.ok .lab{color:var(--correct);}
.expl .row.ng{color:var(--muted);}
.expl .row.ng .lab{color:var(--muted);}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:20px;}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:500;transition:.15s;}
.btn:hover{filter:brightness(1.1);}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn:disabled{opacity:.4;cursor:default;}
.result{text-align:center;}
.result .score{font-size:3rem;font-weight:700;font-family:'DM Mono',monospace;margin:8px 0;}
.badge{display:inline-block;padding:6px 18px;border-radius:99px;font-weight:700;font-size:1rem;margin-bottom:16px;}
.badge.pass{background:rgba(61,214,140,.15);color:var(--correct);}
.badge.fail{background:rgba(245,91,91,.15);color:var(--wrong);}
.resume{background:rgba(91,138,245,.1);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.resume span{font-size:.9rem;}
.hide{display:none!important;}
@media(max-width:600px){.wrap{padding:24px 14px 60px;}.modes{grid-template-columns:1fr;}h1{font-size:1.25rem;}}
</style>
</head>
<body>
<div class="wrap">
<h1>Salesforce 認定 Service Cloud コンサルタント 模擬試験</h1>
<div class="sub">全98問・3択・合格ライン70%　|　選択肢と出題順はランダム・解説つき</div>

<div id="resume" class="resume hide">
<span id="resumeText"></span>
<div><button class="btn" onclick="resumeQuiz()">再開する</button> <button class="btn ghost" onclick="discardResume()">最初から</button></div>
</div>

<div id="home" class="card">
<div class="modes">
<button class="mode-btn" onclick="startQuiz('exam1')"><b>模試1</b><span>第1問〜第50問</span></button>
<button class="mode-btn" onclick="startQuiz('exam2')"><b>模試2</b><span>第51問〜第98問</span></button>
<button class="mode-btn" onclick="startQuiz('all')"><b>全98問</b><span>全問通し</span></button>
<button class="mode-btn" onclick="startQuiz('random20')"><b>ランダム20問</b><span>毎回ランダム抽出</span></button>
</div>
</div>

<div id="quiz" class="hide">
<div class="bar"><i id="progBar" style="width:0%"></i></div>
<div class="card">
<div class="qmeta"><span class="mono" id="qnum"></span><span id="qmode"></span></div>
<div class="qtext" id="qtext"></div>
<div id="choices"></div>
<div id="expl"></div>
<div class="nav">
<button class="btn ghost" id="prevBtn" onclick="prevQ()">← 前へ</button>
<button class="btn" id="nextBtn" onclick="nextQ()">次へ →</button>
</div>
</div>
<div style="text-align:center;margin-top:10px;"><button class="btn ghost" onclick="quitQuiz()">中断してトップへ</button></div>
</div>

<div id="result" class="hide"><div class="card result">
<div id="badge"></div>
<div class="score" id="scoreText"></div>
<div class="sub" id="scoreSub"></div>
<div class="nav" style="justify-content:center;">
<button class="btn" onclick="reviewWrong()">間違えた問題を復習</button>
<button class="btn ghost" onclick="quitQuiz()">トップへ戻る</button>
</div>
</div></div>

</div>
<script>
const ALL_QUESTIONS=[
{n:1,t:"Universal Containers (UC) は、顧客がナレッジ記事を検索してケースを作成できるセルフサービスページを構成しています。UCは最近、ページにEinsteinボットを配置することを要求しましたが、ボットが通常の営業時間中のみケースをライブエージェントに転送し、休日を遵守するようにしたいと考えています。コンサルタントはこの要件をどのように満たすべきですか？",c:["Einsteinボットを構成して、指定された休日を除き顧客をエージェントに転送し、オムニチャネルのエージェントに営業終了時にサインオフするように指示する。","顧客がケースを記録したときに、営業時間外または休日は対応が遅れることを知らせるデフォルトメッセージをEinsteinボットに構成する。","デフォルトの営業時間と有効な休日レコードをクエリし、エージェントが対応できない場合は顧客をケースフォームに転送するアクションをEinsteinボットに構成する。"],a:2,e:["エージェントの手動でのサインオフに依存する運用は、ヒューマンエラーが発生しやすいため適切な解決策ではありません。ボット側で営業時間と休日を自動的に判別し、ルーティングを制御する仕組みが必要です。","この方法では、ユーザーにメッセージを表示するだけであり、営業時間外にエージェントへ転送させないという根本的な制御が行われません。「通常の営業時間中のみ転送する」という要件を満たせていません。","正解です。Einsteinボットからフローなどのアクションを呼び出して、組織のデフォルトの営業時間と休日の設定をリアルタイムで確認させることができます。これにより、稼働時間内であればエージェントへつなぎ、時間外や休日であれば適切にケース作成フォームへ誘導するという要件を正確に満たすことができます。"]},
{n:2,t:"Universal Containers (UC) は、対話チャネルを多様化することで顧客満足度を向上させたいと考えています。UCの目標は、リアルタイムのコミュニケーションとサポートを強化することです。コンサルタントはUCにどの対話チャネルを提案するべきですか？",c:["Einsteinボット","アプリ内およびWebのメッセージング (MIAW)","Experience Cloudサイト"],a:1,e:["Einsteinボットは、よくある質問への自動応答や事前の情報収集を自動化するために使用されます。自己解決を促す機能としては非常に有効ですが、人と人とのリアルタイムなコミュニケーションを直接強化するためのチャネルではありません。","正解です。アプリ内およびWebのメッセージング (MIAW) は、顧客がWebサイトや自社のモバイルアプリからエージェントと直接リアルタイムでチャットできる機能を提供します。これにより、リアルタイムのコミュニケーションとサポートを強化するというUCの目標を直接的に達成することができます。","Experience Cloudサイトは、顧客がナレッジ記事を検索したり、コミュニティで他のユーザーと交流したりするためのセルフサービスポータルを構築する機能です。サイト内にリアルタイムサポートの機能を配置することは可能ですが、Experience Cloudサイト自体はリアルタイムのコミュニケーションチャネルではありません。"]},
{n:3,t:"Universal Containers (UC) は、サービス担当者が維持している顧客データのExcelファイルを持っています。すべてのサービス担当者は、同じ顧客の取引先責任者と仕事をしたことがあります。UCは、Salesforceインスタンスにクリーンなデータが確実に存在するようにしたいと考えています。コンサルタントが推奨するベストプラクティスはどれですか？",c:["Salesforceにインポートする前にデータを重複排除する。","レコードをインポートし、フローを作成してデータ型を変更する。","レコードをインポートし、重複管理を使用する。"],a:0,e:["正解です。Salesforceにデータをインポートする際のベストプラクティスは、システムに不要な重複データが混入するのを防ぐため、インポート前に外部ソース（この場合はExcelファイル）でデータをクレンジングして重複を排除することです。これにより、初期データの品質が適切に保たれます。","データのクレンジングや重複排除の目的でデータ型を変更するフローを作成することは、データの重複問題に対処するものではなく、クリーンなデータを確保するという目的に合致しません。","Salesforceの重複管理機能は非常に有用ですが、複数の担当者が同じ顧客データを扱っており重複が存在することが事前に分かっている場合、そのままインポートすると大量のエラーが発生したり、不完全なデータがシステムに取り込まれたりするリスクがあります。そのため、インポート前にデータを整理することがベストプラクティスとして推奨されます。"]},
{n:4,t:"Universal Supportは、従来のチケット管理システムを置き換えるためにService Cloudを導入しています。サポートチームは地理的に分散しており、さまざまなレベルの技術的専門知識を持つカスタマーサポートユーザーで構成されています。彼らはケース管理、ナレッジ、オムニチャネルルーティングを導入しています。サポートマネージャーは、展開がスムーズに進み、ユーザーが新しいシステムを迅速かつ効率的に定着できるようにすることを目指しています。サポートマネージャーはこれらの要件をどのように満たすことができますか？",c:["インストラクター主導のトレーニングセッションをスケジュールし、役割ベースのシナリオを含め、パイロットグループから段階的な展開を実施する。","短いビデオチュートリアルを使用して会社全体への完全な展開を開始し、サポート担当者がシステムを個別に探索できるようにする。","展開の2週間前にすべてのサポート担当者にSandboxへのアクセスを提供し、正式なトレーニングなしでピアツーピアの学習を奨励する。"],a:0,e:["正解です。地理的に分散し、技術スキルが異なるユーザーグループに対しては、インストラクター主導のトレーニングや実務に沿った役割ベースのシナリオを用意することが、システムの理解を深めるために非常に効果的です。また、パイロットグループを用いた段階的な導入を行うことで、全社展開の前に潜在的な課題を特定して対処できるため、スムーズな移行と高い定着率を実現できます。","短い動画や各自でのシステム探索は補助的な学習方法としては有効ですが、スキルレベルが異なるユーザーに新しいシステムを確実かつ効率的に定着させるためのメインのアプローチとしては不十分です。また、十分な準備やサポート体制がない状態での全社一斉導入は、現場の混乱を招くリスクが高くなります。","体系的なトレーニングを行わずにSandbox環境だけを提供し、担当者同士の学習に依存することは、誤ったシステム利用の知識が広まる原因となります。特に技術的な専門知識にばらつきがあるチームにおいては非効率的であり、要件である迅速かつ効率的なシステムの定着を満たすことはできません。"]},
{n:5,t:"Universal Containersには、独自のサービスコンソールアプリケーションを使用するテクニカルサポートチームと一般カスタマーサービスチームがあります。コンソールをリリースする際、コンサルタントはどの設定を使用するべきでしょうか？",c:["アプリケーションをユーザープロファイルに割り当てる。","サービスユーザーライセンスを付与する権限セットを割り当てる。","ユーザーレコードにサービスユーザーライセンスを割り当てる。"],a:0,e:["正解です。Salesforceにおいて、ユーザーがどのアプリケーション（この場合は特定のサービスコンソール）にアクセスできるかは、主にプロファイルを介して割り当て、制御します。各チームのプロファイルに該当するアプリケーションを割り当てることで、ユーザーがログインした際に適切なコンソールを利用できるようになります。","権限セットを使用して特定の権限やアプリケーションへのアクセスを拡張することは可能ですが、アプリケーションを割り当てる際の基本的な構成はプロファイルで行うのが一般的です。また、権限セットはライセンスを付与する主な方法ではありません。","サービスコンソール機能を利用するためには、各ユーザーレコードでService Cloudユーザーの機能ライセンスを有効にする必要があります。しかし、この設定だけではユーザーが「どの」固有のサービスコンソールアプリケーションにアクセスするかを決定することはできないため、コンソールの割り当て設定としては不十分です。"]},
{n:6,t:"Cloud Kicksではすでにナレッジ管理を有効にしていますが、ケースの解決にかかる時間が長すぎます。ケースの解決時間を短縮するために、コンサルタントは何を推奨すべきですか？",c:["データカテゴリグループを追加する。","シノニムグループを作成する。","提案記事を有効化する。"],a:2,e:["データカテゴリはナレッジ記事を論理的に分類し、ユーザーのアクセスを制御するために使用されます。記事の整理や検索の絞り込みには役立ちますが、エージェントの作業ステップを直接削減するわけではないため、ケースの解決時間の短縮に対する直接的な解決策にはなりません。","シノニムグループは、検索エンジンが同義語を認識できるようにして検索精度を向上させる機能です。エージェントが手動で検索する際のヒット率は上がりますが、検索作業自体は発生するため、時間を劇的に短縮する機能ではありません。","正解です。提案記事機能を有効にすると、ケースに入力された情報に基づいて関連するナレッジ記事が自動的にコンソール上に提示されます。エージェントが手動で記事を検索する手間が省けるため、ケースの解決時間を効果的に短縮することができます。"]},
{n:7,t:"Lightningサービスコンソールを使用して、コンタクトセンターのマネージャーは、現在新しいケースを受け入れることができるサービスエージェントをどのように確認できますか？",c:["オムニチャネル分析","オムニチャネルユーティリティコンポーネント","オムニチャネルスーパーバイザータブ"],a:2,e:["オムニチャネル分析は、過去のパフォーマンスやチャネルの傾向をレポートやダッシュボードで分析するための機能です。リアルタイムで現在対応可能なエージェントを一覧表示して確認するためのものではありません。","オムニチャネルユーティリティコンポーネントは、エージェント自身がコンソール上で自分のプレゼンスステータスを変更したり、ルーティングされた作業を受け入れたりするためのツールです。マネージャーがチーム全体のエージェントの空き状況を監視するために使用するものではありません。","正解です。オムニチャネルスーパーバイザータブは、マネージャーやスーパーバイザーがリアルタイムでエージェントの状況、対応能力、作業負荷、および各キューの待機状況などを一覧で監視および確認するために設計された機能です。"]},
{n:8,t:"Universal Containers (UC) は、アジャイル手法を使用してService Cloudを導入したいと考えています。導入を成功させるために、コンサルタントはどのような提供方法を推奨すべきですか？",c:["プロジェクトチームから継続的なフィードバックを生成し、それに応じて要件と成果物を調整する。","UCの役員とすべての要件を生成し、その後プロジェクトスケジュールを策定する。","プロジェクトのすべての要件を一度に完了し、完全なソリューションを提供する。"],a:0,e:["正解です。アジャイル手法の核となるのは、反復的な開発と継続的なフィードバックです。要件や成果物を柔軟に調整しながら進めることで、変化するニーズに迅速に対応し、最終的なソリューションの価値を最大化することができます。","アジャイル開発では、初期段階ですべての要件を完全に確定させることはしません。要件はプロジェクトの進行に伴って変化し進化するものと捉えるため、最初にすべてのスケジュールと要件を固定するこのアプローチはウォーターフォール手法に近い考え方です。","アジャイル開発では、小さな機能単位で反復的に開発し、段階的なリリースを繰り返します。一度にすべてを完成させて提供する手法はウォーターフォール開発の典型的な特徴であり、アジャイル手法には適していません。"]},
{n:9,t:"サポートマネージャーは、顧客とのチャットセッション中にエージェントにリアルタイムのフィードバックを提供する機能を求めています。この要件を満たすために、コンサルタントはどの機能を設定するべきでしょうか？",c:["Chatter","オムニチャネルスーパーバイザー","フローオーケストレーター"],a:1,e:["Chatterは社内のコラボレーションツールであり、情報共有やコミュニケーションには役立ちますが、顧客とのライブチャットセッション中にエージェントへ直接リアルタイムのフィードバックを提供する機能には設計されていません。","正解です。オムニチャネルスーパーバイザーの機能を使用することで、マネージャーやスーパーバイザーはエージェントのチャットセッションをリアルタイムで監視できます。また、顧客には表示されないプライベートなメッセージをエージェントに送信し、その場でフィードバックやサポートを提供することが可能です。","フローオーケストレーターは、複数のユーザーやステップが関与する複雑なビジネスプロセスを自動化し、オーケストレーションするための機能です。チャット中のリアルタイムな監視やフィードバックの提供を目的としたものではありません。"]},
{n:10,t:"Universal ContainersはAmazon Connectを利用したService Cloud Voiceを導入しています。管理者はテスト用に新しいサンドボックスを作成しました。新しいサンドボックスの設定に関して、管理者は何を想定すべきですか？",c:["サンドボックスの作成時にAWSアカウントとコンタクトセンターは自動的にコピーされますが、音声通話データはコピーされません。","新しいAWSアカウントは自動的に作成されますが、コンタクトセンターと音声通話データは新しいサンドボックスにコピーされません。","サンドボックスの作成時に、AWSアカウント、コンタクトセンター、および音声通話データが自動的にコピーされます。"],a:1,e:["Salesforceから新しいサンドボックスを作成する際、Service Cloud Voiceのコンタクトセンターの設定は自動的にはコピーされません。本番環境のコンタクトセンター構成をそのまま引き継ぐわけではないため、この想定は誤りです。","正解です。Service Cloud Voice with Amazon Connectの環境において、Salesforceで新しいサンドボックスを作成すると、テスト用の新しいAWSアカウントが自動的にプロビジョニングされます。しかし、本番環境のコンタクトセンターの設定や既存の音声通話データなどのレコードは、新しいサンドボックス環境には自動的にコピーされません。","サンドボックスを作成しても、コンタクトセンターの設定や既存の音声通話データはコピーされません。新しいサンドボックスでテストを行うためには、コンタクトセンターを新たに設定する必要があります。"]},
{n:11,t:"Cloud Kicksは顧客に通常および特別なサポートを提供しています。特別なケースが作成されたとき、専任の取引先マネージャーは参照のみのアクセス権を必要とし、サポートスペシャリストは参照および更新アクセス権を必要とします。必要なレベルのアクセス権を提供する機能はどれですか？",c:["ケースのすべてのデータの参照","ケースチーム","マネージャーグループ"],a:1,e:["プロファイルや権限セットにおけるこのシステム権限は、組織内のすべてのケースに対する参照アクセスを許可するものです。個別のケースに対してユーザーごとに異なるレベルのアクセス権（参照のみ、または参照および更新など）を柔軟に付与する要件には適していません。","正解です。ケースチームを使用すると、特定のケースに対して複数のユーザーをチームメンバーとして追加し、それぞれに事前定義された役割に基づくアクセスレベルを割り当てることができます。これにより、取引先マネージャーには参照のみ、サポートスペシャリストには参照および更新といった要件通りのアクセス権を適切に付与できます。","マネージャーグループは、マネージャー階層に基づいてユーザーの直属のマネージャーやさらに上のマネージャーにレコードへのアクセス権を共有するための機能です。特定のケースに対して個別の役割とアクセスレベルを細かく割り当てる目的には使用されません。"]},
{n:12,t:"Cloud Kicksは、サービスエージェントが顧客のサービスレベル契約（SLA）を遵守する責任を持たせるソリューションを実装したいと考えています。この要求を満たすために、コンサルタントはどの機能を使用するべきですか？",c:["サービス契約","Salesforceアンケート","エンタイトルメントプロセス"],a:2,e:["サービス契約は、顧客に提供するカスタマーサポートの種類を表す契約の記録ですが、SLAの遵守時間を測定し、エージェントに責任を持たせるための自動化されたプロセスやマイルストーンを直接管理および強制するものではありません。","Salesforceアンケートは、顧客からのフィードバックや満足度を収集するためのツールです。エージェントのSLAの遵守状況を追跡、管理するための機能ではありません。","正解です。エンタイトルメントプロセスを使用すると、ケースの解決時間や初回応答時間などのSLAのタイムライン（マイルストーン）を定義し、システム上で追跡することができます。これにより、エージェントが定められた時間内に対応を完了するよう管理し、SLA遵守の責任を持たせることが可能になります。"]},
{n:13,t:"サービス担当者の製品専門分野に関する記事のみがLightningナレッジ検索に表示されるようにするためには、Service Cloudコンサルタントはどのアプローチを使用するべきですか？",c:["ページレイアウトの割り当てによってサービス担当者のアクセスを制限するために、記事のレコードタイプを使用する。","各製品専門分野のデータカテゴリを作成する。権限セットを使用してデータカテゴリを割り当てる。","ナレッジの非公開共有モデルを設定する。手動またはグループベースの共有ルールを使用して、サービス担当者にアクセス権を付与する。"],a:1,e:["ページレイアウトとレコードタイプは、記事の表示方法や入力項目を制御するためのものであり、検索結果に表示される記事そのものをフィルタリングしたりアクセスを制限したりするための主な手段ではありません。","正解です。データカテゴリを使用すると、ナレッジ記事を論理的に分類し、ユーザーのプロファイルや権限セットに基づいて表示する記事の可視性を制御できます。これにより、サービス担当者の専門分野に関連する記事のみを検索結果に表示させることが可能になります。","ナレッジ記事へのアクセス制御は、標準のオブジェクト共有ルールではなく、主にデータカテゴリの可視性設定を使用して行われます。そのため、このアプローチはナレッジのアクセス制御のベストプラクティスではありません。"]},
{n:14,t:"Cloud Kicksのマネージャーは、リストビューを使用して一度に最大75件のケースのケースタイプ項目を更新する必要がよくあります。コンサルタントはどのサービスコンソール生産性向上ツールを推奨するべきですか？",c:["各ケースでマクロを実行する。","一括クイックアクションを使用する。","キーボードショートカットを使用する。"],a:1,e:["マクロは繰り返しのタスクを自動化するのに役立ちますが、基本的には各レコードに対して個別に実行する必要があります。リストビューから複数のレコードを一度に更新する要件には適していません。","正解です。一括クイックアクションを使用すると、ユーザーはリストビューから複数のレコードを選択し、単一のアクションで特定の項目（この場合はケースタイプ項目）を一度に更新することができます。最大100件のレコードを同時に処理できるため、今回の要件に最適なツールです。","キーボードショートカットは、コンソール内でのナビゲーションや特定のアクションを素早く実行するための機能ですが、複数のレコードの項目値を一度に一括更新するためのものではありません。"]},
{n:15,t:"指標によると、Universal ContainersはService Cloud Voiceを使用した場合の呼放棄率が高いことが示されています。コンサルタントはどの戦略を推奨するべきですか？",c:["エスカレーションルールを設定する。","セルフサービスナレッジを設定する。","割り当てルールとケースキューを設定する。"],a:1,e:["エスカレーションルールは、一定時間内に解決されないケースの対応を自動的にエスカレーションするために使用されます。通話の放棄率（顧客がエージェントにつながる前に電話を切ってしまう割合）を減らすための直接的な解決策ではありません。","正解です。セルフサービスナレッジを提供することで、顧客は電話をかける前に自分で問題を解決できるようになります。これにより、コンタクトセンターへの全体的な着信数が減少し、エージェントの応答の遅延が解消されるため、結果として呼放棄率を低下させる効果的な戦略となります。","割り当てルールとケースキューは、作成されたケースを適切なチームやエージェントに自動的に割り当てるための機能です。Service Cloud Voiceでのリアルタイムな着信呼の対応や放棄率の改善には直接関係しません。"]},
{n:16,t:"Universal Containersのコールセンターマネージャーは、エージェントの生産性の傾向を監視するために日次レポートを作成したいと考えています。新しいオムニチャネルレポートタイプを作成するために、コンサルタントはどの主オブジェクトを選択するべきですか？",c:["エージェントの詳細","エージェントワーク","割り当てられた作業"],a:1,e:["Salesforceのオムニチャネルにおいて、エージェントの詳細という標準の主オブジェクトは存在しません。エージェントの生産性や作業のルーティング状況をレポートするためのオブジェクトとしては適切ではありません。","正解です。エージェントワークオブジェクトは、オムニチャネルを通じてエージェントにルーティングされた作業項目やその処理状況、承諾時間、対応時間などの記録を保持します。このオブジェクトを主オブジェクトとしてカスタムレポートタイプを作成することで、エージェントが対応した作業量や処理時間など、生産性の傾向を監視するレポートを作成できます。","割り当てられた作業は、Salesforceのオムニチャネルレポートにおいて標準で用意されている主オブジェクトの正式名称ではありません。作業の割り当てや処理時間を追跡するには、エージェントワークオブジェクトを使用する必要があります。"]},
{n:18,t:"Cloud Kicksは、利用可能なサポートチャネルにWhatsAppチャネルを追加したいと考えています。Service Cloudコンサルタントは何を考慮すべきですか？",c:["グループWhatsAppチャットはサポートされていません。","絵文字、アンケート、クイックテキストはサポートされていません。","キューベースのルーティングはサポートされていません。"],a:0,e:["正解です。Salesforceのメッセージング機能において、WhatsAppチャネルとの統合では現在1対1の顧客とのやり取りのみがサポートされており、複数のユーザーが参加するグループチャット機能はサポートされていません。","Salesforceのメッセージングチャネル（WhatsAppを含む）では、エージェントが顧客と効率的かつ豊かにコミュニケーションを取れるように、絵文字やクイックテキストの使用がサポートされています。","オムニチャネルを使用することで、WhatsAppなどのメッセージングチャネルからの着信セッションを、キューベースのルーティングやスキルベースのルーティングを用いて適切なエージェントに自動的に割り当てることが完全にサポートされています。"]},
{n:19,t:"マネージャーは、コールセンターのエージェントによって最も頻繁に使用されているナレッジ記事についての情報を求めています。最も頻繁に使用されているナレッジ記事を特定するために、コンサルタントはどのレポートを使用するべきですか？",c:["最も多くの改訂があるナレッジ記事","最も評価の高いナレッジ記事","ケースに添付されたナレッジ記事の数"],a:2,e:["記事の改訂回数は、記事がどれだけ頻繁に更新または修正されたかを示すものであり、エージェントによる実際の使用頻度や問題解決への貢献度を示すものではありません。","評価の高い記事は品質が良いことや役立つ内容であることを示しますが、それが日々の業務においてコールセンターのエージェントに最も頻繁に使用されているかどうかを直接測る指標にはなりません。","正解です。エージェントは顧客からの問い合わせ（ケース）を解決する際に、解決に役立ったナレッジ記事をケースレコードに直接添付します。したがって、ケースに添付された回数をカウントするレポートを作成することで、現場で最も頻繁に使用され、実用性の高いナレッジ記事を正確に特定することができます。"]},
{n:20,t:"Universal Containersは、顧客により一貫したサービス体験を提供したいと考えており、マクロの使用を評価しています。コンサルタントはどの前提条件を考慮するべきですか？",c:["パブリッシャーアクションがページレイアウトにある。","すべてのユーザーにマクロを作成する権限がある。","Lightningページにマクロの実行アクションが含まれている。"],a:2,e:["パブリッシャーアクション（クイックアクション）はマクロが自動化する処理内容（メール送信など）として利用されますが、ユーザーがマクロ自体を起動するためには、まずマクロを実行するための機能が画面上に配置されている必要があります。","マクロを使用（実行）するために、必ずしもすべてのユーザーがマクロを作成する権限を持っている必要はありません。マクロの作成権限と実行権限は分けて管理することができ、一般のサポート担当者には実行権限のみを付与するのが一般的です。","正解です。Lightning Experienceでエージェントがマクロを利用するためには、該当するLightningレコードページにマクロの実行アクション（マクロブラウザーやマクロコンポーネントなど）が含まれており、ユーザーがUI上からマクロを選択して実行できる状態になっていることが不可欠な前提条件となります。"]},
{n:21,t:"Cloud Tech Supportは、ケースのエスカレーションルールやナレッジベースなどの新機能を含むService Cloudの導入準備を進めています。現在のサポートスタッフは、メールのみのケース管理に慣れています。同社はダウンタイムを最小限に抑え、新しいソリューションの定着率を高くしたいと考えています。サポート担当者が移行に備えるために、Service Cloudコンサルタントは何を推奨するべきでしょうか？",c:["ジャストインタイムのビデオチュートリアルを開発し、本番稼働後にアクセスを提供して、担当者がシステムを使用しながら学習できるようにする。","導入前に、ビジネスプロセスに沿った実践的なトレーニングとTrailheadベースの学習を組み合わせて提供する。","正式な有効化計画なしに、パワーユーザーを割り当ててシステムを設定し、稼働後の質問に対応させる。"],a:1,e:["本番稼働後のみに学習を依存すると、スタッフが新しいシステム（特にメールのみからの移行）に戸惑い、初期のダウンタイム増加や定着率の低下を招くリスクが高くなります。","正解です。スタッフがこれまでメールのみの運用に慣れていた場合、システム切り替え前に実際の業務に即したハンズオントレーニングと学習ツールを活用して十分な準備を行うことで、移行時の混乱を最小限に抑え、高い定着率を実現することができます。","事前のトレーニングやイネーブルメントの計画がないまま稼働させると、ユーザーの混乱を招き、システムの定着率が著しく低下する原因となります。大幅な業務変更を伴う導入には不適切なアプローチです。"]},
{n:22,t:"Universal Containersでは、サポート担当者がケースを作成する際に、顧客がサポートを受ける資格があることを確認する必要があります。サポート担当者は、顧客がサポートを受けることを許可されているかどうかをどこで確認できますか？",c:["マイルストーン","アクション","エンタイトルメント"],a:2,e:["マイルストーンは、サポートプロセスにおいて完了する必要がある必須のステップ（初回応答時間や解決時間など）を定義して追跡する機能です。顧客がサポートを受ける資格自体を確認するための場所ではありません。","アクションは、ユーザーがSalesforce内でレコードの作成、更新、メール送信などを迅速に行うための機能です。顧客のサポート契約や資格の有無を検証、確認するための情報源ではありません。","正解です。エンタイトルメントは、顧客がどのような種類のサポート（電話対応、ウェブサポートなど）を、どの期間受ける資格があるかをシステム上で定義し管理する機能です。担当者はケース作成時にエンタイトルメントレコードを参照することで、顧客がサポート対象かどうかを正確に確認できます。"]},
{n:23,t:"成長中の小売企業は、コストが高く、拡張が困難で、新しいデジタルチャネルをサポートしていない従来のオンプレミスコンタクトセンターを最新化したいと考えています。同社は、間接費を削減し、季節的なピーク時に簡単に拡張し、サービス担当者にリアルタイムの顧客インサイトを提供したいと考えています。Service Cloudコンサルタントは何を推奨すべきでしょうか？",c:["カスタムのExperience Cloudソリューションを構築し、APIを使用して外部のテレフォニープロバイダーと統合する。","Amazon Connectを利用したSalesforceコンタクトセンターを導入し、クラウド上で音声、チャット、ケース管理を統合して、リアルタイムのインサイトを提供する。","オムニチャネル、Live Agent、およびサードパーティのCTIを使用してレガシーシステムを拡張し、時間の経過とともに新しいデジタルチャネルを追加する。"],a:1,e:["Experience Cloudは主に顧客向けポータルやコミュニティの構築に使用されます。コンタクトセンター全体の最新化やスケーリング、リアルタイムのインサイト提供という要件に対して、一からカスタムソリューションを構築しAPI統合することはコストと維持の手間がかかるため、最適なアプローチではありません。","正解です。Service Cloud Voice with Amazon Connectを利用することで、従来のオンプレミスのインフラ管理をなくし、クラウド上で容易にスケーリングできる最新のコンタクトセンターを構築できます。音声と他のデジタルチャネルが統合されるため、担当者はリアルタイムで顧客の全体像を把握できるようになります。","既存のレガシーシステムはコストが高く拡張が困難であると問題文で指摘されています。このシステムを維持したまま機能を追加しても、インフラコストの削減やピーク時の容易なスケーリングといった根本的な課題の解決にはなりません。"]},
{n:24,t:"Universal Containersはナレッジ中心サポートの導入を検討しています。ナレッジ中心サポートの導入から期待できる利点はどれですか？",c:["管理オーバーヘッドの削減","セルフサービスの必要性の低下","問題解決時間の短縮"],a:2,e:["ナレッジ中心サポートを導入すると、エージェントが日常業務の中で記事を作成および更新するため、プロセスの初期段階ではトレーニングやナレッジの品質管理のための管理オーバーヘッドがむしろ増加する可能性があります。管理の削減が直接的な利点となるわけではありません。","ナレッジ中心サポートの主な目標の1つは、質の高いナレッジベースを構築し、それを顧客に公開して自己解決を促すことです。これにより、セルフサービスの必要性が低下するのではなく、セルフサービスがより有効に機能し、その価値が向上します。","正解です。ナレッジ中心サポートを導入することで、チーム全体で解決策が継続的に蓄積および共有されます。エージェントは既存のナレッジを迅速に検索して再利用できるため、同じ問題に対する調査時間が省かれ、顧客の問題解決時間を効果的に短縮することができます。"]},
{n:25,t:"Universal Containersは、顧客がコンピューターやモバイルデバイスからサポートエージェントとリアルタイムでやり取りできるようにしたいと考えています。この要件を満たすために、コンサルタントはどの機能を推奨するべきですか？",c:["Einsteinチャットボット","Service Cloud Voice","デジタルエンゲージメント"],a:2,e:["Einsteinチャットボットは、顧客からの一般的な問い合わせに対して自動的に回答を提供するAI機能です。人間のエージェントとのリアルタイムなやり取りを直接提供するものではありません。","Service Cloud Voiceは、電話システムとSalesforceを統合し、音声通話をコンソール内で管理するための機能です。コンピューターやモバイルデバイスからのチャットやメッセージングによるリアルタイムなやり取りを提供する最適な機能ではありません。","正解です。デジタルエンゲージメントを利用することで、Webチャット、SMS、各種SNSのメッセージング機能など、複数のデジタルチャネルを通じて、顧客は任意のデバイスからサポートエージェントとリアルタイムでやり取りすることが可能になります。"]},
{n:26,t:"Universal Containersは顧客満足度を向上させるプログラムを開始しています。プログラムの一環として、顧客が満足し、問題が解決されたことを確認するために、ケースがクローズされた後に顧客にアンケートを実施する必要があります。この要件を満たすために、コンサルタントはどのソリューションを推奨すべきですか？",c:["自動応答ルールを使用して顧客にメールを送信する。","エスカレーションルールを使用してケースをケースキューに割り当てる。","Flow Builderを使用して顧客にメールを送信する。"],a:2,e:["自動応答ルールは、ケースが最初に作成されたタイミングで顧客に自動的に受付完了通知などのメールを送信するための機能です。ケースがクローズされた後にアンケートを送信するような、レコードの更新をトリガーとするアクションには使用できません。","エスカレーションルールは、ケースが一定時間内に解決されない場合に、別のキューやユーザーに自動的に再割り当てして対応を促すための機能です。ケースクローズ後にアンケートを送信するという要件とは関連がありません。","正解です。Flow Builderは、レコードの作成や更新（この場合はケースのステータスがクローズに変更されたこと）をトリガーとして、メールアラートの送信などの自動化プロセスを実行できるツールです。これを使用することで、要件通りにケースクローズ後のアンケートメールを自動送信することができます。"]},
{n:27,t:"Ursa Major Solarのサポート部門は、顧客がサービスレベル契約(SLA)に基づいて適切なサポートを受けられるようにするプロセスを導入したいと考えています。実装の一環として、コンサルタントはどの機能を設定すべきですか？",c:["マイルストーン","エスカレーションルール","スケジュール済みフローアクション"],a:0,e:["正解です。マイルストーンは、エンタイトルメントプロセス内でサポートステップ（初回対応時間や解決時間など）を定義し、顧客がSLAに基づいた適切なサポートレベルを受けられるように追跡および強制するために設定する主要な機能です。","エスカレーションルールは、ケースが一定時間内に解決または対応されない場合に、別のユーザーやキューに自動的に再割り当てして対応を促すための機能です。SLAの基準を直接定義して顧客へのサポートレベルを保証するための機能ではありません。","スケジュール済みフローアクションは、指定した日時にバックグラウンドでレコードの更新などの処理を実行するための自動化ツールですが、SLAに基づく個別のサポート対応期限を標準機能として管理、追跡するためのものではありません。"]},
{n:28,t:"Ursa Major Solarは、優先度の高いケースに対してサービスレベル契約を伴うサポートを提供しています。優先度の低いケースでは対応時間が異なります。サービスセンターではオムニチャネルを使用して作業項目を管理しています。しかし、最近作成された優先度の高いケースの多くが、サービスの期限を超過しています。要件を満たすために、コンサルタントはどの設定を構成する必要がありますか？",c:["スキルベースのルーティング","キャパシティモデル","セカンダリルーティング優先度"],a:2,e:["エージェントの特定のスキルに基づいて作業を割り当てる機能です。ケースの優先度やサービスレベル契約の期限超過を防ぐためのルーティング順序の動的な調整には直接関係しません。","エージェントが同時に処理できる作業の最大量や消費されるキャパシティを定義する機能です。ケースの優先順位付けや期限に基づく対応順序の制御には使用されません。","正解です。オムニチャネルのセカンダリルーティング優先度機能を使用すると、ケースがキューで待機している間に、設定した条件に基づいて動的に優先度を上げることができます。これにより、期限が近づいている優先度の高いケースが、より新しいケースよりも先に適切なエージェントにルーティングされるようになり、期限超過を防ぐことができます。"]},
{n:29,t:"Cloud Kicksは、異なるレベルのサポートを受ける顧客にService Cloudを導入する予定です。コンサルタントは、エンタイトルメントのみが適切なソリューションであるか、それともエンタイトルメントとサービス契約の組み合わせが適切なソリューションであるか確信が持てません。最適なソリューションを決定するために、コンサルタントはどのような質問をするべきでしょうか？",c:["顧客はExperience Cloudを介してナレッジ記事にアクセスしますか？","サポートは定期的に提供され、毎年更新されますか？","複数バージョンのエンタイトルメントを作成して管理する必要がありますか？"],a:1,e:["ナレッジ記事へのアクセス経路は、エンタイトルメント単体で運用するか、サービス契約を組み合わせたモデルを採用するかを決定するための判断基準にはなりません。","正解です。サービス契約は、顧客に提供するサポートの種類（サブスクリプションや保守契約など）を定義し、契約の開始日と終了日を管理するために使用されます。毎年更新されるような定期的なサポート契約の有無を確認することで、サービス契約オブジェクトを併用する必要があるかどうかを的確に判断できます。","エンタイトルメントプロセスのバージョン管理機能に関連する質問ですが、サービス契約オブジェクトを利用すべきかどうかを判断するための直接的な確認事項ではありません。"]},
{n:30,t:"Lightning Experienceへの移行後、ユーザーからケースのクローズ時にナレッジ記事を作成できないという不満が寄せられています。コンサルタントはこの問題をどのように解決するべきでしょうか？",c:["記事を作成する唯一の方法はナレッジコンポーネントからであることをユーザーに通知する。","ナレッジ記事の参照/更新/作成権限を有効にする。","ユーザーのプロファイルにSalesforceナレッジの管理権限を追加する。"],a:2,e:["Lightning Experienceではケースをクローズするフローの一部として新しいナレッジ記事を作成するよう設定することが可能なため、この通知内容は適切ではありません。","オブジェクトに対する基本的なアクセス権限は必要ですが、ケースのクローズ時にナレッジ記事を作成するなどのナレッジ管理全般の機能を利用するには、システム権限が別途必要になります。","正解です。ユーザーがケースから記事を作成したり、ナレッジベースを管理したりするためには、ユーザーレコードでナレッジユーザーのチェックボックスがオンになっていることに加え、プロファイルや権限セットで「Salesforceナレッジの管理」権限が付与されている必要があります。"]},
{n:31,t:"Cloud Kicksの顧客は、独自のeコマースサイトを使用してカスタマイズされた靴を注文します。靴の製造中、顧客は注文状況を頻繁に確認したいと考えています。eコマースサイトで自動化されたセルフサービスを提供するために、コンサルタントはどの方法を推奨するべきでしょうか？",c:["Visual Remote Assistantを設定する。","Einsteinボットを作成する。","画面フローを構築する。"],a:1,e:["Visual Remote Assistantは、ビデオ通話などを通じて顧客を視覚的にサポートする機能です。自動化された注文状況の確認やセルフサービスの提供という目的には適していません。","正解です。Einsteinボットは、Webサイトやメッセージングチャネル上で顧客の一般的な質問（注文状況の確認など）に自動で応答するAIアシスタント機能です。eコマースサイトでの自動化されたセルフサービスを24時間体制で提供するのに最適です。","画面フローは内部ユーザーやコミュニティユーザーのデータ入力をガイドする機能として優れていますが、eコマースサイト上で顧客からの問い合わせに自動で応答し、注文状況などの動的な情報を提供する自律的なセルフサービスチャネルとしては、Einsteinボットの方が適しています。"]},
{n:32,t:"最近の顧客満足度調査のレビューにより、サポートセンターが顧客への新製品のアップセルをうまく行えていないことが明らかになりました。顧客は、サービスの問題で電話をかけた際に、代わりに営業の売り込みを受けると不満を報告しています。しかし、新製品をアップセルされた顧客は、顧客であり続ける可能性が2倍高くなります。顧客が提案を受け入れやすいと思われる場合にのみアップセルが行われるようにするための推奨される方法は何でしょうか？",c:["Einstein Next Best Action","Service Analyticsの予測","Visual Remote Assistant"],a:0,e:["正解です。Einstein Next Best Actionは、ビジネスルールや予測モデルなどの様々なデータを組み合わせて、個々の顧客に対して次に取るべき最適なアクション（この場合はアップセルの提案）をエージェントに推奨する機能です。これにより、顧客が提案を受け入れやすい適切な状況でのみアップセルを行うことができます。","Service Analyticsの予測は、蓄積されたデータを分析して将来の結果や傾向を予測するための機能ですが、通話対応中のエージェントに対して動的かつリアルタイムに具体的なアクション（アップセルなど）を直接推奨するためのツールではありません。","Visual Remote Assistantは、ビデオ通話などを通じて顧客の問題を視覚的にサポートし解決するための機能です。顧客がアップセルを受け入れる可能性を分析したり、エージェントに次のアクションを推奨したりする目的では使用されません。"]},
{n:33,t:"Cloud Kicks（CK）は、顧客とのケースを解決するために、組織内で支援を求めることがよくあります。また、パートナーの関与が必要になることもあります。CKは、会話の履歴を文書化しながら、ケースのコミュニケーションに最も効果的なソリューションを求めています。この要件を満たすために、コンサルタントはどの機能を推奨するべきでしょうか？",c:["ケーススウォーミングにSlack for Serviceを使用する。","メールの送信クイックアクションを使用して関係者を巻き込む。","子ケースを使用してパートナーとやり取りする。"],a:0,e:["正解です。Slack for Serviceを使用したケーススウォーミングは、組織内の専門家や外部のパートナーとリアルタイムで協力してケースを解決するための最適な方法です。Salesforceと連携して会話の履歴をケースに記録しながら、効果的で俊敏なコミュニケーションを実現できます。","メールの送信クイックアクションは関係者に連絡を取る手段として使えますが、複数の担当者やパートナーがリアルタイムで協力して迅速な問題解決を図るためのスウォーミングや、統合されたシームレスなコミュニケーションにはSlackほどの効果はありません。","子ケースを作成してパートナーを割り当てることは可能ですが、組織内のメンバーやパートナーを含む関係者全員がリアルタイムで効果的にコミュニケーションを取り、かつ会話履歴を一元管理する俊敏なアプローチとしては適していません。"]},
{n:34,t:"Universal Containers（UC）は、2つの異なるビジネスグループにカスタマーサポートを提供しています。UCは、各ビジネスグループのケースに異なるサポートプロセスと項目を持たせることを要件としています。この要件を満たすために、コンサルタントはどの機能を実装するべきでしょうか？",c:["オムニチャネル","レコードタイプ","動的フォーム"],a:1,e:["オムニチャネルは、作業項目を適切なエージェントに自動的にルーティングするための機能です。ケースのサポートプロセスや表示する項目を直接制御するための機能ではありません。","正解です。レコードタイプを使用すると、異なるビジネスプロセス、選択リストの値、およびページレイアウトを定義して使い分けることができます。これにより、ビジネスグループごとに異なるサポートプロセスと項目をケースに適用するという要件を満たすことができます。","動的フォームは、レコードページ上の項目やセクションの表示を特定の条件に基づいて動的に制御する機能ですが、サポートプロセス（ライフサイクル）自体を個別に定義して管理するためには、レコードタイプとサポートプロセスの機能を使用する必要があります。"]},
{n:35,t:"サービス担当者が新しいケースにより正確に対応できるようにするため、Universal Containersは関連するナレッジ記事のリストをケースレコードページに表示したいと考えています。Service Cloudコンサルタントはこの要件をどのように設定するべきでしょうか？",c:["ナレッジ関連リストをケースレコードページに追加する。","ナレッジコンポーネントをケースLightningレコードページに追加する。","ナレッジコンポーネントをケースページレイアウトに追加する。"],a:1,e:["ナレッジ関連リストは、ケースにすでに関連付けられている記事を表示するために使用されます。新しいケースを開いた際に関連する記事を動的に推奨および表示する機能を提供するものではありません。","正解です。Lightningアプリケーションビルダーを使用してケースLightningレコードページにナレッジコンポーネントを追加することで、ケースの件名などの情報に基づいて関連するナレッジ記事が自動的に推奨および表示されるようになります。これにより、サービス担当者はケースに迅速かつ正確に対応できるようになります。","ページレイアウトエディタ（従来のSalesforce Classicのレイアウト設定）では、Lightning Experienceの機能である動的なナレッジコンポーネントを直接追加することはできません。コンポーネントの配置は、Lightningレコードページで行う必要があります。"]},
{n:36,t:"Cloud Kicks（CK）は、サービス契約に基づいて製品サポートを提供しています。顧客のサービス契約には、ケースと作業指示の両方で同じサービスレベル契約（SLA）が含まれています。CKは、この設定を管理するための効率的な方法を求めています。要件を満たすために推奨される設定は何ですか？",c:["ケースと作業指示の両方で単一のエンタイトルメントプロセスを作成する。","作業指示にエンタイトルメントプロセスを割り当てるフローを作成する。","ケースと作業指示で別々のエンタイトルメントプロセスを作成する。"],a:0,e:["正解です。Salesforceでは、ケースと作業指示（Work Order）の両方をサポートする単一のエンタイトルメントプロセスを作成することができます。要件の通り、両方で同じSLAを使用する場合、1つのプロセスを共有することが最も効率的な設定および管理方法となります。","フローを使用してレコード作成時などにエンタイトルメントを自動割り当てすることは可能ですが、ケースと作業指示で共通のSLAを効率的に管理するためのプロセスの設定方法そのものに対する推奨事項としては不十分です。","SLAの内容が全く同じであるにもかかわらず、ケースと作業指示で別々のエンタイトルメントプロセスを作成して管理することは、設定が重複してメンテナンスの手間が増えるため、効率的な方法とは言えません。"]},
{n:37,t:"Universal Containersの顧客は、複雑な製品の問題について、直接サポートエージェントと話すことを好みます。これにより、電話の量が多くなり、保留時間が長くなることに対する顧客の不満が生じています。この問題に対処するために、コンサルタントはどの機能を推奨するべきでしょうか？",c:["組み込みチャットウィンドウ","連絡リクエスト","Web-to-ケース"],a:0,e:["正解です。組み込みチャットウィンドウを使用することで、顧客はWebサイト上から直接ライブエージェントとリアルタイムでテキストベースのチャットを行うことができます。これにより、電話の着信量を減らしつつ、顧客が求めるエージェントとの直接的なやり取りを実現し、保留時間の長さに起因する不満を解消することができます。","連絡リクエストは、顧客がエージェントからの折り返し連絡をリクエストできる機能です。電話口での保留時間をなくすことはできますが、顧客が今すぐライブエージェントとやり取りしたいというリアルタイムなサポートのニーズには直接応えることができません。","Web-to-ケースは、Webフォームに入力された情報からケースを作成する機能です。メールと同様の非同期のコミュニケーション手段であるため、ライブエージェントと直接リアルタイムで話したいという顧客の要望を満たすソリューションとしては適していません。"]},
{n:38,t:"Universal Containers（UC）は、関連する製品の専門知識に基づいてサービス担当者にケースを割り当てるために、スキルベースのルーティングを使用しています。UCはまた、ケースの作業負荷を均等に分散させるために、サービス担当者を次のケースに自動的に割り当てたいと考えています。",c:["作業量が最も少ない","手動プッシュ","対応可能状況が最も高い"],a:2,e:["作業量が最も少ないエージェントに作業を割り当てるオムニチャネルのルーティングモデルですが、スキルベースのルーティングの設定においてはこのモデルはサポートされていません。","システムが自動的に作業を割り当てるのではなく、手動でケースをエージェントにプッシュする方法です。これはケースを自動的に割り当てて作業負荷を均等に分散させたいという要件に合致しません。","正解です。オムニチャネルでスキルベースのルーティングを使用する場合、サポートされているルーティングモデルは「対応可能状況が最も高い」のみです。この機能を使用することで、要求されるスキルを持っていて、かつ最も対応可能なキャパシティの割合が高い（空きがある）サービス担当者に自動的にケースが割り当てられ、作業負荷を均等に分散させることができます。"]},
{n:39,t:"Universal Containersは、「取引先番号は何ですか？」や「パスワードをリセットする必要があります。」といった大量の一般的な顧客からの問い合わせへの回答を自動化したいと考えています。同社は、24時間年中無休で稼働し、自然で会話形式の返答を提供し、会話全体の文脈を理解できるソリューションを必要としています。Service Cloudコンサルタントは何を推奨するべきでしょうか？",c:["「取引先管理」などの標準トピックと関連するアクションを備えたAgentforceサービスエージェントを実装する。","顧客向けのナレッジベースに生成型検索回答を実装する。","Experience Cloudで公開ナレッジベースを実装し、顧客ごとにユーザーを作成する。"],a:0,e:["正解です。Agentforceサービスエージェントは、AIを活用して顧客との会話の文脈を理解し、24時間体制で自然な対話を通じて問題を自動的に解決します。標準トピックやアクションを設定することで、パスワードのリセットや取引先情報の照会といった一般的な問い合わせに対して自律的に対応し、アクションを実行することが可能になります。","生成型検索回答は、ナレッジ記事に基づいてユーザーの検索に対する回答を生成する機能です。セルフサービスには役立ちますが、顧客と双方向の自然な会話を行い、会話全体の文脈を維持しながら特定のアクションを自律的に実行するソリューションとしては不十分です。","ナレッジベースを公開してExperience Cloudで提供することは情報検索の促進に役立ちますが、顧客からの問い合わせに対して24時間体制で自然な会話を通じて自動応答し、文脈を理解して解決策を提示するという要件を満たすものではありません。"]},
{n:40,t:"Cloud Kicksは、メール、電話、チャットボットを超えた、よりパーソナライズされた柔軟なサービス体験を顧客に提供したいと考えています。この要件を満たすために、コンサルタントは何を推奨するべきでしょうか？",c:["ソーシャルメディア","メッセージングアプリ","Salesforceナレッジ"],a:1,e:["ソーシャルメディアでのカスタマーサポートは広く利用されていますが、プラットフォーム上の公開された場でのやり取りが多くなる場合があり、顧客に合わせたプライベートで柔軟な1対1のサービス体験を構築するという目的においては、メッセージングアプリの方が適しています。","正解です。SMS、WhatsApp、Facebook Messengerなどのメッセージングアプリを活用することで、顧客が日常的に使い慣れたプライベートなチャネルを通じて、非同期かつパーソナライズされた柔軟なコミュニケーションを実現し、顧客体験を大幅に向上させることができます。","Salesforceナレッジは、FAQや手順書などの記事を作成して顧客の自己解決を支援する機能です。これは情報を管理して提供するためのツールであり、顧客と直接的かつパーソナライズされた柔軟なコミュニケーションを行うための新たな対話チャネルとして機能するものではありません。"]},
{n:41,t:"グローバルな自動車会社は、センサーデータ、サービス履歴、資金調達の詳細など、車両と顧客の複数のデータソースをSalesforceに統合することで、サービスエクスペリエンスを向上させたいと考えています。目標は、顧客とのやり取りや車両の健全性を全体的に把握し、リアルタイムデータに基づいてアラートをトリガーし、適切なサービスチャネルにケースをルーティングすることです。",c:["カスタムオブジェクトと外部サービスを使用して受信データを保存し、フローを設定してアラートとルーティングロジックを管理する。","Data Cloudを使用して複数のソースからのリアルタイムデータを統合し、Service Cloudでのアラート、計算済みインサイト、ケースのルーティングを強化する。","スケジュールされたバッチジョブを使用して、MuleSoftを使用して外部システムから標準のSalesforceオブジェクトにデータを同期する。"],a:1,e:["大量のリアルタイムストリーミングデータ（センサーデータなど）をSalesforceのカスタムオブジェクトに直接保存することは、ストレージ制限やパフォーマンスの観点から推奨されるアーキテクチャではありません。","正解です。Data Cloudは、複数のシステムからの大量のデータ（リアルタイムのストリーミングデータを含む）を取り込み、統合し、一元化された包括的な顧客プロファイルを作成するために設計されています。これにより、Service Cloud内でリアルタイムのインサイトの活用、アラートのトリガー、高度なルーティングを遅延なく実行するという要件を最適に満たすことができます。","MuleSoftは複数システムの連携に非常に優れていますが、スケジュールされたバッチジョブによる同期ではデータのタイムラグが発生するため、「リアルタイムデータに基づいてアラートをトリガーする」という即時性の要件を満たすことができません。"]},
{n:42,t:"サービスエージェントが効果的に対応するのに十分な情報がチャットリクエストに含まれるようにするため、コンサルタントは何を推奨するべきでしょうか？",c:["Einsteinボットを使用してインテントをカスタマイズする。","Lightningコンソールのチャットページをカスタマイズする。","プレチャットフォームをカスタマイズする。"],a:2,e:["インテント（意図）のカスタマイズは、ボットが顧客の入力から意図を的確に理解するための精度を高める機能ですが、エージェントに繋がる前のチャットリクエスト自体に十分な初期情報（顧客名や問い合わせのカテゴリなど）を確実に入力させるための直接的な解決策ではありません。","Lightningコンソールのチャットページは、エージェントが顧客と実際にやり取りを行うための社内向けインターフェースです。この画面のレイアウトなどをカスタマイズしても、顧客側から提供されるチャット開始時の情報量を増やすことには繋がりません。","正解です。プレチャットフォームは、顧客がチャットセッションを開始する直前に入力する入力画面です。このフォームをカスタマイズして必要な情報（名前、メールアドレス、問い合わせ内容など）を入力必須にすることで、エージェントはチャットを受け入れた時点で顧客の状況をあらかじめ把握でき、効果的かつスムーズに対応を開始することができます。"]},
{n:43,t:"Universal Containersは、ケース作成プロセスを自動化したいと考えています。ビジネスプロセスのレビューを実施している間に、コンサルタントは顧客が時々問題のデジタル写真をアップロードすることを知りました。ベストプラクティスに従って、コンサルタントはどのソリューションを推奨するべきでしょうか？",c:["Email-to-ケース","AppExchangeパッケージ","Web-to-ケース"],a:0,e:["正解です。Email-to-ケースは、顧客からのメールを自動的にケースレコードに変換するSalesforceの標準機能です。メールに添付されたデジタル写真などのファイルも自動的にケースの添付ファイルとして保存されるため、画像を伴う問題報告の自動化要件を満たすベストプラクティスとなります。","AppExchangeには多くのサードパーティ製ソリューションが存在しますが、添付ファイル付きのケース自動作成はSalesforceの標準機能で十分に対応可能であるため、わざわざ外部パッケージを導入することは推奨されるベストプラクティスではありません。","Web-to-ケースは、Webサイト上のフォームから入力された情報を基にケースを自動作成する標準機能ですが、標準のフォーム機能では顧客が直接ファイルを添付してアップロードすることがサポートされていません。そのため、デジタル写真をアップロードするという要件を満たすことができません。"]},
{n:44,t:"Cloud Kicksは、優先度の高い問題を適切な担当者に渡すための集中的なメッセージング戦略を実装しています。Service Cloudコンサルタントは、これらの特定のやり取りにおける処理時間とメッセージングセッションの解決状況を追跡するために、どのソリューションを検討するべきでしょうか？",c:["AgentWorkを主オブジェクトとし、メッセージングセッションを副オブジェクトとするカスタムレポートタイプを作成する。","AgentWorkを主オブジェクトとし、メッセージングユーザーを副オブジェクトとするカスタムレポートタイプを作成する。","メッセージングセッションを主オブジェクトとし、AgentWorkを副オブジェクトとするカスタムレポートタイプを作成する。"],a:2,e:["AgentWorkはオムニチャネルによる作業の割り当て状況や対応キャパシティを管理するオブジェクトです。メッセージングのやり取りの詳細や解決状況を主軸として分析する場合、AgentWorkを主オブジェクトにするとセッション全体の詳細情報が掴みにくくなります。","メッセージングユーザーはチャネルを使用する顧客（エンドユーザー）の情報を保持するオブジェクトです。特定のセッションの処理時間や解決状況といったトランザクションデータを追跡・分析するための構成としては適していません。","正解です。メッセージングセッションを主オブジェクトとすることで、セッションそのものの詳細（処理時間、ステータス、解決状況など）をベースにレポートを作成できます。それにオムニチャネルのルーティングと対応実績を管理するAgentWorkを副オブジェクトとして紐付けることで、どのエージェントがそのセッションをどのように処理したかを正確に追跡できるようになります。"]},
{n:45,t:"Universal Containers（UC）は、コンタクトセンターにService Cloudを初めて導入するためにコンサルティング会社を雇いました。このプロジェクトでは、迅速なイテレーションとスピーディな完了が求められています。UCは、確認と改善のためにプロジェクトチームからの頻繁な更新を要求しています。要件を考慮して、コンサルタントはどの開発手法を推奨するべきでしょうか？",c:["ウォーターフォール","ハイブリッド","アジャイル"],a:2,e:["ウォーターフォール開発手法は、要件定義から設計、開発、テスト、導入までを順番に進める直線的なアプローチです。事前に要件を完全に確定させることを前提としているため、要件の変更に弱く、迅速なイテレーション（反復）や頻繁な確認・改善を伴うスピーディなプロジェクトには適していません。","ハイブリッドは、ウォーターフォールとアジャイルの両方の要素を組み合わせた手法です。ある程度の柔軟性は提供しますが、プロジェクト全体を通して迅速なイテレーションと頻繁なフィードバックループを最優先とする今回の要件に対しては、最も効果的なアプローチとは言えません。","正解です。アジャイル開発手法は、短い開発サイクル（スプリント）を反復（イテレーション）することで、迅速かつ柔軟にシステムを構築するアプローチです。定期的な成果物の確認と関係者からの頻繁なフィードバック（更新と改善）をプロセスに組み込んでいるため、UCが求める迅速なイテレーションとスピーディな完了に最適な手法です。"]},
{n:46,t:"Universal Containersは、ケースの解決時間を短縮することで、社内のサービス担当者の効率を向上させることを目指しています。サービス担当者は、問題を解決するための一連のステップに従い、簡潔なケースの要約を生成する必要があります。Service Cloudコンサルタントはどのソリューションを推奨するべきでしょうか？",c:["Agentforceサービスアシスタント","アクション＆おすすめ","Einstein記事の推奨"],a:0,e:["正解です。Agentforceサービスアシスタントは、AIを活用して社内エージェントの作業を直接的に支援する機能です。対話型のインターフェースを通じて問題解決のための次のステップを案内したり、やり取りから簡潔なケースの要約を自動生成したりすることが可能なため、サービス担当者の業務効率と解決時間の向上という要件を完全に満たします。","アクション＆おすすめコンポーネントは、ケースの解決に役立つフローやクイックアクションをコンソール上に提示してステップをガイドする機能ですが、ケースの要約を自動的に生成する機能は持ち合わせていません。","Einstein記事の推奨は、過去のケースデータと自然言語処理を利用して、エージェントの問題解決に役立つナレッジ記事を自動的に提案する機能です。解決のヒントにはなりますが、一連のステップの実行支援や、ケースの要約を自動生成するソリューションではありません。"]},
{n:47,t:"Universal Containers (UC) は、エージェントがオンボーディング体験のステップに関連付けられた10個の未完了の活動を作成する必要がある新しいパートナーオンボーディングプロセスを作成しました。UCは通常、週に20人の新しいパートナーを追加します。活動の作成は労力がかかり、それぞれ完了するまでに最大20分かかる場合があります。エージェントがこれらの活動を作成するための費用対効果の高い方法は何ですか？",c:["マクロを実行する","画面フローを操作する。","Einsteinケースラップアップを活用する。"],a:0,e:["正解です。マクロを使用すると、ToDoや行動などのレコード作成といった、エージェントが日常的に行う複数の反復的なアクションを1回のクリックで自動化できます。これにより、10個の活動を手作業で作成する労力と時間を大幅に削減でき、標準機能でユーザー自身でも簡単に設定できるため、非常に費用対効果の高い解決策となります。","画面フローを使用して活動の作成を自動化することは可能ですが、フローの構築と保守には専門的な知識や開発リソースが必要になります。マクロと比較すると設定や運用のハードルが高く、費用対効果の観点から今回の要件に対する最適な推奨事項とは言えません。","Einsteinケースラップアップは、過去のデータに基づいてケースのクローズ時に項目値（ケースの理由や分類など）を予測し、エージェントに提案するAI機能です。複数の活動レコードを自動的に作成するという目的や要件を満たすものではありません。"]},
{n:48,t:"Cloud Kicks（CK）は、Lightning Dialerとワンクリック発信を使用して顧客に電話をかけています。CKは最近、コミュニケーションの希望をメールのみ、またはテキストのみに設定している顧客から苦情を受けました。要件を満たすために、コンサルタントが使用すべき最も効率的なソリューションは何ですか？",c:["ページレイアウトから電話番号を削除する。","動的フォームを使用して電話番号を非表示にする。","取引先責任者の「電話不要（Do Not Call）」項目の値をTrueに設定する。"],a:2,e:["ページレイアウトから電話番号を削除すると、すべての顧客の電話番号が見えなくなってしまい、電話での連絡を希望する顧客への発信もできなくなるため、適切な解決策ではありません。","動的フォームを使用して特定の条件に基づいて電話番号を非表示にすることは可能ですが、標準機能として用意されている項目を活用する方が、設定やデータ管理の観点からよりシンプルで効率的です。","正解です。取引先責任者の標準項目である「電話不要」をTrueに設定することで、Lightning Dialerなどのシステムからの誤った発信を標準機能で防ぐことができるため、要件を満たす最も効率的な方法です。"]},
{n:49,t:"Cloud Kicksのサポートスーパーバイザーは、重要業績評価指標（KPI）を表示し、Service Cloud Voiceコンタクトセンターに関するグラフやデータを確認したいと考えています。通話量、平均処理時間、平均応答速度などの総計値をどのように追跡できるでしょうか？",c:["Service CRM Analyticsアプリケーションを使用する。","ケースとサービス担当者の作業に関するレポートを含むカスタムダッシュボードを作成する。","AppExchangeからService Cloud Reportsパッケージをインストールする。"],a:0,e:["正解です。Service Cloud Voiceのコンタクトセンターに関する高度なKPI（通話量、平均処理時間、平均応答速度など）を視覚化し、詳細なグラフやデータとして分析するには、事前構築済みのダッシュボードを提供するService CRM Analyticsアプリケーションを活用するのが最も効果的な方法です。","Salesforceの標準レポートとカスタムダッシュボードでも基本的なデータは確認できますが、Service Cloud Voiceに特化したリアルタイムな通話メトリクスや高度な音声KPIを包括的に分析する目的としては、Service CRM Analyticsの方が適しています。","AppExchangeには様々なレポートパッケージが存在しますが、Service Cloud Voiceのテレフォニーデータとコンタクトセンターのパフォーマンス指標をネイティブかつ高度に分析するための推奨される解決策は、専用のCRM Analyticsアプリケーションを使用することです。"]},
{n:50,t:"Universal Containersは、電話が請求の問題に関するものである場合、コンタクトセンターのエージェントに顧客の支払い履歴へのアクセスを提供する必要があります。以下の考慮事項を考慮する必要があります。請求データは2000万件以上のレコードを含む外部システムに保存されています。財務部門のみが請求システムに直接アクセスできます。コンサルタントはどのソリューションを推奨するべきでしょうか？",c:["請求システムの検索ページを表示するカスタムタブを作成する。","カスタムオブジェクトを使用して、請求システムからSalesforceに支払いデータを統合する。","請求システムに対してSalesforce Connectと外部オブジェクトを設定する。"],a:2,e:["カスタムタブで外部システムの検索ページを表示することは可能ですが、コンタクトセンターのエージェントがSalesforce内で顧客のレコードと支払い履歴をシームレスに関連付けて表示・操作するという要件を満たすには不十分です。","2000万件以上の大量のレコードをSalesforce内にカスタムオブジェクトとして直接インポートして保存することは、データストレージ容量の制限に抵触する可能性が高く、パフォーマンスにも影響を与えるため推奨されません。","正解です。Salesforce Connectと外部オブジェクトを使用することで、Salesforce内に大量のデータを物理的に保存することなく、外部システムにある2000万件以上の支払いデータにリアルタイムでアクセスし、エージェントが顧客情報と関連付けてシームレスに参照できるようになります。これによりストレージ制限を回避しつつ要件を満たすことができます。"]},
{n:51,t:"Cloud Kicksは世界中の顧客にサポートを提供しており、Lightning Experienceを使用しています。サービスエージェントには、一連の共通の回答があります。マネージャーは、回答をクイックテキストとして統合し、複数の言語に翻訳して、適切なサービスエージェントのグループと共有したいと考えています。要件を満たすために、コンサルタントは何を推奨するべきでしょうか？",c:["カスタム表示ラベルを使用してクイックテキストの翻訳を管理する。","翻訳ごとにクイックテキストを含むフォルダを共有する。","各クイックテキストを公開グループに個別に共有する。"],a:1,e:["カスタム表示ラベルは、Apexクラスやコンポーネントなどで多言語対応のテキストを表示するために使用されますが、クイックテキスト自体の翻訳や共有設定を直接管理するための機能ではありません。","正解です。クイックテキストをフォルダに整理し、各言語用のフォルダを作成して適切なユーザーグループに共有することで、各地域のサービスエージェントが必要な言語のクイックテキストに効率よくアクセスできるようになります。これが最も管理しやすく、拡張性のある推奨されるアプローチです。","各クイックテキストをレコード単位で個別に公開グループと共有することは可能ですが、多数のクイックテキストと複数の言語が存在する場合、管理の手間が膨大になるため、効率的なソリューションとは言えません。"]},
{n:52,t:"Cloud Kicksは、複数の専門家がケースでコラボレーションできるように、Slackでのスウォーミングの実装を検討しています。このアプローチの考慮事項は何ですか？",c:["スウォームチャネルは、Slackではデフォルトでパブリックチャネルになります。","ユーザーがチャネルに追加されたとき、過去の投稿を見ることができません。","スウォームは、その問題のために作成された新しいチャネルでのみ作成できます。"],a:1,e:["スウォームチャネルはパブリックチャネルとして作成することも可能ですが、機密情報を含むケースを扱う場合などを考慮し、デフォルトでプライベートチャネルとして設定することもサポートされています。したがって、必ずしもデフォルトがパブリックになるわけではありません。","正解です。Slackの標準的な動作や連携の設定によっては、新しく追加されたユーザーがチャネルに参加する前の過去の投稿（履歴）を閲覧できないように制限される場合があります。スウォーミングで専門家を途中から参加させる際には、この情報共有の制限を考慮して、ケースのコンテキストやこれまでの経緯を適切に共有する工夫が必要になります。","スウォームは、ケース解決のために新しくチャネルを作成して開始することもできますが、既存のチャネル（特定のチームやトピック用のチャネルなど）を利用してスウォームを開始することも可能です。新しいチャネルの作成に限定されるわけではありません。"]},
{n:53,t:"Cloud Kicks（CK）はサービスセンターでLightning ExperienceとLightningナレッジを使用しています。CKは、サービスエージェントがケースのクローズ時に新しい記事を簡単に作成できる方法を求めています。新しい記事には、他のユーザーにとって役立つように、ケースからの適切な詳細が含まれている必要があります。",c:["トリガーを使用して新しい記事を自動的に作成する。","新しい記事を作成するためにグローバルに共有されるマクロを開発する。","クイックアクションを作成して、ケースの項目を新しい記事にマッピングする。"],a:2,e:["Apexトリガーを使用して記事の作成を完全に自動化することは可能ですが、ケースの内容が常にそのまま記事として公開するのに適しているとは限らないため、エージェントが内容を確認および編集するプロセスを省くのはベストプラクティスではありません。","マクロは定型的な反復作業を自動化するのには適していますが、ケースの特定の項目値を新しいナレッジ記事の項目に動的にマッピングして作成する要件には、クイックアクションの方が適しています。","正解です。ケースオブジェクト上にレコードの作成クイックアクションを設定し、対象オブジェクトをナレッジに指定することで、ケースの件名や説明などの項目値を新しい記事の項目にあらかじめ入力（マッピング）しておくことができます。これにより、エージェントはケースクローズ時にシームレスかつ簡単に、有用な詳細を含んだ記事を作成できます。"]},
{n:54,t:"Service Cloudコンサルタントは、電気通信会社のクライアントと協力しています。クライアントは、新しいケースの自動化とAgentforce Service Agentの実装により、初回解決率を30%向上させることを目指しています。クライアントは、この変更により顧客満足度が向上することを期待していますが、定着率とシステムの複雑さを懸念しています。懸念を管理し、期待値を調整するために、コンサルタントが最初に行うべきことは何ですか？",c:["自動化されたケースルーティングルールとエスカレーションパスを含む、詳細なAgentforce Service Agent設定計画を作成し、ITチームと技術要件を検証する。","主要な利害関係者を早期に関与させながら、技術的な課題、ユーザーの定着に対する障壁、および既存のワークフローへの影響に焦点を当てたリスクレジスタを実施する。","すべての技術要件が確定するまでプロジェクトの延期を推奨し、ユーザー定着のための包括的な変更管理戦略を作成する。"],a:1,e:["この選択肢は解決策の設計や実装に焦点を当てています。これらは後のフェーズで必要になりますが、クライアントが抱えるシステムの複雑さや定着率への懸念を管理し、期待値を調整するための最初のステップとしては適切ではありません。","正解です。プロジェクトの初期段階で主要な利害関係者を巻き込み、懸念事項をリスクとして文書化して評価することは、期待値を調整し、導入に対する不安を軽減するための最適な最初のアプローチです。","プロジェクトの延期は、初回解決率を向上させるというクライアントのビジネス目標達成を遅らせるため、最初の対応としては適切ではありません。プロジェクトを進行させながらリスク管理と変更管理を行うべきです。"]},
{n:55,t:"Cloud Kicksはユーザーをサポートするためにコンソールアプリを使用しています。サービスエージェントは、取引先のワークスペースタブと、ケース、取引先責任者、およびサービス契約の複数のサブタブを開きます。サービスエージェントは、ケースでコラボレーションするために、最近開いたサブタブへのリンクを他のユーザーと共有したいと考えています。要件を満たすために、コンサルタントは何を推奨すべきですか？",c:["取引先オブジェクトを最近の項目ユーティリティに追加する。","コンソールアプリに履歴ユーティリティを含める。","Chatterグループでケース番号をメンションする。"],a:2,e:["最近の項目ユーティリティは最近アクセスしたレコードへのショートカットを提供しますが、開いているワークスペースタブや複数のサブタブへのリンクを直接共有する機能は提供していません。","履歴ユーティリティを使用すると、ユーザーはコンソール内で最近アクセスしたタブのリンクをコピーして共有することができます。リンク共有の要件に合致する機能ですが、本設問ではコラボレーションを促進する手法としてCが解答として指定されています。","正解です。ChatterはSalesforceにおける強力なコラボレーションツールです。Chatterグループでケース番号をメンションすることで、他のユーザーにリンクを共有し、該当ケースに直接アクセスさせることができます。そこから関連する取引先や取引先責任者の情報も確認できるため、ケース解決に向けたチームでのコラボレーション要件を満たすことができます。"]},
{n:56,t:"Cloud Kicksには、数十のトピックにまたがり、幅広い製品、ヘルプ記事、トラブルシューティングのアイデアを網羅する数百のナレッジ記事があります。Cloud Kicksの管理者は、ナレッジ記事をデータカテゴリに整理する予定です。管理者が記事を整理する際に留意すべきことは何ですか？",c:["データカテゴリは最大10,000個まで作成できる。","データカテゴリの階層は最大10レベルまで設定できる。","記事には最大8つのデータカテゴリを割り当てることができる。"],a:1,e:["1つのデータカテゴリグループに作成できるデータカテゴリの数はデフォルトで100個（Salesforceサポートへの申請で最大500個）です。10,000個という制限は実際の仕様とは異なります。","本設問の解答はBとされていますが、現在のSalesforceの公式仕様では、データカテゴリグループの階層はデフォルトで最大5レベル（サポートへの申請で最大8レベル）です。実際の仕様としては10レベルという記述は誤りである点に注意してください。","実際のSalesforceの仕様では、1つの記事に対して１つのデータカテゴリグループから割り当てることができるデータカテゴリはデフォルトで最大8つです。したがって、実務上の仕様としてはこの選択肢が最も正確な内容を表しています。"]},
{n:57,t:"コンサルタントは、クライアントの電話システムをサービスコンソールと統合するために雇用されました。この統合中にコンサルタントは何を行う必要がありますか？",c:["Lightningコンソールを有効にする。","CTIアダプターを設定する。","アプリにユーティリティバーを追加する。"],a:1,e:["サービスコンソールを使用するためにアプリケーションの設定や有効化は必要ですが、それ単体では外部の電話システムとの統合を行うことはできません。電話システムの統合には、専用の連携機能が必要です。","正解です。CTI(コンピュータテレフォニーインテグレーション)アダプターは、Salesforceとサードパーティの電話システムを接続し、サービスコンソール内でソフトフォンを利用可能にするために不可欠な設定です。","ユーティリティバーは、ユーザーがソフトフォンなどの機能に素早くアクセスするための領域ですが、これを追加するだけでは電話システム自体との統合は行われません。統合の根幹となるのはCTIアダプターです。"]},
{n:58,t:"Universal Containers (UC) は、コンタクトセンターの拡張に伴いエージェントを雇用しました。エージェントを早期に戦力化し、完全に生産的な状態にすることが最優先事項です。UCはエージェントを支援するために、標準化されたエージェントと顧客の対話を実装しました。コンサルタントはサービスコンソールにどの機能を統合するべきですか？",c:["アプリ内ガイダンス","Einstein Next Best Action","アクション＆おすすめ"],a:1,e:["アプリ内ガイダンスは、Salesforceの画面上でユーザーにプロンプトやウォークスルーを表示し、操作方法のトレーニングや新機能の定着を支援する機能です。システムの利用方法を学ぶには有用ですが、顧客とのリアルタイムで標準化された対話ステップをエージェントに直接提示する用途には適していません。","正解です。Einstein Next Best Actionは、ビジネスルールや予測モデルに基づいて、その時々の状況に最適なアクションや推奨事項をエージェントに提示します。これにより、エージェントは次に何をすべきか、どのような標準化された対話（画面フローなど）を実行するべきかの具体的なガイダンスをリアルタイムで受け取ることができ、迅速な生産性の向上に繋がります。","アクション＆おすすめは、レコードに関連するフローやクイックアクションのリストをコンソールに表示するコンポーネントです。このコンポーネント内にNext Best Actionの推奨事項を表示することは可能ですが、要件にある「標準化された対話」を動的かつ知能的にエージェントへ提示する中核的な機能そのものはEinstein Next Best Actionを指します。"]},
{n:59,t:"Universal Containersは、サポートエージェントがケース作成に費やす時間を削減したいと考えています。ケース作成は1日あたり最大5,000件の新規ケースにスケールアップし、顧客による10MB未満のファイル添付を許可する必要があります。コンサルタントはどの機能を提案するべきですか？",c:["Web-to-Case","On-Demand Email-to-Case","Email-to-Case"],a:0,e:["正解です。Web-to-Caseは、Webサイトのフォームから直接ケースを作成できる機能であり、エージェントのケース作成時間を削減します。1日あたりの最大ケース処理制限は5,000件であり、顧客がフォームから直接ファイルを添付することも可能なため、提示された要件に完全に合致します。","On-Demand Email-to-Caseは、顧客からのメールを自動的にケースに変換する機能です。添付ファイルの上限は25MBであり、1日の処理制限はライセンス数に基づいて計算されるため、5,000件という特定の要件とは直接一致しません。","Email-to-Caseは、企業のファイアウォール内に専用のソフトウェアをインストールしてメールをケースに変換する機能です。添付ファイルのサイズは自社のメールサーバーの制限に依存するため25MBを超えることも可能ですが、システム管理の手間がかかり、1日5,000件という固有の要件を指す機能ではありません。"]},
{n:60,t:"Universal Containersは、サービスコンソールで顧客にサポートを提供するためにWhatsAppを使用しています。エージェントは、チャットウィンドウから顧客が送信したPDFをプレビューしたいと考えています。コンサルタントは何を推奨するべきですか？",c:["メールでPDFを送信するように顧客に依頼する。","チャットでファイルのプレビューを使用する。","チャットからPDFをダウンロードする。"],a:1,e:["WhatsAppという現在のサポートチャネルから顧客を離脱させることになり、顧客体験を損なうため推奨されません。Salesforceではチャット内でファイルを直接処理する機能が提供されています。","正解です。サービスコンソールのメッセージング機能では、エージェントが顧客から送信されたPDFなどのサポート対象ファイルをチャットウィンドウ内で直接プレビューできる機能が提供されています。これにより、アプリケーションを切り替えることなくシームレスで効率的なサポートが可能になります。","ファイルをローカルにダウンロードして外部のアプリケーションで開くことは可能ですが、エージェントがチャットウィンドウから直接プレビューしたいという要件に対しては、手間と時間がかかるため最適な解決策ではありません。"]},
{n:61,t:"Cloud Kicks (CK) は製品ラインに基づいてカスタマイズされたサポートを提供しており、音声のみのサポートから拡張する予定です。サポートエージェントは、1つまたは複数の特定の製品ラインで認定されています。CKは複数のチャネルを通じてサポートを提供したいと考えています。CKは一貫した顧客体験を確保したいと考えています。要件を満たすために、コンサルタントはどのソリューションを推奨すべきですか？",c:["キューベースのルーティングを使用したオムニチャネル","キャパシティベースのルーティングを使用したオムニチャネル","Einsteinケースルーティングを使用したオムニチャネル"],a:2,e:["キューベースのルーティングは作業アイテムを特定のキューに割り当て、そのキューのメンバーであるエージェントに作業を転送します。この方法は単純なグループ割り当てには有効ですが、特定の製品ラインの認定というエージェントの個別のスキルセットに動的に基づいて作業を割り当てる高度な要件には適していません。","キャパシティベースのルーティングは、エージェントが現在対応できる作業量に基づいて作業アイテムを割り当てることに焦点を当てています。これはエージェントの作業負荷を管理するためには重要ですが、製品ラインの認定という特定の知識やスキル要件を満たすためのルーティング機能ではありません。","正解です。Einsteinケースルーティングは、過去のデータと機械学習を使用してケースの項目を予測し、自動的に分類してオムニチャネルのルーティングプロセスを強化します。これにより、複数のサポートチャネルから流入する問い合わせを正確に評価し、適切なスキル（製品認定）を持つエージェントへ効率的かつ均一にルーティングできるため、チャネルを問わず一貫した顧客体験を確保することができます。"]},
{n:62,t:"Universal Containersは新しいサービスエージェントのグループをトレーニングしています。トレーニングの一環として、顧客からのメッセージングの処理が含まれます。しかし、サービスエージェントの応答がプロフェッショナルで正確であることを確認し、必要に応じてマネージャーが支援できるように、コンタクトセンターのマネージャーがメッセージングセッションを監視することが重要です。このニーズをサポートするために、コンサルタントはどのLightningコンソール機能を設定すべきですか？",c:["チャットスーパーバイザータブとウィスパーメッセージ","インシデント管理タブとウィスパーメッセージ","オムニチャネルスーパーバイザーとウィスパーメッセージ"],a:2,e:["以前のSalesforce Classicや古いLive Agent機能ではチャットスーパーバイザーというタブが存在していましたが、現在のLightningコンソールおよびオムニチャネルを利用したメッセージングセッションの監視においては、別の包括的な機能が標準として使用されます。","インシデント管理タブは、広範囲に影響を及ぼすシステム障害や重大な問題（インシデント）を追跡および解決するための機能です。個々のエージェントのメッセージングセッションをリアルタイムで監視したり支援したりする目的では使用されません。","正解です。オムニチャネルスーパーバイザーを使用することで、マネージャーはエージェントの作業状況や進行中のメッセージングセッションをリアルタイムで監視できます。さらにウィスパーメッセージ機能を利用すると、顧客には表示されない形でマネージャーからエージェントへ直接メッセージを送信できるため、リアルタイムでの的確な支援が可能になります。"]},
{n:63,t:"コンタクトセンターのサポート提供コストが着実に増加しています。Universal Containersはコスト削減対策を講じたいと考えています。コンサルタントは何を推奨すべきですか？",c:["セルフサービスナレッジベースを設定する。","サービスチャネルにスキルベースのルーティングを設定する。","ケースのメール用の自動応答テンプレートを作成する。"],a:0,e:["正解です。顧客がエージェントに問い合わせることなく自分で問題を解決できるセルフサービスナレッジベースを導入することで、コンタクトセンターに寄せられるケース数が減少し、サポート提供のコスト削減に大きく貢献します。","スキルベースのルーティングは、適切なスキルを持つエージェントに作業を割り当てることで解決時間の短縮や顧客満足度の向上に役立ちますが、顧客の自己解決を促進する機能ではないため、ケースの絶対数を減らすような直接的なコスト削減効果は限定的です。","自動応答テンプレートは顧客に問い合わせを受領したことを知らせるためのものですが、最終的にはエージェントがそのケースに対応して解決する必要があるため、サポート対応にかかる全体的なコストの削減には繋がりません。"]},
{n:64,t:"Universal Containers (UC) のカスタマーサポート組織は、コールセンターにナレッジ中心サポート (KCS) を導入しました。しかし、コールセンターの経営陣は、サポート担当者が新しいナレッジ記事をもっと頻繁に投稿すべきだと考えています。この状況に対処するために、UCは何をすべきですか？",c:["承認されて公開された新しい記事の数に基づいて、サポート担当者を評価および報酬を与える。","承認のために提出された新しい記事の数に基づいて、サポート担当者を評価および報酬を与える。","新しい提案記事を提出する際、サポート担当者にケースのチェックボックスをオンにするよう要求する。"],a:1,e:["記事が承認されて公開されるかどうかは、承認者の判断やプロセスの遅延など、担当者自身ではコントロールできない要因に依存します。担当者の行動を直接評価するものではないため、投稿頻度を向上させるための動機付けとしては最適ではありません。","正解です。KCS（ナレッジ中心サポート）のベストプラクティスでは、記事の作成プロセスへの参加と貢献（提出）を奨励することが推奨されています。提出数に基づいて評価と報酬を与えることで、担当者が新しい記事を積極的に作成する直接的な動機付けとなり、ナレッジの投稿頻度が高まります。","チェックボックスをオンにする作業を義務付けることは、入力の手間を増やすだけであり、担当者が新しいナレッジ記事をより頻繁に作成・投稿するためのインセンティブや根本的な解決策にはなりません。"]},
{n:65,t:"Universal Containers (UC) は世界中に地域のコンタクトセンターを持っています。UCは、ケースの組織の共有設定を非公開に設定してService Cloudを実装しました。UCのロール階層は地域ごとに設定されています。サポートマネージャーは、デフォルトで自分の地域のサポート指標を確認したいと考えています。UCはスケーラブルなソリューションを必要としています。コンサルタントはどの戦略を推奨するべきですか？",c:["レポーティングスナップショットを使用してダッシュボードを作成する。","各サポートマネージャー用にダッシュボードを作成する。","動的ダッシュボードを作成する。"],a:2,e:["レポーティングスナップショットは、過去のデータを維持して傾向をレポートするための機能です。マネージャーが自分の地域のデータを閲覧できるようにするというアクセス権や表示のパーソナライズに関する要件を直接解決するものではなく、スケーラブルなソリューションではありません。","各サポートマネージャー用に個別のダッシュボードを作成することは可能ですが、マネージャーの数や地域の数が増えるにつれて管理の手間が膨大になります。そのため、要件にあるスケーラブルなソリューションとしては適していません。","正解です。動的ダッシュボードを使用すると、ログインしたユーザー（この場合はサポートマネージャー）のデータアクセス権限に基づいてデータが表示されます。組織の共有設定が非公開でロール階層が設定されているため、1つの動的ダッシュボードを作成するだけで、各マネージャーは自動的に自分の地域のデータのみを確認できます。これは管理が容易でスケーラブルなアプローチです。"]},
{n:66,t:"Universal Containersは、再販業者が顧客の取引先を共有し、ケースの送信とステータスの追跡を行い、レポートやダッシュボードを表示できる安全なポータルを提供したいと考えています。コンサルタントはどのソリューションを推奨すべきですか？",c:["従業員コミュニティ","パートナーエクスペリエンスサイト","カスタマーエクスペリエンスサイト"],a:1,e:["従業員コミュニティは、社内の従業員が情報やリソースを共有し、コラボレーションするためのプラットフォームです。社外の再販業者がポータルとして利用し、取引先の共有やレポートの閲覧を行うという要件には適していません。","正解です。パートナーエクスペリエンスサイトは、再販業者や代理店などのパートナー企業向けに設計されており、取引先、商談、ケースなどの共有や、レポートおよびダッシュボードへのアクセス機能を提供します。これにより、再販業者が顧客データを安全に管理できるポータルの要件を完全に満たすことができます。","カスタマーエクスペリエンスサイトは、エンドユーザーである顧客自身がセルフサービスでケースを作成・追跡したり、ナレッジを検索したりするためのポータルです。再販業者が顧客の取引先全体を管理したり、レポートやダッシュボードを表示したりするような高度なパートナー向け機能の提供には適していません。"]},
{n:67,t:"Universal Containers (UC) は Service Cloud の実装準備を進めており、グローバルサポートチームをオンボーディングしたいと考えています。UC はサポートチームから Service Cloud の使用方法に関するフィードバックを収集しています。要件収集セッションの結果、大量の成果物が作成されました。コンサルタントは次のステップとして何を推奨すべきですか？",c:["最小限の実行可能な製品（MVP）の要件を特定し、優先順位を付ける。","提出した利害関係者に基づいて要件に優先順位を付ける。","地域からのリクエストに基づいて要件に優先順位を付ける。"],a:0,e:["正解です。大規模な実装プロジェクトにおいて大量の要件が集まった場合、まず最小限の実行可能な製品（MVP）を特定することがベストプラクティスです。MVPに必要な要件に絞って優先順位を付けることで、迅速にシステムを稼働させて初期の価値を提供し、ユーザーからのフィードバックを早期に得ながら段階的に機能を拡張していくことができます。","要件の優先順位は、特定の利害関係者の立場や声の大きさではなく、ビジネスへの貢献度、全体的なプロジェクト目標、およびMVPの範囲に基づいて客観的に評価および決定されるべきです。","グローバルサポートチームをオンボーディングする場合、特定の地域の要件のみを優先すると、グローバルで統一された一貫性のあるサポートプロセスの構築が妨げられる可能性があります。まずは地域を問わず共通して必要な基盤機能（MVP）を優先して実装するべきです。"]},
{n:68,t:"Universal Containersは、電話ベースの対応システムを導入しています。電話の待ち時間が長くなりすぎており、カスタマーサービスに悪影響が出ています。経営陣は、顧客の待ち時間を短縮し、エージェントが一度により多くの問い合わせに対応できるような方法を見つけたいと考えています。コンサルタントはどの機能を推奨すべきですか？",c:["ケースの自動応答ルール","OmniStudio","Salesforce Chat"],a:2,e:["ケースの自動応答ルールは、Webやメールなどからケースが作成された際に顧客へ自動で確認メールを送信する機能です。顧客に安心感を与えることはできますが、電話の待ち時間を直接短縮したり、エージェントが同時に複数の問い合わせを処理したりできるようにするものではありません。","OmniStudioは、複雑なビジネスプロセスを構築し、ユーザーにガイド付きのエクスペリエンスを提供するための強力なツールスイートです。優れたツールではありますが、コールセンターの待ち時間短縮やエージェントの複数同時対応という要件に対する直接的なチャネルの解決策ではありません。","正解です。Salesforce Chatなどのテキストベースのデジタルチャネルを導入することで、エージェントは1回の電話対応にかかる時間で、同時に複数の顧客とチャット対応できるようになります。これによりコンタクトセンター全体の処理能力が向上し、顧客の待ち時間が短縮されます。"]},
{n:69,t:"Cloud Kicksは顧客に24時間体制でサポートを提供しています。Cloud Kicksのサービスマネージャーは、ケースがオープンのままである平均日数を示すレポートを希望しています。Service Cloudコンサルタントは標準の経過時間項目を使用してレポートを作成しましたが、オープンなケースの経過時間が正しく表示されていません。これを解決するために、コンサルタントは何をすべきですか？",c:["ケースの経過時間を計算するカスタム数式項目を作成する。","1日あたりのオープンなケース数のレポートスナップショットを作成する。","設定で営業時間経過時間を有効にし、レポートに項目を追加する。"],a:2,e:["数式項目を使用して現在の日時と作成日時の差を計算することは技術的に可能ですが、標準で提供されているビジネス時間に基づいた経過時間追跡機能があるため、カスタム開発を行うことはベストプラクティスではありません。","レポートスナップショットは特定の時点でのデータの履歴を保持し、傾向を分析するために使用されます。特定の日におけるオープンなケースの総数を記録することはできますが、ケースがオープンのままである平均日数を計算するという要件の直接的な解決策にはなりません。","正解です。サポート設定で営業時間年齢(Business Hours Age)を有効にすると、指定された営業時間に基づいてケースの正確な経過時間を追跡できるようになります。この標準項目をレポートに追加することで、オープンなケースの正確な経過時間と平均日数を表示するという要件を満たすことができます。"]},
{n:70,t:"コンサルタントは、ケースがオープンのままである平均日数を示すレポートをどのように設定するべきでしょうか？",c:["平均経過日数を計算するために、ケースに数式項目を作成する。","毎日オープンになっているケース数のレポートスナップショットを作成する。","レポートの標準のケース経過時間項目を使用する。"],a:0,e:["正解です。ケースが作成されてからクローズされるまで、あるいは現在までの正確な日数を数値として計算するカスタム数式項目を作成することで、レポート上でその項目の平均値を簡単に算出することができます。これにより、営業時間や特定の条件を加味した柔軟な計算も可能になります。","レポートスナップショットは、特定の時点における日々のオープンなケースの総数などの履歴データを保存し、傾向を分析するために使用されます。ケースがオープンのままである平均日数を計算するという要件の解決策としては適していません。","標準の経過時間項目はケースの経過時間を追跡しますが、レポート上で直接平均日数を柔軟に計算し、特定のビジネス要件に合わせた数値として集計するためには、カスタム数式項目を作成するアプローチがより確実なソリューションとなります。"]},
{n:71,t:"Universal Containers (UC) は、関連する製品の専門知識に基づいてエージェントにケースを割り当てることで、ケース管理を改善したいと考えています。UCはまた、ケースの作業負荷を均等に分散させるために、エージェントを自動的に次のケースに割り当てたいと考えています。",c:["最も対応可能なルーティングモデルを使用する。","エージェントのプレゼンス状況を使用する。","クローズしたケースが最も多いレポートを使用する。"],a:0,e:["正解です。オムニチャネルの「対応可能状況が最も高い(Most Available)」ルーティングモデルを使用すると、オープンな作業キャパシティが最も大きいエージェントに作業がルーティングされます。スキルベースのルーティングと組み合わせることで、製品の専門知識に基づいて、作業負荷を均等に分散しながらケースを自動的に割り当てることができます。","プレゼンス状況はエージェントが作業を受け入れられるかどうか（オンライン、離席中など）を示すものですが、スキルや作業負荷の均等な分散を考慮してケースを自動的に割り当てるルーティングロジック自体を提供するものではありません。","レポートは過去のデータや現在の状態を分析・可視化するためのツールであり、新しく入ってきたケースをリアルタイムでエージェントに自動的に割り当てるルーティング機能ではありません。"]},
{n:72,t:"Cloud Kicks (CK) はLightning Knowledgeを使用しており、データカテゴリを設定しています。CKはデータカテゴリの表示設定を使用して、製品と地理的な場所に基づいてアクセスを制御しています。管理者は、ナレッジ設定の共有設定で「標準のSalesforce共有を使用する」を有効にする予定です。この変更を行う際、管理者が留意すべき考慮事項はどれですか？",c:["すべてのカテゴリのデータカテゴリの表示設定は、公開/参照のみアクセス権を提供します。","カスタムのデータカテゴリの表示設定は、組織の共有設定によるアクセス権を上書きします。","データカテゴリは記事へのアクセスを制御しなくなります。"],a:2,e:["標準のSalesforce共有を有効にすると、レコードのアクセス権は組織の共有設定や共有ルールなどの標準機能によって決定されます。データカテゴリの表示設定が直接アクセス権を提供するわけではありません。","標準の共有モデルに切り替えた後は、組織の共有設定がアクセス権のベースラインとなり、共有ルールなどでアクセス権を拡張していく仕組みになります。データカテゴリの表示設定が標準の共有設定を上書きすることはありません。","正解です。ナレッジ設定で「標準のSalesforce共有を使用する」を有効にすると、記事へのアクセス制御は従来のデータカテゴリによる制御から、他のオブジェクトと同様の標準のSalesforce共有モデル（組織の共有設定、共有ルール、ロール階層など）へと完全に切り替わります。その結果、データカテゴリは記事のレコードアクセスを制御するための機能としては機能しなくなります。"]},
{n:73,t:"Cloud Kicksのサービスエージェントは、異なるチャネルの同じ顧客からの重複するケースに頻繁に遭遇します。経営陣は、サービスエージェントが重複を処理し、ケースの1つを削除するための方法を提供したいと考えています。コンサルタントはどのアクションを推奨すべきですか？",c:["ケースのマージを有効にする。","ケースの重複ルールを設定する。","自動起動フローを作成する。"],a:0,e:["正解です。ケースのマージ機能を有効にすることで、エージェントは最大3つの重複するケースを選択して統合することができます。このプロセスでは、残すべき情報を1つのマスターケースにまとめ、他の不要なケースを削除することができるため、要件を満たす最適な標準機能です。","重複ルールは、新しいケースが作成されるタイミングで既存のケースと重複していないかを検知し、ユーザーに警告を表示したり作成をブロックしたりするための機能です。すでに作成されてしまった複数のケースを処理し、エージェントが一方を削除できるようにする機能ではありません。","自動起動フローを使用してケースの削除や統合のプロセスを構築することは技術的に可能ですが、Salesforceには「ケースのマージ」という専用の標準機能が用意されているため、カスタムオートメーションを作成することは推奨されるベストプラクティスではありません。"]},
{n:74,t:"Agentforceサービスエージェントは、ケースレコードへのアクセスと更新、ナレッジ記事からの情報の取得、および認証されていない顧客セッションの特定のプロセスを自動化するためのフローの実行を行う必要があります。",c:["組織の共有設定とトピック/アクションレベルのフィルターを使用する。","「新しいエージェントユーザー」オプションを使用し、最小権限の原則を使用して特定の権限を適用する。","最大限の互換性を得るために、AIエージェントユーザーに「システム管理者」プロファイルを付与する。"],a:1,e:["組織の共有設定はレコードへの基本的なアクセスレベルを定義しますが、フローの実行や特定のオブジェクトへのアクセスなど、エージェントがタスクを実行するために必要な詳細なユーザー権限を制御する主たる手段ではありません。","正解です。セキュリティのベストプラクティスとして、エージェントには専用のユーザーを割り当て、タスクの実行（ケースの更新やナレッジの検索、フローの実行など）に必要な最小限の権限のみをプロファイルや権限セットを通じて付与する必要があります。これにより、システムを安全に保ちながら必要な機能を提供できます。","システム管理者プロファイルはシステム全体に対する広範な制御権限を持っています。特に未認証の顧客セッションとやり取りするエージェントに対してこのような強力な権限を与えることは、重大なセキュリティリスクを引き起こすため絶対に避けるべきです。"]},
{n:75,t:"Universal Containers (UC) は、Service Cloud内で増加する顧客からの問い合わせを効率的に管理および対応することに課題を抱えています。コンサルタントは、現在のカスタマーサポート業務を改善するためにチャットボットの導入について助言しています。カスタマーサポート業務を改善するためにチャットボットを導入する際、UCはどの特定の側面に優先的に取り組むべきですか？",c:["大量の問い合わせを処理するためのスケーラビリティに焦点を当てる。","ソーシャルメディアプラットフォームとの統合に取り組む。","チャットの継続的な監視を強調する。"],a:0,e:["正解です。チャットボットを導入する最大の目的および利点は、人間のエージェントの対応能力を超えて、同時に発生する多数の一般的な問い合わせを自動的に処理できるスケーラビリティの向上です。これにより、増加する問い合わせを効率的に管理するという課題を直接解決します。","ソーシャルメディアとの連携は顧客接点を増やすために有効ですが、現在直面している問い合わせ件数の増加に対する効率的な対応という課題を解決するための最優先事項ではありません。","チャットの監視や分析は導入後の継続的な改善プロセスにおいて重要ですが、急増する問い合わせをさばき、サポート業務の負荷を直ちに軽減するための直接的な解決策や導入時の最優先事項ではありません。"]},
{n:76,t:"Universal Containers (UC) は、顧客が企業のWebサイトからケースを送信できるようにしたいと考えています。UCは、大量の無効なケースが発生するのを防ぎたいと考えています。要件を満たすために、コンサルタントはどのツールを使用するべきですか？",c:["オンデマンドEmail-to-Case","Web-to-Case","AppExchangeパッケージ"],a:1,e:["オンデマンドEmail-to-Caseは、顧客が送信したメールを自動的にケースに変換する機能です。企業のWebサイトから直接送信するという要件には適しておらず、WebフォームのようにWebサイト上でスパムを防ぐ仕組みを組み込む目的とは異なります。","正解です。Web-to-Caseは企業のWebサイトに問い合わせフォームを設置し、そこからSalesforce内に直接ケースを生成する標準機能です。設定でreCAPTCHAによる検証を有効にすることができるため、ボットによるスパムや大量の無効なケースが作成されるのを効果的に防ぐことができます。","AppExchangeパッケージを利用して外部のフォーム作成ツールなどを導入することも可能ですが、Salesforceには追加コストなしで要件を完全に満たすことができるWeb-to-Caseという最適な標準機能が用意されているため、最初の選択肢としては推奨されません。"]},
{n:77,t:"Cloud Kicksは、顧客のケースの作業を行う際にサービスエージェントを支援するために、Einstein Next Best Actionを使用しています。複数のサービスエージェントが同じケースで作業します。アイテムがいつ開始、一時停止、再開、および完了したかをサービスエージェントに表示するために、コンサルタントは何を設定するべきですか？",c:["ケース履歴関連リスト","アクション＆おすすめコンポーネント","活動分析タブ"],a:1,e:["ケース履歴関連リストはケースの項目の変更履歴を追跡するものですが、Einstein Next Best Actionやフローなどの特定のアクションの進行状況（開始、一時停止、再開、完了など）を詳細に表示するようには設計されていません。","正解です。アクション＆おすすめコンポーネントを使用すると、ケースに関連付けられたフローやアクションのリストを表示し、それぞれの進行状況の履歴を追跡できます。複数のエージェントが同じケースで作業する場合でも、他のエージェントがどのアクションをいつ開始、一時停止、再開、または完了したかを確認できるため、要件に完全に合致します。","活動分析タブは、ToDoや行動などの活動全体の分析情報を提供するためのものであり、コンソール内で実行される個別のアクションや推奨事項の特定の状態遷移（一時停止や再開など）をエージェントに直接表示する機能ではありません。"]},
{n:78,t:"コンサルタントは、クライアントの電話システムをSalesforceと統合するために雇用されました。この統合のためにコンサルタントは何を使用することを検討すべきですか？",c:["Service Cloudコールセンター","Lightning Dialer","Service Cloudソフトフォンレイアウト"],a:0,e:["正解です。Salesforceとクライアントの既存のサードパーティ製電話システムを統合するには、CTI（コンピュータテレフォニーインテグレーション）を利用するためのService Cloudコールセンター機能の設定を検討する必要があります。","Lightning DialerはSalesforceが提供するネイティブの電話機能であり、クライアントがすでに使用している外部の電話システムを統合する目的で使用するものではありません。","Service Cloudソフトフォンレイアウトは、統合が完了した後にコンソール画面に表示されるソフトフォンのデザインや表示項目をカスタマイズするための機能であり、システム間の統合自体を行うためのものではありません。"]},
{n:79,t:"Universal Containersは、アプリ内およびWebのメッセージング (MIAW) に適用するのと同じ基準に基づいてケースを転送したいと考えています。コンサルタントはどの機能を推奨するべきですか？",c:["オムニチャネルルーティング","マイルストンとエンタイトルメントプロセス","ケース割り当てルール"],a:0,e:["正解です。オムニチャネルルーティングを使用すると、メッセージング（MIAW）やケースなど、異なるチャネルからの作業項目を同じルーティング基準（スキルベースやキューベースのルーティングなど）を使用して適切なエージェントに自動的に転送することができます。これにより、すべてのチャネルで一貫したルーティングロジックを適用するという要件を満たすことができます。","マイルストンとエンタイトルメントプロセスは、顧客に対するサポート要件（SLA）を定義および適用し、対応の期限を管理するための機能です。作業を適切なエージェントに割り当てるためのルーティング機能としては使用されません。","ケース割り当てルールは、ケースが作成されたときに特定の条件に基づいてケースをユーザーまたはキューに割り当てる機能です。この機能はケース専用であり、MIAWのルーティング基準と共有することはできないため、同じ基準を適用するという目的には適していません。"]},
{n:80,t:"Cloud Kicksは、応答時間と初回ケースクローズ率のサービス重要業績評価指標(KPI)を標準化したいと考えています。個々のサービスエージェント、チームリーダー、地域ディレクター、およびサービス担当VPは、ユーザーがアクセスできるデータのみを使用して計算された同じKPIを表示する必要があります。要件を満たすために推奨される実行ユーザーは誰ですか？",c:["ダッシュボード閲覧者","チームリーダー","サービス担当VP"],a:0,e:["正解です。ダッシュボードをダッシュボード閲覧者として表示(動的ダッシュボード)するように設定することで、各ユーザーは自分にアクセス権限があるデータのみに基づいて計算されたKPIを表示できます。これにより、単一のダッシュボードでさまざまな階層のユーザーに適切なデータセットを提供し、それぞれのユーザーがアクセスできるデータのみを使用するという要件を正確に満たすことができます。","実行ユーザーを特定のチームリーダーに固定した場合、ダッシュボードを表示するすべてのユーザーがそのチームリーダーと同じデータアクセス権限でデータを見ることになります。個々のエージェントや他の地域のデータが正しく制限または表示されないため、ユーザー自身がアクセスできるデータのみを表示するという要件を満たせません。","実行ユーザーをサービス担当VPに設定すると、組織全体のデータが表示される可能性が高くなります。アクセス権限のない一般のサービスエージェントにも上位役職者と同じ広範なデータが見えてしまうため、ユーザーごとにアクセス可能なデータのみを使用するという要件に違反します。"]},
{n:81,t:"Cloud Kicksのサービスマネージャーは、英語以外の言語を話す顧客から、ケースの解決に時間がかかっているという苦情を受けました。調査の結果、コンサルタントは、これらの作業項目が適切なエージェントに割り当てられていないと判断しました。コンサルタントはサービスマネージャーに最初に何をすることを推奨するべきでしょうか？",c:["割り当てられた作業を確認する。","キューのバックログを確認する。","スキルのバックログを確認する。"],a:2,e:["割り当てられた作業を確認しても、すでにエージェントの元に到達している作業項目がわかるだけであり、適切なエージェントに割り当てられずにシステム内で滞留しているケースの根本的な原因（スキル不足など）を特定することはできません。","キューのバックログを確認すると、キューベースで待機している作業の全体量は把握できますが、言語などの特定のスキル要件に基づいてルーティングされるべき作業がなぜ割り当てられていないのかを詳細に分析することには適していません。","正解です。オムニスーパーバイザーのスキルのバックログを確認することで、特定のスキル（この場合は英語以外の言語）を必要とする作業項目が現在どれだけ待機しているか、また対応できるエージェントが不足しているかどうかを特定できます。言語スキルに基づくルーティングの失敗や待機の原因を調査するための最初のアクションとして最も適切です。"]},
{n:82,t:"Cloud Kicksのコンタクトセンタースーパーバイザーは最近オムニチャネルを実装し、処理時間、応答速度、アクティブ時間などの主要な指標を監視したいと考えています。Service Cloudコンサルタントはどのようにしてこの要件を達成できますか？",c:["サービス設定アシスタントから事前構築済みのレポートをインストールする。","ケースマイルストンのカスタムレポートタイプを作成する。","ケースライフサイクルレポートを作成する。"],a:0,e:["正解です。オムニチャネルの主要な指標（処理時間、応答速度、アクティブ時間など）を監視するためには、サービス設定アシスタント（またはAppExchangeのパッケージ）から提供されるオムニチャネルの事前構築済みレポートやダッシュボードをインストールすることが、最も効率的で推奨される方法です。","ケースマイルストンは、顧客のエンタイトルメントプロセスに対するSLA（サービスレベル契約）の遵守状況を追跡するために使用されます。オムニチャネルのエージェントのパフォーマンスやルーティングの指標を監視する目的には適していません。","ケースライフサイクルレポートは、ケースの作成からクローズまでの期間やステータスの変更履歴を追跡するための標準レポートです。エージェントのアクティブ時間や応答速度といったオムニチャネル固有の指標を監視することはできません。"]},
{n:83,t:"Cloud Kicksは、困難な問題に協力して対処するためにケースチームを使用する予定です。サポートエージェントは、事前定義されたケースチームを使用して、ケースにスペシャリストを追加できます。スペシャリストは、ケースを表示し、ケースに関連レコードを追加できる必要があります。ケースチームロールに推奨されるケースアクセスレベルはどれですか？",c:["テリトリールール","参照のみ","非公開"],a:1,e:["テリトリールールは、ケースチームロールのアクセスレベルを設定するための標準的な選択肢ではありません。テリトリー管理は主に取引先や商談のアクセス権を制御するために使用されます。","正解です。ケースに対して「参照のみ」のアクセス権を持つユーザーは、ケース自体の詳細を表示しつつ、ケースコメントなどの関連レコードを追加することができます。スペシャリストはケースの編集権限を必要とせず、表示と関連レコードの追加のみが求められているため、要件を満たす推奨のアクセスレベルとなります。","非公開アクセスレベルでは、スペシャリストがケース自体を表示することができなくなります。ケースを表示して関連レコードを追加するという要件を満たすことができないため、この設定は不適切です。"]},
{n:84,t:"Universal Containersは、新しいLightningナレッジ導入の一環として、社内データベースから記事を移行したいと考えています。コンサルタントは移行戦略の一環としてどの要素を考慮するべきでしょうか？",c:[".csvファイルを使用して、すべての記事タイプを一度に移行する。","既存の各記事タイプに一致する記事レコードタイプがあることを確認する。","インポートする前に、HTMLを含むすべての記事をプレーンテキストに変換する。"],a:1,e:["異なる記事タイプはそれぞれ異なる構造やカスタム項目を持っていることが多いため、すべての記事タイプを1つの.csvファイルで一度にインポートすることはできません。データ構造の正確なマッピングを確実にするためには、レコードタイプごとに移行データを準備してインポートする必要があります。","正解です。Lightningナレッジでは、従来のClassicナレッジで記事の分類に使用されていた「記事タイプ」の代わりに「レコードタイプ」を使用して記事の構造を管理します。そのため、データ移行を成功させるためには、移行元の各記事タイプに対して、適切な項目のレイアウトと構造を持つ一致するレコードタイプがLightningナレッジに事前に作成されていることを確認することが非常に重要です。","Lightningナレッジのリッチテキストエリア項目はHTML形式のデータインポートをサポートしています。テキストの太字やリスト、リンクなどの元のフォーマットを維持するためには、プレーンテキストに変換せず、HTMLタグを含んだ状態でインポートを行うのが正しい手順です。"]},
{n:85,t:"企業は、既存の外部ナレッジベースからSalesforceナレッジへの移行を計画しています。移行する記事を選択する際に考慮すべき要素の組み合わせはどれですか？",c:["最初の作成日と過去1年間の記事ビューの総数","最終更新日と過去1年間に頻繁に検索された用語","最終更新日と過去1年間の記事ビューの総数"],a:2,e:["最初の作成日は、記事の現在の情報の鮮度や正確性を示す指標としては不十分です。何年も前に作成された記事でも最近更新されていれば有用な場合がありますが、作成日だけでは最新の状態であるかを判断できません。","頻繁に検索された用語は顧客の全体的な関心事を知る上で役立ちますが、個々の記事を移行するかどうかの直接的な判断基準としては適していません。その記事自体がどれだけ閲覧されたかを示すビュー数の方が、記事の実際の有用性をより正確に評価できます。","正解です。移行するナレッジ記事を選択する際、最終更新日によって情報が最新であるかを確認し、過去1年間のビューの総数によってその情報が実際に利用され価値があるかを確認できます。この2つの組み合わせは、新しいシステムへ移行すべき最も関連性が高く有用な記事を特定するための最適な指標となります。"]},
{n:86,t:"Cloud Kicks (CK) は、記事の品質を維持しながら、ナレッジベースの記事数を増やしたいと考えています。CKは、すべてのサービスエージェントが記事を作成できるようにする予定です。低品質な記事の数を減らすための審査ワークフローを作成するために、コンサルタントは何を推奨するべきでしょうか？",c:["通知付きのフロー","レポートとダッシュボード","承認プロセス"],a:2,e:["フローと通知を使用して独自のルーティングやアラートを作成することは可能ですが、ナレッジ記事の審査と承認という目的に対しては、標準機能として用意されている承認プロセスを使用する方が適しており、維持管理も容易です。","レポートとダッシュボードは、作成された記事の数やステータスを追跡および可視化するためには有用ですが、記事が公開される前にその品質を審査し制御するためのワークフロー機能を提供するものではありません。","正解です。承認プロセスを使用することで、エージェントが作成したドラフト記事が公開される前に、レビュー担当者による審査ステップを強制するワークフローを構築できます。これにより、品質基準を満たさない記事の公開を防ぎ、ナレッジベースの品質を維持するという要件を満たすことができます。"]},
{n:87,t:"Universal Containersのサポートマネージャーは、不正確なサポート担当者のパフォーマンスレポートを受け取っています。データを調査した結果、Salesforce管理者は、クローズされているにもかかわらず、まだキューが所有している何百ものケースを特定しました。",c:["データローダを定期的に使用して、これらのケースをデフォルトの所有者に割り当てる。","クローズ時にケースがユーザーによって所有されるようにするケース入力規則を作成する。","クローズ時にケースがユーザーによって所有されるようにするケース割り当てルールを作成する。"],a:2,e:["データローダを使用して定期的に所有者を一括更新することは、事後対応のデータクレンジング作業です。ケースがキューの所有のままクローズされるという根本的な問題の発生をリアルタイムで防ぐことはできず、マネージャーが常に正確なレポートを確認できるようにするという要件を満たしません。","入力規則は、ユーザーがケースをクローズする際に所有者がキューのまま保存されるのを防ぐ（エラーを表示して変更を促す）ための手段として有効ですが、この問題では選択肢Cが解答として指定されています。","正解です。ケースの割り当てルールを使用して、ステータスがクローズに変更された場合などの特定の基準に基づいて、ケースを適切なユーザーに自動的にルーティング（割り当て）することができます。これにより、担当者の手動操作に依存することなくシステム側で確実に所有者をユーザーに変更し、レポートのデータ正確性を保つ運用が意図されています。"]},
{n:88,t:"Service Cloudコンサルタントは最近、公開ナレッジベースを実装しました。",c:["月間ケース数","初回コール解決率","平均ケース解決時間"],a:0,e:["正解です。公開ナレッジベースを導入する主な目的の1つは、顧客が自己解決できる環境を提供し、サポートエージェントに寄せられる問い合わせ（ケース）の数を減らすことです。したがって、月間ケース数の推移（減少）を監視することは、公開ナレッジベースの実装が成功し、ケースディフレクション（問い合わせの回避）が機能しているかを評価するための最も直接的で適切な指標となります。","初回コール解決率は、最初のコンタクトでケースが解決された割合を示す指標です。これは主にエージェントの対応スキルやサポートプロセスの効率性を評価するためのものであり、顧客が自身で問題を解決することを促す公開ナレッジベースの直接的な効果を測定する指標としては適していません。","平均ケース解決時間は、エージェントがケースの対応を開始してからクローズ（成約/解決）するまでの時間を示します。エージェントがナレッジを使用することで解決時間の短縮につながる可能性はありますが、公開ナレッジベースの最大の目的はケースの発生そのものを防ぐことであるため、月間ケース数を監視する方が導入効果を測る上でより重要です。"]},
{n:89,t:"コンサルタントが新しいService CloudインスタンスでSalesforceメッセージング機能を実装する際に考慮すべきことは何ですか？",c:["オムニチャネル経由でルーティングする必要がある。","Einsteinボットと互換性がない。","エクスペリエンスビルダーで展開する必要がある。"],a:0,e:["正解です。Salesforceメッセージング(SMS、WhatsApp、Facebook Messengerなど)を使用する場合、受信したメッセージングセッションを適切なエージェントに割り当てるためにオムニチャネルを構成してルーティングする必要があります。これにより、エージェントの対応可能状況やスキルに基づいて作業が効率的に振り分けられます。","SalesforceメッセージングはEinsteinボットと完全に互換性があります。メッセージングチャネルにボットを接続して初期対応や情報収集を自動化し、必要に応じてシームレスにライブエージェントへ引き継ぐ構成は、一般的なベストプラクティスとして広く利用されています。","メッセージング機能(特にSMSやWhatsAppなど)は、顧客のモバイルデバイス上のアプリを通じて直接やり取りを行うため、Experience Cloudサイト(エクスペリエンスビルダー)で展開することが必須要件ではありません。Web上のメッセージング(MIAW)などはサイトに組み込むことができますが、すべてのメッセージング機能に当てはまる考慮事項ではありません。"]},
{n:90,t:"Universal Containersは最近チャットを実装しており、顧客とチャットしている間に適切な回答を見つけるエージェントの能力を向上させる方法についての推奨事項を探しています。コンサルタントはこの要件を満たすために何を推奨するべきでしょうか？",c:["Einstein返信レコメンデーション","Einstein記事レコメンデーション","アクション＆おすすめコンポーネント"],a:1,e:["Einstein返信レコメンデーションは、過去のチャットの履歴に基づいてエージェントに短い返信テキストを提案する機能です。顧客との会話をスムーズに進めるのには役立ちますが、顧客の質問に対する詳細な「適切な回答」が記載された情報源（ナレッジなど）を直接見つけるという目的には最適ではありません。","正解です。Einstein記事レコメンデーションを使用すると、チャットの会話内容やケースのコンテキストに基づいて、顧客の質問に答えるために最も関連性の高いナレッジ記事が自動的にエージェントに提案されます。これにより、エージェントがチャット中に適切な回答を迅速に見つける能力が直接的に向上します。","アクション＆おすすめコンポーネントは、エージェントが次に実行すべきステップ（フローの起動や特定のクイックアクションの実行など）をガイドするための機能です。チャット中の顧客に対する具体的な回答や情報を検索・提示するための機能ではありません。"]},
{n:91,t:"Cloud Kicksのサポートチームは、顧客からの一般的なフィードバックや懸念事項に対処するためのメッセージングツールを導入したいと考えています。サポートチームはまた、サポート機能を拡張したいとも考えています。この要件を満たすためにコンサルタントは何を推奨するべきでしょうか？",c:["Slack Connect","Service GPT","Einsteinボット"],a:2,e:["Slack Connectは、外部のパートナーや他の組織とのコラボレーションやコミュニケーションを安全に行うためのツールです。顧客からのよくある質問に直接自動対応し、カスタマーサポート機能を拡張するための主要なツールとしては設計されていません。","Service GPTは、生成AIを使用してケースの要約や回答のドラフト作成を支援し、エージェントの生産性を向上させる機能です。サポート業務を支援する強力な機能ですが、顧客の一般的な問い合わせに直接対応して自己解決を促すメッセージングツール(チャットボット)ではありません。","正解です。Einsteinボットを使用すると、一般的なフィードバックやよくある質問に対して、チャットやメッセージングチャネルを通じて自動的に応答することができます。これにより、エージェントが複雑な問題に集中できるようになり、チーム全体のサポート機能とキャパシティを効果的に拡張することができます。"]},
{n:92,t:"Universal Containers (UC) は、北米、ヨーロッパ、アジアにある100のコンタクトセンターにService Cloudを展開したいと考えています。UCは、世界中のコンタクトセンターの重要業績評価指標 (KPI) 全体で標準化されたレポートを求めています。このシナリオでコンサルタントはどのアプローチを推奨するべきでしょうか？",c:["経験豊富なアナリストのグローバルチームを割り当てて、標準のレポートテンプレートを作成する。","すべての地域のリーダーシップ、経営陣、およびエージェントに、標準のレポートテンプレートについて投票するように依頼する。","ワールドワイドサポートのVPに、明確なビジョンを提供するための標準のレポートテンプレートを設計するよう要求する。"],a:0,e:["正解です。世界中に分散する多数のコンタクトセンター全体で一貫したKPIと標準化されたレポートを実現するには、各地域の業務要件やデータの特性を理解している経験豊富なアナリストのグローバルチームを編成し、共通の標準テンプレートを作成させるアプローチが最も現実的で効果的です。","全員による投票で標準テンプレートを決定することは、時間がかかりすぎるだけでなく、各地域の特定のニーズや偏った意見に影響される可能性があり、グローバルで一貫した効果的なKPI標準化を達成するためのアプローチとしては適していません。","トップダウンのアプローチは全体的な方向性を示すのには役立ちますが、世界中の各拠点の具体的な業務要件やデータ構造の違いをVP単独で正確に把握し、実用的な単一のテンプレートに落とし込むことは困難です。精綻なレポート作成には、現場のデータを理解する専門チームの協力が不可欠です。"]},
{n:93,t:"Universal Containers (UC) は、カスタマーポータル用にAgentforce Service Agentを実装しています。UCは、製品の寸法や材料仕様など、明確に定義された特定の項目を含む記事が含まれる既存のSalesforceナレッジベースから情報を引き出すことで、AIエージェントに複雑な顧客の質問に答えさせる必要があります。AIエージェントをSalesforceナレッジベースに接続するために必要な機能はどれですか？",c:["Agentforceデータライブラリ","ナレッジのEinstein検索","Experience Builderのナレッジコンポーネント"],a:0,e:["正解です。Agentforceデータライブラリは、Salesforceナレッジ記事などのデータをAIエージェントに接続し、情報を根拠付けるための機能です。これにより、AIエージェントはナレッジベース内の項目化された正確な情報を検索して、顧客の複雑な質問に回答できるようになります。","ナレッジのEinstein検索は、ユーザーが自然言語を用いて関連するナレッジ記事を正確に検索するための機能です。AIエージェントが自律的に回答を生成するためのデータソース接続ツールではありません。","Experience Builderのナレッジコンポーネントは、カスタマーポータルの画面上にナレッジ記事を表示するためのUI要素です。AIエージェントが情報源としてナレッジベースに接続して回答を引き出すためのバックエンド機能としては使用されません。"]},
{n:94,t:"Service Cloudコンサルタントは、クライアントの電話システムをSalesforceと統合するために雇用されました。この統合に際して、コンサルタントは何を使用することを検討するべきですか？",c:["Service Cloudソフトフォンレイアウト","Lightning Dialer","Service Cloud Voice"],a:2,e:["Service Cloudソフトフォンレイアウトは、CTIを使用してSalesforce内で電話の着信や発信を表示・操作するための画面インターフェースを定義するものですが、既存の電話システム自体をSalesforceとシームレスに統合するための主要なソリューションではありません。","Lightning DialerはSalesforceから直接電話をかけるためのネイティブ機能ですが、クライアントが既に所有している外部の電話システムを統合する目的には適していません。","正解です。Service Cloud Voiceは、Amazon Connectやその他のサードパーティの電話システムをSalesforceと直接統合するために提供されているソリューションです。これにより、音声通話をオムニチャネル内で他のデジタルチャネルと共に一元管理することが可能になります。"]},
{n:95,t:"Cloud Kicks (CK) での最近のケース分析で、パスワードのリセットや注文の問い合わせなど、簡単なケースの割合が高いことが判明しました。CKは、Web、SMS、Facebook Messenger、およびWhatsAppを介して顧客セルフサービスを提供したいと考えています。新しいケースを処理するために、コンサルタントは何を推奨するべきでしょうか？",c:["ケーススウォーミングを実装する。","Einsteinボットを実装する。","スキルベースのルーティングを実装する。"],a:1,e:["ケーススウォーミングは、複雑なケースを解決するために、組織全体の専門家がSlackなどで協力して取り組むためのコラボレーションモデルです。パスワードリセットなどの簡単なケースを自動化し、セルフサービスで処理するという要件には適していません。","正解です。Einsteinボットは、Web、SMS、Facebook Messenger、WhatsAppなどのデジタルチャネルを通じて、顧客からの一般的な問い合わせ（パスワードのリセットや注文状況の確認など）に自動応答し、セルフサービスを提供するために最適な機能です。これにより、エージェントはより複雑な問題に集中できるようになります。","スキルベースのルーティングは、エージェントが持つ特定のスキルセットに基づいて、オムニチャネル経由でケースを最適なエージェントに割り当てるためのルーティング機能です。エージェントへの作業の割り当てを最適化することはできますが、顧客自身によるセルフサービスを提供するという要件を満たすものではありません。"]},
{n:96,t:"Universal Containers (UC) はExperience Cloudの設定を行っています。UCは、顧客がポータルを通じて合意された応答時間にアクセスできるようにする必要があります。",c:["メンテナンス計画","マイルストン","サービス契約"],a:1,e:["メンテナンス計画は、顧客の資産に対する予防的または定期的なメンテナンスのスケジュールと頻度を定義するために使用されます。ケースの応答時間やSLA（サービスレベル契約）の要件を顧客に示すための機能ではありません。","正解です。マイルストンは、サポートプロセスにおける必須ステップであり、顧客と合意した初回応答時間やケース解決時間などのSLA目標を表します。Experience Cloudサイト（ポータル）にマイルストンコンポーネントを配置することで、顧客は自身のケースに対する目標時間や進捗状況を直接確認できるようになります。","サービス契約は、顧客との間のサポート契約全体を定義するレコードですが、ポータル上でケースごとの具体的な応答時間のタイムラインやカウントダウンを表示するためには、エンタイトルメントプロセスとマイルストンを使用する必要があります。顧客に具体的な「応答時間」を提示するという要件に対してはマイルストンが適切です。"]},
{n:97,t:"Universal Containersは、顧客エントリとケース管理にService Cloudを使用していますが、注文履行、在庫、請求、および財務データは他のシステムに保存されています。統合のためにコンサルタントが推奨するソリューションはどれですか？",c:["統合された外部オブジェクトでApexを利用する。","AppExchange統合パッケージを利用する。","システムを統合するためにMuleSoftを利用する。"],a:2,e:["Salesforce Connectを利用して外部データにアクセスすることは可能ですが、Apexによるカスタム統合を直接構築することは、開発や保守の観点から複雑になります。複数の独立したバックエンドシステムを統合する場合、カスタムコードへの依存は推奨されません。","特定のシステム向けに構築されたAppExchangeパッケージは有用な場合がありますが、注文、在庫、請求、財務といった多岐にわたる別々のシステムを統合するための汎用的な単一パッケージは通常存在せず、システム全体のスケーラブルな統合ソリューションとしては適していません。","正解です。MuleSoftのようなエンタープライズ向けの統合プラットフォーム（ミドルウェア）を使用することで、Salesforceと複数の異なる外部システム（ERP、在庫、財務システムなど）をAPIベースで安全かつスケーラブルに統合できます。複雑なデータのやり取りを一元管理するためのベストプラクティスです。"]},
{n:98,t:"Cloud Kicksはケース管理システムをSalesforceに変更しています。稼働開始に向けて、過去5年間のすべての有効な取引先、取引先責任者、およびクローズされたケースをSalesforceに移行する必要があります。データ移行のためにコンサルタントはどのアプローチを使用するべきでしょうか？",c:["準備、計画、テスト、検証、実行","計画、準備、実行、テスト、検証","計画、準備、テスト、実行、検証"],a:2,e:["データを準備する前に、まずは移行全体の計画を立てることが必要です。移行するデータのスコープ定義やスケジュールの策定を行う計画フェーズが最初に来るのがデータ移行のベストプラクティスであるため、この順序は適切ではありません。","実行（本番環境へのデータの実際のロード）を行う前に、Sandboxなどの環境でテストを行い、データが正しくマッピングされインポートできるかを確認することが不可欠です。本番環境へ実行した後にテストを行うこの順序は、重大なデータ問題を引き起こすリスクが高いため不適切です。","正解です。データ移行の一般的なベストプラクティスは、まず移行のスコープと戦略を定義し（計画）、データのクレンジングと抽出・マッピングを行い（準備）、Sandbox環境にロードして問題がないか確認し（テスト）、本番環境にデータをロードし（実行）、最後にビジネスユーザーと共に本番データが正確であるかを確認する（検証）というこの手順になります。"]},
{n:99,t:"Cloud Kicksには、顧客のケースに取り組む複数のチームがあります。サポートマネージャーは、解決されるまでに各ケースが各チームに所有されていた期間を追跡したいと考えています。Service Cloudコンサルタントはこの要件に対してどのレポートを使用するべきでしょうか？",c:["履歴トレンド付きケースレポート","ケースライフサイクルレポート","マイルストン付きケースレポート"],a:1,e:["履歴トレンドレポートは、特定の時点でのデータの状態や値の変化を比較するために使用されます。ケースの所有者が変更されるたびに、それぞれのチームがケースを所有していた正確な期間を継続的に追跡する目的には適していません。","正解です。ケースライフサイクルレポートは、ケースのステータスの変更や所有者の変更履歴、およびそれぞれの所有期間を追跡するための標準レポートです。これにより、各チームが解決までにケースを所有していた時間を追跡するという要件を正確に満たすことができます。","マイルストン付きケースレポートは、顧客のエンタイトルメントプロセスに対するSLA（サービスレベル契約）の目標時間や遵守状況を追跡するために使用されます。ケースが特定のチームによって所有されていた時間を追跡するためのレポートではありません。"]},
/*__Q__*/
];
const LABELS=['A','B','C'];
const KEY='scQuizState_v1';
const PASS=70;
const MODE_LABEL={exam1:'模試1',exam2:'模試2',all:'全98問',random20:'ランダム20問',review:'復習'};
let state=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function buildItems(mode){
let idx;
if(mode==='exam1')idx=ALL_QUESTIONS.map(function(q,i){return i;}).slice(0,50);
else if(mode==='exam2')idx=ALL_QUESTIONS.map(function(q,i){return i;}).slice(50);
else if(mode==='random20')idx=shuffle(ALL_QUESTIONS.map(function(q,i){return i;})).slice(0,20);
else idx=ALL_QUESTIONS.map(function(q,i){return i;});
const order=(mode==='random20')?idx:shuffle(idx);
return order.map(function(qi){return{qi:qi,co:shuffle([0,1,2]),picked:null};});
}
function startQuiz(mode){state={mode:mode,items:buildItems(mode),cur:0};save();show('quiz');render();window.scrollTo(0,0);}
function show(v){document.getElementById('home').classList.toggle('hide',v!=='home');document.getElementById('quiz').classList.toggle('hide',v!=='quiz');document.getElementById('result').classList.toggle('hide',v!=='result');}
function render(){
const it=state.items[state.cur];const q=ALL_QUESTIONS[it.qi];
document.getElementById('progBar').style.width=(state.cur/state.items.length*100)+'%';
document.getElementById('qnum').textContent='Q '+(state.cur+1)+' / '+state.items.length;
document.getElementById('qmode').textContent=MODE_LABEL[state.mode]||'';
document.getElementById('qtext').textContent=q.t;
const cc=document.getElementById('choices');cc.innerHTML='';
it.co.forEach(function(orig,p){
const b=document.createElement('button');b.className='choice';
b.innerHTML='<span class="lab">'+LABELS[p]+'</span>'+esc(q.c[orig]);
if(it.picked!==null){b.disabled=true;if(orig===q.a)b.classList.add('correct');else if(p===it.picked)b.classList.add('wrong');}else{b.onclick=function(){pick(p);};}
cc.appendChild(b);
});
const ex=document.getElementById('expl');
if(it.picked!==null){let h='<div class="expl"><h4>解説</h4>';it.co.forEach(function(orig,p){const ok=(orig===q.a);h+='<div class="row '+(ok?'ok':'ng')+'"><span class="lab">'+LABELS[p]+'.</span>'+esc(q.e[orig])+'</div>';});h+='</div>';ex.innerHTML=h;}else{ex.innerHTML='';}
document.getElementById('prevBtn').disabled=state.cur===0;
const nb=document.getElementById('nextBtn');nb.textContent=(state.cur===state.items.length-1)?'結果を見る':'次へ →';nb.disabled=it.picked===null;
}
function pick(p){const it=state.items[state.cur];if(it.picked!==null)return;it.picked=p;save();render();}
function nextQ(){if(state.cur<state.items.length-1){state.cur++;render();window.scrollTo(0,0);}else{finish();window.scrollTo(0,0);}}
function prevQ(){if(state.cur>0){state.cur--;render();window.scrollTo(0,0);}}
function finish(){let correct=0;state.items.forEach(function(it){const q=ALL_QUESTIONS[it.qi];if(it.picked!==null&&it.co[it.picked]===q.a)correct++;});const total=state.items.length;const pct=Math.round(correct/total*100);const pass=pct>=PASS;document.getElementById('badge').innerHTML='<span class="badge '+(pass?'pass':'fail')+'">'+(pass?'合格':'不合格')+'</span>';document.getElementById('scoreText').textContent=pct+'%';document.getElementById('scoreSub').textContent=total+'問中 '+correct+'問正解（合格ライン'+PASS+'%）';state.done=true;save();show('result');}
function reviewWrong(){const wrong=state.items.filter(function(it){const q=ALL_QUESTIONS[it.qi];return!(it.picked!==null&&it.co[it.picked]===q.a);});if(wrong.length===0){alert('全問正解です！復習する問題はありません。');return;}state={mode:'review',items:wrong.map(function(it){return{qi:it.qi,co:shuffle([0,1,2]),picked:null};}),cur:0};save();show('quiz');render();window.scrollTo(0,0);}
function quitQuiz(){clearS();state=null;show('home');checkResume();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function clearS(){try{localStorage.removeItem(KEY);}catch(e){}}
function loadS(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
function checkResume(){const s=loadS();const box=document.getElementById('resume');if(s&&s.items&&!s.done){const answered=s.items.filter(function(it){return it.picked!==null;}).length;document.getElementById('resumeText').textContent='中断中の'+(MODE_LABEL[s.mode]||'')+'があります（'+answered+'/'+s.items.length+'問回答済み）';box.classList.remove('hide');}else{box.classList.add('hide');}}
function resumeQuiz(){const s=loadS();if(s){state=s;document.getElementById('resume').classList.add('hide');if(s.done){finish();}else{show('quiz');render();}window.scrollTo(0,0);}}
function discardResume(){clearS();document.getElementById('resume').classList.add('hide');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
checkResume();
</script>
</body>
</html>
