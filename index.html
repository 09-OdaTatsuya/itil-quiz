<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Salesforce Platform Sharing and Visibility アーキテクト 模擬試験</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--text:#e6e8ee;--muted:#9aa3b2;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',-apple-system,sans-serif;line-height:1.75;-webkit-font-smoothing:antialiased;}
.wrap{max-width:820px;margin:0 auto;padding:32px 20px 80px;}
h1{font-size:1.5rem;font-weight:700;margin:0 0 4px;}
.sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mode-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:18px 16px;cursor:pointer;text-align:left;transition:.15s;font-family:inherit;}
.mode-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
.mode-btn b{display:block;font-size:1.05rem;margin-bottom:4px;}
.mode-btn span{color:var(--muted);font-size:.82rem;}
.bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:18px;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem;margin-bottom:12px;}
.mono{font-family:'DM Mono',monospace;}
.qtext{font-size:1.05rem;font-weight:500;white-space:pre-wrap;margin-bottom:20px;}
.choice{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-family:inherit;font-size:.97rem;transition:.15s;}
.choice:hover:not(:disabled){border-color:var(--accent);}
.choice:disabled{cursor:default;}
.choice .lab{display:inline-block;font-weight:700;font-family:'DM Mono',monospace;margin-right:10px;color:var(--accent);}
.choice.correct{border-color:var(--correct);background:rgba(61,214,140,.12);}
.choice.correct .lab{color:var(--correct);}
.choice.wrong{border-color:var(--wrong);background:rgba(245,91,91,.12);}
.choice.wrong .lab{color:var(--wrong);}
.expl{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-top:14px;animation:fadeIn .3s ease;}
.expl h4{margin:0 0 10px;font-size:.85rem;color:var(--muted);letter-spacing:.04em;}
.expl .row{font-size:.9rem;margin-bottom:10px;}
.expl .row:last-child{margin-bottom:0;}
.expl .row .lab{font-weight:700;font-family:'DM Mono',monospace;margin-right:8px;}
.expl .row.ok .lab{color:var(--correct);}
.expl .row.ng{color:var(--muted);}
.expl .row.ng .lab{color:var(--muted);}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:20px;}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:500;transition:.15s;}
.btn:hover{filter:brightness(1.1);}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn:disabled{opacity:.4;cursor:default;}
.result{text-align:center;}
.result .score{font-size:3rem;font-weight:700;font-family:'DM Mono',monospace;margin:8px 0;}
.badge{display:inline-block;padding:6px 18px;border-radius:99px;font-weight:700;font-size:1rem;margin-bottom:16px;}
.badge.pass{background:rgba(61,214,140,.15);color:var(--correct);}
.badge.fail{background:rgba(245,91,91,.15);color:var(--wrong);}
.resume{background:rgba(91,138,245,.1);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.resume span{font-size:.9rem;}
.hide{display:none!important;}
@media(max-width:600px){.wrap{padding:24px 14px 60px;}.modes{grid-template-columns:1fr;}h1{font-size:1.25rem;}}
</style>
</head>
<body>
<div class="wrap">
<h1>Salesforce 認定 Platform Sharing and Visibility アーキテクト 模擬試験</h1>
<div class="sub">全100問・3択・合格ライン70%　|　選択肢と出題順はランダム・解説つき</div>

<div id="resume" class="resume hide">
<span id="resumeText"></span>
<div><button class="btn" onclick="resumeQuiz()">再開する</button> <button class="btn ghost" onclick="discardResume()">最初から</button></div>
</div>

<div id="home" class="card">
<div class="modes">
<button class="mode-btn" onclick="startQuiz('exam1')"><b>模試1</b><span>第1問〜第50問</span></button>
<button class="mode-btn" onclick="startQuiz('exam2')"><b>模試2</b><span>第51問〜第100問</span></button>
<button class="mode-btn" onclick="startQuiz('all')"><b>全100問</b><span>全問通し</span></button>
<button class="mode-btn" onclick="startQuiz('random20')"><b>ランダム20問</b><span>毎回ランダム抽出</span></button>
</div>
</div>

<div id="quiz" class="hide">
<div class="bar"><i id="progBar" style="width:0%"></i></div>
<div class="card">
<div class="qmeta"><span class="mono" id="qnum"></span><span id="qmode"></span></div>
<div class="qtext" id="qtext"></div>
<div id="choices"></div>
<div id="expl"></div>
<div class="nav">
<button class="btn ghost" id="prevBtn" onclick="prevQ()">← 前へ</button>
<button class="btn" id="nextBtn" onclick="nextQ()">次へ →</button>
</div>
</div>
<div style="text-align:center;margin-top:10px;"><button class="btn ghost" onclick="quitQuiz()">中断してトップへ</button></div>
</div>

<div id="result" class="hide"><div class="card result">
<div id="badge"></div>
<div class="score" id="scoreText"></div>
<div class="sub" id="scoreSub"></div>
<div class="nav" style="justify-content:center;">
<button class="btn" onclick="reviewWrong()">間違えた問題を復習</button>
<button class="btn ghost" onclick="quitQuiz()">トップへ戻る</button>
</div>
</div></div>

</div>
<script>
const ALL_QUESTIONS=[
{n:1,t:"Universal Containers (UC) は複数の注文に関する法的紛争に巻き込まれています。UCはこれらのレコードがシステムから削除されたことを発見しました。営業担当副社長は今後このようなことが起こらないように求めています。この要件を満たすアプローチはどれですか？",c:["注文のレコードタイプ/ページレイアウトの割り当てを読み取り専用に変更する。","注文のページレイアウトから「削除」ボタンを削除する。","プロファイルと権限セットから注文の「削除」権限を削除する。"],a:2,e:["ページレイアウトを読み取り専用に変更しても、APIやデータローダ、リストビューなどUI以外の方法からの削除を防ぐことはできません。アクセス権限そのものを制限するわけではないため、不適切なアプローチです。","ページレイアウトからボタンを削除するだけでは、APIや他のインターフェースを介したレコードの削除を防ぐことはできません。これもUIレベルの非表示化に過ぎず、要件を完全に満たすことはできません。","正解です。プロファイルや権限セットのオブジェクト権限レベルで「削除」権限を奪うことで、UI、API、データローダなど、すべての経路からのレコード削除をシステム全体で確実に防ぐことができます。"]},
{n:2,t:"Universal Containersの取引先オブジェクトの組織の共有設定モデルは非公開です。営業担当者は1つの取引先内で2つの商談を所有しています。営業担当者プロファイルには、商談レコードへの作成/編集アクセス権があります。営業担当者は関連する取引先レコードに対してどのレベルのアクセス権を持ちますか？",c:["参照/作成/編集アクセス権","アクセス権なし","参照アクセス権"],a:2,e:["商談の所有者であるという理由だけで、親である取引先の作成や編集アクセス権が付与されることはありません。取引先の編集権限を得るには、取引先の所有者になるか、共有ルールや手動共有などを通じて別途権限を付与される必要があります。","組織の共有設定が非公開であっても、その取引先に関連付けられた商談を所有している場合、暗黙的な共有機能によって親レコードへのアクセスが許可されるため、完全にアクセス権なしになることはありません。","正解です。Salesforceの暗黙的な共有（Implicit Sharing）の機能により、ユーザーが取引先に関連する子レコード（商談、ケース、または取引先責任者）を所有している場合、その親である取引先レコードに対して自動的に参照アクセス権が付与されます。したがって、営業担当者は取引先に対する参照アクセス権を持ちます。"]},
{n:3,t:"Universal Containers (UC) はカスタムの請求書オブジェクトを作成しました。UCの標準営業ユーザーは検索レイアウトでレコードを表示できますが、クリックして詳細を表示すると、レコード名、作成日、最終更新日のみが表示されます。システム管理者がアクセスすると、より多くのデータ項目が含まれる完全なレコードの詳細が表示されます。この問題の考えられる原因は何ですか？",c:["営業ユーザーのロールに項目へのアクセス権を付与するためのロールベースの共有ルールが欠落しているため、追加する必要がある。","営業ユーザープロファイルに残りの項目へのアクセス権がない。","営業ユーザープロファイルに割り当てられたページレイアウトでは、項目に対するアクセス権が参照のみになっている。"],a:1,e:["共有ルールはレコードへのアクセス権を付与するためのものであり、レコード内の特定の項目へのアクセス権を制御するものではありません。項目レベルのアクセス制御には項目レベルセキュリティを使用します。","正解です。プロファイルや権限セットの項目レベルセキュリティによって、特定の項目に対するアクセス権が制限されている場合、ユーザーにはその項目が表示されません。システム管理者はすべての項目へのアクセス権を持つため、完全な詳細が表示されます。","ページレイアウトで項目が参照のみに設定されている場合でも、値の編集ができないだけで項目自体は画面に表示されます。今回は項目そのものが表示されていないため、原因としては当てはまりません。"]},
{n:4,t:"Universal Containersの財務チームは通常、取引先と取引先責任者のレコードへのアクセス権を持っていません。ある財務アナリストは、税金計算の支援のために大規模な商談に対するアクセス権を一時的に付与されました。しかし、彼女は現在、取引先と取引先責任者のレコードにもアクセスできるようになっています。この問題の原因は何ですか？",c:["商談からの暗黙的な共有により、取引先責任者レコードにアクセスできる。","ロール階層により、取引先レコードにアクセスできる。","商談からの暗黙的な共有により、取引先レコードにアクセスできる。"],a:2,e:["暗黙的な共有によって親レコードへのアクセス権が付与される対象は取引先です。商談へのアクセス権が付与されても、それによって自動的に関連する取引先責任者レコードへのアクセス権が付与されるわけではありません。","ロール階層は上位ロールのユーザーが下位ロールの所有するレコードにアクセスできるようにする仕組みです。今回の事象は特定の商談への一時的なアクセス権付与が引き金となっており、ロール階層が原因ではありません。","正解です。Salesforceの暗黙的な共有機能により、ユーザーが商談、ケース、または取引先責任者といった子レコードへのアクセス権を付与された場合、その関連する親である取引先レコードに対する参照アクセス権が自動的に付与されます。これが取引先レコードにアクセスできるようになった直接の原因です。"]},
{n:5,t:"Universal ContainersはSales Cloudを導入し、高リスク商品の販売訓練を受けた特定の支店スタッフのみが高リスク商品の商談を作成できるように要求しました。アーキテクトは、特定の支店スタッフのみが高リスク商品を販売できるようにするために、どのようにすべきですか？",c:["価格表の組織の共有設定を参照のみに設定し、手動共有によって(高リスクの)価格表を訓練を受けたスタッフと共有する。","価格表の組織の共有設定を参照のみに設定し、共有ルールによって(高リスクの)価格表を訓練を受けたスタッフと共有する。","価格表の組織の共有設定(OWD)を参照のみに設定し、(高リスクの)価格表を訓練を受けたスタッフと共有する。"],a:1,e:["価格表オブジェクトは手動共有をサポートしていません。そのため、このアプローチはSalesforceのシステム上実行することができず、要件を満たすことはできません。","正解です。価格表へのアクセスを制御し、特定のユーザーのみが商談でその価格表を利用できるようにするには、組織の共有設定を制限付き(アクセス権なし、または参照のみ)に設定した上で、共有ルールを使用して対象となる特定のユーザーグループに「使用」アクセス権を付与するのが最適なアプローチです。","この選択肢はアクセス権を付与するという方向性は合っていますが、システム上でどのように共有を実現するのかという具体的な機能（共有ルールなど）が明記されていないため、最適な解答としては不十分です。"]},
{n:6,t:"Universal Containers (UC) は、システムに入力される重複したリードの量を減らしたいと考えています。UCはまた、リードの編集や再割り当てがリード所有者のみによって行われることを確実にしたいと考えています。UCがこれらの要件を実装するのを支援するために、どの組織の共有設定(OWD)のアプローチを推奨すべきですか？",c:["リードの組織の共有設定として公開/参照のみ/移行を実装する。","リードの組織の共有設定として公開/参照のみを実装する。","リードの組織の共有設定として非公開を実装する。"],a:2,e:["リードオブジェクトの組織の共有設定には「公開/参照のみ/移行」という設定値は存在しません。設定可能な値は「非公開」「公開/参照のみ」「公開/参照・更新」「公開/参照・更新・移行」です。存在しない設定値であるため、適切なアプローチではありません。","組織の共有設定を「公開/参照のみ」に設定すると、システム内のすべてのユーザーがすべてのリードを参照できるようになります。他のユーザーによる編集は防げますが、重複を確認する目的のみですべてのデータを全ユーザーに公開することは、最小権限の原則から外れるため推奨されません。","正解です。組織の共有設定を「非公開」に設定することで、レコードの所有者のみがリードの表示、編集、再割り当てを行えるようになり、要件を完全に満たします。重複レコードの入力を防ぐという要件については、組織の共有設定を非公開に保ったまま、共有ルールをバイパスしてシステム全体で一致を検知できるSalesforceの標準の「重複ルール」と「一致ルール」を利用するのが最適なアプローチです。"]},
{n:7,t:"Universal Containers (UC) の営業担当者は、サポートが必要な時に顧客レコードに対するサポート用の内部ユーザー(法務、エンジニアリング、財務など)へのアクセス権を付与するために実行しなければならない手動の作業について不満を述べています。一般的に、商談に関与する営業担当者は変更されません。アーキテクトはUCの営業担当者の生産性向上をどのように支援するべきでしょうか？",c:["他のユーザーにアクセス権を付与するために条件に基づく共有ルールを作成する。","デフォルトの取引先チームを活用する。","すべてのデータの参照権限を持つ権限セットを作成し、サポートユーザーに割り当てる。"],a:1,e:["共有ルールは特定の条件に基づいてレコードへのアクセス権を自動的に付与しますが、個別の取引先や商談ごとに異なるサポートメンバーを動的に割り当てるような柔軟なチーム構成には適していません。","正解です。デフォルトの取引先チームを設定することで、ユーザーは自分が所有する取引先に対して、頻繁に協業する内部メンバーへのアクセス権を自動的に追加することができます。関与する担当者が固定されている場合、この機能を使用することで都度の手動共有が不要になり、営業担当者の生産性を大幅に向上させることができます。","すべてのデータの参照権限を付与すると、サポートユーザーはシステム内の関連しないすべてのレコードにまでアクセスできるようになります。これは最小権限の原則に反する過剰な権限付与であり、セキュリティの観点から適切なアプローチではありません。"]},
{n:8,t:"Universal Containers (UC) は、学生や企業にトレーニングやコースを提供しています。UCは、学生にCustomer Communityライセンスを付与して、Salesforce Customer Communityを導入しています。コミュニティの要件の一環として、UCは、UCコミュニティ内の自分の取引先に関連するケースへのアクセス権を学生に与えるよう求めました。これらの要件を達成するための最適な共有手法は何ですか？",c:["学生とケースを共有するためにApex共有を使用する。","学生とケースを共有するために共有ルールを作成する。","学生とケースを共有するために共有セットを作成する。"],a:2,e:["Apex共有はプログラムによる複雑なカスタムロジックが必要な場合に使用されます。しかし、Customer Communityライセンスを持つユーザーに対しては、標準機能で要件を満たせるアプローチがあるため、コードの開発と保守が必要なApex共有は最適な手法ではありません。","Customer Communityライセンスを持つユーザーはSalesforceのロール階層を持たないため、ロールに基づく共有ルールを使用してレコードを共有することはシステム上できません。したがって、この要件には適用できません。","正解です。共有セットは、Customer Communityライセンスのようなロールを持たないコミュニティユーザーに対して、そのユーザーの取引先や取引先責任者に関連付けられたレコード（今回の場合、取引先に関連するケース）へのアクセス権を付与するために用意された標準機能であり、この要件を満たすための最適な手法です。"]},
{n:9,t:"Universal ContainersはSales Cloudを導入し、営業エージェントが会社が販売する商品と価格にアクセスでき、顧客のために商談を作成できるようにすることを要求しました。価格表の組織の共有設定はどうあるべきですか？",c:["公開/参照のみ","表示","使用"],a:2,e:["公開/参照のみに設定すると、ユーザーは価格表とその中の価格を表示することはできますが、その価格表を使用して商談に商品を追加することはできません。商談を作成して商品を追加するには使用アクセス権が必要です。","表示アクセス権だけでは、価格表の情報を閲覧することは可能ですが、それを商談や見積もりに関連付けて商品を追加する権限は与えられません。したがって、この設定では顧客のための商談作成という要件を満たすことができません。","正解です。価格表の組織の共有設定を使用に設定することで、営業エージェントは価格表の情報を参照できるだけでなく、商談レコードでその価格表を選択し、顧客のために商品を追加できるようになります。これにより、要件である商談の作成と価格表の利用が完全に満たされます。"]},
{n:10,t:"Universal Containersは、次のビジネス要件に従ってレコードとオブジェクトへのアクセスを制御したいと考えています。営業ユーザーはすべての取引先レコードを参照できますが、編集できるのは自分のレコードのみです。営業マネージャーはすべての取引先レコードを参照できますが、編集できるのは自分のチームのレコードのみです。サービスユーザーは、プロスペクトのレコードタイプでマークされていないすべての取引先レコードを参照できます。これらの要件を満たすために、アーキテクトはどの組織の共有設定を推奨するべきですか？",c:["公開/参照・更新","公開/参照・移行","非公開"],a:2,e:["組織の共有設定を公開/参照・更新に設定すると、すべてのユーザーがすべての取引先レコードを参照および編集できるようになります。これは、営業ユーザーが自分のレコードのみを編集できるという要件や、サービスユーザーに対して特定のレコードタイプを非表示にするという要件を満たすことができません。","組織の共有設定を公開レベル（参照のみ、またはそれ以上）に設定すると、システム内のすべてのユーザーがすべての取引先レコードを参照できるようになります。これにより、サービスユーザーがプロスペクトのレコードタイプを含むすべての取引先レコードを参照できてしまうため、アクセスを制限する要件を満たせなくなります。","正解です。Salesforceのセキュリティモデルでは、一部のユーザーに対して特定のレコードへのアクセスを制限する必要がある場合（今回のケースでは、サービスユーザーに対してプロスペクトの取引先を非表示にする要件）、ベースラインとなる組織の共有設定を最も制限の厳しい「非公開」に設定する必要があります。その上で、共有ルールやロール階層を使用して、営業ユーザーやマネージャーに必要なアクセス権を拡張して付与するのが正しい設計アプローチです。"]},
{n:11,t:"あるコンサルティング会社は、フィールドコンサルタント向けにSalesforceモバイルアプリケーションを使用し、ケースオブジェクトを使用してフィールドコンサルタントが行う顧客固有のコンサルティングを追跡しています。同社には、会社支給のデスクトップで顧客からの電話を受け、ケースオブジェクトを使用して顧客の問題や苦情を追跡する多数のカスタマーサービス担当者もいます。同社は、顧客訪問中にケースレコードを編集している間に、フィールドコンサルタントが撮影した顧客サイトの画像をキャプチャしたいと考えています。ITディレクターは、カスタマイズを最小限に抑え、可能な限りコード成果物の再利用性を促進したいと考えています。サービス担当者がトレーニングを受けたのと同じLightningページを引き続き使用できることを保証しながら、画像キャプチャ要件を実装するために、アーキテクトは会社にどのような推奨事項を提示するべきですか？",c:["モバイルビューの「編集」アクションの上書きとしてLightningコンポーネントを使用し、画像キャプチャ機能を許可する。デスクトップユーザーに変更は必要ない。","Lightning Experienceの「編集」アクションの上書きとしてLightningコンポーネントを使用し、画像キャプチャ機能を許可する。デバイスのフォームファクタを検出し、ユーザーをデフォルトのオーバーライドされていないビューにリダイレクトする。","「モバイルで編集」という別のボタンを作成し、フィールドコンサルタントが画像を追加できるカスタムLightningコンポーネントを開く。デスクトップユーザーに変更は必要ない。"],a:0,e:["正解です。Salesforceでは、アクションの上書きを設定する際、SalesforceモバイルアプリケーションとデスクトップのLightning Experienceで異なるコンポーネントや動作を割り当てることができます。モバイルの「編集」アクションのみを画像キャプチャ機能を持つLightningコンポーネントで上書きすることで、デスクトップを使用するカスタマーサービス担当者の既存のページやプロセスに全く影響を与えずに要件を満たすことができます。","デスクトップを含むすべてで標準アクションを上書きし、カスタムコンポーネント内でデバイスを判別して処理を分岐させるアプローチは、不要なカスタマイズを増やすことになります。設定レベルでモバイルとデスクトップの動作を分離できる標準機能を利用する方が適切です。","新しいカスタムボタンを作成するアプローチは技術的には可能ですが、ユーザーは標準の「編集」ボタンと新しいボタンの使い分けを意識する必要があります。ITディレクターがカスタマイズの最小限化を求めていることを考慮すると、標準の「編集」アクションをモバイル環境でのみ上書きするアプローチの方がシームレスであり推奨されます。"]},
{n:12,t:"Universal Containersは、販売代理店向けにCustomer Community Plusライセンスを使用してCustomer Communityを導入しました。小売販売代理店には、複数の販売代理店で働くパートタイムエージェントがいます。これらのエージェントは、他の販売代理店の取引先にもアクセスできる必要があります。エージェントに異なる販売代理店の取引先へのアクセス権を付与するには、何を設定する必要がありますか？",c:["取引先と取引先責任者のリレーションを使用して、販売代理店の取引先をエージェントと共有するための共有セットを作成する。","Account__Shareテーブルを使用して、販売代理店の取引先をエージェントと共有するためにApex共有を使用する。","販売代理店の取引先をエージェントと共有するための共有ルールを作成する。"],a:0,e:["正解です。複数の取引先で働くエージェントのようなユーザーに対して、それらの取引先へのアクセス権を付与するには、「取引先責任者-複数取引先リレーション（取引先と取引先責任者のリレーション）」を有効にし、共有セットを使用して関連付けられた取引先へのアクセスを許可するのが標準的で最適なアプローチです。これにより、複雑なカスタマイズなしに要件を満たすことができます。","Apex共有を使用してプログラムによる共有ロジックを構築することは技術的には可能ですが、Salesforceのベストプラクティスでは、標準の宣言的な機能（共有セットと取引先と取引先責任者のリレーション）で要件を満たせる場合、コードの開発と継続的な保守が必要となるApex共有の使用は推奨されません。","Customer Community Plusライセンスは共有ルールをサポートしていますが、パートタイムエージェントが関連する複数の特定の販売代理店に動的にアクセスするという要件に対しては、個々のレコードの関連付けを直接活用できる共有セットと取引先と取引先責任者のリレーションの組み合わせの方が、設定と管理が容易で適しています。"]},
{n:13,t:"Universal Containers (UC) の営業マネージャーは、自チームの取引先に加えて、他の国にある同じセグメントのすべての取引先に対する参照アクセス権を必要としています。これに従って(国に基づいて)ロール階層が実装されましたが、米国の営業マネージャーは、カナダにある同じセグメントの取引先レコードを表示できないと不満を述べています。アクセス権を適切に付与するために、UCは何をすべきですか？",c:["所有者に基づく共有ルールを作成し、同じセグメントを持つ取引先レコードへのアクセス権をすべての営業マネージャーロールに付与する。","公開グループを作成して同じセグメントのすべての取引先を含め、権限セットを使用してアクセス権を付与する。","ロール階層を変更し、米国とカナダのすべての営業マネージャーを同じロールに配置する。"],a:0,e:["正解です。ロール階層は垂直方向（上司と部下）のアクセス権を提供しますが、異なる国同士のような水平方向のアクセス権を横断的に付与するには共有ルールが適しています。共有ルールを使用して対象レコードを特定のロール（営業マネージャー）に共有することで、要件を正確に満たすことができます。","公開グループはユーザーの集団をまとめるためのものであり、レコード（取引先）自体を含めることはシステム上不可能です。また、権限セットはオブジェクトや項目レベルの権限などを付与するものであり、特定のレコード単位の共有には使用されません。","ユーザーを同じロールに配置しただけでは、互いの所有するレコードへのアクセス権は自動的には付与されません。さらに、国別に設定されているロール階層の構造やレポートの枠組みを破壊してしまうため、推奨される設計ではありません。"]},
{n:14,t:"Universal Containers (UC) は500の異なる地域でトレーニングを提供しています。UCのオペレーションユーザーチームは、コースの設定、スケジュール設定、およびトレーナーの設定を管理しています。チームメンバーは地域レベルで働き、オペレーションマネージャーに報告します。オペレーションマネージャーは、オペレーションユーザーチームが所有するすべてのスケジュールされたコースを編集するためのアクセス権を要求しました。これをどのように達成するべきですか？",c:["オペレーションマネージャーは、所有者に基づく共有ルールを作成し、スケジュールされたコースをオペレーションマネージャーと共有することで、スケジュールされたコースへのアクセス権を取得する。","オペレーションマネージャーは、ロール階層で定義されたオペレーションユーザーチームが所有するスケジュールされたコースへのアクセス権を取得する。","オペレーションマネージャーは、公開グループを作成し、その公開グループにオペレーションマネージャーとオペレーションユーザーチームを追加することで、スケジュールされたコースへのアクセス権を取得する。"],a:1,e:["共有ルールを使用してアクセス権を付与することは可能ですが、マネージャーと部下という報告関係がすでに存在する場合、共有ルールで個別に設定することは管理の手間を増やすことになります。標準機能でより適したアプローチが存在するため、最適ではありません。","正解です。チームメンバーがオペレーションマネージャーに報告するという組織構造がある場合、ロール階層を利用するのが最も標準的で効率的なアプローチです。ロール階層を使用したアクセス権の付与により、上位のロールにいるユーザー(マネージャー)は、下位のロールにいるユーザー(チームメンバー)が所有するレコードに対して自動的にアクセスできるようになります。","公開グループにユーザーを追加しただけでは、レコードへのアクセス権は付与されません。アクセス権を付与するには、さらに共有ルールなどを設定する必要がありますが、マネージャーと部下の関係においてはロール階層を使用する方が適切な設計です。"]},
{n:15,t:"ケースに法務チームの関与が必要な場合、ケース所有者はケース上のLegal SME項目に企業弁護士の1人を追加します。ケースは非公開であるため、支援が必要な特定のケースへのアクセス権を弁護士に付与するにはどうすればよいですか？",c:["legal assistance needed?項目がチェックされたときに、企業法務チームのロールと共有する条件に基づく共有ルールを作成する。","ケーストリガーでApexによる共有を使用し、Legal SME項目で指定されたユーザーとレコードを共有する。","legal assistance needed?項目がチェックされたときに、法務公開グループと共有する条件に基づく共有ルールを作成する。"],a:1,e:["条件に基づく共有ルールは、ロールや公開グループなどのユーザーグループに対してレコードを共有するための機能です。項目で指定された特定の個人のみに動的にアクセス権を付与するという要件には適していません。","正解です。Apexによる共有を使用することで、レコード上の参照項目に指定されたユーザーを動的に特定し、その個別のユーザーに対して共有アクセス権を付与するプログラムを実装できます。これにより、指名された特定の弁護士のみにアクセスを許可できます。","条件に基づく共有ルールは公開グループ全体にアクセス権を付与します。法務チーム全体ではなく、選択された特定の弁護士のみにアクセス権を付与するという要件を満たすことができません。"]},
{n:16,t:"メアリーはロール階層においてジョーのマネージャーです。カスタムの請求書オブジェクトの組織の共有設定は公開/参照のみであり、メアリーのプロファイルには請求書オブジェクトに対する参照権限が付与されていません。メアリーはジョーの請求書レコードに対してどのアクションを実行できますか？",c:["参照/更新","参照のみ","なし"],a:2,e:["組織の共有設定やロール階層によってレコードへのアクセス権が拡張されたとしても、ユーザーのプロファイルでオブジェクトに対する基本的なアクセス権(この場合は参照権限)が付与されていなければ、レコードを参照または更新することはできません。","組織の共有設定が公開/参照のみであっても、メアリーのプロファイルに請求書オブジェクトの参照権限がありません。オブジェクトレベルのセキュリティ(プロファイルや権限セット)は、レコードレベルのセキュリティ(組織の共有設定やロール階層)が評価される前の大前提となるため、参照することはできません。","正解です。Salesforceのセキュリティモデルでは、レコードへのアクセス権を得るためには、まずプロファイルまたは権限セットで該当オブジェクトに対する最低限のアクセス権(参照権限など)を持っている必要があります。メアリーはプロファイルで請求書オブジェクトへの参照権限を持っていないため、組織の共有設定やロール階層の設定に関わらず、ジョーの請求書レコードに対して一切のアクションを実行できません。"]},
{n:17,t:"Universal Containers (UC) は、UCの現地オフィスがない国でコンテナを販売する関連会社を持っています。UCは、それらの国での販売サイクルを管理するためにPartner Communityを使用しています。ある関連会社が大幅に成長し、社内の営業チームを次のような構造に再編しました：営業担当副社長 → 営業ディレクター → 営業マネージャー → 営業担当者。営業担当者はお互いの商談を見るべきではなく、商談の表示は営業担当者の階層内で上位に公開されるべきです。この状況でアーキテクトが対処すべき主な問題は何ですか？",c:["チャネルマネージャーロールはPartner Communityと共有できません。","パートナーユーザーのロールは3つのレベルに制限されています。","Partner Communityはロール階層をサポートしていません。"],a:1,e:["チャネルマネージャーロールはパートナー取引先を所有する内部ユーザーのロールであり、関連会社内の4階層のロール構造を構築できないという今回の直接的な問題の原因ではありません。","正解です。パートナーポータルまたはコミュニティで作成できるパートナーロールは、デフォルトで最大、3つのレベル（パートナーエグゼクティブ、パートナーマネージャー、パートナーユーザーなど）に制限されています。設問の要件では営業担当副社長、営業ディレクター、営業マネージャー、営業担当者の4つのレベルの階層が求められているため、このシステム上の制限がアーキテクトが対処すべき主な問題となります。","Partner Communityライセンスは最大、3つのレベルでロール階層をサポートしているため、この記述は誤りです。ロール階層自体は利用可能ですが、レベル数に制限があることが問題の焦点です。"]},
{n:18,t:"共有ルールを作成する際に、データを共有するために選択できるオプションはどれですか？",c:["ユーザー","プロファイル","ロール"],a:2,e:["共有ルールでは、個々のユーザーを直接の共有先として選択することはできません。レコードへのアクセス権を付与する共有先として選択できるのは、公開グループ、ロール、およびロールと下位ロールです。個別のユーザーにレコードを共有する場合は、手動共有やApex共有を使用する必要があります。","プロファイルはオブジェクトに対する基本的なアクセス権(作成、参照、編集、削除など)を制御するものであり、特定のレコードを共有するための共有ルールの共有先として選択することはできません。","正解です。共有ルールを作成する際、共有先のオプションとしてロールを選択することができます。これにより、特定のロールに属するすべてのユーザーに対して、指定した条件や所有者に基づくレコードへのアクセス権を付与することが可能になります。"]},
{n:19,t:"Universal Containersのサポート担当者は、過去7日間に作成されたすべてのオープンなケースを表示するレポートを作成し、そのレポートを「非公開レポート」フォルダに保存しました。誰がこのレポートを表示して実行できますか？",c:["レポートの所有者","レポートの所有者と、「私の非公開レポート」フォルダへのアクセス権を付与されたすべてのユーザー","レポートの所有者と、「すべてのデータの参照」権限を持つユーザー"],a:0,e:["正解です。Salesforceでは、「非公開レポート」フォルダに保存されたレポートは、そのレポートを作成したユーザー（所有者）のみがアクセスして実行することができます。システム管理者であっても、他のユーザーの非公開フォルダに保存されているレポートを表示または実行することはできません。","「非公開レポート」フォルダは各ユーザー専用に用意された特殊なフォルダであり、他のユーザーに対してこのフォルダへのアクセス権を共有したり付与したりする機能はシステム上存在しません。","「すべてのデータの参照(View All Data)」権限は、組織内のすべてのレコードデータへのアクセスを許可する強力な権限ですが、他のユーザーの「非公開レポート」フォルダに保存されているレポート自体へのアクセス権を付与するものではありません。したがって、この権限を持っていても他のユーザーの非公開レポートは表示できません。"]},
{n:20,t:"Universal Containers (UC) の営業マネージャーは、自分のチームの出荷レコード(カスタムオブジェクト)にアクセスできないと苦情を言っています。当初、管理者はこれは設定を誤ったロール階層が原因で発生していると示唆しました(出荷の組織の共有設定は非公開です)。調査の結果、これらのユーザーのロール階層は正しいと判断されました。UCの営業マネージャーが出荷レコードを表示できない理由は何ですか？",c:["管理者によって、ロール階層の暗黙的な共有が誤って無効化された。","管理者によって、出荷の所有者に基づく共有ルールが誤って無効化された。","管理者によって、出荷の共有設定にある「階層を使用したアクセス譲渡」オプションが誤って無効化された。"],a:2,e:["Salesforceでは、ロール階層によるアクセス権の自動付与(暗黙的な共有)をシステム全体で一括して無効化するような単一の設定は存在しません。ロール階層に基づくアクセス制御は、オブジェクトごとの共有設定で個別に管理されます。","共有ルールは、ロール階層とは独立してレコードへのアクセス権を横断的に拡張するための機能です。今回のケースでは「マネージャーが自分のチーム(部下)のレコードを見られない」というロール階層に基づくアクセス権の問題が焦点となっており、ロール階層自体は正しく設定されていると明記されているため、共有ルールの無効化が直接の原因ではありません。","正解です。標準オブジェクトではロール階層を使用したアクセス権の付与は常に有効ですが、カスタムオブジェクトの場合は、組織の共有設定で「階層を使用したアクセス譲渡」というオプションの有効・無効を切り替えることができます。このオプションが無効になっていると、ロール階層の構造自体が正しく設定されていても、マネージャーは下位ロールが所有するレコードへのアクセス権を自動的に得ることができなくなります。"]},
{n:21,t:"Universal Containers (UC) は、Partner Communityライセンスを使用する200の販売代理店を持っています。パートナーはお互いのデータを見ることはできませんが、UCは販売代理店の特定の個人にデータへのより多くの可視性を与えようとしています。パートナーマネージャーロールのユーザーに、同じ販売代理店のパートナーユーザーのすべてのケースとコンテナレコードへのアクセス権を付与するスケーラブルなオプションはどれですか？",c:["所有者に基づく共有ルールを作成する。","個々のパートナーマネージャーユーザーにスーパーユーザー権限を付与する。","共有セットを作成する。"],a:1,e:["共有ルールは特定の条件や所有者に基づいてレコードへのアクセス権を付与しますが、200もの販売代理店が存在する場合、代理店ごとに個別の共有ルールを作成および維持することは非常に非効率であり、スケーラブルなオプションではありません。","正解です。パートナーコミュニティの「パートナーのスーパーユーザーアクセス」機能を有効にし、特定のパートナーユーザーにスーパーユーザー権限を付与することで、そのユーザーは同じ取引先(販売代理店)に関連する他のパートナーユーザーが所有するレコードにアクセスできるようになります。これは標準機能であり、スケーラブルで要件を正確に満たします。","共有セットは、ロールを持たないCustomer Communityライセンスのユーザーなどに対してアクセス権を付与するための機能です。Partner Communityライセンスのユーザーはすでにロール(パートナーマネージャーロールなど)を持っているため、同一代理店内のアクセス権拡張にはスーパーユーザーアクセス機能を利用するのが適切なアプローチです。"]},
{n:22,t:"Dreamforceのプレゼンターは、Salesforceの非公開のカスタムオブジェクト(Presentation)にあるプレゼンテーションの詳細(概要、プレゼンターの略歴など)を編集できる必要があります。プレゼンテーションのすべてのプレゼンターは、Presenterとユーザー間のPresenter連結オブジェクトにキャプチャされます。これをどのように実現できますか？",c:["レコードのプレゼンターに付与される権限セットを介して、Presentationレコードへの編集権限を付与する。","Presentationレコードの営業チームにユーザーを追加するPresenter連結オブジェクトのトリガーを使用する。","関連するPresentationレコードへのアクセス権を追加または削除するApexによる共有を使用したPresenter連結オブジェクトのトリガーを使用する。"],a:2,e:["権限セットはオブジェクトレベルまたは項目レベルの権限をユーザーに付与するものであり、特定のレコード単体へのアクセス権を動的に付与するためには使用されません。個別のレコードへのアクセス制御には共有機能を使用する必要があります。","営業チームや取引先チームといったチーム機能は、商談や取引先などの特定の標準オブジェクトに対してのみ利用可能です。カスタムオブジェクト(Presentation)に対してチーム機能を使用してアクセス権を制御することはシステム上できません。","正解です。カスタムオブジェクトに対して、関連する連結オブジェクトのレコードが作成または削除されたタイミングで動的にアクセス権を付与または削除するという複雑な要件を満たすには、ApexトリガーとApex共有を組み合わせてプログラムで実装するのが最適なアプローチです。"]},
{n:23,t:"Universal Containersは、小売顧客を表すために個人取引先を使用し、法人顧客を表すために法人取引先を使用しています。小売営業チームは法人顧客へのアクセス権を持つべきではありませんが、すべての小売顧客へのアクセス権を持つ必要があります。取引先の組織の共有設定が非公開に設定されている場合、アーキテクトはこれらの要件をどのように満たすべきですか？",c:["小売営業ロールにPersonAccountタイプの取引先へのアクセス権を付与する2つの条件に基づく共有ルールを作成する。","小売営業担当者が所有するすべての取引先取引先責任者ロールレコードへのアクセス権を付与するために、AccountContactRelationに所有者に基づく共有ルールを作成する。","小売営業プロファイルを更新して、個人取引先レコードタイプへのアクセス権を付与する。"],a:0,e:["正解です。個人取引先(PersonAccount)は取引先オブジェクトの特定のレコードタイプとして機能します。レコードタイプを条件とした条件に基づく共有ルールを作成することで、指定されたレコードタイプ(すべての小売顧客)のレコードのみを特定のロール(小売営業チーム)と共有することが可能になります。これにより、組織の共有設定が非公開であっても、法人取引先へのアクセスを制限したまま要件を満たすことができます。","AccountContactRelation(取引先と取引先責任者のリレーション)オブジェクトは、共有ルールの対象オブジェクトとして直接使用することはできません。また、このアプローチは特定のレコードタイプ(個人取引先)に対するアクセス権を付与するという要件に対処するものではありません。","プロファイルで特定のレコードタイプへのアクセス権を付与すると、ユーザーはそのレコードタイプのレコードを作成したり選択したりできるようになりますが、組織の共有設定が非公開の場合、他のユーザーが所有する既存のレコードへの参照アクセス権が自動的に付与されるわけではありません。したがって、すべての小売顧客を表示するという要件を満たすことはできません。"]},
{n:24,t:"若手の取引先マネージャーが取引先を所有しており、複雑な案件を管理するために新しい商談を作成します。彼女は製品スペシャリストとソリューションエンジニアの助けを必要としています。この案件の規模を考えると、近い将来、取引先がシニア取引先マネージャーに再割り当てされる可能性が高いことを彼女は知っています。共有モデルが非公開である場合、若手の取引先マネージャーが商談を共有するための最適な方法は何ですか？",c:["商談での手動共有","取引先での手動共有","商談チーム"],a:2,e:["商談での手動共有を使用して製品スペシャリストやソリューションエンジニアに商談へのアクセス権を付与することは可能ですが、親である取引先の所有者が変更された場合、商談の手動共有設定がリセットされ、アクセス権が失われるリスクがあります。そのため、所有者が変更される予定がある状況においては最適な方法ではありません。","取引先での手動共有を行うと関連する商談へのアクセス権も付与される可能性がありますが、取引先の所有者がシニア取引先マネージャーに再割り当てられた時点で、過去の取引先に対する手動共有レコードはシステムによって自動的に削除されます。したがって、アクセス権を維持するための最適な方法ではありません。","正解です。商談チームを利用することで、商談に貢献する複数のユーザーに対して適切なレベルのアクセス権を付与できます。手動共有とは異なり、取引先の所有者が変更されても商談チームのメンバー設定とアクセス権は保持されるため、将来的な所有者変更を見越した上で協業を継続するための最適なアプローチとなります。"]},
{n:25,t:"Universal ContainersはSales Cloudを導入しています。会計年度の第4四半期に、営業マネージャーは互いに商談を成約させるのを支援します。彼らは、必要に応じて異なるチームの他の営業マネージャーと商談を共有でき、かつ共有された商談が新しい会計年度の開始2週間後に自動的に期限切れになることを要求しました。これらの要件を満たすソリューションの組み合わせはどれですか？",c:["営業マネージャーと商談を共有するためのApex共有を実装し、新会計年度開始2週間後にアクセス権を削除するスケジュール済みApexジョブを作成する。","営業マネージャーと商談を共有するための共有ルールを作成する。","営業マネージャーと商談を手動共有し、2週間後に手動で共有を削除する。"],a:0,e:["正解です。必要に応じて特定のマネージャーに動的にアクセス権を付与するにはApex共有が適しており、さらに特定の期日(新しい会計年度が始まってから2週間後)に自動的に共有を期限切れにするには、スケジュール済みApexジョブでそのApex共有レコードを削除する必要があります。この2つを組み合わせることで要件を満たせます。","共有ルールは特定の条件やレコード所有者に基づいて、ロールや公開グループ全体に対して自動的かつ永続的にアクセス権を付与するものです。必要に応じて個別に共有を判断する要件や、特定のタイミングで自動的にアクセス権を削除するといった動的な期限付きの共有要件には対応できません。","手動共有で対応することは可能ですが、多数の商談に対して毎回手動でアクセス権を付与・削除する運用は現実的でなくスケーラブルではありません。動的な付与と期限付きの自動削除には、Apex共有とスケジュール済みApexジョブの組み合わせが適しています。"]},
{n:26,t:"共有設定でサイトユーザの表示がオフになっている場合、影響を受けるコミュニティ機能はどれですか？",c:["ユーザプロファイルの更新。","他の外部ユーザの検索。","内部ユーザの検索。"],a:1,e:["ユーザ自身のプロファイルの更新は、他のユーザの表示・非表示の設定に依存しないため、影響を受けません。","正解です。共有設定にあるサイトユーザの表示機能は、同じサイト（コミュニティ）内の外部ユーザ同士がお互いを表示および検索できるかどうかを制御します。この設定をオフにすると、他の外部ユーザを検索できなくなります。","内部ユーザを表示または検索できるかどうかは、サイトユーザの表示設定ではなく、組織の共有設定やポータルユーザの表示設定など、他の共有メカニズムによって制御されるため影響を受けません。"]},
{n:27,t:"ある企業は、生産性を向上させるためにどこからでも仕事ができる文化を導入しようとしています。営業担当者は、さまざまなフォームファクタの多種多様なデバイスを使用しています。現在、同社は営業担当者に商談レコードの詳細を表示するために1つのページレイアウトを使用しています。営業担当地域副社長は、商談レコードのデータの配置が正しくなく、一部の営業担当者にとって使いづらいと苦情を述べています。この問題を解決するために推奨される手順はどれですか？",c:["商談の参照アクションにカスタムLWCの上書きを使用し、onLoadアクションでフォームファクタを特定して、フォームファクタに基づいた関連するレイアウトを表示する。","商談の参照アクションにVisualforceの上書きを使用し、onLoadアクションでフォームファクタを特定して、フォームファクタに基づいた関連するレイアウトを表示する。","動的フォームを使用して、デバイスのさまざまなフォームファクタに適用できる異なる項目セクションを定義する。"],a:2,e:["カスタムLightning Web Component (LWC) を作成して参照アクションを上書きすることは技術的に可能ですが、標準機能で対応できる要件に対してカスタム開発を行うことは、開発や保守のコストが増加するため推奨されません。","Visualforceによる上書きも可能ですが、Lightning Experience環境においては旧来の技術であり、LWCと同様に不要なカスタムコードの記述を伴うため、ベストプラクティスではありません。","正解です。動的フォームを使用すると、ページレイアウトに依存することなく、Lightningレコードページ上で直接項目や項目セクションを構成できます。さらに、表示ルールの条件としてデバイスのフォームファクタ（デスクトップまたは電話）を指定できるため、コードを一切記述せずに各デバイスに最適な画面を提供し、この課題を解決できます。"]},
{n:28,t:"Universal Containersの営業担当者は、営業プロセスの一環として、電子メールで共有するには大きすぎるファイルを作成することがあります。彼らはユーザが顧客とファイルを共有できるようにしたいと考えていますが、CISOは共有されるファイルリンクはパスワードで保護されていなければならないと要求しています。これをどのように実現できますか？",c:["顧客にパスワードで保護されたファイルを提供するためにAppExchange製品を利用する。","コンテンツ配信を作成し、作成時に、ユーザがコンテンツにアクセスするためのパスワードを要求するオプションを選択する。","顧客がファイルにアクセスするためのExperience Cloudサイトを設定し、Chatterを介して顧客とファイルを共有する。顧客はサイトにログインしてコンテンツにアクセスできる。"],a:1,e:["AppExchange製品を利用して要件を満たすことは可能かもしれませんが、Salesforceの標準機能であるコンテンツ配信を使用することで、追加のコストやサードパーティ製アプリの導入なしに要件を満たすことができます。","正解です。コンテンツ配信機能を使用すると、ファイルへのオンラインリンクを生成し、そのリンクにパスワード保護や有効期限を設定することができます。これにより、大容量のファイルを安全に外部の顧客と共有するという要件を標準機能で満たすことができます。","Experience Cloudサイトを設定することでファイルを共有することは可能ですが、単にパスワード保護されたファイルリンクを共有するという要件に対しては、サイトの構築や管理が必要となり、過剰なソリューションとなります。"]},
{n:29,t:"Universal Containersは、非アクティブな取引先を確認するために、小規模で多様なユーザグループを選択しました。非公開の共有モデルを考慮して、公開グループが作成され、このユーザグループが利用できるようになりました。非アクティブな取引先を公開グループに表示するための共有ルールが作成されました。しかし、これらのユーザの一部は、公開グループと共有された取引先がまったく表示されないと報告しています。これらのユーザの根本的な問題は何ですか？",c:["ユーザは、取引先オブジェクトへのアクセス権がないプロファイルに属している。","これらのユーザに割り当てられているページレイアウトが、取引先所有者と異なっている。","取引先は、ロール階層で上位のユーザによって所有されている。"],a:0,e:["正解です。Salesforceのセキュリティモデルにおいて、オブジェクトレベルのアクセス権（プロファイルや権限セットで設定）は、レコードレベルのアクセス権（共有ルールなど）の前提条件となります。プロファイルで取引先オブジェクトへの参照権限がない場合、共有ルールでレコードが共有されていても、対象のレコードを見ることはできません。","ページレイアウトは、ユーザがレコードにアクセスできた際にどの項目が見えるか、どのように配置されるかを制御するものです。レコードそのものへのアクセス権（レコード一覧に表示されるかどうか）を制御する機能ではないため、原因ではありません。","共有ルールはロール階層とは独立してアクセス権を付与するため、レコードの所有者がロール階層のどこに位置しているかは、共有ルールによるアクセス付与に影響しません。共有ルールが正しく設定されていれば、所有者の階層に関わらずレコードは共有されます。"]},
{n:30,t:"Universal Containers (UC) は世界中で事業を展開しており、10か国100以上の地域にオフィスを構え、データの表示を制御するために非常に複雑なロール階層を確立しています。新しい会計年度に、UCはロールを再編成し、取引先の所有者を再割り当てすることを計画しています。この作業に伴う問題を回避するために、アーキテクトはどの機能を推奨するべきですか？",c:["ディビジョンを使用したデータのパーティション化","共有ルールの並行再適用","スキニーテーブル"],a:1,e:["ディビジョンは、大量のデータを持つ組織でデータを論理的に分割して検索やレポートのパフォーマンスを向上させるための機能です。共有の再計算やロール階層の変更に伴う直接的なパフォーマンス問題やロック問題の解決策ではありません。","正解です。複雑なロール階層や多数の共有ルールを持つ組織で大規模なロールの変更や所有者の再割り当てを行う場合、共有の再計算に非常に長い時間がかかることがあります。共有ルールの並行再適用機能を使用すると、このプロセスを非同期で複数のスレッドで並行して実行でき、計算時間を大幅に短縮し、タイムアウトやロックなどの問題を回避できます。","スキニーテーブルは、頻繁に使用される項目を1つのテーブルにまとめることで、大規模なデータセットに対するレポートやリストビュー、SOQLのパフォーマンスを向上させるために使用されます。共有ルールの再計算やロール階層の変更による問題を回避するための機能ではありません。"]},
{n:31,t:"ユーザがファイルホームの非公開ライブラリにアップロードしたPDFを閲覧できるのは誰ですか？",c:["ユーザおよびロール階層でそのユーザより上位のユーザ","ユーザおよび「すべてのデータの参照」権限を持つユーザ","そのユーザのみ"],a:2,e:["非公開ライブラリ（自分の非公開ファイル）に保存されたファイルは、レコードのようなロール階層を通じたアクセス権の付与の対象外です。そのため、上位のロールを持つユーザであっても自動的に閲覧することはできません。","システム管理者など「すべてのデータの参照」権限を持つユーザであっても、他のユーザの非公開ライブラリに保存された非公開ファイルにはアクセスできません。ファイルが明示的に共有されない限り、他のユーザには表示されません。","正解です。ユーザがファイルホームにアップロードし、他のレコードやユーザ、グループなどと一切共有していないファイルは、デフォルトで完全に非公開となります。したがって、アップロードした所有者本人のみが閲覧できます。"]},
{n:32,t:"Universal Containersは、販売代理店向けにCustomer Community Plusライセンスを使用してCustomer Communityを導入しました。一部の販売代理店から、特定のコミュニティユーザ（エージェント）に、同じ販売代理店の他のエージェントが送信したケースを表示する権限を付与してほしいという要望がありました。これらの要件をサポートする機能はどれですか？",c:["コミュニティ管理者権限を付与する権限セット","代理外部ユーザ","パートナースーパーユーザ"],a:2,e:["コミュニティ管理者権限は、主にパスワードのリセットや新しいユーザの作成など、コミュニティユーザの管理タスクを委任するための機能です。同じ販売代理店の他のエージェントが作成したレコード（ケースなど）の参照権限を付与することに特化した機能ではありません。","代理外部ユーザ機能は、外部ユーザのプロビジョニングやユーザ管理をパートナーや顧客の管理者に委任するためのものであり、他のユーザの取引先データやトランザクションレコード（ケースなど）に対する参照アクセス権を直接付与するものではありません。","正解です。スーパーユーザアクセスを付与すると、そのユーザはロール階層に関係なく、同じ取引先（この場合は販売代理店）に属する他のユーザが所有するケース、商談、取引先責任者などのレコードを参照および編集できるようになります。Customer Community Plusライセンスを持つユーザに対してもこの機能を有効化でき、今回の要件を正確に満たすことができます。"]},
{n:33,t:"Universal Containers (UC) のサービス担当者は、ケースオブジェクトの「すべて表示」権限を持つプロファイルに割り当てられています。取引先とケースオブジェクトの組織の共有設定 (OWD) は非公開です。サービス担当者が顧客からの要望に対応するために、関連するすべての情報 (取引先と取引先責任者) に確実にアクセスできるようにするため、アーキテクトはどの詳細を考慮するべきですか？",c:["取引先のOWDが非公開の場合、サービス担当者は関連する取引先にアクセスできません。","取引先責任者のOWDが親レコードに連動する場合、サービス担当者は関連する取引先責任者にアクセスできません。","取引先責任者のOWDが親レコードに連動する場合、サービス担当者は関連する取引先責任者にアクセスできます。"],a:2,e:["ケースへのアクセス権(「すべて表示」)があるため、組み込みの暗黙的な共有により、親である取引先への参照アクセス権が自動的に付与されます。したがって、組織の共有設定が非公開であっても関連する取引先にアクセスできます。","サービス担当者はケースへのアクセスを通じて親の取引先への暗黙的な参照アクセス権を得ます。取引先責任者のアクセス権が親レコード(取引先)に連動している場合は、その取引先責任者にもアクセスできるようになるため、この記述は誤りです。","正解です。サービス担当者はケースオブジェクトの「すべて表示」権限を持っているため、関連する親取引先に対する暗黙的な参照アクセス権を自動的に獲得します。取引先責任者の組織の共有設定が「親レコードに連動」に設定されている場合、親である取引先へのアクセス権を持つユーザは、それに連動して関連する取引先責任者にもアクセスできるようになります。"]},
{n:34,t:"Universal Containers (UC) の営業業務部門は、特定の地域の商談を絞り込むためのリストビューを作成したいと考えています。50以上のリストビューが存在することになるため、個々のユーザに関連しないリストビューを非表示にするにはどのようにすればよいですか？",c:["適切な個別のユーザとリストビューを共有する。","適切なキューとリストビューを共有する。","適切な公開グループとリストビューを共有する。"],a:2,e:["Salesforceの標準機能では、リストビューの表示設定において、特定の個別のユーザを直接指定して共有することはできません。共有先として選択できるのは、一部のユーザのグループ（公開グループやロールなど）です。","キューはレコード（ケースやリードなど）の所有者として割り当てるための仕組みであり、リストビュー自体の共有先（表示できる対象）としてキューを選択することはできません。","正解です。特定の地域の商談を見る必要があるユーザをまとめた公開グループを作成し、リストビューの共有設定でその公開グループを選択することで、該当するユーザにのみリストビューを表示し、関連のないユーザからは非表示にすることができます。"]},
{n:35,t:"Universal Containersの営業担当者が、参照/更新権限を持つ商談チームに追加されました。彼女は商談においてどのアクションを実行できますか？",c:["商談のフェーズの更新。","商談の所有者の置き換え。","商談チームのメンバーの追加/削除。"],a:0,e:["正解です。商談チームで「参照/更新」権限を付与されたメンバーは、その商談レコードの標準項目やカスタム項目を編集することができます。フェーズの更新は通常のレコード編集操作に含まれるため、実行可能です。","レコードの所有者を変更（移行）できるのは、レコードの所有者本人、ロール階層で所有者より上位のユーザ、または「すべてのデータの編集」などのシステム管理者権限を持つユーザに限られます。商談チームの参照/更新アクセス権だけでは、所有者を変更することはできません。","商談チームのメンバーを管理（追加または削除）できるのは、商談の所有者、ロール階層で所有者より上位のユーザ、または商談に対するフルアクセス権を持つユーザです。商談チームでの参照/更新権限だけでは、他のチームメンバーの追加や削除を行うことはできません。"]},
{n:36,t:"関連のないユーザのグループに一連のレコードへのアクセス権を付与するには、どの機能を使用するべきですか？",c:["ロール階層","共有セット","公開グループ"],a:2,e:["ロール階層は、組織の管理構造における上下関係に基づいてアクセス権を付与する仕組みです。階層に依存しない、関連のないユーザをまとめる目的には使用できません。","共有セットは、主にExperience Cloudサイトのユーザに対して、ユーザの取引先責任者や取引先に関連するレコードへのアクセス権を付与するための機能です。内部ユーザの関連のないグループにアクセス権を付与する機能ではありません。","正解です。公開グループを使用すると、個別のユーザ、特定のロール、またはその他の公開グループを任意に組み合わせて、組織構造に縛られない柔軟なグループを作成できます。作成した公開グループを共有ルールや手動共有の対象として使用することで、一連のレコードへのアクセス権を一括で付与することができます。"]},
{n:37,t:"Universal Containersのユーザは、先週末のデプロイ後に取引先ページから項目が消えたと苦情を述べています。今回のデプロイではページレイアウトは変更されていません。管理者はこの問題をどのようにトラブルシューティングするべきですか？",c:["取引先でフィルタリングして、誰が何を参照できるかレポートを実行する。","ユーザとしてログインし、いくつかの取引先を確認して問題のレコードを特定する。","オブジェクトマネージャで項目アクセス権限を表示する。"],a:2,e:["レポートはレコード全体へのアクセス権を確認するのには役立ちますが、特定の項目の表示や非表示（項目レベルセキュリティなど）を直接トラブルシューティングする機能ではありません。","ユーザとしてログインすることで事象の再現や確認はできますが、なぜその項目が消えたのかという設定の根本原因（項目レベルセキュリティや権限セットの変更など）をシステム全体で効率よく特定するトラブルシューティングの手順としては不十分です。","正解です。ページレイアウトが変更されていないにもかかわらず項目が消えた場合、デプロイによって項目レベルセキュリティ（FLS）が上書きまたは変更された可能性が高いです。オブジェクトマネージャから項目アクセス権限を表示することで、プロファイルごとの項目レベルセキュリティの設定をマトリックス形式で一目で確認し、原因を迅速に特定できます。"]},
{n:38,t:"Universal Containersの営業マネージャーは、説明責任とコラボレーションを確立する簡単な方法を提供するために、チームに各ユーザの取引先でのロールを定義するよう要求しました。営業マネージャーはまた、営業アシスタントが以下の権限のみを取得するように要求しました。1. 取引先への参照アクセス。2. 取引先に関連するケースへの参照アクセス。3. 取引先に関連する商談へのアクセスなし。営業アシスタントは、必要に応じて商談へのアクセス権を付与される場合があります。組織全体の共有モデルが非公開であり、取引先オブジェクトに共有ルールが設定されていないと仮定した場合、アーキテクトはこれらの要件をどのように達成するべきでしょうか？",c:["取引先、および取引先に関連する商談とケースへのアクセス権を定義するには、取引先チームを使用する。","取引先チームとケースチームを使用する。商談オブジェクトへの設定は必要ない。","取引先チームと共有ルールを使用して、ケースを営業アシスタントと共有する。商談オブジェクトへの変更は必要ない。"],a:0,e:["正解です。取引先チームの機能を使用すると、取引先のチームメンバーごとに、その取引先レコードへのアクセス権だけでなく、関連する商談やケースへのアクセスレベル（非公開、参照のみ、参照/更新）を個別に設定できます。これにより、取引先とケースへの参照アクセスを付与しつつ、商談へのアクセスを非公開に設定するという要件を1つの機能でまとめて実現できます。","取引先チームの機能だけで関連するケースへのアクセス権も制御できるため、ケースチームを別途設定する必要はありません。複数の機能を重複して使用することは、管理の複雑化を招くため推奨されません。","共有ルールを使用してケースのアクセス権を付与することは可能ですが、取引先チームの標準機能を使えば、取引先チームメンバーに対して関連するケースのアクセス権を同時に付与できるため、別途共有ルールを作成する必要はありません。"]},
{n:39,t:"カスタムの請求書オブジェクトが作成され、取引先との主従関係が設定されています。売掛金 (AR) チームは請求書レコードへのアクセス権を必要としています。ARユーザは取引先レコードを所有しておらず、アクセス権もありません。取引先の組織の共有設定は非公開に設定されています。ARチームは、リストビュー、レポート、およびグローバル検索で請求書を見つけることができません。アーキテクトはトラブルシューティングの支援を求められました。ARチームメンバーが請求書を表示できない原因は何ですか？",c:["ARプロファイルに請求書オブジェクトへの参照権限がない。","ARチームと取引先を共有するための共有ルールが欠落している。","ARチームと請求書を共有するための共有ルールが欠落している。"],a:1,e:["プロファイルにオブジェクトの参照権限がない場合もレコードは表示されませんが、主従関係においては親レコードのアクセス権が子レコードの表示を制御します。問題文でARユーザが親である取引先へのアクセス権を持たないことが明記されているため、まずは親レコードへのアクセス権の欠落が根本的な原因となります。","正解です。請求書オブジェクトは取引先と主従関係にあるため、親レコード（取引先）へのアクセス権が子レコード（請求書）へのアクセス権を完全に制御します。ARチームは親である取引先レコードへのアクセス権を持たないため、共有ルールなどを使用して取引先へのアクセス権を付与しない限り、請求書レコードを表示することはできません。","請求書は主従関係の従（子）側に設定されているため、請求書オブジェクト自体に直接共有ルールを作成することはシステムの仕様上できません。アクセス権は常に親レコードによって制御されます。"]},
{n:40,t:"Universal Containers (UC) は、出荷情報(カスタムオブジェクト、組織の共有設定は非公開)を表示するために、Apexクラスを使用したカスタムLightningコンポーネントを使用しています。UCの営業マネージャーは、2つの重要な点について苦情を述べています。チームに属する出荷レコードが他のユーザから見えてしまうこと。出荷金額はマネージャーのみが表示できるはずですが、営業担当者が参照できてしまうこと。開発チームが見落としたため、この問題を引き起こしている機能はどれですか？",c:["レコードの表示を確保するために、ApexクラスでisShareableキーワードを使用する。","項目のアクセス権をチェックするために、ApexクラスでisAccessible()メソッドを使用する。","ユーザ権限と項目レベルの権限を適用するために、テストクラスでrunAsを使用する。"],a:1,e:["isShareableというキーワードはApexには存在しません。Apexクラスの実行時にレコードの共有ルール(レコードレベルのアクセス権)を適用して他のユーザに見えないようにするには、クラス定義でwith sharingキーワードを使用する必要があります。","正解です。Apexはデフォルトでシステムモードで実行されるため、ユーザの項目レベルのアクセス権(項目レベルセキュリティ)を無視してデータを取得してしまいます。マネージャーのみが出荷金額を見ることができるようにするには、Apexコード内でisAccessible()メソッドを使用して、現在のユーザがその特定の項目への参照権限を持っているかを確認するコードを実装する必要があります。","テストクラスでのSystem.runAs()は、特定のユーザのコンテキストでテストを実行し、共有や権限が想定通りに動作するかを検証するための機能です。本番環境のLightningコンポーネントが実行される際の実際のアクセス制御を解決する設定やコードではありません。"]},
{n:41,t:"Universal Containersは、サービス担当者に送信されるさまざまなサポートリクエストを追跡するために標準のケースオブジェクトを使用しています。現在、ケースオブジェクトには400以上の項目があります。8種類の異なるケースプロセスが確立されており、それぞれに一意の状況の組み合わせがあります。カスタマーサービス担当ディレクターは、サービス担当者が対応しているケースタイプに固有の必要な情報のみを表示できるようにしたいと考えています。この要件を実装するために推奨されるオプションはどれですか？",c:["ケースタイプごとに関連する項目を表す異なる項目セクションを持つ動的フォームを使用し、ケースのレコードタイプの値によってセクションの表示を制御する。","ケースタイプごとに、関連する項目を表す異なるページレイアウトを使用する。","ケースオブジェクトの参照アクションを上書きするためにカスタムLWCを使用し、ケースタイプごとに関連する項目を定義するためにカスタムメタデータ型を使用する。"],a:0,e:["正解です。動的フォームを使用すると、項目や項目セクションをLightningレコードページ上に直接配置し、レコードの値（この場合はケースのレコードタイプ）に基づいて表示と非表示のルールを設定できます。これにより、400以上の項目を持つ複雑なオブジェクトでも、複数のページレイアウトを保守する手間を省きながら、ケースタイプごとに必要な情報のみを動的に表示することができます。","ページレイアウトとレコードタイプを使用して表示を切り替えることは従来の方法として可能ですが、項目数が多く、ケースプロセスが複数ある場合、多数のページレイアウトを作成および維持管理する必要があり、管理の負担が非常に大きくなります。現在は動的フォームを使用することが推奨されるベストプラクティスです。","カスタムLightning Web Componentを開発すれば要件を満たす高度な制御が可能ですが、標準機能である動的フォームで解決できる要件に対してカスタム開発を導入することは、開発コストと保守の複雑さを不必要に増大させるため推奨されません。"]},
{n:42,t:"コミュニティユーザが商談でコラボレーションできるようにするためには、ユーザにどのライセンスタイプを付与する必要がありますか？",c:["Customer Community Plus","Customer Community","Partner Community"],a:2,e:["Customer Community Plusライセンスは、高度な共有やロール階層、レポートやダッシュボードへのアクセスを提供する強力なライセンスですが、商談やリードなどのCRMオブジェクト（Sales Cloudオブジェクト）へのアクセス権は含まれていません。","Customer Communityライセンスは、大量のユーザを抱えるB2Cポータル向けに設計されており、ケースやナレッジなどの基本的なサポート機能へのアクセスを提供しますが、商談へのアクセス権は提供されません。","正解です。Partner CommunityライセンスはB2Bポータル向けに設計されており、コミュニティユーザがリード、キャンペーン、そして商談などのSales Cloud標準オブジェクトにアクセスしてコラボレーションを行うために必要な唯一のコミュニティライセンスです。"]},
{n:43,t:"Universal Containers (UC) は、Partner Communityライセンスを使用する販売代理店のネットワークを通じて、配送能力を拡大しようとしています。UCの従業員は現在、公開・参照のみの組織の共有設定 (OWD) を通じてすべての配送レコードを表示できます。販売代理店が表示できるレコードを制限するために、アーキテクトが推奨するアプローチはどれですか？",c:["販売代理店にアクセス権を付与するための、所有権に基づく共有ルールを作成する。","販売代理店にアクセス権を付与するための、条件に基づく共有ルールを作成する。","配送オブジェクトの外部組織の共有設定を非公開に設定する。"],a:2,e:["共有ルールはアクセス権を付与（拡張）するための機能であり、アクセス権を制限（縮小）するために使用することはできません。","Aの選択肢と同様に、共有ルールを使用して既存のアクセスレベルを制限し、表示されるレコードを減らすことはシステムの仕様上不可能です。","正解です。Salesforceでは、外部組織の共有設定を使用することで、コミュニティユーザなどの外部ユーザに対するデフォルトのアクセスレベルを、内部従業員とは別に定義できます。内部組織の共有設定を公開・参照のみのまま維持し、外部組織の共有設定を非公開にすることで、内部の可視性に影響を与えずに販売代理店のアクセスのみを適切に制限できます。"]},
{n:44,t:"カスタムのServiceFeedbackオブジェクトは、パートナーのフィードバックを収集するために使用されます。ServiceFeedbackレコードは、すべての内部従業員が利用できる必要があります。パートナーが他のパートナーユーザのフィードバックを参照できないように、外部ユーザの組織の共有設定(OWD)は非公開に設定されています。アーキテクトはすべての内部従業員にどのようにアクセス権を付与するべきですか？",c:["パートナーが所有するすべてのServiceFeedbackレコードに対して、所有者に基づく共有ルールを作成する。","ロール階層で、すべての内部ユーザがパートナーより上位にいることを確認する。","内部ユーザの組織の共有設定を公開・参照のみに設定する。"],a:2,e:["共有ルールを使用して内部ユーザにアクセス権を付与することは技術的に可能ですが、すべての内部従業員に対する基本的なアクセスレベルを定義する場合は、内部組織の共有設定を使用する方がシステム管理上シンプルでありベストプラクティスです。","パートナーロールは通常、そのパートナー取引先を所有する内部ユーザのロールの直下に位置づけられます。すべての内部ユーザをパートナーより上位のロールに配置することは現実的ではなく、組織全体のアクセス権を制御するための適切なアプローチではありません。","正解です。Salesforceでは、内部ユーザと外部ユーザに対して別々の組織の共有設定を適用することができます。外部組織の共有設定を非公開にしてパートナー間のデータ共有を制限しつつ、内部組織の共有設定を公開・参照のみに設定することで、追加の共有ルールを作成することなくすべての内部従業員に効率的にアクセス権を付与できます。"]},
{n:45,t:"Universal Containers (UC) は、支店長とUC支店スタッフが自分たちの地理的場所の顧客と関連情報のみを表示できるように要求しました。この要件を達成するために一緒に使用する必要があるオプションはどれですか？",c:["ロール階層を設定し、共有ルールを作成する。","取引先チームを作成して支店長のチームメンバーを追加し、取引先オブジェクトの組織の共有設定を設定する。","取引先オブジェクトの組織の共有設定を設定し、共有ルールを作成する。"],a:0,e:["正解です。前提として組織の共有設定が非公開である環境において、地理的な場所に基づいてロール階層を構築することで、支店長は自動的に自分の支店スタッフが所有する顧客レコード(取引先)にアクセスできるようになります。さらに、同じ支店内のスタッフ同士で顧客情報を共有する必要がある場合は、共有ルールを作成して水平方向のアクセス権を付与することで、指定された地理的場所の範囲内でのみデータを表示するという要件を効率的に満たすことができます。","取引先チームは、個別の取引先に対して共同で作業を行うメンバーを手動またはデフォルトチーム設定で追加するための機能です。地理的な条件に基づいて、全ユーザのアクセス権を自動かつ大規模に制御するという今回の要件に対しては、設定と保守の負担が大きすぎるため最適な方法ではありません。","組織の共有設定を非公開にすることはアクセス制限の基本ですが、支店長が部下のデータを参照するための垂直方向のアクセス権まで共有ルールだけで実現しようとすると、ルール数が膨大になり管理が複雑になります。垂直方向の共有には標準機能であるロール階層を活用する方がアーキテクチャとして適切です。"]},
{n:46,t:"Universal Containersの営業マネージャーに適切に出荷レコードへのアクセス権を付与するためには、Apexによる管理共有を活用する必要がありました。ITチームはレコードへの不適切なアクセスを懸念しています。このリスクを軽減するためにアーキテクトが推奨すべきことはどれですか？",c:["レコードの表示が確実に従われるように、ApexクラスでisShareableキーワードを使用する。","異なるユーザとプロファイルを使用してテストするために、テストクラスでrunAsシステムメソッドを使用する。","レコードの表示が確実に従われるように、ApexクラスでisAccessibleキーワードを使用する。"],a:1,e:["isShareableというキーワードはApexに存在しません。レコードの共有設定を適用するためにはwith sharingキーワードを使用しますが、これ自体はアクセス権が正しく実装されているかを検証し保証するためのテスト手法ではありません。","正解です。System.runAs()メソッドを使用すると、指定した特定のユーザのコンテキストでテストコードを実行できます。これにより、Apexによる管理共有によって付与されたレコードへのアクセス権が、さまざまなユーザやプロファイルに対して要件通りに正しく機能し、不当なアクセスが制限されているかを網羅的に検証できるため、セキュリティリスクを軽減できます。","isAccessible()メソッドは、現在のユーザが対象の項目を参照できるかどうかの項目レベルのアクセス権(項目レベルセキュリティ)を確認するためのものです。Apex管理共有が制御するレコードレベルのアクセス権の適切な動作をテストし保証するための機能ではありません。"]},
{n:47,t:"Universal Containersの取引先オブジェクトの組織の共有設定モデルは非公開です。ある営業担当者が1つの取引先内で２つの商談を所有しています。営業担当者のプロファイルには、商談レコードへの作成/編集アクセス権があります。この営業担当者は、関連する取引先レコードに対してどのレベルのアクセス権を持ちますか？",c:["参照アクセス権","参照/作成/編集アクセス権","アクセス権なし"],a:0,e:["正解です。Salesforceの組み込み機能である暗黙的な共有により、子レコード（この場合は商談）のアクセス権や所有権を持つユーザは、親レコード（この場合は取引先）に対する参照アクセス権を自動的に獲得します。これにより、営業担当者は自身が所有する商談がどの取引先に関連しているかを確認できるようになります。","子レコードから親レコードへの暗黙的な共有によって付与されるのは参照アクセス権のみです。親レコードである取引先への編集や作成の権限が自動的に付与されることはありません。","営業担当者は子レコードである商談を所有しているため、親の取引先への暗黙的な参照アクセス権が自動的に付与されます。したがって、アクセス権が全くないという状態にはなりません。"]},
{n:48,t:"Universal Containersは、合計で100万人近いユーザを抱える75,000の販売代理店を利用しています。販売代理店は、配送のために自社に割り当てられた成約間近の商談を確認するためにコミュニティを使用する必要があります。販売代理店のニーズを満たすライセンスの推奨事項はどれですか？",c:["Customer Community Plus","Partner Community","Customer Community"],a:1,e:["Customer Community Plusライセンスは、高度な共有機能やレポートへのアクセスなどを提供するライセンスですが、商談やリードなどのCRMオブジェクトへのアクセス権は含まれていません。そのため、商談を確認するという要件を満たすことはできません。","正解です。Partner Communityライセンスは、外部ユーザがリード、キャンペーン、そして商談などのSales Cloud標準オブジェクトにアクセスするために必要なライセンスです。販売代理店が商談レコードを確認する必要がある場合、このライセンスを選択する必要があります。","Customer Communityライセンスは、大量のユーザを抱えるサポートポータルなどに適しており、ケースやナレッジへのアクセスを提供しますが、商談へのアクセス権は含まれていません。"]},
{n:49,t:"Universal Containers (UC) には、200の販売代理店向けのパートナーコミュニティがあります。UCの顧客の取引先には、個々の販売代理店が割り当てられています。カスタムの配送オブジェクトの組織の共有設定は非公開です。ある販売代理店のすべてのユーザに、その特定の販売代理店に割り当てられているすべての顧客の配送レコードへのアクセス権を付与するために、アーキテクトはUCにどのようにアドバイスするべきですか？",c:["販売代理店と一致する配送レコードをロール階層の販売代理店ロールと共有する、条件に基づく共有ルールを作成する。","販売代理店と一致する配送レコードを、その販売代理店のために作成された公開グループのユーザと共有する、条件に基づく共有ルールを作成する。","配送オブジェクトへのアクセス権を付与するために、販売代理店プロファイル用の共有セットを作成する。"],a:2,e:["コミュニティユーザに対して共有ルールを使用することは可能ですが、200の販売代理店ごとに共有ルールを作成して管理するのは、設定のオーバーヘッドが非常に大きく、オブジェクトごとの共有ルールの制限に達する可能性があるため推奨されません。","Aの選択肢と同様に、200の販売代理店それぞれに対して専用の公開グループと条件に基づく共有ルールを作成および維持することは、スケーラビリティに欠け、管理の負担が大きすぎるため最適な方法ではありません。","正解です。共有セットを使用すると、コミュニティユーザのユーザレコード（関連する取引先や取引先責任者など）と対象オブジェクトのレコード間の動的な関係に基づいてアクセス権を付与できます。販売代理店のプロファイルに対して1つの共有セットを設定するだけで、200すべての販売代理店がそれぞれの顧客の配送レコードに適切にアクセスできるようになり、効率的かつスケーラブルに要件を満たすことができます。"]},
{n:50,t:"Universal Containersはデータストレージ用の仮想コンテナの販売に事業を拡大しました。仮想コンテナの作業指示はシステムによってすぐにプロビジョニングされるため、営業担当者が変更することはできません。これらの要件を実装するための最適なアプローチは何ですか？",c:["すべての作業指示へのアクセス権を参照に変更する共有ルールを実装する。","作業指示のレコードタイプ/ページレイアウトの割り当てを参照のみに変更する。","営業担当者プロファイルから作業指示の編集権限を削除する。"],a:2,e:["共有ルールはレコードへのアクセス権を付与または拡張するための機能であり、既存のアクセス権を制限したり、編集権限を参照権限に縮小したりするために使用することはシステムの仕様上できません。","ページレイアウト上で項目を参照のみに設定することは可能ですが、これはユーザインターフェース上の制御に過ぎません。API、データローダ、リストビューの一括編集など、他の経路からのレコードの変更を防ぐことはできないため、セキュリティ対策としては不十分です。","正解です。プロファイルのオブジェクト権限で作業指示オブジェクトの「編集」権限を削除することで、Salesforceのすべてのアクセス経路（画面、API、モバイルアプリなど）において、営業担当者が作業指示レコードを変更できないように完全に制限できます。これがオブジェクトレベルのアクセス制御における最も適切で確実なアプローチです。"]},
{n:51,t:"Universal Containers (UC) は、Partner Communityライセンスを使用する代理店のネットワークを通じて、配送能力を拡大しようとしています。現在、UCの従業員は、公開・参照のみの組織の共有設定 (OWD) を通じてすべての配送レコードを参照できます。代理店が参照できるレコードを制限するために、アーキテクトが推奨すべきアプローチはどれですか？",c:["配送オブジェクトの外部組織の共有設定 (OWD) を非公開に設定する。","代理店にアクセス権を付与するために、条件に基づく共有ルールを作成する。","代理店にアクセス権を付与するために、所有者に基づく共有ルールを作成する。"],a:0,e:["正解です。Salesforceでは、内部ユーザー向けの組織の共有設定とは別に、外部ユーザー（パートナーコミュニティユーザーなど）向けの外部組織の共有設定（External OWD）を設定することができます。外部OWDを非公開に設定することで、内部従業員の公開アクセスを維持したまま、外部ユーザーである代理店のレコードアクセスを制限することが可能になります。","共有ルールは、組織の共有設定（OWD）で制限されたアクセス権を広げる（追加で付与する）ための機能であり、アクセスを制限するために使用することはできません。このケースでは、まず外部OWDでアクセスを制限することが必要です。","条件に基づく共有ルールと同様に、所有者に基づく共有ルールもアクセス権を広げるための機能です。現在の設定からアクセス権を制限する目的には使用できません。"]},
{n:52,t:"Universal Containers (UC) のサービス担当者は、ケースオブジェクトの「すべて表示」権限を持つプロファイルに割り当てられています。取引先とケースオブジェクトの組織の共有設定 (OWD) は「非公開」です。顧客の要望に対応するために、サービス担当者がすべての関連情報 (取引先と取引先責任者) にアクセスできるようにするためには、アーキテクトはどの詳細を考慮するべきでしょうか？",c:["取引先責任者の組織の共有設定 (OWD) が「親レコードに連動」である場合、サービス担当者は関連する取引先責任者にアクセスできる。","取引先責任者の組織の共有設定 (OWD) が「親レコードに連動」である場合、サービス担当者は関連する取引先責任者にアクセスできない。","取引先の組織の共有設定 (OWD) が「非公開」である場合、サービス担当者は関連する取引先にアクセスできない。"],a:0,e:["正解です。プロファイルでケースオブジェクトの「すべて表示」権限を持っているため、担当者はケースの親である取引先に対する暗黙的な参照権限(Implicit Read)を得ます。取引先責任者のOWDが「親レコードに連動」に設定されている場合、取引先の参照権限を持つことで、その取引先に関連する取引先責任者への参照権限も自動的に付与されます。","ケースへのアクセス権を通じて親である取引先への暗黙的な参照権限が与えられるため、OWDが「親レコードに連動」であれば取引先責任者にもアクセス可能となります。したがってアクセスできないとするこの選択肢は誤りです。","組織の共有設定が「非公開」であっても、子レコードであるケースへのアクセス権(「すべて表示」)があることで、Salesforceの組み込みの機能である暗黙的な共有(Implicit Sharing)が働き、関連する親の取引先には参照権限が付与されます。そのためアクセスできないとするこの選択肢は誤りです。"]},
{n:53,t:"Universal Containers (UC)は2000万人以上のメンバー(寄付者)を抱える非営利団体です。UCは地域に基づいてこれらの取引先を寄付担当者に割り当てることを決定しました。結果として、各寄付担当者は50000以上の寄付者を所有することになりました。寄付担当者はシステムパフォーマンスの著しい低下に気付き始めました。この問題の原因は何でしょうか？",c:["Salesforceの共有の再計算が開始されたため。","割り当てられた取引先に対する寄付担当者のアクセス権が間違っているため。","取引先の所有者データスキューの問題があるため。"],a:2,e:["共有の再計算は通常、共有ルールやロール階層などの共有アーキテクチャ全体に影響を与える変更が行われた場合にトリガーされます。大量のレコードを一人のユーザーに割り当てること自体は、パフォーマンス低下の根本原因であるデータスキューを生み出しますが、共有の再計算プロセスそのものがこの持続的なパフォーマンス低下の直接的な理由ではありません。","アクセス権の設定誤りは、ユーザーがレコードを参照または編集できないといったセキュリティや可視性の問題を引き起こしますが、システム全体のパフォーマンス低下を直接的に引き起こす原因にはなりません。","正解です。Salesforceでは、1人のユーザーが同じオブジェクトのレコードを10000件以上所有すると「所有者データスキュー」と呼ばれるアーキテクチャ上の問題が発生します。今回のケースでは各担当者が50000件以上の取引先レコードを所有しているため所有者データスキューが発生しており、これが共有の計算やレコードの更新処理時におけるシステムパフォーマンスの著しい低下の直接的な原因となります。"]},
{n:54,t:"Universal Containersの取引先オブジェクトの組織の共有設定は非公開です。ある営業担当者が、1つの取引先内で２つの商談を所有しています。営業担当者プロファイルには、商談レコードに対する作成/編集アクセス権があります。営業担当者は、関連する取引先レコードに対してどのレベルのアクセス権を持ちますか？",c:["参照アクセス権","アクセス権なし","参照/作成/編集アクセス権"],a:0,e:["正解です。Salesforceの暗黙的な共有（Implicit Sharing）の仕組みにより、子レコード（この場合は商談）の所有者には、その親レコード（取引先）に対する暗黙的な参照アクセス権が自動的に付与されます。そのため、取引先の組織の共有設定が非公開であっても、営業担当者は関連する取引先を参照することができます。","暗黙的な共有の機能によって親である取引先への参照アクセス権が自動的に付与されるため、アクセス権がないとするこの選択肢は誤りです。","暗黙的な共有によって付与されるのは親レコードへの参照アクセス権のみです。親レコードの編集や作成を行うためのアクセス権を得るためには、取引先の所有者になるか、共有ルールやロール階層などによって明示的にアクセス権が付与される必要があります。したがってこの選択肢は誤りです。"]},
{n:55,t:"Universal Containersの営業担当者は、営業プロセスの一環として、電子メールで共有するには大きすぎるサイズのファイルを時々作成します。ユーザーが顧客とファイルを共有できるようにしたいと考えていますが、CISOは、共有されるファイルリンクはすべてパスワードで保護されている必要があると要請しています。これを達成するにはどうすればよいでしょうか？",c:["コンテンツ配信を作成する。作成時に、ユーザーはコンテンツにアクセスするためにパスワードを要求するオプションを選択する。","顧客がファイルにアクセスするためのExperience Cloudサイトを設定し、Chatterを介して顧客とファイルを共有する。顧客はサイトにログインしてコンテンツにアクセスできる。","パスワードで保護されたファイルを顧客に配信するために、AppExchange製品を利用する。"],a:0,e:["正解です。Salesforceのコンテンツ配信（Content Deliveries）機能を使用すると、ファイルをWebリンクに変換して外部のユーザーと共有することができます。このリンクの作成時にパスワード保護や有効期限を設定できるため、セキュリティ要件を満たしつつ大容量のファイルを安全に共有することが可能です。","Experience Cloudサイトを構築して顧客とファイルを共有することもシステム上は可能ですが、単にファイルをパスワード保護して共有したいという要件に対しては、サイトの構築やライセンスの管理は過剰な対応となります。標準機能のコンテンツ配信を使用する方がシンプルで適切です。","AppExchangeのサードパーティ製品を導入して要件を満たすことも可能かもしれませんが、Salesforceには標準機能としてコンテンツ配信が備わっているため、追加のコストや設定の手間をかけて外部製品を利用する必要はありません。"]},
{n:56,t:"Universal ContainersはSales Cloudを導入しています。会計年度の第4四半期には、営業マネージャーが互いに協力して商談を成約させます。彼らは必要に応じて他のチームの営業マネージャーと商談を共有でき、かつ共有された商談が新しい会計年度の開始2週間後に自動的に期限切れになることを要求しました。これらの要件を満たすソリューションの組み合わせはどれですか？",c:["営業マネージャーと商談を共有するためのApex共有を実装し、新会計年度開始2週間後にアクセス権を削除するスケジュール済みApexジョブを作成する。","営業マネージャーと商談を共有するための共有ルールを作成する。","営業マネージャーと商談を手動共有し、2週間後に手動で共有を削除する。"],a:0,e:["正解です。必要に応じて特定のマネージャーに動的にアクセス権を付与するにはApex共有（プログラムによる共有）が適しており、標準の共有機能では対応できない柔軟な共有を実現できます。さらに、新しい会計年度の開始から2週間後に自動的にアクセス権を期限切れにするには、スケジュール済みApexジョブでApex共有により作成された共有レコード（OpportunityShareレコード）を削除する必要があります。この2つを組み合わせることで要件を満たせます。","共有ルールは、条件や所有者に基づいて事前定義されたユーザーグループに自動的にアクセス権を付与する機能です。担当者が「必要に応じて」個別のレコードを柔軟に共有するという要件や、特定の期日（2週間後）に自動的にアクセス権を削除するという動的な制御を行うことはできません。","手動共有で対応することも可能ですが、多数の商談に対して毎回手動でアクセス権を付与・削除する運用は現実的でなくスケーラブルではありません。動的な付与と期限付きの自動削除には、Apex共有とスケジュール済みApexジョブの組み合わせが適しています。"]},
{n:57,t:"Universal Containersのセールスコーチは、レポートフォルダを作成し、他のセールスコーチと共有したいと考えています。これを達成するために必要な2つの権限はどれですか？",c:["公開フォルダのレポートを管理、および私のレポートを編集","レポートフォルダを作成、および公開フォルダのレポートを管理","レポートの作成とカスタマイズ、およびレポートフォルダの作成"],a:2,e:["公開フォルダ内の既存のレポートを管理したり、自身の個人用レポートを編集したりすることはできますが、新しいレポートフォルダを作成する権限が含まれていないため、要件を満たすことができません。","フォルダの作成や公開フォルダの管理は可能ですが、レポート自体を作成およびカスタマイズするための基本的な権限がこの選択肢には含まれていません。","正解です。ユーザーが独自のレポートフォルダを作成し、そのフォルダを他のユーザーと共有するためには「レポートフォルダの作成」権限が必要です。また、共有するためのレポート自体を作成してフォルダに保存するには「レポートの作成とカスタマイズ」権限が必要となるため、これら2つの権限の組み合わせが要件を満たします。"]},
{n:58,t:"Universal Containersのサポート担当者は、過去7日間に作成された自身の未解決のケースをすべて表示するレポートを作成し、そのレポートを「非公開レポート」フォルダに保存しました。誰がそのレポートを表示および実行できますか？",c:["レポートの所有者と「すべてのデータの参照」権限を持つユーザー","レポートの所有者","レポートの所有者と、「私の非公開レポート」フォルダへのアクセス権を付与されたすべてのユーザー"],a:1,e:["「非公開レポート」フォルダに保存されたレポートは、システム管理者や「すべてのデータの参照」権限を持つユーザーであっても参照することはできません。このフォルダ内のレポートは完全に個人のものとして扱われます。","正解です。「非公開レポート」フォルダは、各ユーザーが個人的なレポートを保存するための専用のフォルダです。このフォルダに保存されたレポートは、レポートを作成した所有者のみが参照および実行することができ、他のいかなるユーザーとも共有されません。","「非公開レポート」フォルダは他のユーザーにアクセス権を付与したり、共有したりすることができない特殊なフォルダです。したがって、他のユーザーにアクセス権を付与して共有することはできません。"]},
{n:59,t:"ある銀行会社は、顧客の生年月日項目を銀行担当者が検索できるようにしたいが、編集できるのはカスタマーサポート担当者のみにしたいと考えています。この要件を満たすために推奨されるアプローチはどれですか？",c:["生年月日項目に2つの入力規則を作成し、user.profilenameがカスタマーサポート担当者と一致する場合にのみルールがtrueを返すようにする。","生年月日項目の項目レベルセキュリティを設定し、カスタマーサポート担当者プロファイルには「参照可能」に設定し、銀行担当者プロファイルには生年月日項目を「参照可能」かつ「参照のみ」に設定する。","取引先責任者オブジェクトの検索レイアウトに生年月日項目を追加する。カスタマーサポート担当者に割り当てられたページレイアウトを変更し、生年月日項目を必須として追加する。"],a:1,e:["入力規則はデータの保存時に値が特定の条件を満たしているかを検証してデータ品質を保つための機能であり、項目の検索可否や画面上での参照・編集権限そのものを制御するものではありません。検索を可能にしつつ特定のユーザーの編集を制限するというアクセス制御には適していません。","正解です。項目レベルセキュリティを使用することで、プロファイルごとに特定の項目へのアクセス権限を細かく制御できます。銀行担当者プロファイルに「参照のみ」を付与することで検索と閲覧を許可しつつ編集を防ぎ、カスタマーサポート担当者プロファイルには通常の「参照可能」（編集可能）を付与することで、要件を完全に満たすことができます。","検索レイアウトへの追加は検索結果の表示に役立ちますが、これだけでは銀行担当者の編集権限を制限することはできません。また、ページレイアウトでの設定はユーザーインターフェース上の制御にとどまるため、レポートやAPI経由などでのアクセスや編集を防ぐための根本的なセキュリティ対策にはなりません。項目に対するアクセス制御は項目レベルセキュリティで行う必要があります。"]},
{n:60,t:"Universal Containers (UC) は世界中で事業を展開しており、10か国の100以上の地域にオフィスを構え、データの可視性を制御するための非常に複雑なロール階層を確立しています。新しい会計年度において、UCはロールの再編成と取引先所有者の再割り当てを計画しています。この作業に伴う問題を回避するために、アーキテクトはどの機能を推奨すべきですか？",c:["ディビジョンを使用したデータのパーティション化","スキニーテーブル","共有の再計算の延期"],a:2,e:["ディビジョンは、大量のデータを論理的なパーティションに分割して検索やレポートのパフォーマンスを向上させる機能です。ロール階層の再編成や所有者の変更に伴うアクセス権の再計算処理の負荷や問題を回避するための機能ではありません。","スキニーテーブルは、頻繁に使用される項目を抽出してシステム内部で別テーブルに保持することで、レポートやリストビューなどのデータ抽出パフォーマンスを向上させるために使用されます。共有の再計算によるシステム負荷の問題を解決する機能ではありません。","正解です。共有の再計算の延期機能を使用すると、ロール階層の大幅な変更や共有ルールの更新を複数行う際に、都度発生する自動的な共有再計算を一時停止することができます。すべての変更が完了した後、夜間や週末などのシステム利用率が低い時間帯に手動で一括して再計算を実行できるため、大規模なメンテナンス作業時におけるシステムパフォーマンスの低下やタイムアウトの問題を回避することができます。"]},
{n:61,t:"Universal Containersは、複雑な商談を支援するために特定のセールスエンジニアで構成される公開グループを作成し、さらにこれらの商談へのアクセス権を付与する共有ルールを作成しました。商談の組織の共有設定は非公開です。これらの共有設定の影響は何ですか？",c:["ロール階層におけるセールスエンジニアとそのマネージャーも、これらのレコードにアクセスできるようになる。","公開グループにセールスエンジニアが含まれているマネージャーの部下も、これらのレコードにアクセスできるようになる。","公開グループのセールスエンジニアと同じロール階層にいる他のセールスエンジニアも、これらのレコードにアクセスできるようになる。"],a:0,e:["正解です。共有ルールによって公開グループのメンバー（この場合は特定のセールスエンジニア）にレコードへのアクセス権が付与されると、標準の「階層を使用したアクセス許可」の機能により、ロール階層でそのセールスエンジニアの上位に位置するマネージャーにも同じアクセス権が自動的に付与されます。","ロール階層によるアクセス権の付与は、階層の下から上に向かって（部下からマネージャーへ）行われます。マネージャーがアクセス権を得たからといって、そのマネージャーの他の部下にアクセス権が下方向に共有されることはないため、この選択肢は誤りです。","公開グループに含まれていない他のセールスエンジニアは、たとえ同じロールレベルにいたとしても、共有ルールの対象外であるためアクセス権は付与されません。アクセス権はあくまで公開グループのメンバーと、その上位のロールに限定されます。"]},
{n:62,t:"Universal Containersの営業担当者(John)は、参照のみのアクセス権を持つ取引先レコードの情報を更新したいと考えました。Johnはレコードの所有者(Paul)に編集アクセス権限を要求しました。Paulは手動でJohnとレコードを共有しました。取引先オブジェクトの組織の共有設定が「公開/参照のみ」であると仮定した場合、システムにはどのような影響がありますか？",c:["既存のAccountShareレコードが更新される。Row Causeは「Manual」で、Access Levelは「Read/Write」である。","新しいAccountShareレコードが作成される。Row Causeは「Manual」で、Access Levelは「Read/Write」である。","新しいAccountShareレコードが作成される。Row Causeは「Owner」で、Access Levelは「Full」である。"],a:1,e:["組織の共有設定が「公開/参照のみ」の場合、システムはすべてのユーザーに対して個別の参照用AccountShareレコードを作成しているわけではありません。そのため、手動共有によってアクセス権を拡張する際、既存のレコードを更新するのではなく、新しいレコードを作成する必要があります。","正解です。レコードの所有者が手動で別のユーザーにレコードを共有して編集権限を付与すると、システムはAccountShareオブジェクトに新しいレコードを作成します。このとき、共有の理由を示すRow Causeは手動共有を示す「Manual」となり、アクセスレベルは「Read/Write」となります。","作成されるAccountShareレコードのRow Causeは手動による共有であるため「Manual」になります。「Owner」はレコードの所有者自身にフルアクセス権を付与するための理由であるため、手動共有を受けたJohnに対する理由としては適切ではありません。"]},
{n:63,t:"テストメソッドを記述する際、システムメソッド「runAs()」はどの機能を検証しますか？",c:["ユーザーのレコード共有の適用","ユーザーの項目レベルセキュリティの適用","ユーザーの権限の適用"],a:0,e:["正解です。Apexのテストクラスで「System.runAs()」メソッドを使用すると、指定した特定のユーザーのコンテキストでコードを実行できます。このメソッドの主な目的は、そのユーザーに適用されるレコードレベルのアクセス権（組織の共有設定や共有ルールなどのレコード共有）が正しく機能しているかを検証することです。","「System.runAs()」メソッドは、項目レベルセキュリティをシステム的に強制または検証するものではありません。項目レベルのアクセス権を検証するには、Apexコード内でSchemaクラスのメソッド（isAccessible()やisUpdateable()など）を使用して開発者が明示的にチェックを記述する必要があります。","「System.runAs()」はあくまでレコードの共有（可視性）を適用するためのものであり、プロファイルや権限セットによって制御されるオブジェクトレベルのユーザー権限（作成、参照、編集、削除など）を強制するものではありません。ユーザー権限を検証する場合も同様にSchemaクラスのメソッドを使用する必要があります。"]},
{n:64,t:"Universal Containersの営業マネージャーに配送レコードへのアクセス権を適切に付与するためには、Apex管理共有を活用する必要がありました。ITチームはレコードへの不適切なアクセスを懸念しています。このリスクを軽減するために、アーキテクトは何を推奨すべきですか？",c:["レコードの可視性が確実に守られるようにするために、ApexクラスでisSharesbleキーワードを使用する。","異なるユーザーやプロファイルを使用してテストするために、テストクラスでrunAsシステムメソッドを使用する。","レコードの可視性が確実に守られるようにするために、ApexクラスでisAccessibleキーワードを使用する。"],a:1,e:["SalesforceのApexにはisSharesbleというキーワードやメソッドは存在しません。したがって、このアプローチを使用してレコードの可視性を確保することはできません。","正解です。Apex管理共有など、共有やアクセス制御のカスタムロジックを実装した場合、それが正しく機能しているかを検証することが非常に重要です。テストクラスでSystem.runAs()メソッドを使用することで、特定のユーザーのコンテキストでテストを実行できます。これにより、意図した通りのレコードへのアクセス権やアクセス制限が各ユーザーに適切に適用されているかを確認でき、不適切なアクセスのリスクを軽減することができます。","isAccessible()メソッドは、Schemaクラスで提供されており、実行中のユーザーが特定のオブジェクトや項目に対して参照アクセス権を持っているかを検証するために使用されます。これは項目レベルセキュリティおよびオブジェクトレベルの権限をチェックするものであり、Apex管理共有によって制御されるレコードレベルのアクセス権を検証するための機能ではありません。"]},
{n:65,t:"Universal Containers (UC) には、ビジネスプロセスを適用し、商談を更新するカスタムApexクラスがあります。UCは、特定のユーザーのプロファイルで「参照のみ」の項目レベルセキュリティ権限を持つ項目が、このクラスによって更新されていることに気付きました。アーキテクトはこの問題をどのように解決すべきでしょうか？",c:["クラスにWith Sharingキーワードを追加する。","With Sharingキーワードを使用する内部クラスにコードを配置する。","更新を許可する前に、各項目をテストするためにIsUpdateable() Apexメソッドを使用する。"],a:2,e:["With Sharingキーワードは、実行中のユーザーのレコードに対する共有設定（レコードレベルのアクセス権）を適用するためのものであり、項目レベルセキュリティを強制するものではありません。したがって、このアプローチでは項目レベルの参照のみ制限を適用して更新を防ぐことはできません。","内部クラスにWith Sharingキーワードを使用した場合も、選択肢Aと同様にレコードレベルの共有が適用されるだけであり、項目レベルセキュリティのチェックは行われません。そのため、特定の項目の更新を防ぐ解決策にはなりません。","正解です。Apexはデフォルトでシステムコンテキストで実行されるため、ユーザーのプロファイルに設定された項目レベルセキュリティを無視してレコードを更新してしまいます。これを防ぐためには、更新処理を実行する前にSchemaクラスのIsUpdateable()メソッドを使用して、実行中のユーザーが対象の項目に対して更新権限を持っているかをコード内で明示的に確認するロジックを実装する必要があります。"]},
{n:66,t:"Universal Containers (UC) の営業オペレーション部門は、特定の地域の商談を絞り込むためのリストビューを作成したいと考えています。リストビューの数は50以上になるため、UCは個々のユーザーに関連しないリストビューをどのように隠す必要がありますか？",c:["適切な個別のユーザーとリストビューを共有する。","適切なキューとリストビューを共有する。","適切な公開グループとリストビューを共有する。"],a:2,e:["リストビューの共有設定では、特定の個々のユーザーを直接指定して共有することはSalesforceの標準機能ではできません。ユーザーのまとまりに対して共有を設定する必要があります。","キューはケースやリードなどのレコードをチームで割り当てて管理するための機能であり、リストビューの共有先として指定することはできません。","正解です。カスタムリストビューを作成する際、その表示設定で「特定のユーザーグループに表示」を選択し、公開グループ、ロール、またはロールと下位ロールを指定することができます。地域ごとの公開グループを作成してリストビューを割り当てることで、各ユーザーに関連のないリストビューを画面上から隠すことができます。"]},
{n:67,t:"Universal Containersは、休眠中の取引先をレビューするために、小規模で多様なユーザーグループを選択しました。非公開の共有モデルを前提として、公開グループが作成され、このユーザーグループが利用できるようになりました。休眠中の取引先を公開グループに表示するための共有ルールが作成されました。しかし、これらのユーザーの一部から、公開グループと共有された取引先が一つも見えないとの報告が上がっています。これらのユーザーの根本的な問題は何でしょうか？",c:["ユーザーが取引先オブジェクトへのアクセス権を持たないプロファイルに属している。","これらのユーザーに割り当てられているページレイアウトが、取引先の所有者とは異なっている。","取引先がロール階層で上位のユーザーによって所有されている。"],a:0,e:["正解です。Salesforceのセキュリティモデルでは、プロファイルや権限セットによるオブジェクトレベルのアクセス権が最も基本的な権限となります。共有ルールによってレコードレベルのアクセス権が付与されていても、そもそもプロファイルで対象のオブジェクト（この場合は取引先）に対する「参照」権限が設定されていなければ、ユーザーはそのオブジェクトのレコードを見ることはできません。","ページレイアウトは、レコードを開いた際のインターフェースにおける項目の配置や表示を制御するものであり、レコード自体へのアクセス権や可視性を制限するものではありません。ページレイアウトが異なっていても、アクセス権があればレコードそのものは表示されます。","共有ルールは、ロール階層の上下関係に関わらず、指定された条件に基づいてレコードを共有します。所有者がロール階層の上位にいる場合でも、共有ルールで対象の公開グループに共有されていれば、オブジェクトの参照権限を持つユーザーはレコードを見ることができます。"]},
{n:68,t:"ケースに法務チームの関与が必要な際、ケース所有者はケースの「法務SME」項目に企業内弁護士の1人を追加します。ケースが非公開である状況で、弁護士の支援が必要になった際に特定のケースへのアクセス権を付与するにはどうすればよいでしょうか？",c:["「法務の支援が必要か？」項目にチェックが入っている際、企業法務チームのロールに共有する条件に基づく共有ルールを作成する。","ケーストリガーでApex管理共有を使用して、「法務SME」項目で指定されたユーザーにレコードを共有する。","「法務の支援が必要か？」項目にチェックが入っている際、法務公開グループに共有する条件に基づく共有ルールを作成する。"],a:1,e:["条件に基づく共有ルールを使用すると、特定のロールや公開グループに対してレコードを一括で共有することは可能ですが、ケースごとに「法務SME」項目で指定された個別のユーザーに対して動的に共有することはできません。このアプローチでは、特定の弁護士ではなく、法務チーム全体にケースが共有されてしまいます。","正解です。ケースごとに異なる個別のユーザー（法務SME項目で指定された特定の弁護士）に対して動的にアクセス権を付与する必要がある状況では、標準の共有ルールでは対応できません。このような要件を満たすためには、Apexトリガーを使用してApex管理共有を実装し、指定された特定のユーザーに対して個別の共有レコードを作成する必要があります。","選択肢Aと同様に、条件に基づく共有ルールを使用して公開グループに共有すると、グループ内のすべてのユーザー（法務チーム全体）にアクセス権が付与されてしまいます。特定のケースに対して個別の弁護士にのみアクセス権を付与するという要件を満たすことができません。"]},
{n:69,t:"Universal Containersは、サポート担当者のユーザーエクスペリエンスを向上させるためにLightning Web Components (LWC) を活用することを要請しました。LWCはビューレイヤーとして使用され、Apexクラスはビジネスロジックを持ちます。このソリューションを実装する際、開発チームはどの注意点を考慮するべきでしょうか？",c:["Apexはシステムモードで実行されるため、開発チームはレコードの可視性を適用する必要がある。","データにアクセスするさまざまなユーザーをテストするために、runAsを含むテストクラスを作成する。","項目権限を適用するために、isSharesble、isEditable、およびisCreatableを使用する。"],a:0,e:["正解です。Apexクラスはデフォルトでシステムコンテキスト(システムモード)で実行されるため、ユーザーのレコード共有設定や可視性(組織の共有設定や共有ルールなど)が自動的には適用されません。そのため、LWCから呼び出されるApexクラスで「with sharing」キーワードを使用するなどして、開発者が明示的にレコードの可視性を適用する必要があります。","テストクラスでrunAs()メソッドを使用することは共有やアクセス権のテストにおいて重要でありベストプラクティスですが、LWCとApexを使用してシステムを実装する際に開発チームがまずコード内で直接考慮・適用すべきアーキテクチャ上の主要な注意点(システムモードでの実行に伴うデータの可視性の強制)としては、選択肢Aの方が設計の根本に関わるため、より直接的かつ適切な回答となります。","項目レベルセキュリティやオブジェクト権限を適用するためには、SchemaクラスのisAccessible()、isUpdateable()、isCreateable()などのメソッドを使用する必要があります。isSharesbleやisEditableといったメソッドは標準の機能として存在しないため、この選択肢は誤りです。"]},
{n:70,t:"Universal Containers (UC) の営業幹部は、リスクのある大規模な商談を絞り込むためのリストビューを作成したいと考えています。これらのリストビューは、問題のある商談を成約させることを専門とする特定の幹部のみが利用できるようにする必要があります。この要件を解決するためにUCは何をすべきでしょうか？",c:["ロール階層の適切なロールとリストビューを共有する。","適切な個別のユーザーとリストビューを共有する。","適切な公開グループとリストビューを共有する。"],a:2,e:["リストビューをロール階層を使用して共有することは可能ですが、今回の要件は問題解決を専門とする特定の幹部への共有です。ロールで共有した場合、そのロールに属するすべてのユーザーに表示されてしまうため、特定の専門メンバーのみに限定するという要件には適していません。","Salesforceの標準機能では、リストビューの共有設定において特定の個別のユーザーを直接指名して共有することはできません。リストビューはロールや公開グループなどのグループ単位で共有を設定する必要があります。","正解です。公開グループを作成し、そこに専門とする特定の幹部メンバーを追加することで、柔軟なメンバー構成が可能になります。リストビューの表示設定でその公開グループを指定することで、要件通りに特定の幹部のみがリストビューを利用できるようになります。"]},
{n:71,t:"あるコンサルティング会社は、フィールドコンサルタント向けにSalesforceモバイルアプリケーションを使用しており、フィールドコンサルタントが行った顧客固有のコンサルティングを追跡するためにケースオブジェクトを使用しています。同社には、会社支給のデスクトップで顧客からの電話を受ける多数のカスタマーサービス担当者もおり、顧客の問題や苦情を追跡するためにケースオブジェクトを使用しています。同社は、フィールドコンサルタントが顧客サイトを訪問中にケースレコードを編集している間に、フィールドコンサルタントが撮影した顧客サイトの画像をキャプチャしたいと考えています。ITディレクターは、カスタマイズを最小限に抑え、可能な限りコード成果物の再利用性を促進したいと考えています。サービス担当者がトレーニングを受けたのと同じLightningページを引き続き使用できるようにしながら、画像キャプチャの要件を実装するために、アーキテクトは会社にどのような推奨事項を提示するべきでしょうか？",c:["画像キャプチャ機能を可能にするモバイルビューの「編集」アクションの上書きとしてLightningコンポーネントを使用する。デスクトップユーザーに変更は必要ない。","画像キャプチャ機能を可能にするLightning Experienceの「編集」アクションの上書きとしてLightningコンポーネントを使用する。デバイスのフォームファクタを検出し、ユーザーを上書きされていないデフォルトのビューにリダイレクトする。","「モバイルで編集」という別のボタンを作成し、フィールドコンサルタントが画像を追加できるようにするカスタムLightningコンポーネントを開く。デスクトップユーザーに変更は必要ない。"],a:0,e:["正解です。Salesforceでは、アクションの上書きをフォームファクタ（デスクトップまたはモバイル）ごとに個別に設定することができます。モバイルでのみ「編集」アクションをカスタムLightningコンポーネントで上書きすることで、フィールドコンサルタントの要件を満たしつつ、デスクトップを使用するカスタマーサービス担当者は標準のLightningページをそのまま使用し続けることができます。これにより、影響を最小限に抑えつつカスタマイズ要件を達成できます。","フォームファクタをコード内で検出してリダイレクトするカスタムロジックを実装することは可能ですが、Salesforceの標準機能であるフォームファクタごとのアクション上書きを使用する方がはるかにシンプルで保守性が高くなります。カスタマイズを最小限に抑えるというITディレクターの要件に反するため、このアプローチは推奨されません。","新しいカスタムボタンを作成してページレイアウトに追加することも解決策の1つですが、ユーザーエクスペリエンスの観点からは標準の「編集」アクションをそのまま利用する方が直感的です。また、フォームファクタごとの上書き機能がすでに存在するため、わざわざ別のアクションを作成することは最適なアプローチとは言えません。"]},
{n:72,t:"カスタムServiceFeedbackオブジェクトは、パートナーのフィードバックを収集するために使用されます。ServiceFeedbackレコードは、すべての内部従業員が利用できるようにする必要があります。外部ユーザーの組織の共有設定(OWD)は非公開に設定されているため、パートナーは他のパートナーユーザーからのフィードバックを表示できません。アーキテクトはすべての内部従業員にどのようにアクセス権を付与するべきですか？",c:["パートナーが所有するすべてのServiceFeedbackレコードに対して、所有者に基づく共有ルールを作成する。","すべての内部ユーザーがロール階層でパートナーより上にいることを確認する。","内部ユーザーの組織の共有設定(OWD)を公開/参照のみに設定する。"],a:2,e:["所有者に基づく共有ルールを使用して内部従業員にアクセス権を付与することはシステム上可能ですが、設定や継続的なメンテナンスの手間がかかります。また、内部と外部のアクセス要件が明確に分かれている場合、個別の共有ルールに依存するよりも、標準の外部共有モデル機能を利用する方がベストプラクティスに沿っています。","ロール階層を通じてアクセス権を付与することはできますが、すべての内部ユーザーをパートナーのロール階層の上に配置することは、実際の組織構造や業務プロセスを正しく反映しない不自然な階層設計につながります。アクセス権のためだけに階層を歪めることは推奨されません。","正解です。Salesforceでは、外部共有モデルを有効化することで、オブジェクトに対する内部ユーザー向けと外部ユーザー向けの組織の共有設定を別々に定義することができます。外部向けを非公開に保ったまま、内部向けの設定を公開/参照のみに変更することで、単一の設定変更のみで要件を完全かつシンプルに満たすことができます。"]},
{n:73,t:"Universal Containers (UC) は、Partner Communityライセンスを使用する200の代理店を抱えています。パートナーはお互いのデータを参照できませんが、UCは代理店の特定の個人にデータへのより多くの可視性を与えようとしています。パートナーマネージャーロールのユーザーに、同じ代理店のパートナーユーザーのすべてのケースとコンテナレコードへのアクセス権を付与する、スケーラブルなオプションはどれですか？",c:["所有者に基づく共有ルールを作成する。","個々のパートナーマネージャーユーザーにスーパーユーザー権限を付与する。","共有セットを作成する。"],a:1,e:["所有者に基づく共有ルールを使用すると、特定のグループに属するユーザーが所有するレコードを別のグループのユーザーと共有することができますが、代理店ごとに個別のルールを作成する必要があるため、200もの代理店が存在するこのシナリオでは管理が煩雑になり、スケーラブルな解決策とは言えません。","正解です。パートナーのスーパーユーザーアクセスを有効にすると、指定されたパートナーユーザーは、同じ取引先または自分より下位のロール階層に属する他のユーザーが所有するケース、リード、カスタムオブジェクト、商談にアクセスできるようになります。これにより、個別の共有設定を大量に作成することなく、対象のパートナーマネージャーに必要なアクセス権をスケーラブルに付与することができます。","共有セットは、Customer Communityライセンスなどのロールを持たないポータルユーザーに対して、取引先責任者や取引先などの関連レコードへのアクセス権を付与するために使用されます。Partner Communityライセンスを使用しており、ロール階層がすでに存在するこのシナリオには適していません。"]},
{n:74,t:"関連のないユーザーグループに一連のレコードへのアクセス権を付与するために、どの方法を使用するべきですか？",c:["ロール階層","共有セット","公開グループ"],a:2,e:["ロール階層は、組織の役職や階層構造に基づいて、上位のロールのユーザーが下位のロールのユーザーのレコードにアクセスできるようにする機能です。組織図に沿った権限の付与には適していますが、階層や部署に関係のない、無作為で関連のないユーザーグループにアクセス権を付与する目的には適していません。","共有セットは、ロールを持たないCustomer Communityライセンスなどのポータルユーザーに対して、ユーザープロファイルに関連付けられた取引先や取引先責任者などのレコードへのアクセス権を付与するために使用される機能です。内部の関連のないユーザーグループに対して任意のレコードへのアクセス権を付与するためのものではありません。","正解です。公開グループは、個別のユーザー、特定のロール、他の公開グループなどを自由に組み合わせて作成できる論理的なユーザーのまとまりです。組織の階層や部署といった既存の構造に縛られずに関連のないユーザーを集めることができるため、このグループを共有ルールや手動共有の対象として指定することで、要件を満たすことができます。"]},
{n:75,t:"Universal Containers (UC) は、顧客データのプライバシーを尊重することがUCの基本原則であるため、組織の共有設定をほぼ非公開にしています。UCは商談データへのアクセスを許可するための複雑なプロセスを実装しています。営業レポートチームの少数の主要メンバーは、すべての商談の商談データを常に参照できる必要がありますが、変更はできないようにする必要があります。これらの要件を満たすために、アーキテクトが推奨すべきアプローチはどれですか？",c:["営業レポートプロファイルにすべてのデータの参照権限を付与する。","すべてのデータの参照権限を付与する権限セットを作成する。","商談のすべて表示権限を付与する権限セットを作成する。"],a:2,e:["プロファイルにすべてのデータの参照権限を付与すると、対象のユーザーに商談だけでなく組織内のすべてのオブジェクトのデータへの参照アクセス権を与えてしまいます。これは、データのプライバシーを重視して組織の共有設定を非公開にしているUCの原則に反します。また、少数の特定のメンバーにのみ権限を付与したい場合、プロファイルの変更はプロファイルに割り当てられたすべてのユーザーに影響してしまうため不適切です。","権限セットを使用することは、少数の特定のユーザーにのみ追加の権限を割り当てる手段として適しています。しかし、すべてのデータの参照権限を付与してしまうと、商談以外のすべてのデータへのアクセスも許可することになり、最小権限の原則およびプライバシーを保護するというUCの要件に違反してしまいます。","正解です。権限セットを使用して商談オブジェクトに対するすべて表示権限を付与することで、アクセス範囲を商談データのみに限定しつつ、組織の共有設定に関係なくすべての商談レコードを閲覧できるように設定できます。これを営業レポートチームの主要メンバーにのみ割り当てることで、他のオブジェクトのデータアクセス設定に影響を与えることなく、要件を正確に満たすことができます。"]},
{n:76,t:"Universal Containersは、販売代理店向けにCustomer Community Plusライセンスを使用してカスタマーコミュニティを実装しました。一部の販売代理店から、特定のコミュニティユーザー（エージェント）に、同じ販売代理店の他のエージェントが送信したケースを表示する権限を付与するよう要求がありました。これらの要件のみをサポートする機能はどれですか？",c:["コミュニティ管理者権限を付与する権限セット","代理外部ユーザー","パートナースーパーユーザー"],a:2,e:["コミュニティ管理者権限は、コミュニティの設定やメンバーの管理などを行うための包括的な管理権限です。同じ取引先（販売代理店）内の他のユーザーのケースに対するレコードレベルのデータアクセス権を付与するという要件に対しては、権限が大きすぎるため不適切です。","代理外部ユーザー管理機能は、外部ユーザーのパスワードリセットや新しいユーザーの作成といったユーザー管理タスクを、特定のパートナーまたはカスタマーユーザーに委任するための機能です。レコード（ケース）の参照権限を制御するための機能ではありません。","正解です。スーパーユーザーアクセスを有効にすることで、特定の外部ユーザーに対し、同じ取引先に属する他のユーザーが所有するデータ（ケース、商談など）へのアクセス権を付与することができます。これにより、代理店内の他のエージェントが作成したケースを表示するという要件を正確に満たすことができます。"]},
{n:77,t:"Universal Containers (UC) はコンテナをグローバルに販売する急成長中の企業です。世界中に数千の販売代理店があり、地元のディーラーがコンテナのサービスを提供しています。UCはディーラー向けに新しいパートナーコミュニティを実装しました。各販売代理店には、サービスエージェントを管理するディーラーマネージャーがいます。コミュニティの共有モデルは非公開です。ディーラーマネージャーに、自社のサービスエージェントが提起した顧客ケースへのアクセス権のみを付与するための最適なオプションはどれですか？",c:["ロール階層を使用して、サービスエージェントが提起したケースが関連するディーラーマネージャーに表示されるようにする。","共有ルールを作成して、サービスエージェントが作成したケースをそのディーラーマネージャーと共有する。","共有グループを作成して、サービスエージェントが作成したケースをそのディーラーマネージャーと共有する。"],a:0,e:["正解です。パートナーコミュニティライセンスでは取引先ロール階層がサポートされており、エグゼクティブ、マネージャー、ユーザーなどのロールが活用できます。この標準のロール階層を利用することで、ディーラーマネージャーは自動的に部下であるサービスエージェントが所有するケースレコードにアクセスできるようになるため、数千の代理店がある環境においても最も最適で保守が容易なアプローチとなります。","共有ルールは、ロール階層の例外としてレコードへのアクセス権を横断的に拡張するために使用されます。世界中に数千の販売代理店がある場合、各代理店のマネージャー向けに個別の共有ルールを作成して管理することは運用上の負担が非常に大きく、共有ルールの作成上限数にも抵触する可能性が高いため最適なアプローチではありません。","共有グループは、カスタマーコミュニティライセンスのようにロールを持たない大容量ポータルユーザーが所有するレコードを、他のユーザーと共有するために提供されている機能です。今回のシナリオではパートナーコミュニティが実装されており、標準でロール階層を使用できるため、共有グループを使用する必要はありません。"]},
{n:78,t:"Universal Containersは、販売代理店向けにCustomer Community Plusライセンスを使用してカスタマーコミュニティを実装しました。小売代理店には、複数の代理店で働くパートタイムのエージェントがいます。これらのエージェントは、他の代理店の取引先にもアクセスできる必要があります。エージェントにさまざまな代理店の取引先へのアクセスを許可するには、何を設定する必要がありますか？",c:["取引先と取引先責任者のリレーションを使用して代理店の取引先をエージェントと共有する共有セットを作成する。","Account__Shareテーブルを使用したApex共有を利用して、代理店の取引先をエージェントと共有する。","共有ルールを作成して、代理店の取引先をエージェントと共有する。"],a:0,e:["正解です。取引先と取引先責任者のリレーション機能を使用すると、1人の取引先責任者を複数の取引先に紐づけることができます。そして共有セットを活用することで、このリレーションに基づいて関連する取引先へのアクセス権をコミュニティユーザーに動的に付与できるため、最も効率的で保守性の高い標準機能のアプローチとなります。","Apex共有を使用して要件を満たすことは技術的には可能ですが、カスタムコードの作成と継続的な保守が必要になります。Salesforceのベストプラクティスでは、標準の宣言的機能で対応できる要件に対してカスタム開発を行うことは推奨されていません。","Customer Community Plusライセンスのユーザーに対して共有ルールを使用することは可能ですが、パートタイムのエージェントが紐づく特定の複数の代理店を条件ベースやロールベースで動的に共有することは運用上非常に困難です。設定が複雑になりすぎることや、共有ルールの制限に達するリスクがあるため最適ではありません。"]},
{n:79,t:"Universal Containers (UC) は、出荷情報（カスタムオブジェクト、組織の共有設定は非公開）を表示するために、Apexクラスを備えたカスタムLightningコンポーネントを使用しています。UCの営業マネージャーは、2つの重要な点について不満を述べています。チームに属する出荷レコードが他のユーザーから見えてしまうことと、出荷金額はマネージャーのみに表示されるべきですが、営業担当者も閲覧できてしまうことです。これらの問題を引き起こしている、開発チームが見落とした機能はどれですか？",c:["ApexクラスでisShareableキーワードを使用して、レコードのアクセス権を確保する。","ApexクラスでisAccessible()メソッドを使用して、項目のアクセス権を確認する。","テストクラスでrunAsを使用して、ユーザー権限と項目レベルの権限を適用する。"],a:1,e:["ApexにはisShareableというキーワードは存在しません。レコードレベルのアクセス権（共有ルールなど）を適用するには、Apexクラスの定義でwith sharingキーワードを使用する必要があります。","正解です。Apexはデフォルトでシステムコンテキストで実行されるため、ユーザーの項目レベルセキュリティを無視してすべてのデータを取得してしまいます。営業担当者が権限のない出荷金額項目を見ることができないようにするには、Apexコード内でisAccessible()メソッドを使用して、現在のユーザーがその項目に対する参照権限を持っているかをコード内で確認する処理を実装する必要があります。","System.runAs()はテストクラス内でのみ使用され、特定のユーザーコンテキストでテストを実行して共有ルールなどが正しく機能するかを検証するためのものです。本番環境で実行される実際のコンポーネントやApexクラスのアクセス制御を適用、修正するものではありません。"]},
{n:80,t:"Dreamforceのプレゼンターは、Salesforceの非公開カスタムオブジェクト（プレゼンテーション）上にある自分のプレゼンテーションの詳細（概要、プレゼンターの略歴など）を編集できる必要があります。あるプレゼンテーションのすべてのプレゼンターは、プレゼンテーションとユーザーの間にあるプレゼンターという連結オブジェクトに記録されます。これを実現するにはどうすればよいですか？",c:["レコードのプレゼンターに付与される権限セットを介して、プレゼンテーションレコードへの編集権限を付与する。","プレゼンテーションレコードの営業チームにユーザーを追加する、プレゼンター連結オブジェクトのトリガーを使用する。","Apex管理共有を使用して、関連するプレゼンテーションレコードへのアクセス権を追加または削除する、プレゼンター連結オブジェクトのトリガーを使用する。"],a:2,e:["権限セットはオブジェクトレベルや項目レベルのセキュリティをユーザーに付与するためのものであり、特定の単一レコードに対するアクセス権（レコードレベルのアクセス権）を動的に付与するものではありません。したがって、自分が担当するプレゼンテーションレコードのみを編集可能にするという要件には適していません。","営業チーム（商談チーム）機能は、標準オブジェクトである商談に対してのみ利用可能な機能です。カスタムオブジェクトであるプレゼンテーションに対してこの標準のチーム機能を使用してアクセス権を付与することはできないため、不適切です。","正解です。カスタムの連結オブジェクトを介して動的にレコードレベルのアクセス権を付与・削除する必要がある場合、宣言的（標準）な共有機能では要件を満たすことが難しいため、Apex管理共有（Apex Managed Sharing）を使用するのが最適です。連結オブジェクトのトリガー内でApexを実行し、条件に基づいて対象となるプレゼンテーションレコードのShareオブジェクトにプログラムでレコードを挿入・削除することで要件を実現できます。"]},
{n:81,t:"Universal Containers (UC) は、システムに入力される重複したリードの量を減らしたいと考えています。UCはまた、リードがリードの所有者によってのみ編集および再割り当てされるようにしたいとも考えています。これらの要件を満たすために、推奨すべき組織の共有設定 (OWD) のアプローチはどれですか？",c:["リードの組織の共有設定を公開/参照のみ・移行に設定する。","リードの組織の共有設定を公開/参照のみに設定する。","リードの組織の共有設定を非公開に設定する。"],a:2,e:["そもそもリードの組織の共有設定には公開/参照のみ・移行という選択肢は存在しません。公開/参照・更新・移行などの設定を使用すると、所有者以外のユーザーもリードの編集や移行（再割り当て）ができてしまうため、所有者のみが編集および再割り当てを行うという要件を満たしません。","組織の共有設定を公開/参照のみに設定すると、すべてのユーザーが他のユーザーのリードを参照できるようになるため、ユーザーが手動で検索して重複を確認することは可能になります。しかし、所有者以外にもすべてのリードデータへの参照権限を広く与えてしまうことになります。","正解です。組織の共有設定を非公開にすることで、リードの編集や再割り当ての権限を所有者（およびロール階層の上位ユーザー）のみに厳格に制限するという要件を満たすことができます。重複リードの削減については、Salesforceの重複ルールの設定で共有ルールの適用をスキップするように構成することで、ユーザーがアクセス権を持たない非公開のリードデータに対してもシステムが重複を検知し、ユーザーに警告やブロックを行うことができるため、セキュリティを保ちながら両方の要件を最適に満たすことができます。"]},
{n:82,t:"アーキテクトは、顧客の社会保障番号を使用して、条件に基づく共有ルールを作成するという要件を持っています。しかし、取引先責任者の共有でルールを設定する際、その項目が使用可能な項目のリストに表示されません。この問題の原因は何ですか？",c:["項目が暗号化されるように設定されている。","アーキテクトのプロファイルに、この項目に対する項目レベルセキュリティがない。","アーキテクトにコンプライアンス項目に対する権限がない。"],a:0,e:["正解です。SalesforceのShield Platform Encryptionなどで暗号化されている特定の項目は、条件に基づく共有ルールの検索条件として使用することができません。そのため、共有ルールの設定画面で使用可能な項目のドロップダウンリストには表示されなくなります。","共有ルールなどのシステム管理設定を行う際、設定を行う管理者（アーキテクトなど）自身のプロファイルにおける項目レベルセキュリティ（参照権限）は、設定画面での項目の表示可否には影響しません。管理者は項目レベルセキュリティの制限に関わらず、システム設定のために項目を選択できます。","Salesforceの標準機能として、コンプライアンス項目に対する権限という特定のシステム権限によって、共有ルール設定画面の項目リストの表示が制御されることはありません。データ分類メタデータを使用してコンプライアンスの分類を記録することはできますが、これは共有ルールの項目選択の可視性には影響しません。"]},
{n:83,t:"Universal Containers (UC) はカスタムの請求書オブジェクトを作成しました。UCの標準営業ユーザーは検索レイアウトでレコードを表示できますが、クリックして詳細を表示すると、レコード名、作成日、最終更新日のみが表示されます。システム管理者がアクセスすると、より多くのデータ項目が含まれるレコードの詳細全体が表示されます。この問題の考えられる原因は何ですか？",c:["ロールベースの共有ルールが欠落しているため、項目へのアクセス権を付与するために営業ユーザーのロールに追加する必要がある。","営業ユーザープロファイルに残りの項目へのアクセス権がない。","営業ユーザープロファイルに割り当てられたページレイアウトに、項目への参照のみアクセス権しかない。"],a:1,e:["共有ルールはレコードレベルのアクセス権を拡張するものであり、レコード内の特定の項目に対するアクセス権を制御するものではありません。ユーザーはすでに検索結果からレコード自体にアクセスして名前などを表示できているため、レコードアクセスではなく項目へのアクセス制限が原因です。","正解です。特定の項目がシステム管理者には表示され、他の特定のユーザーに表示されない場合、最も可能性が高い原因はプロファイルの項目レベルセキュリティの設定です。営業ユーザーのプロファイルにおいて、該当する残りの項目に対する参照権限が付与されていないため、詳細ページで非表示になっています。","ページレイアウトで項目が参照のみに設定されている場合、その項目は画面上に表示されますが編集ができなくなります。問題文では項目自体が表示されていない状態であるため、ページレイアウトの参照のみ設定が原因ではありません。"]},
{n:84,t:"Universal Containers (UC) は、複数の注文に関する法的紛争に巻き込まれています。UCは、これらのレコードがシステムから削除されていることに気付きました。営業担当副社長は、将来このようなことが起きないようにすることを求めています。この要件を満たすアプローチはどれですか？",c:["注文のレコードタイプ/ページレイアウトの割り当てを参照のみに変更する。","注文のページレイアウトから削除ボタンを削除する。","プロファイルと権限セットから注文の削除権限を削除する。"],a:2,e:["ページレイアウトを介して項目を参照のみに設定することでユーザーインターフェース上での編集を制限することはできますが、レコード自体の削除権限を剥奪するものではありません。また、API経由での削除を防ぐこともできず、必要な編集作業まで妨げてしまうため不適切です。","ページレイアウトから削除ボタンを取り除くと、ユーザーインターフェースの詳細ページから削除アクションを実行することはできなくなります。しかし、リストビューやAPI、データローダなど、他の方法を介した削除を防ぐことはできないため、システムからの削除を完全に防ぐという要件を満たしません。","正解です。プロファイルや権限セットを用いたオブジェクトレベルのセキュリティで削除権限を削除することで、ユーザーインターフェース、API、リストビューなど、どの経路からのアクセスであってもユーザーがレコードを削除することをシステムレベルで完全に防ぐことができます。"]},
{n:85,t:"Universal Containers (UC) には、UCの現地オフィスがない国でコンテナを販売する関連会社があります。UCはパートナーコミュニティを使用して、これらの国での販売サイクルを管理しています。その関連会社の1つが大幅に成長し、社内の営業チームを次のような構造に再編しました。営業担当副社長 → 営業ディレクター → 営業マネージャー → 営業担当者。営業担当者は互いの商談を見ることができず、取引の可視性は営業担当者の階層内で広がる必要があります。この状況でアーキテクトが対処すべき主な問題は何ですか？",c:["チャネルマネージャーロールはパートナーコミュニティと共有できない。","パートナーユーザーロールは3つのレベルに制限されている。","パートナーコミュニティはロール階層をサポートしていない。"],a:1,e:["チャネルマネージャーは内部ユーザーのロールであり、パートナーコミュニティのロール階層の親として機能します。今回のシナリオで提示されている問題は、パートナー取引先内の階層の深さに関するものであり、内部のチャネルマネージャーのロールに関するものではありません。","正解です。Salesforceのパートナーコミュニティで各パートナー取引先に対して作成できるロール階層は、最大で３つのレベル（エグゼクティブ、マネージャー、ユーザーなど）に制限されています。要件にある営業担当副社長、営業ディレクター、営業マネージャー、営業担当者という4つのレベルを持つ構造をそのまま標準のパートナーロール階層で表現することはできないため、これがアーキテクトが直面する主な制限であり対処すべき問題となります。","パートナーコミュニティライセンスは、標準機能としてロール階層をサポートしています。ロール階層自体をまったくサポートしていないわけではなく、作成できる階層の深さに制限があることが問題です。"]},
{n:86,t:"組織の共有設定が非公開であるオブジェクトのレコードのChatterフィードに、ユーザーがファイルを投稿します。デフォルトでファイルを閲覧できるのは誰かを正確に説明している文はどれですか？",c:["ファイルを投稿したユーザー、およびファイルのChatter投稿リンクを共有されたユーザー","ファイルを投稿したユーザーのみ","ファイルを投稿したユーザー、およびレコードへのアクセス権を持つユーザー"],a:2,e:["Chatter投稿のリンクを共有されたとしても、親レコード自体へのアクセス権がないユーザーは、非公開オブジェクトのレコードに添付されたファイルを閲覧することはできません。ファイルのアクセス権は、デフォルトで添付先のレコードのアクセス権に依存します。","ファイルを投稿したユーザー（所有者）は当然閲覧可能ですが、そのファイルが関連付けられているレコードへのアクセス権を持つ他のユーザーも閲覧することができます。したがって、投稿したユーザーのみに限定されるという説明は不正確です。","正解です。Salesforceでは、レコードのChatterフィードに投稿されたファイル（またはレコードに関連付けられたファイル）の共有設定は、デフォルトでレコードのアクセス権を継承するように設定されます。そのため、組織の共有設定が非公開であっても、その親レコードに対する参照アクセス権を持つユーザーであれば、そのファイルを閲覧することができます。"]},
{n:87,t:"Universal Containersはデータストレージ用の仮想コンテナの販売に事業を拡大しました。仮想コンテナの作業指示書はシステムによって即座にプロビジョニングされるため、営業担当者が変更することはできません。これらの要件を実装するための最適なアプローチは何ですか？",c:["すべての作業指示書へのアクセスを参照に変更する共有ルールを実装する。","作業指示書のレコードタイプ/ページレイアウトの割り当てを参照のみに変更する。","営業担当者プロファイルから作業指示書の編集権限を削除する。"],a:2,e:["共有ルールは、特定のユーザーグループに対してレコードへのアクセス権（参照または参照・更新）を拡張して追加付与するための機能です。既存のアクセス権を制限したり、すでに持っている編集権限を参照権限に引き下げたりするために使用することはできないため不適切です。","ページレイアウトを使用してすべての項目を参照のみに設定することは可能ですが、これは画面（ユーザーインターフェース）上での見え方を制御しているに過ぎません。APIやリストビュー、その他のツールを経由したアクセスが行われた場合、レコードの編集を防ぐことはできないため、確実なアクセス制御のアプローチではありません。","正解です。プロファイルでオブジェクトに対する編集権限を直接削除することで、画面やAPIなどすべてのアクセス経路において、システムレベルで対象ユーザーによるレコードの変更を完全に防ぐことができます。これが最も確実で最適なアプローチです。"]},
{n:88,t:"Universal Containersの営業マネージャーは、説明責任とコラボレーションを確立する簡単な方法を提供するために、取引先に対する各ユーザーの役割を定義するようチームに要求しました。営業マネージャーはまた、営業担当者に以下の権限のみを付与するよう要求しました。1. 取引先への参照アクセス権。2. 取引先に関連するケースへの参照アクセス権。3. 取引先に関連する商談へのアクセス権なし。営業担当者には、必要に応じて商談へのアクセス権が付与される場合があります。組織全体の組織の共有設定が非公開であり、取引先オブジェクトに共有ルールが設定されていないと仮定した場合、アーキテクトはこれらの要件をどのように達成すべきですか？",c:["取引先チームを使用して、取引先、および取引先に関連する商談やケースへのアクセスを定義する。","取引先チームとケースチームを使用する。商談オブジェクトに対する設定は不要である。","取引先チームと共有ルールを使用して、ケースを営業担当者と共有する。商談オブジェクトに対する変更は不要である。"],a:0,e:["正解です。取引先チームは、チームメンバーに対して取引先自体のアクセス権を付与するだけでなく、その取引先に関連する取引先責任者、商談、ケースに対する個別のアクセスレベルも同時に設定できる標準機能です。これにより、取引先とケースは参照のみ、商談は非公開としてメンバーを追加し、後で商談のアクセス権が必要になった際にチームメンバーの設定を更新することで、すべての要件を1つの機能で柔軟に満たすことができます。","取引先チームを使用するだけで、関連するケースへのアクセス権を個別に制御できるため、ケースチームを別途使用する必要はありません。無駄な設定が増えることになります。","共有ルールは、特定の条件や所有者に基づいてレコードのアクセス権を横断的かつ自動的に付与するために使用されます。今回のように特定の取引先ごとに各ユーザーの役割を定義し、個別にケースへのアクセス権を付与するという要件に対しては、共有ルールは適していません。取引先チームの標準機能でケースのアクセスレベルも制御するのが最適です。"]},
{n:89,t:"Universal Containers (UC) は、学生や企業にトレーニングやコースを提供しています。UCは学生向けにSalesforceカスタマーコミュニティを実装しており、Customer Communityライセンスを付与しています。コミュニティの要件の一部として、UCはコミュニティ内の自身の取引先に関連するケースへのアクセス権を学生に付与するよう求めました。これらの要件を達成するための最適な共有手法は何ですか？",c:["Apex共有を使用してケースを学生と共有する。","共有ルールを作成してケースを学生と共有する。","共有セットを作成してケースを学生と共有する。"],a:2,e:["Apex共有などのプログラムによるカスタム開発は、より複雑な共有要件を満たすために使用されます。今回のような、コミュニティユーザーに自身の取引先に関連するレコードを共有するという標準的で一般的な要件に対しては、宣言的な標準機能を使用する方が最適であり、今後の保守性も高くなります。","Customer Communityライセンスを持つユーザーはロールを持たず、ロール階層に参加しない大容量ポータルユーザーであるため、条件に基づく共有ルールや所有権に基づく共有ルールを使用してレコードを共有することはできません。共有ルールを使用するには、ロール階層をサポートするCustomer Community Plus以上のライセンスが必要になります。","正解です。共有セットは、ロールを持たないCustomer Communityライセンスなどの大容量ユーザーに対して、ユーザーの取引先責任者または取引先に関連付けられたレコード（このシナリオでは取引先に関連するケース）へのアクセス権を付与するために提供されている専用の標準機能です。これが最も最適で推奨されるアプローチとなります。"]},
{n:90,t:"Universal Containers (UC) は、すべての従業員の社内ネットプロモータースコア (NPS) を追跡するためのカスタムオブジェクトを持っています。マネージャーは所有者の上のロールに属しており、オブジェクトに共有ルールはありません。UCは、NPSレコードが所有者のマネージャーからアクセスできないことをどのようにして確実にすべきですか？",c:["マネージャーのプロファイルと権限セットから、作成、参照、編集、および削除を削除する。","Apex共有を使用して、マネージャープロファイルのNPSオブジェクト共有レコードを削除する。","NPSオブジェクトの組織の共有設定を非公開に設定し、階層を使用したアクセス権の付与オプションのチェックを外す。"],a:2,e:["プロファイルや権限セットからオブジェクトレベルのアクセス権を削除してしまうと、マネージャーは自分が所有する自分自身のNPSレコードを含め、NPSオブジェクト全体に一切アクセスできなくなってしまいます。部下のレコードへのアクセスのみを制限するという要件を満たさないため不適切です。","ロール階層によって付与される上位ロールへのレコードアクセス権は、Salesforceのプラットフォームレベルでシステムによって動的に計算されて付与されます。Apex共有を使用してプログラムで共有テーブル（Shareオブジェクト）のレコードを操作し、プロファイルやロール階層に基づく標準のアクセス権を削除することはできないため不適切です。","正解です。標準オブジェクトではロール階層によるアクセス権の付与が常に有効ですが、カスタムオブジェクトの場合は組織の共有設定の設定画面で「階層を使用したアクセス権の付与」オプションのチェックを外して無効化することができます。組織の共有設定を非公開にした上でこの設定を無効化することで、ロール階層で上位に位置するマネージャーであっても、部下の所有するレコードに対するアクセス権が自動的に付与されることを確実に防ぐことができます。"]},
{n:91,t:"Universal Containers (UC) は世界中で事業を展開しており、10か国100以上の地域にオフィスを構え、データの可視性を制御するために非常に複雑なロール階層を確立しています。新しい会計年度において、UCはロールの再編と取引先所有者の再割り当てを計画しています。この作業に伴う問題を回避するために、アーキテクトが推奨すべき機能はどれですか？",c:["ディビジョンを使用してデータを分割する","共有ルールの並行再計算","スキニーテーブル"],a:1,e:["ディビジョンは、極めて大量のデータを持つ組織において、検索、レポート、リストビューのパフォーマンスを向上させるためにデータを論理的に分割する古い機能です。ロール階層の変更や所有者の再割り当てに伴う共有計算のパフォーマンスやロックの問題を解決する機能ではありません。","正解です。複雑なロール階層の大規模な再編や取引先所有者の大幅な変更を行うと、システムは関連するすべてのレコードの共有アクセス権を再計算する必要があるため、タイムアウトや行ロックなどのパフォーマンス問題が発生する可能性があります。共有ルールの並行再計算機能を使用すると、これらの計算プロセスがバックグラウンドで非同期かつ複数のスレッドで並行して実行されるため、大規模な共有の変更をより迅速に処理し、システムの問題を回避することができます。","スキニーテーブルは、频繁に使用される項目を標準テーブルとカスタムテーブルから抽出して結合を省いた1つのテーブルにまとめることで、大規模なデータセットに対するレポートやSOQLクエリのパフォーマンスを劇的に向上させる機能です。データのアクセス権や共有ルールの計算プロセスには関与しないため、このシナリオには適していません。"]},
{n:92,t:"関連のないユーザーのグループにアクセス権を付与するために使用すべき方法はどれですか？",c:["共有セット","公開グループ","ロール階層"],a:1,e:["共有セットは、カスタマーコミュニティライセンスなどのロールを持たないユーザーに対して、ユーザーの取引先責任者または取引先に関連付けられたレコードへのアクセス権を付与するために使用される機能です。関連のないユーザーを論理的にまとめるための機能ではありません。","正解です。公開グループは、個別のユーザー、特定のロール、ロールとその下位ロール、または他の公開グループなど、組織内のあらゆる種類のユーザーを任意に組み合わせて作成できる管理機能です。これにより、ロール階層や組織図に依存しない、関連のないユーザーの集合を作成し、共有ルールなどでレコードのアクセス権を一括で付与するための最適な方法となります。","ロール階層は、組織の階層構造に基づいて、レコードの所有者よりも上位のロールに属するユーザーへ自動的にアクセス権を付与するデータ共有の基盤です。階層という垂直的な構造に依存しているため、組織図のさまざまな場所に散らばっている関連のないユーザーをグループ化してアクセス権を付与する目的には適していません。"]},
{n:93,t:"ユーザーがファイルホームの非公開ライブラリにアップロードしたPDFを閲覧できるのは誰ですか？",c:["そのユーザーと、ロール階層でそのユーザーの上位にいるユーザー","そのユーザーと、「すべてのデータの参照」権限を持つユーザー","そのユーザーのみ"],a:2,e:["ロール階層はオブジェクトレコードへのアクセス権を上位のロールに拡張するために使用されますが、ユーザーが個人的にアップロードして明示的に共有していないファイル（非公開ファイル）に対しては、ロール階層を通じたアクセス権の付与は適用されません。","「すべてのデータの参照」権限は組織内の標準およびカスタムオブジェクトのデータに対する幅広いアクセスを許可する強力な権限ですが、ユーザーが個人用に保持している完全な非公開ファイルに対しては、システム管理者やこの権限を持つユーザーであってもデフォルトでは閲覧することができません。","正解です。Salesforceのファイルホームにファイルをアップロードし、特定のレコード、ユーザー、またはグループと共有する前の初期状態では、そのファイルは完全に非公開となります。この非公開ファイルは、アップロードした所有者自身（そのユーザー）のみが閲覧および管理することができます。"]},
{n:94,t:"カスタマーサポートエージェントとの悪い対応に関する顧客からの苦情は、ケースとして記録され、人事担当者に割り当てられます。苦情の対象となったエージェントはそのケースを見ることができないようにする必要がありますが、そのマネージャーは見ることができるようにする必要があります。これはどのように達成されますか？",c:["ケースのトリガーを使用して、Apex管理共有を使用して割り当てられたエージェントカスタム項目（苦情の対象）のマネージャーを検索し、共有する。","割り当てられたエージェント（苦情の対象）というカスタム項目が空白でない場合に、ロールマネージャー以上に共有する、ケースの条件に基づく共有ルール。","ケースは苦情の対象者によって所有されるため、ロール階層内のマネージャーはそのレコードにアクセスできる。エージェントがケースレコードを読み取れないように、ケースのCRED権限を削除する。"],a:0,e:["正解です。標準の宣言的な機能では、レコードに関連付けられた特定のユーザー（この場合は苦情の対象となったエージェント）のマネージャーのみを特定して、動的にレコードを共有することは困難です。Apexトリガーを使用して対象エージェントのマネージャーを検索し、Apex管理共有によって対象のマネージャーにのみケースのアクセス権をプログラムで付与するのが最適かつ確実な方法です。","条件に基づく共有ルールは、特定の条件を満たすレコードを、あらかじめ指定した公開グループやロールに対して一括で共有するものです。レコードごとに動的に異なる「対象エージェントのマネージャー」を特定して個別に共有するという要件を、標準の共有ルールで実現することはできません。","プロファイルからケースのオブジェクト権限（作成・参照・編集・削除）を削除してしまうと、そのエージェントは自分が所有するレコードを含め、すべてのケースレコードに一切アクセスできなくなります。日常業務で対応すべき他のケースも処理できなくなるため、アプローチとして不適切です。また、そもそも人事担当者にケースが割り当てられるという要件にも反しています。"]},
{n:95,t:"Universal Containersの取引先オブジェクトの組織の共有設定モデルは非公開です。営業担当者は、1つの取引先で2つの商談を所有しています。営業担当者プロファイルには、商談レコードに対する作成/編集アクセス権があります。営業担当者は関連する取引先レコードに対してどのレベルのアクセス権を持つことになりますか？",c:["参照アクセス権","参照/作成/編集アクセス権","アクセス権なし"],a:0,e:["正解です。Salesforceの暗黙的な共有の仕組みにより、ユーザーが取引先に関連する子レコード（商談、ケース、取引先責任者など）を所有している場合、その親である取引先レコードに対する参照アクセス権が自動的に付与されます。組織の共有設定が非公開であっても、この暗黙的な親共有によって取引先を参照することができます。","商談の所有者であるという理由だけで、親の取引先に対する作成権限や編集権限が自動的に付与されることはありません。取引先の編集権限を得るには、取引先の所有者であるか、ロール階層、共有ルール、取引先チームなどの他の機能によって明示的に編集アクセス権が付与される必要があります。","取引先の組織の共有設定が非公開であるため、一見するとアクセスできないように思えるかもしれません。しかし、子レコードである商談の所有権による暗黙的な共有機能が動作するため、親取引先への参照アクセス権はシステムによって保証されます。したがって、アクセス権なしという状態にはなりません。"]},
{n:96,t:"Salesforceが大規模なロール階層の再編のために有効化すべき高度なツールはどれですか？",c:["きめ細かいロック","スキニーテーブルのインデックス作成","ディビジョンによるパーティショニング"],a:0,e:["正解です。大規模なロール階層の変更や公開グループの更新を行う際、Salesforceは通常、データの不整合を防ぐためにグループメンバーシップテーブル全体をロックします。きめ細かいロック（Granular Locking）機能をSalesforceサポートに依頼して有効化することで、システムは更新されている特定のグループやロールのテーブル部分のみをロックするようになり、並列処理が可能になるため、大規模な再編時の「行をロックできません」というエラーやタイムアウトを回避できます。","スキニーテーブルは、频繁に使用される項目を標準テーブルとカスタムテーブルから抽出して結合を省いた1つのテーブルにまとめることで、大規模なデータセットに対するレポートやSOQLクエリのパフォーマンスを向上させる機能です。ロール階層の再編やデータアクセス権の共有計算プロセスとは無関係です。","ディビジョンは、極めて大量のデータを持つ組織において、検索、レポート、リストビューのパフォーマンスを向上させるためにデータを論理的に分割する古い機能です。ロール階層の変更に伴うシステムロックや再計算の問題を解決するツールではありません。"]},
{n:97,t:"Universal Containersは、少数の営業担当者に新しいアプリケーションを試験導入することを計画しています。それらの営業担当者のみに新しい機能へのアクセス権を付与し、同時に従来の機能を非表示にする最適な方法は何ですか？",c:["営業担当者プロファイルをコピーし、設定を調整して、パイロットユーザーに新しいプロファイルを割り当てる。","営業担当者プロファイルで従来の機能へのアクセスを取り消し、新しい機能のための権限セットを作成する。","新しい機能へのアクセスを許可し、古い機能を非表示にする権限セットを作成する。"],a:0,e:["正解です。プロファイルをコピーしてパイロットユーザー専用の新しいプロファイルを作成することで、特定の少数のユーザーグループに対してのみ、従来の機能へのアクセス権を削除して非表示にしつつ、新しい機能へのアクセス権を追加することができます。これにより、他のユーザーに影響を与えることなくアクセス権の付与と制限の両方を適切に制御できます。","既存の営業担当者プロファイル自体の設定を変更して従来の機能へのアクセスを取り消すと、パイロットに参加していない他のすべての営業担当者からも従来の機能が非表示になってしまい、大多数のユーザーの通常業務に支障をきたすため不適切です。","権限セットはベースとなるプロファイルの権限に加えて、ユーザーにアクセス権を追加で付与するためにのみ使用されるものであり、アクセス権を制限したり既存の機能を非表示にしたりすることはできません。したがって、古い機能を非表示にするという要件を権限セット単体で満たすことは不可能です。"]},
{n:98,t:"コミュニティユーザーが商談でコラボレーションできるようにするためには、ユーザーにどのライセンスタイプを付与する必要がありますか？",c:["Customer Community Plus","Customer Community","Partner Community"],a:2,e:["Customer Community Plusライセンスは、ロール階層や共有ルールなどの高度な共有機能をサポートするB2C向けのライセンスですが、リードや商談などの標準的な営業関連オブジェクトへのアクセス権は付与されません。そのため、商談でのコラボレーションには使用できません。","Customer Communityライセンスは、大量のポータルユーザーを想定した基本的なB2C向けライセンスです。ケースやナレッジ記事へのアクセスは可能ですが、商談オブジェクトへのアクセス権は含まれていないため、この要件を満たすことはできません。","正解です。Partner Communityライセンスは、販売代理店などのB2Bパートナー向けに特別に設計されており、Salesforceの標準営業オブジェクトであるリードや商談、キャンペーンなどへのアクセス権を提供します。コミュニティ内で商談を共有しコラボレーションを行うには、このライセンスタイプが必須となります。"]},
{n:99,t:"以前のプロジェクトのアーキテクトが、ある企業にPlatform Shield Encryptionを実装しました。しかし、最近の監査に基づいて、その企業のプライバシーチームは、安全に保護する必要がある取引先レコードの3つの追加項目（請求先（町名・番地）、請求先（市区郡）、電話）を特定しました。アーキテクトは、この新しいポリシーの変更にどのように対処すべきですか？",c:["クラシック暗号化を使用してすべての項目が保護されていることを確認し、暗号化の検証についてSalesforceに問い合わせる。","暗号化ポリシーを使用し、項目値が暗号化されたことを示すSalesforceからのメールを待つ。","暗号化ポリシーを使用し、既存のレコードを更新して項目値が暗号化されるようにSalesforceに問い合わせる。"],a:2,e:["クラシック暗号化は特定のカスタムテキスト項目等にのみ利用可能であり、取引先の標準項目（請求先（町名・番地）、請求先（市区郡）、電話など）を暗号化することはできません。また、すでにPlatform Shield Encryptionが実装されている環境であるため、古い機能であるクラシック暗号化を使用するアプローチは不適切です。","暗号化ポリシーの設定画面で新しく項目を暗号化対象として有効化した場合、それ以降に作成または編集されたレコードの値は暗号化されますが、既存の保存済みレコードのデータは自動的には暗号化されません。そのため、システムによる自動的な適用と完了メールを待つというアプローチは誤りです。","正解です。Shield Platform Encryptionで新しく項目を暗号化対象に追加した際、すでに存在する大量の既存レコードの項目値を一括で暗号化するには、Salesforceサポートに連絡してバックグラウンドでの暗号化同期サービスの実行を依頼するのが従来からの正しい手順です。"]},
{n:100,t:"Universal Containers (UC) は、商談の組織全体のデフォルト (OWD) を「非公開」に設定しています。営業担当者が自分のテリトリー内のすべての商談を表示できるように共有ルールが定義されています。しかし、法務部門からは、特定の「機密」フラグが立てられた商談については、共有ルールによるアクセス権付与を無視し、特定のユーザー（所有者と法務マネージャー）のみにアクセスを制限することを求められています。この要件を満たす最適な方法はどれですか？",c:["共有ルールを削除し、すべての商談に対して手動共有またはApex共有を使用する。","機密商談をフィルタリングして除外するために、商談オブジェクトに「制限ルール (Restriction Rules)」を適用する。","商談の「機密」レコードタイプを作成し、プロファイルレベルでそのレコードタイプへのアクセス権を削除する。"],a:1,e:["大規模な組織で手動共有やApex共有を多用すると、メンテナンスが非常に困難になり、パフォーマンスにも影響を与える可能性があるため、最適な方法ではありません。","正解です。制限ルールは、既存の共有メカニズム（共有ルール、ロール階層、OWDなど）によって付与されたアクセス権をさらに「絞り込む」ために設計された機能です。特定の条件に基づいてアクセスを制限する要件に最適です。","プロファイルでのレコードタイプへのアクセス制限は、新しいレコードの作成やUI上での選択を制限するものであり、既存のレコードへの表示アクセス権（共有）そのものを制御するものではありません。"]}
];
const LABELS=['A','B','C'];
const KEY='svQuizState_v1';
const PASS=70;
const MODE_LABEL={exam1:'模試1',exam2:'模試2',all:'全100問',random20:'ランダム20問',review:'復習'};
let state=null;
