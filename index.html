<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ITIL 4 HVIT 模擬試験（80問）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;--text:#e8eaf0;--text2:#8b91a8;--text3:#5c6278}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.container{max-width:760px;width:100%;margin:0 auto}
h1{text-align:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:20px;font-size:0.85em}
.mode-select{display:flex;flex-direction:column;gap:12px;margin:20px 0}
.mode-btn{padding:18px 24px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-size:15px;font-weight:bold;cursor:pointer;transition:all .15s;text-align:left;display:flex;justify-content:space-between;align-items:center}
.mode-btn:hover{border-color:var(--accent);background:var(--surface)}
.mode-btn small{font-size:12px;color:var(--text3);font-weight:400;display:block;margin-top:3px}
.progress-bar{height:4px;background:var(--surface2);border-radius:4px;margin:16px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease}
.question-area{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin:16px 0;animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-number{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:14px}
.q-text{font-size:16px;font-weight:600;margin-bottom:20px;line-height:1.8;white-space:pre-wrap}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:16px 20px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:all .15s ease;text-align:left;font-size:15px;line-height:1.6;color:var(--text)}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}
.choice-btn.selected{border-color:var(--accent);background:var(--surface2)}
.choice-btn.correct{border-color:var(--correct);background:rgba(61,214,140,.08)}
.choice-btn.correct .choice-label{color:var(--correct)}
.choice-btn.wrong{border-color:var(--wrong);background:rgba(245,91,91,.08)}
.choice-btn.wrong .choice-label{color:var(--wrong)}
.choice-btn:disabled{cursor:default}
.choice-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:20px;padding-top:1px}
.explanation{margin-top:18px;padding:20px 24px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;display:none;font-size:14px;line-height:1.8;color:var(--text2);animation:fadeIn .3s ease}
.explanation.show{display:block}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px}
.nav-btn{flex:1;padding:14px 20px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease}
.nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.nav-btn.primary:hover{opacity:.88;transform:translateY(-1px)}
.nav-btn.secondary{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}
.nav-btn.secondary:hover{border-color:var(--accent);color:var(--text)}
.nav-btn:disabled{opacity:.35;cursor:default;transform:none}
.result-screen{text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:none;animation:fadeIn .4s ease}
.result-screen.show{display:block}
.score-display{font-family:'DM Mono',monospace;font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:24px 0}
.score-display.pass{background:linear-gradient(135deg,var(--correct),#2e7d32);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-display.fail{background:linear-gradient(135deg,var(--wrong),#c62828);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-msg{font-size:16px;color:var(--text2);margin-bottom:20px}
@media(max-width:600px){.question-area{padding:22px 18px}.q-text{font-size:14px}.choice-btn{font-size:14px;padding:14px 16px}.score-display{font-size:48px}}
.glossary-section{margin-top:30px}
.glossary-toggle{width:100%;padding:18px 24px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;text-align:left;margin-bottom:8px}
.glossary-toggle:hover{border-color:var(--accent);background:var(--surface)}
.glossary-content{display:none;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-height:500px;overflow-y:auto}
.glossary-content.show{display:block}
.glossary-search{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;margin-bottom:16px}
.glossary-search:focus{border-color:var(--accent)}
.glossary-item{padding:12px 0;border-bottom:1px solid var(--border);font-size:.9em}
.glossary-item .term{font-weight:bold;color:var(--accent);font-size:14px}
.glossary-item .en{color:var(--text3);font-size:11px;margin-left:6px}
.glossary-item .def{color:var(--text2);margin-top:2px;font-size:13px;line-height:1.7}
.status-bar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.hidden{display:none!important}
.save-indicator{position:fixed;top:10px;right:10px;background:var(--correct);color:#fff;padding:6px 14px;border-radius:20px;font-size:.8em;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>📝 ITIL 4 HVIT 模擬試験</h1>
<p class="subtitle">ITIL 4 Specialist: High Velocity IT — 模擬試験 1 & 2（全80問）<br>出題順・選択肢の順序はランダムです ｜ 合格ライン：70%</p>
<div id="saveIndicator" class="save-indicator">💾 進捗保存しました</div>
<div id="modeScreen">
<div class="mode-select">
<button class="mode-btn" onclick="startQuiz('sp1')">📘 模擬試験 1<br><small>Q001–Q040（40問）</small></button>
<button class="mode-btn" onclick="startQuiz('sp2')">📗 模擬試験 2<br><small>Q041–Q080（40問）</small></button>
<button class="mode-btn" onclick="startQuiz('all')">📚 全問チャレンジ<br><small>80問すべて</small></button>
<button class="mode-btn" onclick="startQuiz('random20')">🎲 ランダム20問<br><small>80問から抽出</small></button>
</div>
<div id="resumeArea"></div>
</div>
<div id="quizArea" class="hidden">
<div class="status-bar"><span id="statusLeft"></span><span id="statusRight"></span></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="question-area">
<div class="q-number" id="qNumber"></div>
<div class="q-text" id="qText"></div>
<div class="choices" id="choices"></div>
<div class="explanation" id="explanation"></div>
</div>
<div class="nav-row">
<button class="nav-btn secondary" id="prevBtn" onclick="prevQuestion()">← 前へ</button>
<button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">次へ →</button>
</div>
</div>
<div id="resultScreen" class="result-screen">
<h2>試験結果</h2>
<div class="score-display" id="scoreDisplay"></div>
<div class="result-msg" id="resultMsg"></div>
<div id="resultDetails" style="text-align:left;margin:20px 0;font-size:.9em"></div>
<button class="nav-btn primary" onclick="backToMenu()" style="margin-top:16px">メニューに戻る</button>
</div>
<div class="glossary-section">
<button class="glossary-toggle" onclick="toggleGlossary('hvit')">📖 HVIT用語集（クリックで展開）</button>
<div class="glossary-content" id="glossaryHvit">
<input class="glossary-search" placeholder="用語を検索..." oninput="filterGlossary('hvit',this.value)">
<div id="glossaryHvitList"></div>
</div>
<button class="glossary-toggle" onclick="toggleGlossary('fnd')" style="margin-top:8px">📖 ファンデーション用語集（クリックで展開）</button>
<div class="glossary-content" id="glossaryFnd">
<input class="glossary-search" placeholder="用語を検索..." oninput="filterGlossary('fnd',this.value)">
<div id="glossaryFndList"></div>
</div>
</div>
</div>
<script>
const QUESTIONS=[
/* === Paper 1 Q001-Q012（移植済み・旧ドラフトから抽出）=== */
{n:1, t:"銀行業の組織が、サービスの大部分をオンラインに移行し、支店オフィスを閉鎖している。これは何の例か？", c:["デジタル組織","セーフティ・カルチャ","ハイベロシティ IT","継続的デリバリ"], a:0, e:"A. 正解。デジタル組織とは「デジタル技術によって、大きく異なる方法で事業を遂行すること、あるいはこれまでとは大きく異なる事業を行うことが可能な組織」である。Ref 2.3\n\nB. 不正解。セーフティ・カルチャは、組織が育む「共有された信念、認識、価値観」に関するもの（技術の利用ではない）。セーフティ・カルチャは「人々が自分らしく（自分を表現して）快適に過ごせる環境」である。Ref 3.2.2.2\n\nC. 不正解。この変革は事業実現に焦点を当てているが、スピードが考慮されている兆候はない。ハイベロシティ IT とは「市場投入までの時間、顧客までの時間、変更までの時間および一般的にスピードが重視される、重要な事業を実現するためのデジタル技術の適用」である。Ref 2.1\n\nD. 不正解。継続的デリバリはソフトウェアのリリース方法に関するもので、「構築されたソフトウェアをいつでも本番環境にリリースできる」ことを意味する。Ref 4.2.5"},
{n:2, t:"組織がデジタル・トランスフォーメーションを進めており、新しい行動パターンの採用を奨励している。調査の結果、一部のチームメンバーは実験を避け、唯一の正しい解決策を探したり待ったりすることを好むことが明らかになった。この姿勢によって最も影響を受ける可能性が高い 2 つの主要な行動パターンはどれか？<br>1. 曖昧さや不確実性を受け入れる<br>2. 継続的な学習に取り組む<br>3. 顧客の仕事を完了する手助けをする<br>4. 信頼し、信頼される", c:["1 と 2","2 と 3","3 と 4","1 と 4"], a:0, e:"A. 正解。\n(1) 実験は不確実性の受容と継続的学習にとって重要である。「実験を歓迎し、安全かつ慎重に失敗することを恐れないことが重要である。実務家は未知のものを恐れるべきではない。物事は完璧ではないことを受け入れ、それに対処する技法を持っていなければならない。」Ref 3.1.1\n(2) 「実務家が継続的に学習し、自身の知識および保有する情報のレベルを向上することに取り組むことが重要である。データに基づく実験を仮説への挑戦と改善のために用いることができる。」Ref 3.1.5\n\nB、C、D. 不正解。\n(3) 実験は継続的学習にとっては重要であるが、顧客の仕事を完了させることにとってはそれほど重要ではない可能性が高い。実験を必要とするもう 1 つの主要行動パターンは曖昧さおよび不確実性の受容である。Ref 3.1.1, 3.1.4, 3.1.5\n(4) 実験は曖昧さおよび不確実性の受容にとっては重要であるが、「信頼し信頼される」パターンにとってはそれほど重要ではない。実験を必要とするもう 1 つの主要行動パターンは継続的学習である。Ref 3.1.1, 3.1.2, 3.1.5"},
{n:3, t:"ある組織は新サービス創出のための複数のバリューストリームを持っている。組織は、ユーザが自分たちに影響を与える変更について十分に知らされておらず、新サービスに関するユーザからの苦情が適切なチームにエスカレーションされていないことを把握した。この状況の改善に最も役立つプラクティスはどれか？", c:["問題管理","リスク管理","サービス・デザイン","サービスデスク"], a:3, e:"A. 不正解。問題管理プラクティスの目的は「インシデントの実際的および潜在的な原因を特定し、ワークアラウンドおよび既知のエラーを管理することによって、インシデントの発生可能性および影響を低減すること」である。Ref Problem Management Practice Guide 2.1\n\nB. 不正解。リスク管理プラクティスの目的は「組織がリスクを理解し、効果的に取り扱うことを確実にすること」である。Ref Risk Management Practice Guide 2.1\n\nC. 不正解。「サービス・デザイン プラクティスの目的は、目的に適しており、使用に適し、組織およびそのエコシステムにより提供できる製品およびサービスを設計すること」である。Ref Service Design Practice Guide 2.1\n\nD. 正解。「サービス・プロバイダとそのユーザの間の双方向の通信ゲートウェイとして、サービスデスク プラクティスの主要な焦点は、コミュニケーションを効果的に捕捉、記録し、関連するバリューストリームに統合することである。」Ref Service Desk Practice Guide 2.4.2"},
{n:4, t:"ある組織はソフトウェアを迅速に開発したいと考えている。セキュリティ要件を開発活動に組み込む最善の方法はどれか？", c:["全ての開発者に情報セキュリティ管理を訓練し、開発する製品のセキュリティに対する責任を担えるようにする","各開発チームに情報セキュリティ管理の専門家を割り当て、開発者にガイダンスを提供できるようにする","すべての本番ソフトウェアをレビュー・承認する独立した情報セキュリティ管理チームを維持する","開発プロセスを高速化するため、開発後の本番ソフトウェアにセキュリティコントロールを追加する"], a:0, e:"A. 正解。「情報セキュリティの職務を実務家の日々の業務に統合する」ことが、セキュリティを確実にする最善の方法である。Ref 4.5.2\n\nB. 不正解。「職務分離それ自体が目的なのではなく、目的に到達するための手段である」。Ref 4.5.2\n\nC. 不正解。「ハイベロシティ環境では、情報セキュリティは可能な限り開発と運用の日々の業務に統合される」。Ref 4.5.2\n\nD. 不正解。「ハイベロシティ環境では、情報セキュリティは可能な限り開発と運用の日々の業務に統合される」。Ref 4.5.2"},
{n:5, t:"リーンとアジャイルが、ハイパフォーマンスへの障壁と見なすものは何か？", c:["大きなバッチサイズの作業","進行中の作業を制限すること","作業をプッシュではなくプルすること","作業を可視化すること"], a:0, e:"A. 正解。実行可能な限り作業のバッチサイズを小さくすることはリーンの原則であり、アジャイルにも見られる。Ref 2.5.2.1, 2.5.2.2\n\nB. 不正解。進行中の作業を制限することで人々は集中でき、スループットの向上に役立つため、制約とは見なされない。Ref 2.5.2.1\n\nC. 不正解。リーンは作業の流れを改善するためにカンバンのようなプル・システムの利用を奨励している。Ref 2.5.2.1\n\nD. 不正解。リーンとアジャイルはともに透明性および、作業を可視化するためのカンバンボードのような視覚的コントロール機構の使用を奨励している。Ref 2.5.2.1"},
{n:6, t:"ハイベロシティ IT に関する記述として正しいものはどれか？", c:["継続的展開（デプロイメント）が必要となる","常に時間を測定対象とみなす","製品の保証のみに関連する","常に価値ある投資となる"], a:1, e:"A. 不正解。継続的展開は速度を高めようとする組織の目標となるかもしれないが、要件ではない。Ref 4.2.5\n\nB. 正解。「ハイベロシティ IT とは、市場投入までの時間、顧客までの時間、変更までの時間および一般的にスピードが重視される、重要な事業を実現するためのデジタル技術の適用である」。Ref 2.1\n\nC. 不正解。ハイベロシティは「一般的に高いパフォーマンスと等価」であり、ソリューションの有用性（価値）または保証を犠牲にして得られるものではない。Ref 2.1\n\nD. 不正解。「HVIT は多くの組織により高度なデジタル実現力を提供するが、必ずしも賢明な投資とは限らない」。Ref 2.1"},
{n:7, t:"トヨタ・カタを最もよく説明するものはどれか？", c:["社会にとって何が良いかを特定するためのアプローチ","流れを改善し無駄を削減することによってスループット向上に役立つアプローチ","当事者がどのように協働して価値を共創するかを特定するためのアプローチ","新しい習慣の形成と維持に役立つ、科学的実験へのアプローチ"], a:3, e:"A. 不正解。これはハイベロシティ IT アプローチに関連する倫理を考慮する際に生じうる状況を表している。Ref 3.2.1.1\n\nB. 不正解。この回答はリーン・アプローチを表している。Ref 2.5.2\n\nC. 不正解。これはサービス・ドミナント・ロジックを表している。Ref 2.5.2.5\n\nD. 正解。「規律ある科学的思考とインクリメンタルな改善は、誤った結論に飛びつく自然なバイアスを減らす。実践とコーチングは、新しい習慣を形成し維持することに役立ち、その後、即興を始めることができる。科学的実験への 1 つのアプローチがトヨタ・カタである」。Ref 3.2.3.3"},
{n:8, t:"あるサービスは有用性および保証のすべての要件を満たしているが、顧客とユーザの体験は良くない。ユーザと顧客が価値があると感じる体験を理解するのに最も貢献するプラクティスはどれか？", c:["サービスデスク","サービス・カタログ管理","ビジネス分析","ソフトウェア開発と管理"], a:2, e:"A. 不正解。「サービスデスク」プラクティスはユーザ体験のニーズについて一定の理解に貢献し得るが、「ビジネス分析」プラクティスほどには顧客体験の理解には貢献しない可能性が高い。Ref 4.4.1, tab 4.21\n\nB. 不正解。「サービス・カタログ管理」プラクティスは意図された顧客体験を文書化し得るが、その情報は他のプラクティスに依存している。Ref 4.4.1, tab 4.21\n\nC. 正解。「ビジネス分析 ― 有用性および保証に関する従来の要件に加え、ユーザのニーズを理解し、それを顧客体験またはユーザ体験の要件に変換する」。Ref 4.4.1, tab 4.21\n\nD. 不正解。「ソフトウェア開発と管理」プラクティスは、ユーザ・インタフェースの設計方法を通じてユーザおよび顧客の体験に影響を与え得るが、価値があると感じられる体験の理解には役立たない。Ref 4.4.1, tab 4.21"},
{n:9, t:"サイロで作業し、コミュニケーションが乏しい組織が、IT システムの対障害弾力性をテストするためにカオス・エンジニアリングのツールを使い始めた。コミュニケーションの乏しさによって最も直接的に影響を受けるプラクティスはどれか？", c:["問題管理","サービス継続管理","インフラストラクチャおよびプラットフォーム管理","モニタリングおよびイベント管理"], a:3, e:"A. 不正解。カオス・エンジニアリングは問題を予防的に検出するために使用できるが、このプラクティスは直接的には影響を受けない。Ref 4.3.2, tab 4.18\n\nB. 不正解。「サービス継続管理」プラクティスには「カオス・エンジニアリング・ツールにより引き起こされる予期しない停止に対処できる十分な対障害弾力性および冗長性をもつサービス継続性対策の設計」が含まれる。Ref 4.3.2, tab 4.18\n\nC. 不正解。「インフラストラクチャおよびプラットフォーム管理」プラクティスには「カオス・エンジニアリング・ツールにより引き起こされる予期しない停止に対処するための十分な対障害弾力性および冗長性をもつインフラストラクチャおよびプラットフォームの設計」が含まれる。Ref 4.3.2, tab 4.18\n\nD. 正解。「モニタリングおよびイベント管理ツールは、カオス・エンジニアリング・ツールによって引き起こされた停止にフラグを立てたり、技術的コンポーネントよりもサービス品質をモニタリングしたりするように設定できる」。Ref 4.3.2, tab 4.18"},
{n:10, t:"中央集権型の IT 部門が、IT システムの対障害弾力性とパフォーマンスを高めるためにサイト・リライアビリティ・エンジニアリングを採用している。これは何の例か？", c:["ハイベロシティ IT","デジタル技術","IT トランスフォーメーション","デジタル・トランスフォーメーション"], a:2, e:"A. 不正解。サイト・リライアビリティ・エンジニアリングの焦点は IT 運用にあり（事業実現ではなく）、スピードが考慮されている兆候はない。Ref 2.1, 2.5.2.3\n\nB. 不正解。サイト・リライアビリティ・エンジニアリングは技術ではなく、「ソフトウェア開発のマインドセットを IT 運用に適用し、開発と運用の間のギャップを埋める手助けをする」アプローチである。Ref 2.4.1, 2.5.2.3\n\nC. 正解。「事業と IT が別個の組織機能と見なされる組織では、『IT トランスフォーメーション』は、IT サービスの提供方法を改善する大きな変化を表すためにしばしば使用される」。Ref 2.4.1\n\nD. 不正解。サイト・リライアビリティ・エンジニアリングは技術ではなく、IT 運用に焦点を当てたアプローチである。Ref 2.4, 2.4.1"},
{n:11, t:"レガシー情報システムのモノリシックな性質により、組織はアジャイルおよび継続的インテグレーション/継続的デリバリ (CI/CD) のようなより現代的なソフトウェア・エンジニアリング技法の利点を十分に享受できない状況にある。より小さく、より頻繁な変更を可能にする、疎結合のサービス、技術、情報要素の設計を含むプラクティスはどれか？", c:["ソフトウェア開発と管理","展開管理","ビジネス分析","アーキテクチャ管理"], a:3, e:"A. 不正解。「ソフトウェア開発と管理」プラクティスには「疎結合のソフトウェア・コンポーネントの詳細設計、構築、運用、管理」（アーキテクチャではなく）が含まれる。Ref 4.2.2, tab 4.6\n\nB. 不正解。より疎結合のアーキテクチャは「展開管理」プラクティスに利益をもたらすが、アーキテクチャの設計を含むのは「アーキテクチャ管理」プラクティスである。Ref 4.2.2, tab 4.6\n\nC. 不正解。「消費者ニーズを理解し、それを疎結合のサービス・アーキテクチャの各コンポーネントの詳細要件に変換する」。これは「ビジネス分析」プラクティスに関連する。Ref 4.2.2, tab 4.6\n\nD. 正解。「アーキテクチャ管理」プラクティスには「疎結合のサービス、技術、および情報アーキテクチャの設計」が含まれる。Ref 4.2.2, tab 4.6"},
{n:12, t:"ある組織が、サービス時間の要件が異なる 2 つの事業ユニットに対してサービスを導入しようとしている。要件の違いの結果として、サービスは 1 日 24 時間利用可能でなければならず、高水準の冗長性を備えて設計される必要がある。どちらの顧客もこのようなソリューションへの投資を自分たちの責任とは見なしていない。この状況が適切に管理されることを確実にするプラクティスはどれか？", c:["関係管理","サービスデスク","アーキテクチャ管理","リスク管理"], a:0, e:"A. 正解。「関係管理プラクティスは、相反するステークホルダー要件が適切に調停されることを確実にする」。Ref Relationship Management Practice Guide 2.1\n\nB. 不正解。「サービスデスク」プラクティスにはステークホルダー要件に関する争いを扱う活動はない。Ref Relationship Management Practice Guide 2.1\n\nC. 不正解。「アーキテクチャ管理」プラクティスにはステークホルダー要件に関する争いを扱う活動はない。Ref Relationship Management Practice Guide 2.1\n\nD. 不正解。これはリスクではなく、ソリューションへの資金提供者の決定が必要となるため、課題（イシュー）である。Ref Risk Management Practice Guide 2.1, 2.2.1, ITIL 4 Foundation 2.5.3"},
{n:13, t:"ある組織は、ウェブサイト訪問者が特定のアクション（連絡先情報の提供や購入など）を実行する割合を高めたいと考えている。この目的を支援するためにどの機能を変更するかについて常に議論が起き、時間と労力が無駄になっている。組織がこの目的を達成するとともに、変更に伴う議論を減らすために使用できるアプローチはどれか？", c:["実用最小限の製品を作成し、顧客から得たフィードバックに基づいて変更する","各機能変更に伴う遅延コストを計算し、それに従って優先順位を付ける","デザイン思考を用い、すべてのステークホルダーのニーズと利害のバランスを取った変更を行う","A/B テストを使用し、訪問者がウェブサイト機能の異なるバージョンにどのように反応するかに基づいて意思決定を行う"], a:3, e:"A. 不正解。実用最小限のアプローチは「製品とサービスを開発するとき、特に市場が不安定で予測不可能な場合」に使用するものであり、望ましい行動を促進する変数についての洞察を得るための方法ではない。Ref 4.1.2\n\nB. 不正解。遅延コストの計算は、望ましい行動を促進する変数についての洞察を提供しない。Ref 4.1.1.1\n\nC. 不正解。「デザイン思考は、相反する仮説をもつ問題に対処する際に特に有用」だが、すべてのステークホルダーのニーズと利害のバランスを取ることが、目的（特定の行動を促すこと）を必ずしも達成するとは限らない。Ref 3.2.1.2\n\nD. 正解。A/B テストは新しい機能の効果を切り分け、ユーザの行動を測定して確かなデータを収集することを可能にする。Ref 4.1.4"},
{n:14, t:"ビジネス・アナリストは、事業マネージャたちが部門改善のニーズについて相反する仮説を持っていると認識している。彼らはまた、自分たちの要件を明確に表現することが難しいと感じている。要件を獲得するための最善のアプローチはどれか？", c:["詳細な質問を慎重に準備した台本に基づきインタビューを行う","部門の働きを分析するために 1 週間を割り当て、その後論理的な結論を導き出す","可能なソリューションの複数のプロトタイプを開発し、最も機能するものを採用する","ディレクタに対し、ビジネス・アナリストが最も妥当と考えるソリューションを強制するよう求める"], a:2, e:"A. 不正解。クネビン・フレームワーク⚠️[要確認: Cynefin framework]によれば、このアプローチは予測可能性が非常に高い状況（明白な領域）により適している。Ref 3.2.3.1\n\nB. 不正解。クネビン・フレームワークによれば、このアプローチは分析するのに十分な情報がある場合（込み入った領域）により適している。Ref 3.2.3.1\n\nC. 正解。事業マネージャたちの相反する仮説と、要件を明確に表現することが難しいことは、これが複雑な領域であることを示している。「複雑 ― 因果関係が不明瞭で知ることができず、安全に失敗できる実験を要求する（創発的プラクティス）」。Ref 3.2.3.1\n\nD. 不正解。クネビン・フレームワークによれば、このアプローチは極めて緊急かつ重要な問題（混沌とした領域）により適している。Ref 3.2.3.1"},
{n:15, t:"ソフトウェアをより頻繁かつ信頼性高くリリースする方法を見つけるためにチームが組織された。このチームは、継続的インテグレーション/継続的デリバリ (CI/CD) と組織の「展開管理」プラクティスとの関係を探求している。継続的デリバリの文脈で「展開管理」プラクティスに含まれるのはどれか？", c:["本番環境ですべてのテストに合格した変更の展開を自動化すること","バージョン・コントロールされたリポジトリを使用して、新しいまたは変更されたサービス・コンポーネントを展開すること","失敗した展開後に根本原因分析および非難なきポストモーテムを実施すること","展開を自動化するために必要なアーキテクチャを設計および改善すること"], a:1, e:"A. 不正解。これは継続的展開を表している。Ref 4.2.5\n\nB. 正解。「展開管理」プラクティスは「バージョン・コントロールされたリポジトリを使用して、新規または変更されたサービス・コンポーネントを展開する、または以前のバージョンに戻す」ことに用いる。Ref 4.3.4, tab 4.17\n\nC. 不正解。「根本原因分析およびポストモーテムを実施する」のは「問題管理」プラクティスの責任である。Ref 4.3.6, tab 4.19\n\nD. 不正解。これは「アーキテクチャ管理」プラクティスの責任である。Ref 4.2.5, tab 4.10"},
{n:16, t:"ある組織がカオス・エンジニアリングを導入したいと考えている。本番環境がどのように反応するかを見るため、さまざまな実験が本番環境で実施される予定である。この働き方を支援するための、追加のサービス継続管理対策の例はどれか？", c:["実験期間中、帯域幅、スループット、応答時間およびその他のパフォーマンス・データに関する情報を記録すること","実験結果を調査して、本番環境の潜在的な脆弱性を識別すること","バックアップ・ネットワーク接続を検証し、想定される作業負荷についてテストすること","サービス停止が事業活動に与える影響を理解するための明確なサービス・モデル一式を提供すること"], a:2, e:"A. 不正解。これはカオス・エンジニアリングに関連する「キャパシティおよびパフォーマンス管理」活動の例である。Ref 4.3.2, tab 4.15\n\nB. 不正解。これはカオス・エンジニアリングに関連する「問題管理」活動の例である。Ref 4.3.2, tab 4.15\n\nC. 正解。「カオス・エンジニアリング・ツールにより引き起こされる予期しない停止に対処できる十分な対障害弾力性および冗長性をもつサービス継続性対策の設計」は、カオス・エンジニアリングに関連するサービス継続管理活動である。Ref 4.3.2, tab 4.15\n\nD. 不正解。これはカオス・エンジニアリングに関連する「アーキテクチャ管理」活動の例である。Ref 4.3.2, tab 4.15"},
{n:17, t:"あるサービス・プロバイダは、事業プロセスを改善するための新サービスを作成した。これらのサービスは適切な機能を持ち、顧客が期待するすべてのサービスレベルを満たしている。スポンサーは、事業プロセスのパフォーマンス改善が彼らの期待ほどではないと不満を述べた。サービス・プロバイダが次に取るべき行動はどれか？", c:["サービスの保証をレビューする","サービスの有用性をレビューする","ユーザ・トレーニングをレビューする","サービスレベルに関するスポンサーの理解をレビューする"], a:2, e:"A. 不正解。シナリオでは既にサービスは適切な機能を持つと述べている。Ref Service Design Practice Guide 2.1\n\nB. 不正解。シナリオでは既にサービスは顧客の期待するすべてのサービスレベルを満たしていると述べている。Ref Service Design Practice Guide 2.1\n\nC. 正解。新機能の導入はユーザ・トレーニングを必要とする。「新規または変更された製品またはサービスの設計は単独で行うべきではなく、顧客、ユーザ、サプライヤを含むすべての関係者への影響を考慮するべきである」。Ref Service Design Practice Guide 2.1\n\nD. 不正解。文書化されたサービスレベルは顧客が理解できる方法で書かれているべきであり、サービスレベルを理解するためのトレーニングは必要であるべきではない。Ref Service Design Practice Guide 2.1"},
{n:18, t:"あるサービス・プロバイダは、顧客およびユーザとともに新サービスの計画と設計に長い時間をかけている。サービスの導入時には顧客およびユーザの満足度は高い。しかしほとんどのサービスについて、稼働開始の最初の 1 年間で満足度レベルが劇的に低下する。この状況を改善するための最善のアプローチはどれか？", c:["設計に段階的なアプローチを導入する","新サービスの測定と測定基準を改善する","初期のサービス・デザイン活動の期間を延ばす","顧客の満足度レベルが下がり始めたときに、無料のサービス・アップグレードを顧客に提供する"], a:0, e:"A. 正解。「反復的かつインクリメンタルなサービス・デザインへのアプローチを考慮することが重要である。これは、稼働運用に導入された製品およびサービスが、組織と顧客の進化するニーズに継続的に整合し適応できるようにすることに役立つ」。Ref Service Design Practice Guide 2.1\n\nB. 不正解。「必要な測定および測定基準を考慮する」ことは重要だが、このシナリオでは顧客とユーザの満足度レベルは既知であり、それらのレベルを改善する行動が必要である。Ref Service Design Practice Guide 2.1\n\nC. 不正解。この解決策は、初期のサービス・デザインの期間を長くし、設計の詳細を長期間ロックダウンすることでシナリオの問題を悪化させる。Ref Service Design Practice Guide 2.1\n\nD. 不正解。このアプローチは顧客満足度を高めるかもしれないが、不必要に長い初期設計期間に対処せず、サービス・プロバイダにとっての価値創出を妨げる追加コストをサービス・プロバイダに課す。Ref Service Design Practice Guide 2.1"},
{n:19, t:"ある組織は、新機能や改善された機能、バグ修正でソフトウェアを継続的に強化するため、継続的インテグレーション/継続的デリバリ (CI/CD) を導入した。これらの変更を迅速にリリースするプレッシャーから、テスト活動の時間がほとんど残されていないことが多い。十分なテストが行われることを確実にするために「サービス検証およびテスト」プラクティスが推奨するアプローチはどれか？", c:["開発ライフサイクル全体を通してテストを実施する","テスト失敗を引き起こす展開を停止する","サービスの信頼性をテストするためにカオス・エンジニアリングの原則を活用する","テスト環境におけるソフトウェアのインストールを自動化する"], a:0, e:"A. 正解。「サービス検証およびテスト」プラクティスは、テストが継続的に実施されることを推奨する。「単体テスト、統合テスト、回帰テストは、開発ライフサイクル全体を通じて継続的に実施される」。Ref 4.2.6, tab 4.12\n\nB. 不正解。これは「展開管理」活動である。「継続的なテストの失敗を引き起こす変更または展開はチームのアンドン・コードをトリガーする。チームメンバはその後、問題を解決するために集まる⚠️[要確認: swarm]」。Ref 4.2.6, tab 4.12\n\nC. 不正解。これは「サービス検証およびテスト」プラクティスの活動だが、焦点は CI/CD ではなくカオス・エンジニアリングである。Ref 4.3.2, tab 4.15\n\nD. 不正解。これは「展開管理」プラクティスの活動である。Ref 4.2.5, tab 4.10"},
{n:20, t:"ある金融機関がデジタル製品の開発と管理に DevOps アプローチを採用している。組織は厳格な規制の対象であり、毎年外部監査を受けている。HVIT の目標である「保証された適合性」⚠️[要確認: assured conformance]を支援するのに最も役立つプラクティスはどれか？", c:["リスク管理","関係管理","可用性管理","インフラストラクチャおよびプラットフォーム管理"], a:0, e:"A. 正解。「エンタープライズ・リスク管理、技術リスク管理、新しい働き方の間でバランスの取れた実践的なアプローチを構築する」ことは、「リスク管理」プラクティスが「保証された適合性」目標に貢献する方法である。Ref 4.5.1, tab 4.22\n\nB. 不正解。「関係管理」プラクティスの目的は「組織とそのステークホルダーの間の戦略的および戦術的レベルのつながりを構築し育成する」ことである。Ref Relationship Management Practice Guide 2.1\n\nC. 不正解。「可用性管理プラクティスの目的は、サービスが顧客およびユーザのニーズを満たすために合意されたレベルの可用性を提供することを確実にすること」である。Ref Availability Management Practice Guide 2.1\n\nD. 不正解。「インフラストラクチャおよびプラットフォーム管理プラクティスの目的は、組織が使用するインフラストラクチャおよびプラットフォームを監督すること」である。Ref Infrastructure and Platform Management Practice Guide 2.1"},
{n:21, t:"あるサービス・プロバイダは、ある製品に基づくサービスを5年間提供してきた。サービス消費者との契約期間は平均2年である。これは何の例か？", c:["サービスバリュー・チェーンに関する異なる視点","バリューストリームに関する異なる認識","デジタル製品ライフサイクルに関する異なる視点","関係管理に関する異なる見解"], a:2, e:"A. 不正解。「ITIL サービスバリュー・チェーンは、サービス・プロバイダが実行する活動の種類をかなり高い抽象度で記述するのに有用である」。Ref 2.6.3, 2.6.2\n\nB. 不正解。バリューストリームは、サービス・プロバイダ（消費者ではない）が製品およびサービスを創出し提供するために実際に取る一連のステップを定義する。Ref 2.6.4, 2.6.2\n\nC. 正解。デジタル製品ライフサイクルは、価値の共創に関するサービス・プロバイダと消費者の視点を表す。「サービス消費者とサービス・プロバイダはデジタル製品に関して異なる視点を持つ。両者はそれぞれ独自の製品ライフサイクルを持ち、消費者とプロバイダ間のエンゲージメント期間中に重複する」。Ref 2.6.2\n\nD. 不正解。「関係管理」プラクティスは、サービス・プロバイダがそのステークホルダーとのつながりを構築・育成することに関わる。Ref 2.6.2"},
{n:22, t:"ある組織は、顧客注文の処理および出荷の速度を大幅に高めるために自動化に多額の投資を行った。これは何の例か？", c:["継続的デリバリ","デジタル製品","IT トランスフォーメーション","デジタル・トランスフォーメーション"], a:3, e:"A. 不正解。継続的デリバリはソフトウェアのリリース方法に関するもので、「構築されたソフトウェアをいつでも本番環境にリリースできる」ことを意味する。Ref 4.2.5\n\nB. 不正解。自動化は製品自体ではない（直接的に価値を提供していない）。Ref 2.6.1\n\nC. 不正解。この場合の自動化の利用は、IT サービスではなく事業サービスの取り扱いに関連する。Ref 2.4.1\n\nD. 正解。デジタル・トランスフォーメーションは「デジタル以外の手段では実現不可能だった組織の達成目標の実現を大幅に改善するための、デジタル技術の利用」を含む。Ref 2.4"},
{n:23, t:"あるサービス・プロバイダはデジタル製品とサービスをビジネス顧客に提供している。全社的なそれらの製品とサービスに関する意思決定に顧客を参加させるものとして何が考えられるか？", c:["サービス提供チーム","デザイン思考","キャッシュ・フローを最適化する製品","製品オーナーシップ"], a:3, e:"A. 不正解。これらのチームは製品オーナーと一緒に仕事をしているものの、顧客を代表しているわけではない。Ref 2.4.2\n\nB. 不正解。「デザイン思考とは、人々のニーズ、可能な技術、事業の成功に関して必要とされるものを統合する、革新への実践中心のアプローチ」であるが、意思決定に顧客を参加させるためのものではない。Ref 3.2.1.2\n\nC. 不正解。これらの製品には意思決定に顧客が含まれる可能性が高いが、その関与は製品オーナーシップのケースよりも限定的である。深たんな関与は製品オーナーシップにより達成される。Ref 2.4.2\n\nD. 正解。「製品オーナーシップは、顧客と事業関係者を製品チームの一部にし、それにより製品のスコープとビジョン、製品のバックログとロードマップ、製品の採用・サービス・サポートに関する意思決定に責任を担わせる」。Ref 2.4.2"},
{n:24, t:"「セーフティ・カルチャ」により促進される 3 つの主要な体験・ジャーニーを最もよく説明するものはどれか？<br>1. 設計された訓練者によって提供される、勩募された全員の職務上ストレスを手助けしたり防ぐためのチーム体験とトレーニング<br>2. 今日、正しいことをしてくれたことに対して、見返りを期待せず、同僚に「ありがとう」と言うチーム体験<br>3. 誤ったものの識別と関係者への誠実さを検討するチーム体験<br>4. コストと価値を最適化するための顧客体験設計", c:["1、2、3","1、3、4","1、2、4","2、3、4"], a:3, e:"A. 不正解。\n(2) 不見返りの謝意・ジェスチャはセーフティ・カルチャの主要なジャーニーである。「今日、正しいことを行った人々に『ありがとう』と言うジェスチャを、見返りを期待せず取り入れる」。Ref 3.2.2.2\n(3) 誠実さはセーフティ・カルチャの主要なジャーニーである。「誠実のジャーニー ― 『誤ったもの』の充分な識別および関係者に対する誠実さ」。Ref 3.2.2.2\n\nB. 不正解。\n(1) 勩募された人々に設計された訓練者を提供するよりも、セーフティ・カルチャはチームメンバー同士が互いを助け合うよう促進するものである。「チームのジャーニー ― 仕事と関連して起こるストレスを同僚同士で進んで取り除くために何ができるか」。Ref 3.2.2.2\n\nC. 不正解。\n(1) 勩募された人々に設計された訓練者を提供するよりも、セーフティ・カルチャはチームメンバー同士が互いを助け合うよう促進するものである。Ref 3.2.2.2\n\nD. 正解。\n(2) 不見返りの謝意・ジェスチャはセーフティ・カルチャの主要なジャーニーである。Ref 3.2.2.2\n(3) 誠実さはセーフティ・カルチャの主要なジャーニーである。Ref 3.2.2.2\n(4) 「コストと価値の最適化 ― 顧客体験を初期コンセプトから仕様と設計まで、さらにトレーニング、実装、運用、進化や退役に至るステップで設計すること」。Ref 3.2.2.2"},
{n:25, t:"「サービス検証およびテスト」プラクティスに関する記述として正しいものはどれか？", c:["テストと負荷テストはプロダクト・オーナーにより実行される","サービス提供者を選択し評価する際の主要な活動である","主に予防措置と予期されたオペレーショナル・コストの低減に関係する","テストには業務検証テスト、コンプライアンス・テスト、プロセス検証テストが含まれる"], a:0, e:"A. 正解。「テストと負荷テストは製品・オーナーとサービスにより実行される」。Ref 4.2.6, tab 4.12\n\nB. 不正解。サービス提供者を選択し評価する際の主要な活動ではない（それはサプライヤ管理プラクティスの責任である）。Ref 4.2.6\n\nC. 不正解。これらはテストの主要な目的ではない。「テストは、品質の改善とスポンサーや買い手、ユーザ、その他の関係者にとって重要な他の品質の側面を改善し、リスクを減らすために使用される」。Ref 4.2.6\n\nD. 不正解。業務検証テストは含まれない。「テストには、その他の例として製品検証テスト、コンプライアンス・テスト、プロセス検証テストが含まれる」。Ref 4.2.6"},
{n:26, t:"あるサービス・プロバイダは、チーム・メンバー間のコミュニケーションを改善している。これらの努力に関して、人々は仮説を明示的に表明し、他者からのチャレンジを歓迎し、議論中に人々の生産的なアイデアを取り入れるよう、勩言されている。これらのアイデアは、何に関して勩言を提供するために使用できるか？", c:["使用者中心の設計","デザイン思考","生産的な議論","セーフティ・カルチャ"], a:2, e:"A. 不正解。使用者中心の設計はデザイン思考の中心となるものであるが、これらのアイデアはチームとして作業し議論をしたり、コミュニケーションしたりする方法に関するものである。Ref 3.2.1.2\n\nB. 不正解。「デザイン思考は人々のニーズ、可能な技術、事業の成功に関して必要とされるものを統合する、革新への実践中心のアプローチ」である。これらのアイデアは、チームとして作業し議論をしたり、コミュニケーションしたりする方法に関するものである。Ref 3.2.1.2\n\nC. 正解。「生産的な議論を促進するため、人々は仮説を明示的に表明し、他者からのチャレンジを歓迎し、議論中に人々の生産的なアイデアを取り入れるよう勩言される」。Ref 3.2.3.2\n\nD. 不正解。セーフティ・カルチャは「人々が自分らしくいられるチーム」の育成に関するものであり、これらのアイデアはチームとして作業し議論をしたり、コミュニケーションしたりする方法に関するものである。Ref 3.2.2.2"},
{n:27, t:"セーフティ・カルチャの主要なジャーニーはどれか？", c:["部門間、願望したやり取り・謝意・誠実さ、コストと価値の最適化、チームのジャーニー、独特な体験とチームの体験","スポンサーと顧客、ユーザ、その他の関係者との見返りを期待しないやり取りと謝意と誠実さ","チームのジャーニーと、顧客体験を初期コンセプトから仕様と設計まで、さらにトレーニング、実装、運用、進化や退役に至るステップで設計すること","見返りを期待しないやり取り、謝意と誠実さのジャーニー、チームのジャーニー、コストと価値の最適化"], a:3, e:"A. 不正解。いくつかの主要なジャーニーは、謝意と誠実さのジャーニーとチームのジャーニーのように古いバージョンと似ている。「セーフティ・カルチャについて人々を代表する体験は 4 つある」。Ref 3.2.2.2\n\nB. 不正解。謝意と誠実さのジャーニーはセーフティ・カルチャについての 4 つの主要なジャーニーの 1 つだが、スポンサーと顧客、ユーザ、その他の関係者との見返りを期待しないやり取りは含まれない。「同僚同士」「ちょっとしたジェスチャ、言葉、こんなようにして」。Ref 3.2.2.2\n\nC. 不正解。主要なジャーニーの 1 つとして独特な体験とチームの体験はあるが、顧客体験は含まれない。「『独特なチーム』の体験とチームの体験 ― チームのダイナミクス」。Ref 3.2.2.2\n\nD. 正解。「4 つの主要なジャーニー ― 見返りを期待しないやり取り、謝意と誠実さのジャーニー、『チームのジャーニー』、コストと価値の最適化」。Ref 3.2.2.2"},
{n:28, t:"あるサービス・プロバイダは、ソフトウェア製品をサービス・オファリングとしても提供している。提案は下記のとおりである: 1 サービス・オファリングはタイプ 1 サービスとタイプ 2 サービスとして提供される。 2. 製品は顧客がそのデータセンターで動作させることができる。タイプ 2 サービスを説明するものはどれか？", c:["サービスはソフトウェア製品のためにサービス・オファリングを提供するように設計されているが、製品の顧客による使用と一緒に顧客によって提供されるものとして提供される","サービスはサービス・プロバイダにより提供されるように設計されているが、データコスト・サービスのための追加料金（例えば一個あたり 50 ドルというように）を顧客に請求する","サービスはサービス・プロバイダによって提供され、顧客はそれを中頻度で使用し、サービスの効果に価値を見出す。たとえば、サービスの中で提供されるコンサルタントサービスに価値を見出す","サービスは顧客によって中頻度で使用されるように設計されているが、使用はサービス・プロバイダによって提供される"], a:0, e:"A. 正解。「タイプ 2 サービスとは顧客とサービス・プロバイダの両方により保証が提供されるサービスである」。Ref 4.4.5\n\nB. 不正解。これはタイプ 1 サービスを説明しているが、追加請求は 1 件あたりではなく、事業トランザクション 1 件あたり 1 ポンド£である可能性がある。Ref 4.4.5\n\nC. 不正解。これはデジタル製品の中のサービスにも関係していない、単なるタイプ 1 サービスを説明している。Ref 4.4.5\n\nD. 不正解。これはデジタル製品の中のサービスにも関係していない、単なるタイプ 1 サービスを説明している。Ref 4.4.5"},
{n:29, t:"あるサービス・プロバイダは、そのすべてのデジタルサービスにセルフサービスを提供している。セルフサービスを有効に機能させるために、サービスデスク・プラクティスにとって重要とされるものは何か？", c:["セルフサービスの考え方を重視するストリート・レベルのサービスデスクを持つこと","セルフサービスとその効果をサービスデスクを介してモニタリングしレポートすること","セルフサービス・チャネルを補完するため、サービスデスクを「人チャネル」オプションとして使用すること","複数のチャネル・オプションをもつサービスデスクを持ち、セルフサービスもこれらのオプションの 1 つとして提供すること"], a:0, e:"A. 正解。「サービスデスクはセルフサービス・チャネルに取って代わられるものではない。それはセルフサービスを重視するストリート・レベルのサービスデスクに進化してきた」。Ref 4.3.5.4\n\nB. 不正解。この状況をモニタリングしレポートすることはセルフサービスを有効に機能させない。Ref 4.3.5.4\n\nC. 不正解。「セルフサービスを介してサービスを扱うことに価値を見出さないトランザクションについては、サービスデスクは一般的に人チャネルを補完するためのオプションと見なされるべきではない」。Ref 4.3.5.4\n\nD. 不正解。これは顧客・ジャーニーとその体験を適切に考慮していない。Ref 4.3.5.4"},
{n:30, t:"セルフサービスを効果的にしたいと考えるサービス・プロバイダに重要な顧客の願望はどれか？", c:["製品の仕様に関する助言を他の顧客から受けるために、コミュニティを推進したい","類似の取り組みに関して他の会社が何をしているかを読んだり計画したりしたい","その仕事をやるために製品をうまく使いたい","製品に関する送付状、広告メール、チャット、トレーニング、業務連絡を受けたい"], a:2, e:"A、B、D. 不正解。これらは効果的なセルフサービスに関連する顧客願望の例ではない。Ref 4.3.5.4, fig 4.13\n\nC. 正解。これは効果的なセルフサービスに関連する顧客願望の例である。Ref 4.3.5.4, fig 4.13"},
{n:31, t:"サービスデスク・プラクティスに関する記述として正しいものはどれか？", c:["サービスデスクはステークホルダーとサービス・プロバイダ間の主要インタフェイスである","サービスデスク・チームはすべての関連データとサービスコンポーネントにアクセスできるべきではない","サービスデスクの目的はステークホルダーと製品を提供するサービス・プロバイダ間のコミュニケーションを低減することである","サービスデスクはその柔軟性のために、セルフサービスの提供に関連してはいない"], a:0, e:"A. 正解。「サービスデスクはステークホルダーとサービス・プロバイダ間の主要インタフェイスである」。Ref 4.3.5.1\n\nB. 不正解。「サービスデスクは、ステークホルダーの要求やインシデントに効果的に対応するため、関連するすべてのデータとサービスコンポーネントにアクセスできるべきである」。Ref 4.3.5.1\n\nC. 不正解。「サービスデスク・プラクティスの目的は、コミュニケーションを効果的に捕捉し記録して関連バリューストリームに統合することである」。Ref 4.3.5.1\n\nD. 不正解。「サービスデスクはセルフサービス・チャネルに取って代わられるものではない。それはセルフサービスを重視するストリート・レベルのサービスデスクに進化してきた」。Ref 4.3.5.4"},
{n:32, t:"あるサービス・プロバイダは、最近アジャイル・ソフトウェア開発を使用したハイベロシティ IT アプローチを採用した。新機能の提供にかかる時間は急速に減少しているが、関連サービスはインシデントによって引き起こされる中断が急増している。これらの問題に対処するための最善の行動はどれか？", c:["優先順位付けを改善し、最も緊急性の高い機能要件の開発に投資が使われることを確実にする","問題の原因が識別されるまで、ウォーターフォール型のソフトウェア開発アプローチに戻す","価値の共創方法に注意を集中するため、サービス消費者とのコラボレーションを強化する","運用上の非機能要件の達成を含めるように「完了の定義」を拡張する"], a:3, e:"A. 不正解。この回答は機能要件に焦点を当てており、ハイベロシティの目標である「価値ある投資」を支援する。代わりに組織は目標「対障害弾力性のある運用」に焦点を当てるべきである。「価値ある投資を達成するために使用できる技法には、優先順位付け技法が含まれる。」Ref 4.1\n\nB. 不正解。質問はハイベロシティの目標「対障害弾力性のある運用」により多くの焦点が必要であることを示しており、古い方法に戻すことではない。古い開発方法に戻ることは後退であり、問題を解決することは保証されない。ソフトウェアの対障害弾力性とパフォーマンス要件により多くの注意を払うべきである。「対障害弾力性のある運用目標の範囲には、デジタル製品が必要なときにいつでも使用可能であることを確実にすることが含まれる。」Ref 4.3\n\nC. 不正解。この回答はハイベロシティの目標「共創された価値」に焦点を当てている。代わりに組織は目標「対障害弾力性のある運用」に焦点を当てるべきである。「共創された価値目標の範囲には、サービス・プロバイダとサービス消費者の緊密なコラボレーションを通じてデジタル製品から価値を共創することが含まれる。」Ref 4.4\n\nD. 正解。質問から、ハイベロシティの目標「対障害弾力性のある運用」により多くの焦点が必要であることがわかる。「完了の定義」を拡張して対障害弾力性要件を含めることは、アジャイル・アプローチを強化し、運用上の問題に対処する良い方法である。「完了の定義は、製品またはサービスの有用性に貢献する機能性、およびその保証に貢献する非機能要件に関連する基準を記述する。これらの非機能要件は、運用に責任を持つ者と定義および合意される必要がある。非機能要件を含む完了の定義は、対障害弾力性のある運用、使用性の向上を通じた価値の共創、および手戻りが少なくなることによる迅速な開発に貢献する。」Ref 4.3.3"},
{n:33, t:"最近、事業上重要なサービスでエラーが発生し、インシデントを引き起こしている。サポート・チームはサービスを復旧するためにさまざまな解決策を使用してきた。一部の解決策はさらなるインシデントを引き起こした。これらの解決策によって作成される技術的負債の量を減らすため、将来採用すべき活動はどれか？", c:["インシデントの原因を理解するために問題分析を実施し、その後、サービスデスクが使用した解決策よりも効果的なワークアラウンドを提案する","カオス・エンジニアリング・ツールを使用して問題を予防的に識別し、組織が冗長性を最も効果的に使用できるようにする","このタイプのインシデントをすべて、専門の問題コントロール・チームに直接ルーティングして、迅速な問題診断と解決を可能にする","インシデント解決を分析して最も成功したものを見つけ、その解決策を変更要求の基礎として使用する"], a:0, e:"A. 正解。これは「問題コントロールおよびエラー・コントロール手法を適用して技術的負債を管理する」ことの例である。Ref 4.3.1, tab 4.14\n\nB. 不正解。この方法でカオス・エンジニアリング・ツールを使用しても、低品質のインシデント解決による技術的負債の削減に関する質問の状況には対処できない。Ref 4.3.1, tab 4.14\n\nC. 不正解。さらなるインシデントの発生を防ぎ、それによって技術的負債を削減しようとする試みにもかかわらず、インシデントは依然として解決されるべきである。インシデント・エスカレーションはインシデント解決を支援すべきである。Ref 4.3.1, tab 4.14\n\nD. 不正解。インシデント解決は停止の徹底的な理解から導出されたものではなく、恒久的な変更の基礎とすべきではない。これらの解決策はエラーを修正するものでもない。このような変更は、さらなる技術的負債の発生を防止しないかもしれない。Ref 4.3.1, tab 4.14"},
{n:34, t:"新製品およびサービスの調査、ならびに既存の製品およびサービスの継続的な評価を伴うハイベロシティ IT の目標はどれか？", c:["価値ある投資","迅速な開発","対障害弾力性のある運用","保証された適合性"], a:0, e:"A. 正解。「価値ある投資」目標は、デジタル投資の識別と正当化を含む。「新しいデジタル製品およびサービスは、収益性の観点から構想および評価されるべきである」、また「より価値のある投資の選択肢が存在する可能性があるため、投資が正当化され承認された後も継続的に評価することが重要である」。Ref 4.1\n\nB. 不正解。「迅速な開発」は「新しいおよび改善されたデジタル製品とサービスを頻繁に、迅速に、信頼性高く実現すること」を含む。Ref 4.2\n\nC. 不正解。「対障害弾力性のある運用」は「デジタル製品が必要なときにいつでも使用可能であることを確実にすること」を含む。Ref 4.3\n\nD. 不正解。「保証された適合性」は「サービス提供およびサービス消費が、ガバナンス、リスク、コンプライアンスに関する企業および規制上の指令に準拠することを保証すること」を含む。この質問には企業および規制上の指令への言及はない。Ref 4.5"},
{n:35, t:"あるサービス・プロバイダが、新しいサービス消費者向けのアプリケーションを開発している。潜在的なユーザとのプロトタイピング・セッション中に、アプリケーションのコストを増加させ、その実現可能性を脅かす可能性のある相反する要件が識別された。相反する要件の優先順位付けに最も役立つプラクティスはどれか？", c:["関係管理","サービス検証およびテスト","情報セキュリティ管理","リスク管理"], a:0, e:"A. 正解。「関係管理」プラクティスは、対立を解決し要件に優先順位を付けるためにすべてのステークホルダーと連絡を取り合うのに最適である。関係管理プラクティスは「新規または変更された製品およびサービスに対する顧客の優先順位の確立への関与」、および「苦情への対応と相反する要件の調停への関与」によって価値ある投資に貢献する。Ref 4.1.3, tab 4.3\n\nB. 不正解。「サービス検証およびテスト」プラクティスは、コンポーネントが実用最小限の製品をサポートしているかをチェックすることにより「価値ある投資」目標を支援するが、ユーザ要件間の対立を解決することはできない。サービス検証およびテストプラクティスは「すべてのサービス・コンポーネントが実用最小限の製品またはサービスをサポートすることをチェックするためのテスト・ケースを開発する」ことにより、価値ある投資に貢献する。Ref 4.1.2, tab 4.2\n\nC. 不正解。「情報セキュリティ管理」プラクティスは「価値ある投資」目標を支援するが、相反するユーザ要件の解決には役立たない。「情報セキュリティ管理」プラクティスの目的は「組織が事業を遂行するために必要な情報を保護すること」である。Ref Information Security Management Practice Guide 2.1\n\nD. 不正解。「リスク管理」プラクティスは「価値ある投資」目標を支援するが、相反するユーザ要件の解決には役立たない。「リスク管理の目的は、組織がリスクを理解し、効果的に取り扱うことを確実にすること」である。Ref Risk Management Practice Guide 2.1"},
{n:36, t:"ある組織には IT 変更が多数あり、展開速度を懸念している。多くの変更は、変更に関与する人々の作業負荷への影響を理解せずに開始されている。この状況を解決するのに最も役立つ、迅速な開発のための技法はどれか？", c:["カンバン","レトロスペクティブ","Infrastructure as Code","疎結合の情報システム・アーキテクチャ"], a:0, e:"A. 正解。カンバンは作業負荷を可視化して理解するのに役立つ。「カンバンは、作業の予測可能で、リズミカルで、一定の流れを開発および管理することを目的とした原則、プラクティス、定期活動の集まりである。」Ref 4.2.7\n\nB. 不正解。レトロスペクティブは、スプリントがどれだけうまく実施されたかを組織が理解するのに役立つ。人間の作業負荷の問題は既に識別されているため、レトロスペクティブは解決に役立たない。「アジャイル・ソフトウェア開発において、レトロスペクティブとは、イテレーション（または『スプリント』）またはプロジェクトの終わりにチームが開催する、何がうまくいったか、何を改善できるか、調査結果から将来どのように利益を得るかを議論する会議である。」Ref 4.2.3.1\n\nC. 不正解。「Infrastructure as Code」は展開速度を高めるのに役立つが、人間の作業負荷の理解不足の問題を解決しない。「Infrastructure as Code (IaC) は環境の高速プロビジョニングを可能にし、迅速な開発と対障害弾力性のある運用に貢献する。」Ref 4.2.1\n\nD. 不正解。疎結合の情報システム・アーキテクチャは、チーム間で必要な相互作用を制限することにより展開速度を高めるのに役立つが、人間の作業負荷の理解不足の問題を解決しない。「疎結合の情報システム・アーキテクチャは、比較的小さく独立したコンポーネントに基づいている。このアーキテクチャは、小さく比較的独立した、製品またはサービスベースのチームおよびプラットフォームベースのチームで作業を行うことを可能にする。」Ref 4.2.2"},
{n:37, t:"あるサービス・プロバイダが、6ヶ月前に一部のサービスの開発にハイベロシティ IT アプローチを採用した。更新は現在、定期的に成功裏に展開されている。しかしサービス障害の数が増加していることを示す証拠がある。開発チームは、これらの問題を解決するために「完了の定義」を改訂することを提案した。可用性管理プラクティスはどのように「完了の定義」の改善に貢献できるか？", c:["リリースが稼働環境に移行されるとき、すべてのソフトウェア・コンポーネントが要件を満たすために検証されることを確実にすることにより","テスト活動が最新の「完了の定義」を中心に開発されることを確実にすることにより","達成可能な保証要件が顧客と交渉および合意されることを確実にすることにより","コードが理解可能、保守可能で、将来の変更をサポートできることを確実にすることにより"], a:2, e:"A. 不正解。コンポーネントを稼働環境に移行する前に検証すべきは「展開管理」プラクティスであり、可用性管理プラクティスではない。展開管理プラクティスは「対障害弾力性のある運用」目標に貢献する。「リリースを稼働環境に移行する際、チームはサポートのための成果物が完了していることを検証すべきである：すべての要件、ユーザ・ストーリー、テストが受け入れられているべきである。」Ref 4.3.3, tab 4.16\n\nB. 不正解。「サービス検証およびテスト」プラクティスの「完了の定義」への貢献は、「テスト活動を完了の定義を中心に構成して、複数のタイプのテストが実施されることを確実にする」ことである。Ref 4.3.3, tab 4.16\n\nC. 正解。「可用性管理」プラクティスは、交渉された保証要件を「完了の定義」に含めることができることを確実にする。「可用性管理」プラクティスは「対障害弾力性のある運用」目標に貢献する。「新規または変更されたサービスの詳細な保証要件は、ステークホルダーと交渉および合意される必要がある。」Ref 4.3.3, tab 4.16\n\nD. 不正解。コードが理解可能、保守可能、将来の変更をサポートできることを確実にするのは「ソフトウェア開発と管理」プラクティスであり、「可用性管理」プラクティスではない。「ソフトウェア開発と管理」プラクティスは「対障害弾力性のある運用」目標に貢献する。「ソフトウェアは稼働環境に展開される前に完了の定義を満たすように開発（または構成）でき、コードが理解可能、保守可能で、将来の変更をサポートする準備ができていることを確実にする。」Ref 4.3.3, tab 4.16"},
{n:38, t:"ある組織はアジャイルな働き方を採用し、継続的インテグレーション/継続的デリバリを使用している。組織の「ビジネス分析」プラクティスはウォーターフォール型の働き方をモデルにしている。顧客要件の確立から、構築、テスト、展開時の要件検証への線形の流れがある。新しい働き方によりよく整合させるため、「ビジネス分析」プラクティスはどのように変更すべきか？", c:["顧客要件を確立するステップを残し、その他すべての活動を最小化する","顧客とのエンゲージメントの開始時に顧客要件を確立する","ビジネス分析の役割を他の開発の役割と組み合わせる","ビジネス分析の活動を、ビジネス・リレーションシップ・マネージャの責任にする"], a:2, e:"A. 不正解。CI/CD は統合テストと展開を自動化するが、ビジネス分析活動は自動化しない。「継続的インテグレーションは、コードがコミットされるたびにビルドおよびコード・テスト・プロセスで達成される自動化である。」「継続的デリバリは、新しいリリースを構築およびテストし、本番環境に昇格させるプロセスに焦点を当てる。」Ref 4.2.5\n\nB. 不正解。ビジネス分析活動は、開発期間全体に織り込まれるべきである。「ビジネス分析が製品チームによって実行される場合、それはプロジェクト主導型ではなく、より継続的な活動となる。」Ref Business Analysis Practice Guide 2.1\n\nC. 正解。ビジネス分析活動は開発活動内に組み込まれるべきである。「ビジネス分析が製品チームによって実行される場合、それはプロジェクト主導型ではなく、より継続的な活動となる。」Ref Business Analysis Practice Guide 2.1\n\nD. 不正解。「アジャイルの文脈では、ビジネス分析プラクティスは特定のチームや役割と関連付けられることが少なくなり、製品オーナまたはサービス・オーナのような役割を果たす多技能の実務家によって適用されることが増えている。」Ref Business Analysis Practice Guide 2.1"},
{n:39, t:"サービスバリュー・チェーン活動のすべてに適用されるハイベロシティ IT の目標はどれか？", c:["迅速な開発","価値ある投資","保証された適合性","対障害弾力性のある運用"], a:2, e:"A. 不正解。「迅速な開発の目標は主に、設計および移行および獲得／構築のバリュー・チェーン活動の一部として行われるアプリケーション開発およびインフラストラクチャ・エンジニアリングによって達成される。」Ref 2.5.1\n\nB. 不正解。「価値ある投資の目標は主に、計画バリュー・チェーン活動の一部として行われる意思決定によって達成される。」Ref 2.5.1\n\nC. 正解。「5 つの目標は、保証された適合性を除いて特定のバリュー・チェーン活動と密接に関連しており、保証された適合性はバリュー・チェーン全体に適用される。」Ref 2.5.1\n\nD. 不正解。「対障害弾力性のある運用目標は主に、提供およびサポートのバリュー・チェーン活動の一部としてシステムを実行および保守することにより達成される。」Ref 2.5.1"},
{n:40, t:"ある組織は、情報セキュリティ・インシデントを管理する計画が効果的であることを確実にしたいと考えている。これを確実にするための最善のアプローチはどれか？", c:["独立して計画をテストし、改善方法を推奨するためにサプライヤを起用する","カオス・エンジニアリングを使用して、定期的にセキュリティ・インシデントを注入することにより計画をテストする","関連チームと計画を定期的にウォークスルーすることでテストする","セキュリティ・インシデントを予防、検出、是正するためのコントロールを計画に追加する"], a:2, e:"A. 不正解。サプライヤはある程度計画をテストできるかもしれないが、セキュリティ・インシデントの管理に関与するチームがウォークスルーに関与することが重要である。「計画と手順を定期的にウォークスルーすることで、チームは欠陥と非効率性を発見し、その発見事項を反映するように情報セキュリティ計画とコントロールを更新する。」Ref Information Security Management Practice Guide 2.4.3\n\nB. 不正解。カオス・エンジニアリングは、セキュリティ脆弱性のいくつかのインスタンスを発見し終了するために使用でき、セキュリティ・インシデントの防止に役立つが、セキュリティ・インシデントの検出と是正の計画を完全にテストして改善することはできない。「Security monkey - セキュリティ違反または脆弱性のインスタンスを発見し終了する。」「計画と手順を定期的にウォークスルーすることで、チームは欠陥と非効率性を発見し、その発見事項を反映するように情報セキュリティ計画とコントロールを更新する。」Ref Information Security Management Practice Guide 2.4.3\n\nC. 正解。「したがってテストは、全体的な情報セキュリティ管理の重要な部分であり、選択された計画とコントロールが実際に機能していることを確実にする唯一の方法である。」「計画と手順を定期的にウォークスルーすることで、チームは欠陥と非効率性を発見し、その発見事項を反映するように情報セキュリティ計画とコントロールを更新する。」Ref Information Security Management Practice Guide 2.4.3\n\nD. 不正解。質問は、情報セキュリティ・インシデントを管理するための計画が既に設計されており、組織はこれらの計画が効果的であることを確実にしたいと考えていることを明確にしている。より多くのコントロールを設計してもこれは達成されず、既に設計されたコントロールが適切に機能することを確認するためにテストすることが重要である。「経験から、テストされていない計画は意図したとおりに機能しない、またはまったく機能しないことがわかっている。」Ref Information Security Management Practice Guide 2.4.3"},
/* === Paper 2 Q041-Q080（翻訳済）=== */
{n:41, t:"ある組織は、人間中心、ホリスティック、共創的なアプローチをサービス・デザインに採用したいと考えている。このアプローチの『共創的』な側面を表すのはどれか？", c:["個別の要素を変更する際に、サービス・デザインのすべての要素を考慮する","内部および外部のすべての関連ステークホルダーを設計プロセスに参加させる","設計活動とリソースを編成（オーケストレート）するためにサービス・デザイン・モデルを使用する","ステークホルダーに共感し、サービスを設計する際にユーザの感情を考慮する"], a:1, e:"A. 不正解。これはホリスティックなアプローチを反映している。「サービス・デザインのすべての側面に対して全体的かつ結果重視のアプローチを採用すること、および個別要素を変更／修正する際には他のすべての側面を考慮することが重要である」。Ref Service Design Practice Guide 2.1\n\nB. 正解。「『共創された価値』とは、サービス消費者、サービス・プロバイダ、その他のステークホルダーにとっての価値を指す」。サービス・デザイン・プラクティスの目的は「目的に適しており使用に適した、組織およびそのエコシステムにより提供できる製品およびサービスを設計すること」。すべての関連ステークホルダーを設計プロセスに参加させることが共創の本質である。Ref 4.4, Service Design Practice Guide 2.1\n\nC. 不正解。これはサービス・デザインにおけるリソースの編成に関連する。「効果的なサービス・デザインを確実にするには、四つの側面すべてでリソースを編成することが必要」。Ref Service Design Practice Guide 2.4.2\n\nD. 不正解。これはデザイン思考に関連し、人間中心アプローチを反映する。「ステークホルダーに共感する ― ステークホルダーの視点とニーズを理解できることが重要」。Ref 3.2.1.2"},
{n:42, t:"ある組織は、いくつかの新サービスをマイクロサービスとして設計することを決めた。その理由の一つは、市場投入までの時間を短縮することである。この状況に対する『アーキテクチャ管理』プラクティスの最良の貢献はどれか？", c:["組織のビジネス・アーキテクチャをレビューして、リソースの使用方法を理解する","サービス・デザインの労力を削減するため、アーキテクチャのテンプレートとガイドラインを提供する","新しいマイクロサービスのコンポーネント間の相互依存関係を追跡するためのシステムを維持する","新しいマイクロサービスに関連する顧客要件を理解し解釈する"], a:1, e:"A. 不正解。「包括的なアーキテクチャ管理プラクティスは組織のアーキテクチャのすべてのレベルに適用され、ビジネス・アーキテクチャもこれに含まれる」が、この活動は市場投入までの時間短縮の目標には直接貢献しない。Ref Architecture Management Practice Guide 2.1\n\nB. 正解。「アーキテクチャ管理」プラクティスの成功要因は「組織のアーキテクチャが目標状態へ継続的に進化することを確実にすること」。関連するアーキテクチャ・テンプレートとガイドラインを維持することにより、サービス・デザインの労力と時間を削減できる。Ref Architecture Management Practice Guide 2.4.2\n\nC. 不正解。これは「サービス構成管理」プラクティスに関連する。「さまざまなサービスおよびサービス・コンポーネントとそれらの相互関係に関する情報を設計および維持する」。Ref 4.2.2, tab 4.6\n\nD. 不正解。これは「ビジネス分析」プラクティスに関連する。「消費者ニーズを理解し、それを疎結合のサービス・アーキテクチャの各コンポーネントの詳細要件に変換する」。Ref 4.2.2, tab 4.6"},
{n:43, t:"あるチームが、ユーザがオンラインで購入できるようにする新しいモバイル・アプリを開発している。ユーザ・エクスペリエンスに最初に貢献すべきプラクティスはどれか、また製品ライフサイクルのどの時点でか？", c:["「リリース管理」プラクティスが最初に貢献すべきであり、コードが書かれた後、初期パイロット・テストの前に貢献する","「サービスデスク」プラクティスが最初に貢献すべきであり、アプリ展開後、ユーザに問題が発生したときに貢献する","「サービスレベル管理」プラクティスが最初に貢献すべきであり、アプリ設計後、開発の最終確定前に貢献する","「サービス・デザイン」プラクティスが最初に貢献すべきであり、開発作業が始まる前に貢献する"], a:3, e:"A. 不正解。リリース管理の貢献は「成功および失敗したリリースを調査し将来の成功を改善する機会を識別すること」などだが、いずれもサービス・デザインの後に発生する。Ref 4.2.3.2, tab 4.8, 4.2.5, tab 4.10\n\nB. 不正解。サービスデスクの貢献は「ユーザとコミュニケートし、共感と心の知能指数をもってユーザの経験的ニーズを理解すること」だが、いずれもサービス・デザインの後に発生する。Ref 4.3.6, tab 4.19, 4.4.1, tab 4.21\n\nC. 不正解。サービスレベル管理の貢献に「疎結合アーキテクチャからのサービスレベルを、サービス消費の時点での消費者期待と整合させる設計」があるが、サービスレベル管理は『アプリ設計後』からでは遅すぎる。Ref 4.2.2, tab 4.6\n\nD. 正解。「サービス・デザインは、創出される製品およびサービスがユーザに良い体験を提供することを確実にする」。「効果的な調整、ホリスティックな設計アプローチ、情報の流れ、ステークホルダーの関与、サービスライフサイクルの早期段階からの設計モデルの良好な計画が成功に不可欠」。Ref Service Design Practice Guide 2.1, 2.4.2"},
{n:44, t:"ある組織は大規模な展開とリリースの後にサービス中断を経験している。展開のサイズと展開タイプの種類のばらつきの両方を減らしたいと考えている。これを達成する迅速な開発のための技法はどれか？", c:["インフラストラクチャ・アズ・コード","疎結合の情報システム・アーキテクチャ","非難なきポストモーテム","かんばん（Kanban）"], a:1, e:"A. 不正解。「インフラストラクチャ・アズ・コード (IaC) は環境のより高速なプロビジョニングを可能にし、迅速な開発と対障害弾力性のある運用に貢献する」。Ref 4.2.1\n\nB. 正解。疎結合の情報システム・アーキテクチャは「システムを比較的独立して開発・管理できる部分に分解することにより」、サービス・コンポーネントの個別の開発・テスト・展開を可能にする。Ref 4.2.2\n\nC. 不正解。非難なきポストモーテムは中断の原因を識別するのに役立ったかもしれないが、本シナリオでは是正措置はすでに識別されている。「非難なきポストモーテムとは、インシデントに先行する状況やイベントの非評価的な記述と分析」である。Ref 4.2.3.2\n\nD. 不正解。かんばんは作業の流れを管理する手法であり、必要な作業を定義する手法ではない。「カンバンはリーン手法であり、ハイレベルに可視化されたプル型ワークフローに基づき、需要と利用可能なキャパシティのバランスを取り、システムレベルのボトルネックの取り扱いを改善することにより、人間のシステムにわたる作業を管理・改善する」。Ref 4.2.7"},
{n:45, t:"あるサービス・プロバイダは、価値が共創されることを確実にしたい。これを達成する最善の方法はどれか？", c:["ユーザがサービスの使用方法を理解し、すべてのサービス・インタラクションで良い体験ができることを確実にする","サービス・デザインからサービス・インタラクションまでの全段階で、顧客とユーザを関与させる","サービスが、有用性および保証の両方について合意された目標を満たしていることを確実にする","顧客フィードバックが理解されることを確実にするため、関係マネージャをサービスレビューに関与させる"], a:1, e:"A. 不正解。この回答はサービス・インタラクションのみを扱う。「共創は、価値が実際に実現されるサービス・インタラクションだけでなく、サービス・デザインおよびさらなる開発への消費者の関与も含む」。Ref 4.4\n\nB. 正解。「共創は、価値が実際に実現されるサービス・インタラクションだけでなく、サービス・デザインおよびさらなる開発への消費者の関与も含む」。Ref 4.4\n\nC. 不正解。有用性および保証の合意目標を満たすだけでは、価値が共創されることを保証するのに十分ではない。「共創された価値は、サービス消費者がサービス・プロバイダの製品およびサービスを効果的に使用し、その有用性と保証から便益を得ることに関するもの」。Ref 4.4\n\nD. 不正解。顧客からのフィードバック収集は重要だが、十分ではない。すべての段階で顧客とユーザを関与させることが重要である。Ref 4.4"},
{n:46, t:"デジタル技術への有益な投資で、その価値が厳しい期限内に実現されるものを最もよく表す用語はどれか？", c:["デジタル製品","デジタル・トランスフォーメーション","ハイベロシティ IT","IT トランスフォーメーション"], a:2, e:"A. 不正解。デジタル製品とは、消費者が商品、リソース、または製品の関連サービスのインタラクションにおいてデジタル技術を体験できるものである。「製品は、その商品、リソース、または関連するサービスのインタラクションでデジタル技術が重要な役割を果たしている場合、デジタルである」。Ref 2.6.1\n\nB. 不正解。「『デジタル・トランスフォーメーション』は、組織が大きく異なる方法で事業を遂行できる、あるいはこれまでとは大きく異なる事業を行えるようにする、デジタル化、ロボット化、その他の自動化形態への大規模な投資を示すためにしばしば使用される」。Ref 2.4\n\nC. 正解。ハイベロシティ IT は「市場投入までの時間、顧客までの時間、変更までの時間および一般的にスピードが重視される、重要な事業を実現するためのデジタル技術の適用」である。Ref 2.1\n\nD. 不正解。「『IT トランスフォーメーション』は、IT サービスの提供方法を改善する大きな変化を表すためにしばしば使用される」。Ref 2.4.1"},
{n:47, t:"サービス・プロバイダの観点から、デジタル製品ライフサイクルはどのように始まるか？", c:["顧客のオンボーディングで","市場機会の探索で","価値の共創で","顧客のオフボーディングで"], a:1, e:"A. 不正解。「サービスが提供および消費される前に、両者で準備が行われるオンボーディング活動がある」。これはサービス・プロバイダと消費者が市場を探索して互いを発見した後に行われる。Ref 2.6.2\n\nB. 正解。「製品のライフサイクルは、新製品への投資のための市場機会の探索から始まる」。Ref 2.6.2\n\nC. 不正解。「サービスが提供および消費される前に、両者で準備が行われるオンボーディング活動がある。その後、プロバイダと消費者は、いずれかの当事者がエンゲージメントの終了を宣言するまで、サービスを使用して価値を共創するためにインタラクションを始める」。価値共創は探索とオンボーディングの後に発生する。Ref 2.6.2\n\nD. 不正解。「これに続いてオフボーディング活動とエンゲージメント終了が行われる」。これはデジタル製品ライフサイクルの終わりに発生する。Ref 2.6.2"},
{n:48, t:"予測不可能であるため、硬直なプロセスに従うよりも実験から学習する方が適切なシステムを表す用語はどれか？", c:["明白 (Obvious)","込み入った (Complicated)","複雑 (Complex)","無秩序 (Disorder)"], a:2, e:"A. 不正解。「明白：因果関係が明確であり、あらかじめ定められたベスト・プラクティスを適用すべき場合」。Ref 3.2.3.1\n\nB. 不正解。「込み入った：因果関係は明確ではないが、分析や専門知識によって特定でき、グッド・プラクティスを適用」。Ref 3.2.3.1\n\nC. 正解。「これらのシステムに固有の予測不可能性は、あらかじめ定められたプロセスでの作業に慣れている人々にとっての課題となる」。「複雑：因果関係が不明瞭で知ることができず、安全に失敗できる実験を要求する（創発的プラクティス）」。Ref 3.2.3.1\n\nD. 不正解。「無秩序：他のどの領域にいるかが分からない状態」。Ref 3.2.3.1"},
{n:49, t:"ある組織の変更実務家は、各変更について許容するリスクのレベルをケース・バイ・ケースで決定する責任を負っている。最近、組織は変更に関連する規制違反を経験した。この状況に対する最良の改善行動はどれか？", c:["実務家が変更の分類に応じて、許容可能なリスクレベルのモデルを作成する","組織は、IT 機能と監査人の間でリスクに関する共通理解を作成するため、DevOps 監査防衛ツールキット⚠️[要確認: DevOps Audit Defense Toolkit]からのガイダンスを採用する","開発チームが各変更について許容可能なリスクレベルを、その分野の専門知識に基づいて決定する","許容可能なリスクレベルに関する決定が組織の統治機関に移され、その決定が変更実務家に伝達される"], a:3, e:"A. 不正解。モデルを作成するか個別判断するかにかかわらず、変更実務家が組織にとって許容可能なリスクレベルを決定すべきではない。「ガバナンスについて、実務家は統治するのではなく、統治される側である」。Ref 4.5\n\nB. 不正解。DevOps 監査防衛ツールキットの目的は組織にとって許容可能なリスクレベルを決定することではなく、「DevOps コミュニティに見られる新しいより流動的な作業パターンによって引き起こされる IT と監査の間の緊張」に対処することである。Ref 4.5.1\n\nC. 不正解。実務家を含む開発チームは、組織にとって許容可能なリスクレベルを決定すべきではない。Ref 4.5\n\nD. 正解。組織の統治機関が組織にとって許容可能なリスクレベルを決定する。「ハイベロシティはリスクテイクとしばしば結び付けられる……統治機関は、その指示が従われていることを保証されなければならない」。Ref 4.5"},
{n:50, t:"あるサービス・プロバイダは、本番環境を模擬シナリオでテストしている。「インフラストラクチャおよびプラットフォーム管理」プラクティスは、これらのテストの結果として重大な停止が発生しないことを確実にすることが期待されている。この活動が最も貢献するハイベロシティ IT の目標はどれか？", c:["対障害弾力性のある運用","共創された価値","迅速な開発","価値ある投資"], a:0, e:"A. 正解。本問はカオス・エンジニアリングの例である。カオス・エンジニアリングに関連する「インフラストラクチャおよびプラットフォーム管理」活動は「カオス・エンジニアリング・ツールにより引き起こされる予期しない停止に対処するための十分な対障害弾力性および冗長性をもつインフラストラクチャおよびプラットフォームの設計」である。Ref tab 4.15\n\nB. 不正解。「共創された価値の目標には、サービス・プロバイダとサービス消費者の緊密なコラボレーションを通じた価値の共創が含まれる」。本問の焦点はカオス・エンジニアリング・テストに耐える対障害弾力性の向上である。Ref 4.4\n\nC. 不正解。「迅速な開発の目標には、新しいまたは改善されたデジタル製品およびサービスを頻繁に、迅速かつ信頼性高く実現することが含まれる」。本問の焦点ではない。Ref 4.2\n\nD. 不正解。「価値ある投資の目標には、事業戦略に大きく貢献するデジタル投資の識別と正当化が含まれる」。本問の焦点ではない。Ref 4.1"},
{n:51, t:"マネージャはリーン・カルチャの採用をどのように最もよく示すことができるか？", c:["実務家に対し、自分たちの作業のあり得る意図しない結果を探求するよう促すこと","安全性にコミットし、従業員が自分らしく表現できるよう促すこと","実務家に対し、複雑性思考を実践するよう促すこと","実際の作業プロセスを観察し、実務家に質問すること"], a:3, e:"A. 不正解。これは倫理に関するものである。「倫理を適用する際、実務家は『自分たちの行動が他者にどのように影響するか考える』ような行動を目指すべき」。Ref 3.2.1.1\n\nB. 不正解。これはセーフティ・カルチャに関するもの。「セーフティ・カルチャは、人々が自分らしく快適に過ごせる環境」である。Ref 3.2.2.2\n\nC. 不正解。これは複雑な環境での作業に関するもの。「効果的に作業するために実務家は環境やシステムの性質を理解する必要があり、システム思考、特に複雑性思考が役立つ」。Ref 3.2.3.1\n\nD. 正解。「ゲンバ・ウォーク⚠️[要確認: Gemba walks]はリーン・マネジメント哲学の主要な部分。マネージャは実際の作業プロセスを観察し、作業を理解し、質問し、学ぶ」。Ref 3.2.3.2"},
{n:52, t:"ある組織にはかつて、ステークホルダーを関与させずに頻繁に意思決定を行い、フィードバックを受け入れない製品オーナーがいた。その結果、ユーザは不満を抱き、開発チームは不幸になり、製品の価値は低下した。前任者を置き換えるため、新しい製品オーナーが任命された。「関係管理」プラクティスは、新しい製品オーナーがステークホルダーの信頼を素早く取り戻し、製品の価値を最大化するのを支援するために、どのように最もよく貢献できるか？", c:["組織内の全員が共有できる共通の価値観と原則を採用する","顧客の優先順位を確立し、苦情に対処するために使用できる技法を提供する","適切な投資判断が行われ、リソースが適切に配分されることを確実にする","組織の要件に基づいて、チームが製品開発に使用しているアプローチを改善する"], a:1, e:"A. 不正解。これは「関係管理」プラクティスの貢献ではあるが、本状況での最良のアプローチではない。組織のカルチャに関するもので、変えるのに時間がかかる。「関係管理に対する共有されたアプローチは組織のカルチャの重要な部分」。Ref Relationship Management Practice Guide 2.4.1\n\nB. 正解。これは「関係管理」プラクティスの貢献である。苦情への対処は、不満を抱くユーザと不幸なチームの声が聞かれることを確実にする。顧客の優先順位の確立は、製品の価値を最大化することにつながる。「関係管理 ― 新規または変更された製品およびサービスに対する顧客の優先順位の確立への関与」「苦情への対処および矛盾する要件の調停への関与」。Ref tab 4.3, Relationship Management Practice Guide 2.4.3\n\nC. 不正解。これは「ポートフォリオ管理」プラクティスの貢献である。Ref Portfolio Management Practice Guide 2.1\n\nD. 不正解。これは「ソフトウェア開発と管理」プラクティスの貢献である。Ref Software Development and Management Practice Guide 2.4.1"},
{n:53, t:"問題マネージャは、組織が使用しているサードパーティ・ソフトウェア製品の重大な欠陥に対するパッチが利用可能であると通知された。分析後、その欠陥のあるバージョンのアプリケーションは廃止されており、もはや使用されていないため、欠陥は組織に影響を与えないと判断した。問題マネージャは次に何を行うべきか？", c:["将来のインシデントをこの問題に関連付けることができるよう、既知のエラー記録を作成する","パッチを実用的に可能な限り早く展開することを計画する","組織にとって関連性がないため、問題記録をクローズする","緊急度と影響度に基づいて、問題の分析の優先順位を付ける"], a:2, e:"A. 不正解。既知のエラーとは「分析されたが解決されていない問題」。本ケースでは問題は組織に影響しないため解決の必要がなく、既知のエラー作成も不要。「脆弱性が組織のサービスに影響しない場合、問題記録は分析後にクローズされてよい」。Ref Problem Management Practice Guide 2.2.2\n\nB. 不正解。影響を受けるバージョンが使用されていないため、パッチを展開する必要はなく、「実用的に可能な限り早く」も不要。Ref Problem Management Practice Guide 2.2.2\n\nC. 正解。「組織が脆弱なバージョンのソフトウェアを使用していない、または脆弱性が組織のサービスに影響しない場合、問題記録は分析後にクローズされてよい」。Ref Problem Management Practice Guide 2.2.2\n\nD. 不正解。問題は既に分析されており、クローズできる。Ref Problem Management Practice Guide 2.2.2"},
{n:54, t:"ある組織は新サービス全体のユーザ・エクスペリエンスを理解したい。新サービスの体験に関するデータを収集する最善の方法はどれか？", c:["新サービスからのアプリケーション・パフォーマンス測定基準を使用してユーザ・エクスペリエンス・スコアを計算する","ビジネス関係マネージャが月次会議で顧客からユーザ・エクスペリエンス測定基準を収集する","サービスデスクが、ユーザとやり取りするたびに新サービスの単純な評価を依頼する","IT サービスに対するユーザ満足度を評価する年次調査でデータを収集する"], a:2, e:"A. 不正解。「『サービス体験』とは、サービス消費者がサービスの『技術的』出力と人間的視点からの認識の組み合わせに基づいてサービスを評価する事実を指す」。Ref 4.4.1\n\nB. 不正解。顧客が新サービスに対する全体的なユーザ満足度を把握していない可能性がある。サービスデスクがすべてのユーザに対するサービス・プロバイダの単一窓口となるべき。Ref Service Desk Practice Guide 2.1\n\nC. 正解。「サービスデスク」プラクティスはサービス体験への貢献として「サービス体験データの収集（ユーザがサービスに満足／不満足の概算）」を行う。Ref 4.4.1, tab 4.21\n\nD. 不正解。年次調査ではフィードバックがあまりにも遅すぎる場合がある。IT サービス全般に対する満足度では、ユーザがこの新サービスをどう体験しているかを十分に理解できない可能性がある。Ref 4.4.1, tab 4.21"},
{n:55, t:"デジタル組織の例はどれか？", c:["IT を使用して戦略的方向性を変える組織","IT を使用して運用プロセスを支援する組織","IT を使用して「サービスデスク」プラクティスを改善する組織","IT トランスフォーメーションを経た組織"], a:0, e:"A. 正解。「デジタル組織はデジタル技術によって実現される。デジタル技術はこれらの組織の内部プロセスの重要な基盤的な実現要素であり、しばしばその製品およびサービスの一部である」。Ref 2.3\n\nB. 不正解。デジタル組織とは、運用面だけでなく戦略的にもデジタル技術を活用する組織。Ref 2.3\n\nC. 不正解。これは戦略的便益につながる証拠がない、運用上の技術利用である。Ref 2.3\n\nD. 不正解。「事業と IT が別個の組織機能と見なされる組織では、『IT トランスフォーメーション』は IT サービスの提供方法を改善する大きな変化を表すためにしばしば使用される」。IT トランスフォーメーションが必ずしもデジタル・トランスフォーメーションやデジタル組織につながるわけではない。Ref 2.4.1"},
{n:56, t:"IT トランスフォーメーションの例はどれか？", c:["開発と運用の間の作業の流れを自動化する","事業活動のパフォーマンスを大幅に加速する","技術を使用してパーソナライズされた顧客体験を作成する","デジタル技術を使用してより迅速な事業意思決定を可能にする"], a:0, e:"A. 正解。この回答はデジタル・ソリューションがどのように提供されるか（どのように使用されるかではなく）の変更を記述している。「IT トランスフォーメーションは、IT サービスおよび情報システムがどのように開発、運用、サポートされるかに焦点を当てる」。Ref 2.4.1\n\nB. 不正解。これはハイベロシティ IT の記述である。「ハイベロシティ IT は、市場投入までの時間、顧客までの時間、変更までの時間、一般的にスピードが重要となる、重要な事業実現のためのデジタル技術の適用」。Ref 2.1\n\nC. 不正解。これはデジタル・トランスフォーメーションの記述。「デジタル・トランスフォーメーションは、組織の達成目標の実現を大幅に改善するためのデジタル技術の利用」。Ref 2.4\n\nD. 不正解。これもデジタル・トランスフォーメーションの記述。Ref 2.4"},
{n:57, t:"仮説をテストするためのプロトタイプを作成することに関係する概念はどれか？", c:["デザイン思考","セーフティ・カルチャ","継続的改善","複雑性思考"], a:0, e:"A. 正解。デザイン思考の典型的な行動パターンは「観察と内省に基づいて仮説を作成し、プロトタイプでそれらをテストする」ことである。Ref 3.2.1.2\n\nB. 不正解。セーフティ・カルチャは「人々が自分らしくあること、自分を表現することに快適である環境」。Ref 3.2.2.2\n\nC. 不正解。継続的改善モデルは組織に「改善を実装するための構造化されたアプローチ」を提供する。Ref 3.2.3.3\n\nD. 不正解。複雑性思考は「システムとそれが機能する文脈に固有のさまざまなレベルの複雑性の認識と理解」に焦点を当てる。Ref 3.2.3.1"},
{n:58, t:"あるサービス・プロバイダは、そのクラウド・サービスの大規模な停止を多数経験している。これらは、サービスの予測不可能で不均一な使用の結果であると疑われている。「キャパシティおよびパフォーマンス管理」プラクティスはこの問題の解決にどのように貢献できるか？", c:["クラウド・サービスの実用最小限の製品を支援するために必要なリソースを識別しコストを算出する","AIOps ツールからの出力を分析して、クラウド・サービスのワークロードのパターンと異常を識別する","クラウド・サービスの問題解決に投資するか、他のサービスに支出を割り当てるかを決定する","定期的な更新を必要とするクラウド・サービスのコンポーネントを識別し、その実装を自動化する"], a:1, e:"A. 不正解。これは「キャパシティおよびパフォーマンス管理」プラクティスが価値ある投資の目標を支援する方法を記述している。Ref 4.1.2, tab 4.2\n\nB. 正解。「キャパシティおよびパフォーマンス管理」プラクティスは AIOps を支援することにより対障害弾力性のある運用の目標に貢献する。「AIOps はパターンと異常を識別し、資産のキャパシティと利用率を判断し、将来の製品やサービスのキャパシティを計画する機能を提供する」。Ref 4.3.5, tab 4.18\n\nC. 不正解。これは「ポートフォリオ管理」プラクティスが対障害弾力性のある運用に貢献する方法を記述している。Ref 4.3.1, tab 4.14\n\nD. 不正解。これは「展開管理」プラクティスが迅速な展開に貢献する方法を記述している。Ref 4.2.1, tab 4.5"},
{n:59, t:"ある組織は複雑なサービスのパフォーマンスと信頼性を改善するための改善を行うことを計画している。現状を分析し、達成したいことを把握している。改善の『どうやってそこに到達するか？』のステップに対してどのアプローチを取るべきか？", c:["詳細なギャップ分析に基づいて計画を作成し、計画のステップに従う","望ましい将来の状態の測定基準を定義し、それらを継続的に測定する","実用最小限の製品を定義し、インクリメンタルに改善する","仮説を確立し、安全に失敗できる実験を実施する"], a:3, e:"A. 不正解。これは複雑なシステムであり、あらかじめ定められた計画よりもトヨタ・カタ・アプローチがより適切である。「状況はしばしば予測不可能であり、大きな変更のためのあらかじめ定められた計画を作成し従うことは困難または無責任ですらある」。Ref 3.2.3.3\n\nB. 不正解。望ましい将来の状態の測定基準を定義することは継続的改善モデルの『どこに行きたいか？』ステップの一部。Ref ITIL 4 Foundation 4.6.1.3\n\nC. 不正解。「実用最小限の製品またはサービスとは、その早期評価および将来の開発のためのフィードバック収集を可能にするのに十分な機能を持つもの」。本シナリオは改善が必要な既存の複雑なサービスである。Ref 4.1.2\n\nD. 正解。「次の目標条件に向けて実験する：障害を克服するためのアイデアを思いつき、そのアイデアで実験を実施する。可能であれば、一度に一つの仮説のみをテストする」。Ref 3.2.3.3"},
{n:60, t:"セキュリティ手続きをスキップするよう求められるなどのジレンマに直面した際に、特に行動の潜在的な結果を想像する人々の能力を改善するために使用できるものはどれか？", c:["サービス・ドミナント・ロジック","デザイン思考","倫理教育","複雑性思考"], a:2, e:"A. 不正解。サービス・ドミナント・ロジックは「組織が互いの利益のために自らのコンピテンシおよびその他のリソースを適用することによって価値を共創する、（経済的）交換のメンタル・モデル」。Ref 2.5.2.5\n\nB. 不正解。デザイン思考は「設計概念が開発される認知的および実践的な技法のセット」。Ref 3.2.1\n\nC. 正解。倫理は「個人および社会にとって何が良いことなのかを定義する原則の体系」。教育は「人々に倫理的結果を意識させる」ために使用できる。Ref 3.2.1, 3.2.1.1\n\nD. 不正解。複雑性思考は「システムとそれが機能する文脈に固有のさまざまなレベルの複雑性の認識と理解に基づくシステム思考のアプローチ」。Ref 3.2.3.1"},
{n:61, t:"ある組織は最近サービス停止を経験した。組織はサービス・プロバイダに対し、停止が組織にとって最も有益な方法で解決されなかったと不満を述べた。「可用性管理」プラクティスがこのような状況を将来防ぐのにどのように貢献できる例はどれか？", c:["サービス継続活動と連携して、すべての可能な停止を排除することを目指して MTBF 目標を引き上げる","消費者の視点からサービスを理解し、それに応じて MTRS 目標を変更する","予想される需要が満たされることを確実にするため、サービス・パフォーマンスに関連する目標をレビューする","組織のサービスにとって最も重要なアプリケーションを理解し、より高い対障害弾力性で設計する"], a:1, e:"A. 不正解。この回答は発生する停止の数を減らす方法を記述しているが、本問の焦点は発生した停止への対応にある。「MTBF はサービスがどの程度頻繁に故障するかを測定する」。Ref Availability Management Practice Guide 2.1, 2.4.1.3\n\nB. 正解。サービス・プロバイダがサービスの使用方法を理解する場合、目標および測定基準を消費者の期待に沿って作成または調整できる。「MTRS は故障後にサービスがどの程度迅速に復旧されるかを測定する」「可用性測定基準と目標は、消費者がサービスの利用不能によってどのように影響を受けるかを正確に反映すべき」。Ref Availability Management Practice Guide 2.1, 2.4.1.3\n\nC. 不正解。これは「キャパシティおよびパフォーマンス管理」プラクティスの貢献である。Ref Capacity and Performance Management Practice Guide 2.1\n\nD. 不正解。これは「ソフトウェア開発と管理」プラクティスの貢献である。Ref 4.3.2, tab 4.15"},
{n:62, t:"HVIT 組織におけるバリューストリームに関する正しい記述はどれか？", c:["HVIT 組織では、バリューストリーム内のすべてのステップに対して手順を強制することがしばしば有用である","HVIT 組織のバリューストリームは、その製品とサービスの多様性を反映する","ITIL は各 HVIT バリューストリームのテンプレートを提供する","バリューストリームは、製品とサービスを管理するために必要な活動の汎用的な記述を提供する"], a:1, e:"A. 不正解。「HVIT 環境ではシステムはしばしば複雑であり予測不可能。これにより、詳細なプロセス、手順、作業指示が有用となる可能性は低くなる」。Ref 2.6.4\n\nB. 正解。「HVIT 組織はしばしば製品／サービス指向であり、製品およびサービスの多様性を反映する複数のバリューストリームを持つ。したがって、その運用モデルは複数のバリューストリームから構成される」。Ref 2.6.4\n\nC. 不正解。バリューストリームは ITIL プラクティスが使用され価値が共創される、実際に物事が起こる場所と考えることができる。バリューストリームには定型構造はなく、各組織に固有である。Ref 2.6.4\n\nD. 不正解。これはサービスバリュー・チェーンを記述している。サービスバリュー・チェーンは製品とサービスを効果的に管理するために必要な活動を記述するが、バリューストリームは消費者に製品とサービスを作成し提供するための実際の一連のステップから構成される。Ref 2.6.4"},
{n:63, t:"ある組織には、さまざまな度合いの形式性で管理される多くの異なるポートフォリオ（製品、プログラム、プロジェクト、アプリケーション）がある。組織はこれらのポートフォリオ全体でリソースを適切に使用することを確実にしたい。また、これらのポートフォリオの項目がどのように機能しているかについて、より正確なデータを取得したい。組織がこれらの目標を達成するための最善のアプローチはどれか？", c:["各ポートフォリオに文書化された憲章と、ポートフォリオの優先順位を定期的に付けるオーナーがいることを確実にする","すべてのポートフォリオ項目の価値実現を比較するために使用できるヘルスチェック・テンプレートを開発する","ステークホルダーが重要と見なすポートフォリオ項目に十分なリソースが与えられるというポリシーを確立する","新しい取り組みの価値提案と財務状態をレビューするために使用できる基準を確立する"], a:1, e:"A. 不正解。この回答は明示された目標のいずれにも対処しない。個別のポートフォリオに優先順位を付けるオーナーを置くと、ポートフォリオ間で優先順位が矛盾する可能性がある。Ref Portfolio Management Practice Guide 2.4, 2.4.1\n\nB. 正解。この選択肢はすべてのポートフォリオ項目を比較する一貫した方法を提供し、健全な投資判断に使用できる情報を提供する。「ヘルスチェック・テンプレートは……組織にとって有効なすべての価値実現指標を示す主要情報レポートを要求することにより、ポートフォリオ項目間の比較を可能にする」。Ref Portfolio Management Practice Guide 2.4.2\n\nC. 不正解。この選択肢はポートフォリオ間で優先順位の矛盾を引き起こす可能性があり、戦略的目標を考慮する必要性を強調しない。Ref Portfolio Management Practice Guide 2.4.1\n\nD. 不正解。この選択肢は新しい取り組みのみを扱い、正確なデータの取得という願望に対処しない。Ref Portfolio Management Practice Guide 2.4.2"},
{n:64, t:"製品チームは 0.1% のエラー予算をどのように利用すべきか？", c:["資金の 0.1% を欠陥の是正に使用すべきである","ダウンタイムが 0.1% に近づく場合、より多くの労力を安定性の向上に費やすべきである","コーディング時間の 0.1% をエラー処理ルーチンの開発に費やすべきである","エラーがユーザ・メッセージの 0.1% に近づく場合、より多くの時間をエラーの削減に費やすべきである"], a:1, e:"A. 不正解。「エラー予算は、安定性のための開発作業に適切なキャパシティを割り当てるコントロール機構であり、適切なバランスを確保する。サービスがエラー予算に近い場合、製品チームは新機能ではなく改善に焦点を当てるべき」。Ref 4.3.7\n\nB. 正解。「エラー予算は、安定性のための開発作業に適切なキャパシティを割り当てるコントロール機構……サービスがエラー予算に近い場合、製品チームは新機能ではなく改善に焦点を当てるべき」「エラー予算は 100% からサービスのサービス・レベル目標 (SLO) を引いたものとして表される。SLO 99.9% のサービスは 0.1% のエラー予算を持つ」。Ref 4.3.7\n\nC. 不正解。エラー予算は安定性のためのキャパシティ割り当てのコントロール機構である。Ref 4.3.7\n\nD. 不正解。エラー予算は SLO の補数として表される。Ref 4.3.7"},
{n:65, t:"ある組織は、ある種のリスクは本番環境でテストされなければならない（例：負荷テストおよびストレス・テスト）と認識している。「サービス検証およびテスト」プラクティスが、このテストがユーザに影響を与えるリスクを最小化するために展開後に使用する 2 つの技法はどれか？<br>1. 継続的インテグレーション・パイプライン内で各ソフトウェア・モジュールをテストする<br>2. より広範な展開前に、新機能を小規模なユーザ・グループにリリースする<br>3. 元の本番環境を変更しないまま、本番環境のコピーにリリースする<br>4. システム間の統合を手動でテストする", c:["1 と 2","2 と 3","3 と 4","1 と 4"], a:1, e:"B. 正解。\n(2) カナリア・テスト⚠️[要確認: Canary testing]（カナリア・リリースとも呼ばれる）は本番環境でのテストの一形態。「新機能は最初に小規模で限定されたユーザ・グループにリリースされ、徐々にすべてのユーザに拡大される」。Ref tab 4.11\n(3) ブルー／グリーン展開⚠️[要確認: Blue/green deployments]は本番環境でのテストの影響を最小化するための戦略。「2 つの同一の本番環境が同時に稼働し（一つは『ブルー』もう一つは『グリーン』）、一方の環境のみがライブですべての本番トラフィックを処理し、他方は新バージョンの展開に使用される」。Ref tab 4.11\n\nA、C、D. 不正解。\n(1) これは単体テストまたは統合テストを記述しており、本番環境への展開前に発生する。Ref 4.2.6, tab 4.11\n(4) これは本番環境への展開前に発生する統合テストを記述している。Ref Service Validation and Testing Practice Guide 2.4.1"},
{n:66, t:"ハイベロシティ IT への変革が望ましくないと考えられるのはどの状況か？", c:["組織が事業実現を高速で支援したい","組織は迅速かつ効果的に革新と運用を行うことに慣れている","組織は一貫して高水準のデジタル技術を使用している","組織は、その価値観とリーダーシップ・スタイルが変革と互換性がないと考えている"], a:3, e:"A. 不正解。ハイベロシティ IT は「市場投入までの時間、顧客までの時間、変更までの時間、一般的にスピードが重要となる、重要な事業実現のためのデジタル技術の適用」。Ref 2.1\n\nB. 不正解。「ハイベロシティはソリューションの有用性（価値）または保証を犠牲にしては実現されず、ハイベロシティは一般的に高いパフォーマンスと等価」。Ref 2.1\n\nC. 不正解。デジタル技術は「何かをデジタル化する、またはデジタル・データを処理する技術」。デジタル技術の使用は HVIT への移行を支援する。Ref 2.2\n\nD. 正解。組織は「関与する文化的変更の量を達成するのが困難すぎる、または許容可能な投資収益を生み出す可能性が低いと考えるため、速度を高めることを試みないことを選択する場合がある」。Ref 2.1"},
{n:67, t:"破壊的なイベントがデジタル製品に影響を与える際に、組織が事業サービスを提供し続ける能力を考慮するハイベロシティ IT の目標はどれか？", c:["価値ある投資","対障害弾力性のある運用","迅速な開発","保証された適合性"], a:1, e:"A. 不正解。価値ある投資の目標はデジタル投資の識別と正当化に関わる。「価値ある投資は市場調査と新製品の開発に基づく」。Ref 4.1\n\nB. 正解。「対障害弾力性のある運用の目標は、デジタル製品が必要なときにいつでも使用可能であることを確実にすることを含む」。「フェイルセーフ・システムは幻想であり、組織は不可避で予期しない故障に備えなければならない。重点はもはや故障間の長い間隔の維持ではなく、不可避の問題が発生したときにサービスを迅速に復旧することにある」。Ref 4.3\n\nC. 不正解。「迅速な開発の目標は、新規および改善されたデジタル製品およびサービスを頻繁に、迅速かつ信頼性高く実現することを含む」。Ref 4.2\n\nD. 不正解。「保証された適合性の目標は、サービス提供およびサービス消費が、ガバナンス、リスク、コンプライアンスに関する企業および規制の指示に準拠することを確実にすることを含む」。本問では企業および規制の指示への言及はない。Ref 4.5"},
{n:68, t:"ある株式取引会社は、市場を分析し投資戦略を提案するために人工知能 (AI) を使用している。IT スタッフは、必要なアルゴリズムを管理するために、プレッシャーの下で長時間勤務している。エラーの数が増加しており、スタッフは意見が一致せず互いを非難している。状況を改善するためにどのアプローチを取るべきか？", c:["意見を表明し問題を解決する安全な環境を育成することにより、信頼を強化する","アルゴリズムのエラーを予防的に検出するため、カオス・エンジニアリングを導入する","エラーが導入されないことを確実にする新しいバリューストリームを設計する","IT スタッフが各アルゴリズムにより多くの時間を費やせるよう、アルゴリズム変更の数を減らす"], a:0, e:"A. 正解。「HVIT 環境では、人々が判断や恥ずかしさを恐れずに自分の意見を共有し、改善のために実験できると感じられることが極めて重要である」。Ref 3.2.2.2\n\nB. 不正解。カオス・モンキー⚠️[要確認: Chaos Monkey]などのツールを通じたカオス・エンジニアリングは「IT システムの対障害弾力性をテストする」。これは金融取引アルゴリズムのエラーを検出しない。Ref 4.3.2\n\nC. 不正解。HVIT 環境ではすべてのエラーを取り除くことは不可能。「これらのシステムは常に複数の欠陥、したがって潜在的な問題を含む」。Ref 3.2.2.2\n\nD. 不正解。本組織は価値共創のために AI に投資している。IT スタッフはこの能力を支援する必要がある。「デジタル組織では、IT が事業を駆動し実現する」。Ref 4.1"},
{n:69, t:"ある組織は、エラーを発見し不正を防止しようと、歴史的に厳格な職務分離を維持してきた。官僚主義を減らすため、組織は変更が組織のコンプライアンス要件に従うことを確実にする自動化されたコントロールを導入した。この組織が自動化されたコントロールを定期的に維持するために使用できる最善のアプローチはどれか？", c:["組織のリスク容量とリスク選好を評価する","定量的および定性的なリスク分析の両方を実施する","リスクの軽減を確実にするため、レビューと監査を実施する","受容したリスクの確率をレビューする"], a:2, e:"A. 不正解。リスク容量およびリスク選好などの概念は、自動化されたコントロールを定義する前のリスク分析の一部として考慮されたはず。これらの概念は継続的有効性の評価の一部として考慮されることがあるが、既存のコントロールを維持する最良のアプローチではない。Ref Risk Management Practice Guide 2.4.1\n\nB. 不正解。リスク分析は、組織のリスク・ポリシーを考慮して、自動化されたコントロールを定義する前に実施されたはず。Ref Risk Management Practice Guide 2.4.3\n\nC. 正解。リスクを管理する決定が下されたら、適切なコントロールを設計し実装する必要がある。「コントロールは、関連性を維持し、合意されたレベルの保護を提供するために適切に実装されるよう、維持される必要がある。例えば……定期的な強化と監査により」。Ref Risk Management Practice Guide 2.4.4\n\nD. 不正解。本ケースでは組織はリスクを単に受容するのではなく、コントロールを使用してリスクを管理している。Ref Risk Management Practice Guide 2.4.4"},
{n:70, t:"ある組織は、モバイル・アプリを開発する新しいチームを設置した。このチームにデジタル・トランスフォーメーションの旅を始める手助けをしてほしいと考えている。新しいアプリの要件を分析および文書化すべきは誰か？", c:["既存のビジネス分析チームがこの作業を行うべきである","この作業を行うために、新しいデジタル・ビジネス分析チームを作成すべきである","新しいモバイル・アプリの製品オーナーがこの作業を行うべきである","この作業にビジネス分析は不要なので、ソフトウェア開発者が反復的にニーズを定義すべきである"], a:2, e:"A. 不正解。「ビジネス分析プラクティスは伝統的に専門機能として組織化されてきた……アジャイル文脈では、ビジネス分析プラクティスは特定のチームや役割と関連性が薄れ、製品オーナーやサービス・オーナーなどの役割を担う多技能の実務家によって適用されることが増えている」。Ref Business Analysis Practice Guide 2.1\n\nB. 不正解。このアプローチは依然としてビジネス分析を専門機能として維持する。Ref Business Analysis Practice Guide 2.1\n\nC. 正解。「アジャイル文脈では、ビジネス分析プラクティスは特定のチームや役割と関連性が薄れ、製品オーナーやサービス・オーナーなどの役割を担う多技能の実務家によって適用されることが増えている」。Ref Business Analysis Practice Guide 2.1\n\nD. 不正解。ソフトウェア開発者がこの作業を行う可能性はあり、おそらく反復的であるべきだが、誰がやってもそれは依然としてビジネス分析である。Ref Business Analysis Practice Guide 2.1"},
{n:71, t:"リアルタイム監視ソリューションは、サービス管理の四つの側面のうちどれの例か？", c:["バリューストリームとプロセス","組織と人材","情報と技術","パートナとサプライヤ"], a:2, e:"A. 不正解。「『バリューストリームとプロセス』の側面は、バリューストリームの設計の入力として使用される抽象的なリソースを表す」。Ref 2.6.6\n\nB. 不正解。この側面は「組織（財務および建物などの物理リソースを含む）と人」が HVIT にどのように関係するかに関わる。Ref 2.6.6\n\nC. 正解。「情報と技術」の側面は「デジタル製品およびサービスを構成する情報と技術を生成するための『生産リソース』として使用される情報と技術」を含み、例えば「監視ツールはパフォーマンス情報へのリアルタイム・アクセスを提供する」。Ref 2.6.6.2\n\nD. 不正解。「パートナとサプライヤ」の側面は、全体的なサービス提供内における外部サービス・プロバイダの関与に関わる。Ref 2.6.6.3"},
{n:72, t:"「情報セキュリティ管理」プラクティスが保証された適合性の達成にどのように貢献するかの例はどれか？", c:["開発されたコードが情報セキュリティの欠陥について同僚によってチェックされることを確実にする","重要なサービス・コンポーネントのアラートしきい値をレビューすることにより、重大なインシデントに対応する","サービス・コンポーネントのために、情報セキュリティ・コントロールを組み込んだ標準ビルド・モデルを作成する","組織の仮想プライベート・ネットワーク (VPN) へのサードパーティのアクセスに対処するポリシーを開発する"], a:3, e:"A. 不正解。これは「ソフトウェア開発と管理」プラクティスが保証された適合性の達成に貢献する例。「需要およびパフォーマンス期待を効果的に満たすことを確実にするため、ピア間で開発作業を検査してコードの品質を高める」。Ref 4.5.3, tab 4.25\n\nB. 不正解。これは「モニタリングおよびイベント管理」プラクティスが保証された適合性の達成に貢献する例。「脅威および脆弱性を継続的にスキャンするよう監視ツールを構成し、適切なチームにエスカレーションできるようにする」。Ref 4.5.2, tab 4.23\n\nC. 不正解。これは「サービス構成管理」プラクティスが保証された適合性の達成に貢献する例。「セキュリティおよび監査要件を支援する標準化された構成」。Ref 4.5.1, tab 4.22\n\nD. 正解。「情報セキュリティ管理ポリシーおよび計画は、リモート・アクセス、サプライヤの組織情報およびリソースへのアクセスなどの側面に対処する場合がある」。これは認可された者のみに組織のリソースへのアクセスを制限することにより、保証された適合性の達成に役立つ。Ref Information Security Practice Guide 2.4.1"},
{n:73, t:"ある組織は歴史的に、従業員に対して『失敗は選択肢にない』と伝達してきた。その結果、従業員が誤りを隠すことが一般的である。実験を実施できるオープンで信頼できる作業環境を最もよく育成するために何を採用すべきか？", c:["セーフティ・カルチャ","デザイン思考","サービス・ドミナント・ロジック","クネビン⚠️[要確認: Cynefin]"], a:0, e:"A. 正解。セーフティ・カルチャは、ストレスの多い状況（故障の場合など）でも、人々が自分らしくいられ自分を表現できる気候を作ることに関わる。「失敗について現実的でなければならない ― 失敗が起こることを認め、人々ではなくシステムを非難することを認識する」。Ref 3.2.2.2\n\nB. 不正解。デザイン思考は『設計概念が開発される認知的および実践的なプロセスのセット』。セーフティ・カルチャによって作られる環境から恩恵を受ける。Ref 3.2.1.2\n\nC. 不正解。サービス・ドミナント・ロジックは、サービス・プロバイダがサービス提供プロセスに顧客を関与させて価値を共創することに関連する。Ref 2.5.2.5\n\nD. 不正解。クネビンは意思決定フレームワーク。「クネビン・センスメイキング・フレームワークは……複雑性を評価し適切な行動方針を決定する実用的な方法を提供する」。Ref 3.2.3.1"},
{n:74, t:"デジタル化された組織が、IT システムの対障害弾力性をテストし改善するため、カオス・エンジニアリングの規律を導入している。この文脈で、「サービス継続管理」プラクティスの貢献ではないものはどれか？", c:["フェイルセーフ・システムを確実にするためのコントロールを導入する","リスクを考慮し対策を設計する","計画をテストし準備態勢を高めるための演習を実施する","計画と対策を継続的に監視する"], a:0, e:"A. 正解。これは貢献ではない。「フェイルセーフ・システムは幻想であり、組織は不可避で予期しない故障に備えなければならない。重点はもはや故障間の長い間隔の維持ではなく、不可避の問題が発生したときにサービスを迅速に復旧することにある」。Ref 4.3\n\nB. 不正解。これは「サービス継続管理」プラクティスの貢献である。「サービス継続管理プラクティスには、広範囲のリスクを管理するためのコントロールの定義および管理が含まれる」。Ref Service Continuity Management Practice Guide 2.4.2\n\nC. 不正解。これは「サービス継続管理」プラクティスの貢献である。「したがってテストはサービス継続管理の重要な部分であり、選択された戦略、実装された対策、計画が実際に機能していることを確実にする唯一の方法」。Ref Service Continuity Management Practice Guide 2.4.3\n\nD. 不正解。これは「サービス継続管理」プラクティスの貢献である。「対障害弾力性のための継続計画、対策、機構を継続的に監視する」。Ref 4.3.2, tab 4.15"},
{n:75, t:"ある組織の IT チームは、しきい値が超過したときに行動を取ることにより、インフラストラクチャとソフトウェア・コンポーネントに影響するイベントを管理している。組織が重大なインシデントについて初めて知るのは、ユーザがサービスデスクに連絡したときであることがある。最善の改善行動はどれか？", c:["サービス全体に関連するインシデントの自動ワークアラウンドを作成する","適切な解決グループへの迅速なインシデント・エスカレーション経路を作成する","最も頻繁に影響を受けるサービスのサービス継続計画を改訂する","サービス・イベントを含めるよう、監視ツールの設計を変更する"], a:3, e:"A. 不正解。これは状況に対する事後対応であり、ユーザがサービスデスクに連絡する前にインシデントを検出するための監視ツールの設計改善が必要。Ref Monitoring and Event Management Practice Guide 2.4.1\n\nB. 不正解。これは事後対応的な対応である。Ref Monitoring and Event Management Practice Guide 2.4.1\n\nC. 不正解。これは状況の再発を防止しない。監視ツールの設計改善が必要。Ref Monitoring and Event Management Practice Guide 2.4.1\n\nD. 正解。組織はサービス・コンポーネントだけでなくエンドツーエンドのサービスも監視すべき。「モニタリングおよびイベント管理プラクティスを確立または改善する際は、監視されるサービスおよびサービス・コンポーネントの識別と優先順位付けなどの側面を考慮すべき」。Ref Monitoring and Event Management Practice Guide 2.4.1"},
{n:76, t:"オンライン・トレーニング・コースを完了した後、組織の従業員はデジタル・システムをよりよく活用できるようになった。このトレーニングが支援するハイベロシティ IT の目標はどれか？", c:["価値ある投資","対障害弾力性のある運用","迅速な開発","共創された価値"], a:3, e:"A. 不正解。価値ある投資の目標はデジタル投資の識別と正当化に関わる。これは研究開発の段階。「新しいデジタル製品およびサービスは収益性の観点から想定し評価されるべき」。Ref 4.1\n\nB. 不正解。対障害弾力性のある運用は、デジタル製品が高い可用性で使用できることを確実にすることに関わる。Ref 4.3\n\nC. 不正解。迅速な開発は、新規および改善されたデジタル製品を頻繁、迅速、信頼性高く実現することに関わる。Ref 4.2\n\nD. 正解。この目標は、サービス・プロバイダと消費者の緊密な協力によりデジタル製品から価値を共創することを目指す。「ユーザは、デジタル製品および情報、その文脈での使用方法を理解しなければならない。機能を適切に使用するのに十分理解し、意思決定を改善するために情報を正しく解釈できなければならない」。Ref 4.4"},
{n:77, t:"ある商業サービス・プロバイダ組織は、ソフトウェア開発に複数のアプローチを使用している。最大顧客のいくつかは、要件と優先順位を伝達し、近い将来にそれらの要件が満たされなければ離脱する可能性があると示唆した。場合によっては、要件が不明確で矛盾している。この組織が最大顧客のニーズを満たすことを最もよく可能にするソフトウェア開発アプローチはどれか？", c:["要件、優先順位、必要なリソースが既知であるため、ウォーターフォール・アプローチ","小規模なチームが独立して作業できる反復的アプローチ","迅速なフィードバックと最高優先順位項目を最初に開発する能力を可能にするアジャイル・アプローチ","明示されていない要件を捕捉するためのプロトタイピングを含む並列実験アプローチ"], a:2, e:"A. 不正解。本問は、場合によっては要件が不明確で矛盾していると述べているため、最良のアプローチではない。「ウォーターフォール・アプローチは、要件と優先順位が既知であり、ソフトウェアの開発方法と必要なリソースが既知である場合に効果的な選択である」。Ref Software Development and Management Practice Guide 2.4.1\n\nB. 不正解。このアプローチには利点があるが、不明確な要件に直接対処しないため、最良のアプローチではない。Ref Software Development and Management Practice Guide 2.4.1\n\nC. 正解。このアプローチは迅速なフィードバックを使って不明確な要件に対処し、最高優先順位項目に最初に取り組む必要性を強調する。「アジャイルおよびスクラム・アプローチは、インクリメンタルかつ反復的の組み合わせで、アプリケーションのオーナーとの緊密な協働に焦点を当て、迅速なフィードバックを得て、オーナーが価値を引き出せる小さなインクリメントを迅速に開発することを目指す」。Ref Software Development and Management Practice Guide 2.2\n\nD. 不正解。良いアプローチだが、最高優先順位項目に最初に取り組む必要性を強調しないため、最良ではない。Ref Software Development and Management Practice Guide 2.4.1"},
{n:78, t:"ある組織は、製品、サービス、改善への価値ある投資を確実にすることを目指している。この目標を最もよく支援する取り組みはどれか？", c:["外部顧客が製品ライフサイクルの早い段階で新機能を活用できるよう、各展開のコード量を削減する","さまざまな逆境下で運用可能性を維持するために、サービスの技術的および非技術的コンポーネントとそれらがどのように協働するかを文書化する","製品への提案された変更が、データ保護規制および組織の情報セキュリティ・ポリシーと整合していることを確実にする","消費者習慣の変化を理解するために外部フォーカス・グループを、アイデアの実現可能性と収益性を検討するために内部ワーキング・グループを設立する"], a:3, e:"A. 不正解。これは迅速な開発の例。「迅速な開発は、単位時間当たりのアプリケーション（変更）のサイズで測定できる」。Ref 4.2\n\nB. 不正解。これは対障害弾力性のある運用の目標の例。「対障害弾力性のある運用の目標は、デジタル製品が必要なときにいつでも使用可能であることを確実にすることを含む」。Ref 4.3\n\nC. 不正解。これは保証された適合性の目標の例。「保証された適合性の目標は、サービス提供およびサービス消費が、ガバナンス、リスク、コンプライアンスに関する企業および規制の指示に準拠することを確実にすることを含む」。Ref 4.5\n\nD. 正解。これは価値ある投資を行うアプローチの例。「価値ある投資の実施は、市場調査と新製品の開発に基づく。新しいデジタル製品およびサービスは収益性の観点から想定し評価されるべき」。Ref 4.1"},
{n:79, t:"ある組織が、オンライン・バンキング・アプリを更新している。新しいアプリでは、ユーザは初回登録時に運転免許証のコピーをアップロードすることが要求される。アプリのリリース後、多くのユーザが運転免許証を持っていないため、否定的なフィードバックが寄せられた。この問題はどの種類のテストで発見されるべきだったか？", c:["ユーザ・インタフェース設計のテスト","ユーザ・ストーリのテスト","リリース・パイプラインのテスト","本番環境におけるシステムのテスト"], a:1, e:"A. 不正解。ユーザ・インタフェースのテストは、運転免許証のアップロードが容易に行えることは検証できたはずだが、ターゲット市場の大多数のユーザが運転免許証を持っているかどうかまでは検証できなかったはずである。「インタフェースおよび体験は関連するアーティファクトを用いてテストされる」。この場合のアーティファクトは運転免許証である。Ref 4.2.6, tab 4.11\n\nB. 正解。「エピック、ユーザ・ストーリ、受け入れ基準、データフロー図、プロセスフロー図などのアーティファクトをテストすべきである」。ユーザ・ストーリをテストすれば、運転免許証を持っていないユーザがアップロードできないことが識別できたはずである。Ref 4.2.6, tab 4.11\n\nC. 不正解。この種類のテストは前提条件の欠陥の詳細を明らかにするのには役立たない。「パイプライン・プロセスをテストすることができ、チームはパイプラインを可能な限り効率的かつ高速にするためにこれを暗黙のうちに行うことが多い。これにはパイプライン・テストの背後にある構造をよく理解することが必要となる」。Ref 4.2.6, tab 4.11\n\nD. 不正解。「一部のリスクは本番環境でテストする必要がある」が、このリスクははるかに早い段階で識別できたはずである。本番環境でのテストは既に行われており、開発ライフサイクルの遅すぎる段階でエラーを識別している。Ref 4.2.6, tab 4.11"},
{n:80, t:"ある組織が、顧客との関わり方を大幅に改善する新しい技術を導入しようとしている。この状況を最もよく表す用語はどれか？", c:["デジタル組織","ハイベロシティ IT","デジタル・トランスフォーメーション","IT トランスフォーメーション"], a:2, e:"A. 不正解。「デジタル組織はデジタル技術によって実現される。デジタル技術はこれらの組織の内部プロセスにとって重要な基盤的実現手段であり、しばしば製品およびサービスの一部となる」。この例では計画された大幅な改善があるため、これは単なるデジタル組織の説明ではなく、デジタル・トランスフォーメーションである。Ref 2.3\n\nB. 不正解。ハイベロシティ IT とは「市場投入までの時間、顧客までの時間、変更までの時間および一般的にスピードが重視される、重要な事業を実現するためのデジタル技術の適用」である。この状況に、トランスフォーメーションが急速に行われるという示唆はない。Ref 2.1\n\nC. 正解。デジタル・トランスフォーメーションとは「デジタル以外の手段では実現不可能だった組織の達成目標の実現を大幅に改善するための、デジタル技術の利用」である。Ref 2.4\n\nD. 不正解。「事業と IT が別個の組織機能と見なされる組織では、『IT トランスフォーメーション』は IT サービスの提供方法を改善する大きな変化を表すためにしばしば使用される。IT トランスフォーメーションは、IT サービスおよび情報サービスがどのように開発、運用、サポートされるかに焦点を当てる」。この組織はシステムの利用方法を変更しようとしており、開発・運用・サポートの方法だけを変えようとしているのではない。Ref 2.4.1"},
];
const GLOSSARY_HVIT=[
{t:"AIOps",en:"AIOps",d:"自動化による継続的な修正と改善がもたらす知見を継続的に得るために、機械学習とビッグ・データを IT 運用に適用すること。「IT 運用のための人工知能」または「アルゴリズム IT 運用」とも呼ばれる。"},
{t:"ITIL 継続的改善モデル",en:"ITIL continual improvement model",d:"改善を実施するための体系的なアプローチを組織に提供するモデル。"},
{t:"ITIL サービスバリュー・チェーン",en:"ITIL service value chain",d:"製品およびサービスを効果的に管理するために必要となる主要な活動をすべて網羅する、サービス・プロバイダの運用モデル。"},
{t:"ITIL サービスバリュー・チェーン活動",en:"ITIL service value chain activity",d:"組織が価値創出において実行する、バリューチェーンのステップ。"},
{t:"ITIL の従うべき原則",en:"ITIL guiding principles",d:"組織の目標、戦略、業務の種類、管理構造が変化したとしても、あらゆる状況で組織を導くことができる推奨事項。"},
{t:"RACI",en:"RACI",d:"役割と責任の定義を支援するために使用されるモデル。RACI は、Responsible（実行責任者）、Accountable（説明責任者）、Consulted（協議先）および Informed（情報先）の略称である。"},
{t:"アンドン",en:"Andon",d:"品質やプロセス上の課題を作業者や組織の他部門に通知するために使用される、手動または自動化されたシステム。アンドン・システムは製造業で考案されたが、現在では IT 分野で広く使用されている。"},
{t:"運用",en:"operation",d:"活動、製品、サービスまたはその他の構成アイテムを、定型化された方法で実施、管理すること。"},
{t:"運用技術",en:"operational technology",d:"物理デバイスに対するモニタリングまたはコントロール（あるいは両方）において、デジタル技術を適用した変更の検出、または変更を加えること。"},
{t:"運用モデル",en:"operating model",d:"組織が顧客および他の利害関係者とどのように価値を共創するかだけでなく、組織がどのように自らを運営するかを、概念的または視覚的（あるいはその両方）に表現したもの。"},
{t:"エピック",en:"epic",d:"まだ十分に洗練または理解されていない要件定義の概要。最終的には、エピックは洗練されるか、いくつかのユーザ・ストーリーと要件に分割される。"},
{t:"改善",en:"improvement",d:"意図的に導入された変更により、1 人以上の利害関係者の価値が高まること。"},
{t:"カオス・エンジニアリング",en:"chaos engineering",d:"システムが不安定な状態に耐えることの出来る環境を構築するための検証の規律。"},
{t:"カオス・モンキー",en:"chaos monkey",d:"本番環境のコンポーネントを意図的に停止させ、残ったシステムがその停止にどのように対応するかをテストすることで、IT システムの対障害弾力性をテストするツール。"},
{t:"カスタマ・ジャーニー",en:"customer journey",d:"タッチポイントおよびサービスのやり取りを通じ、サービス顧客が 1 つ以上のサービス・プロバイダ、またはその製品（あるいはその両方）に対して持つ、完全なエンドツーエンドの体験。"},
{t:"カタ",en:"Kata",d:"科学的思考およびプラクティスとコーチングのルーティンのためのメンタルモデルと行動パターン。"},
{t:"価値",en:"value",d:"知覚されている便益、便利さおよび何らかの重要性。"},
{t:"価値提案",en:"value proposition",d:"サービス・プロバイダが顧客に対して、特定の一連の便益を提供するという明示的な約束。"},
{t:"ガバナンス",en:"governance",d:"組織を方向付け、コントロールする方法。"},
{t:"カルチャ・フィット",en:"cultural fit",d:"自分の信念、または価値観およびニーズに対応した環境で快適に働くことができる従業員またはチームの能力。"},
{t:"カンバン",en:"Kanban",d:"作業を可視化したり、発生の可能性がある障害やリソース競合を識別したり、進行中の作業を管理したりするための手法。"},
{t:"完了の定義",en:"definition of done",d:"提案された製品またはサービスに対する合意された基準のチェックリスト。"},
{t:"機械学習",en:"machine learning",d:"人工知能の応用形態の一つで、システムがデータに反応し、より多くのデータに継続的にさらされることで、その行動およびアウトプットを適応させるという原理に基づいている。"},
{t:"技術的負債",en:"technical debt",d:"時間のかかるシステム・ソリューションではなくワークアラウンドを選んだ結果として蓄積された、再作業を必要とするバックログ全体。"},
{t:"逆説的介入",en:"paradoxical intervention",d:"スタッフに何かを要求し、反対の結果を得る管理技法。例えば、インパクトを減らすために、より多くのリスクを取るように要求すること。"},
{t:"ギャップ分析",en:"gap analysis",d:"2 つのデータ・セットを比較し、違いを特定する活動。例えば、一連の要件と実際に提供したもの、または組織の現在の状態と目標とする将来の状態を比較する。"},
{t:"計画",en:"plan",d:"4 つのすべての側面、並びにすべての製品およびサービスに対するビジョン、現在のステータスおよび改善の方向性に関する理解を組織全体で確実に共有するためのバリューチェーン活動。"},
{t:"継続的インテグレーション",en:"continuous integration",d:"ソフトウェア開発環境内でコードを統合し、構築し、テストするためのアプローチ。"},
{t:"継続的デリバリ",en:"continuous delivery",d:"ソフトウェアをいつでも本番環境にリリースできるようにするソフトウェア開発へのアプローチ。頻繁な展開も可能だが、通常、組織はゆっくりとした展開を好むため、展開は個別に決定される。"},
{t:"継続的展開（デプロイメント）",en:"continuous deployment",d:"ソフトウェア開発において、変更がパイプラインを経由して自動的に本番環境に投入され、1 日に複数回の本番展開を可能にするアプローチ。継続的展開は継続的デリバリに依存する。"},
{t:"構成管理データベース (CMDB)",en:"configuration management database (CMDB)",d:"構成レコードのライフサイクルを通して構成レコードを保管するために使用されるデータベース。CMDB は構成レコード間の関係も維持する。"},
{t:"顧客指向",en:"customer orientation",d:"顧客の長期的なニーズおよび要望を満たす支援に重点を置く、営業活動と顧客関係へのアプローチ。"},
{t:"顧客体験 (CX)",en:"customer experience (CX)",d:"顧客により認識されている、サービスとサービス・プロバイダとの実務的および感情的なやり取りの積み重ね。"},
{t:"心の知能指数",en:"emotional intelligence",d:"人の気持ちや反応を理解し、そのスキルを使用して適切な判断を下したり、対立を回避または解決したりすることができる能力。"},
{t:"コンテナ化",en:"containerization",d:"開発、出荷および展開のために、標準化され、軽量で、独立し、実行可能な単位にソフトウェアをパッケージ化する技法。"},
{t:"コントロール",en:"control",d:"リスクを管理する手段であり、事業達成目標を確実に実現する手段、またはプロセスに確実に従っているようにする手段。"},
{t:"コンプライアンス",en:"compliance",d:"標準または一連の指針に確実に従っているようにする、または、適切で一貫した会計業務やその他のプラクティスが確実に用いられているようにする活動と結果の両方のこと。"},
{t:"サービス・アジリティ（俊敏性）のための再構築",en:"reconstructing for service agility",d:"複雑で社会的な性質を反映した、知識労働とサービス供給を体系化するアプローチ。"},
{t:"サービス・ドミナント・ロジック",en:"service-dominant logic",d:"組織が互いの利益のために各自のコンピテンシおよびその他のリソースを適用することによって価値を共創する、（経済的）交換のメンタルモデル。"},
{t:"サービス・マインドセット",en:"service mindset",d:"サービス関係における組織の行動を定義する組織のカルチャの重要な要素。サービス・マインドセットには、組織が採用し、従い、共有する価値および従うべき原則が含まれる。"},
{t:"サービスの共感",en:"service empathy",d:"サービス関係を確立、維持および改善するために、他の当事者の利益、ニーズ、意図および経験を認識、理解、予想および予測する能力。"},
{t:"サービスの統合および管理",en:"service integration and management",d:"製品およびサービスの開発と提供に関わるすべてのサプライヤ間の作業の調整および編成。"},
{t:"サービスのやり取り",en:"service interaction",d:"価値を共創するサービス・プロバイダとサービス消費者の間の相互作用。"},
{t:"サービスバリュー・システム (SVS)",en:"service value system (SVS)",d:"価値創出を促進するために、組織のすべてのコンポーネントと活動がどのように連携して機能するかを表すモデル。"},
{t:"サービス品質",en:"service quality",d:"明示的および暗黙的なニーズを満たす能力に関連する、サービスの特性の総体。"},
{t:"サービスマネジメント",en:"service management",d:"顧客にとっての価値をサービスの形で実現する、組織の専門能力の集まり。"},
{t:"サービスレベル",en:"service level",d:"期待または実現されるサービス品質を定義する 1 つ以上の測定基準。"},
{t:"サービスレベル・アグリーメント (SLA)",en:"service level agreement (SLA)",d:"必要とされるサービスとサービスで期待されるレベルを規定するための、サービス・プロバイダと顧客の間で結ばれる合意文書。"},
{t:"サイクル・タイム",en:"cycle time",d:"入力を出力に変換する、個別の作業単位を完了するために必要な時間。"},

{t:"査読（ピア・レビュー）",en:"peer review",d:"科学的または他の専門的な仕事について、同じ分野で働く他の人が判断すること。ソフトウェア開発に適用される場合、技術的内容と品質を評価するために、開発者と 1 人以上の同僚によって製品が検査される。これにより、適合性が保証される。"},

const GLOSSARY_FND=[{t:"サービス",en:"service",d:"顧客が特定のコストやリスクを管理することなく成果の達成を促進する手段。"},{t:"サービス・マネジメント",en:"service management",d:"顧客に対する価値の形で組織の専門能力を可能にするための組織能力のセット。"},{t:"サービス提供物",en:"service offering",d:"1つ以上の製品に基づく1つ以上のサービスの説明。"},{t:"成果",en:"outcome",d:"利害関係者のために可能になった結果。"},{t:"体験",en:"experience",d:"サービス消費者がサービスプロバイダとのやり取りを通じて得る認識。"},{t:"情報と技術",en:"information and technology",d:"サービスマネジメントの4つの側面の1つ。"},{t:"組織と人材",en:"organizations and people",d:"サービスマネジメントの4つの側面の1つ。"},{t:"パートナとサプライヤ",en:"partners and suppliers",d:"サービスマネジメントの4つの側面の1つ。"},{t:"バリューストリームとプロセス",en:"value streams and processes",d:"サービスマネジメントの4つの側面の1つ。"},{t:"継続的改善",en:"continual improvement",d:"すべてのレベルで組織のパフォーマンスを改善する反復的な活動。"},{t:"ガバナンス",en:"governance",d:"組織を方向付け、コントロールする手段。"},{t:"リスク",en:"risk",d:"損害や損失を引き起こす可能性のある事象。"}];
let currentMode='',quizQuestions=[],currentIndex=0,answers={},score=0;const STORAGE_KEY='hvitQuiz';
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(mode){currentMode=mode;localStorage.removeItem(STORAGE_KEY);let pool=[];if(mode==='sp1')pool=QUESTIONS.filter(q=>q.n<=40);else if(mode==='sp2')pool=QUESTIONS.filter(q=>q.n>40);else if(mode==='all')pool=[...QUESTIONS];else if(mode==='random20')pool=shuffle([...QUESTIONS]).slice(0,20);quizQuestions=shuffle(pool).map(q=>{const idx=[0,1,2,3];const sh=shuffle([...idx]);return{...q,c:sh.map(i=>q.c[i]),a:sh.indexOf(q.a)}});currentIndex=0;answers={};score=0;document.getElementById('modeScreen').classList.add('hidden');document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultScreen').classList.remove('show');renderQuestion()}
function renderQuestion(){const q=quizQuestions[currentIndex],total=quizQuestions.length;const answered=Object.keys(answers).length;let correctCount=0;quizQuestions.forEach((qq,ii)=>{if(answers[ii]===qq.a)correctCount++});document.getElementById('statusLeft').textContent=getModeLabel()+' '+(currentIndex+1)+'/'+total+'問目';document.getElementById('statusRight').textContent='✓'+correctCount+' / '+answered+'回答';document.getElementById('progressFill').style.width=((currentIndex+1)/total*100)+'%';document.getElementById('qNumber').textContent='Q'+String(q.n).padStart(3,'0');document.getElementById('qText').innerHTML=q.t;const labels=['A','B','C','D'],cd=document.getElementById('choices');cd.innerHTML='';const ua=answers[currentIndex],done=ua!==undefined;q.c.forEach((c,i)=>{const b=document.createElement('button');b.className='choice-btn';if(done){if(i===q.a)b.classList.add('correct');else if(i===ua&&ua!==q.a)b.classList.add('wrong')}const btn_html='<span class="choice-label">'+labels[i]+'.</span><span>'+c+'</span>';b.innerHTML=btn_html;if(!done)b.onclick=()=>selectAnswer(i);cd.appendChild(b)});const exp=document.getElementById('explanation');if(done){exp.innerHTML='<strong>【解説】</strong><br>'+q.e;exp.classList.add('show')}else{exp.innerHTML='';exp.classList.remove('show')}document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').textContent=currentIndex===total-1?'結果を見る →':'次へ →'}
function selectAnswer(i){answers[currentIndex]=i;saveProgress();renderQuestion()}
function nextQuestion(){if(currentIndex<quizQuestions.length-1){currentIndex++;renderQuestion()}else showResults()}
function prevQuestion(){if(currentIndex>0){currentIndex--;renderQuestion()}}
function showResults(){document.getElementById('quizArea').classList.add('hidden');const rs=document.getElementById('resultScreen');rs.classList.add('show');score=0;quizQuestions.forEach((q,i)=>{if(answers[i]===q.a)score++});const total=quizQuestions.length,pct=Math.round(score/total*100),passLine=Math.ceil(total*0.7),pass=score>=passLine;const sd=document.getElementById('scoreDisplay');sd.textContent=score+'/'+total+' ('+pct+'%)';sd.className='score-display '+(pass?'pass':'fail');document.getElementById('resultMsg').textContent=pass?'🎉 合格です！おめでとうございます！':'😢 不合格です。合格ライン: '+passLine+'/'+total+'（70%）';let d='<table style="width:100%;border-collapse:collapse"><tr style="background:var(--surface2)"><th style="padding:6px;border:1px solid var(--border);color:var(--text)">問題</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">あなた</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">正解</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">結果</th></tr>';const lb=['A','B','C','D'];quizQuestions.forEach((q,i)=>{const ua=answers[i]!==undefined?lb[answers[i]]:'未',ca=lb[q.a],ok=answers[i]===q.a;d+='<tr style="background:'+(ok?'rgba(61,214,140,.08)':'rgba(245,91,91,.08)')+'"><td style="padding:4px 8px;border:1px solid var(--border);color:var(--text)">Q'+String(q.n).padStart(3,'0')+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center;color:var(--text)">'+ua+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center;color:var(--text)">'+ca+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center">'+(ok?'✅':'❌')+'</td></tr>'});d+='</table>';document.getElementById('resultDetails').innerHTML=d;localStorage.removeItem(STORAGE_KEY)}
function backToMenu(){document.getElementById('resultScreen').classList.remove('show');document.getElementById('modeScreen').classList.remove('hidden');document.getElementById('quizArea').classList.add('hidden');checkResume()}
function getModeLabel(){if(currentMode==='sp1')return'模擬試験1';if(currentMode==='sp2')return'模擬試験2';if(currentMode==='all')return'全問チャレンジ';return'ランダム20問'}
function saveProgress(){const data={mode:currentMode,questions:quizQuestions.map(q=>q.n),answers,currentIndex,timestamp:Date.now()};localStorage.setItem(STORAGE_KEY,JSON.stringify(data));const si=document.getElementById('saveIndicator');si.classList.add('show');setTimeout(()=>si.classList.remove('show'),1500)}
function checkResume(){const s=localStorage.getItem(STORAGE_KEY),a=document.getElementById('resumeArea');if(!s){a.innerHTML='';return}try{const d=JSON.parse(s),ans=Object.keys(d.answers||{}).length,total=d.questions.length,dt=new Date(d.timestamp).toLocaleString('ja-JP');a.innerHTML='<div style="margin:20px auto;max-width:500px;padding:16px;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;text-align:center"><p style="font-weight:bold;color:var(--text)">💾 前回の続きがあります</p><p style="font-size:.9em;color:var(--text2)">回答済: '+ans+'/'+total+' | '+dt+'</p><button class="nav-btn primary" style="margin-top:12px" onclick="resumeQuiz()">続きから再開</button> <button class="nav-btn secondary" style="margin-top:12px" onclick="clearResume()">破棄</button></div>'}catch(e){a.innerHTML=''}}
function resumeQuiz(){const s=JSON.parse(localStorage.getItem(STORAGE_KEY));currentMode=s.mode;quizQuestions=s.questions.map(n=>{const o=QUESTIONS.find(q=>q.n===n);const idx=[0,1,2,3];const sh=shuffle([...idx]);return{...o,c:sh.map(i=>o.c[i]),a:sh.indexOf(o.a)}});answers=s.answers||{};currentIndex=s.currentIndex||0;document.getElementById('modeScreen').classList.add('hidden');document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultScreen').classList.remove('show');renderQuestion()}
function clearResume(){localStorage.removeItem(STORAGE_KEY);document.getElementById('resumeArea').innerHTML=''}
function toggleGlossary(t){const e=document.getElementById(t==='hvit'?'glossaryHvit':'glossaryFnd');e.classList.toggle('show');if(e.classList.contains('show')&&!e.dataset.loaded){renderGlossary(t);e.dataset.loaded='1'}}
function renderGlossary(t){const d=t==='hvit'?GLOSSARY_HVIT:GLOSSARY_FND,l=document.getElementById(t==='hvit'?'glossaryHvitList':'glossaryFndList');l.innerHTML=d.map(g=>'<div class="glossary-item"><span class="term">'+g.t+'</span> <span class="en">('+g.en+')</span><div class="def">'+g.d+'</div></div>').join('')}
function filterGlossary(t,v){const d=t==='hvit'?GLOSSARY_HVIT:GLOSSARY_FND,l=document.getElementById(t==='hvit'?'glossaryHvitList':'glossaryFndList');const f=v.toLowerCase();l.innerHTML=d.filter(g=>g.t.toLowerCase().includes(f)||g.en.toLowerCase().includes(f)||g.d.toLowerCase().includes(f)).map(g=>'<div class="glossary-item"><span class="term">'+g.t+'</span> <span class="en">('+g.en+')</span><div class="def">'+g.d+'</div></div>').join('')}
checkResume();
</script>
</body>
</html>
