<head>

<title>ITIL 4 DSV 模擬試験</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;--text:#e8eaf0;--text2:#8b91a8;--text3:#5c6278}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}.header{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}.score-badge{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:20px}.score-badge span{color:var(--accent);font-weight:700}.progress-wrap{width:100%;max-width:760px;margin-bottom:28px}.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px;font-family:'DM Mono',monospace}.progress-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease}.card{width:100%;max-width:760px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.q-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:14px}.q-text{font-size:16px;line-height:1.8;color:var(--text);white-space:pre-wrap}.choices{width:100%;max-width:760px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}.choice-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;text-align:left;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;cursor:pointer;transition:all .15s ease;display:flex;align-items:flex-start;gap:12px}.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}.choice-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:20px;padding-top:1px}.choice-btn.correct{border-color:var(--correct);background:rgba(61,214,140,.08)}.choice-btn.correct .choice-label{color:var(--correct)}.choice-btn.wrong{border-color:var(--wrong);background:rgba(245,91,91,.08)}.choice-btn.wrong .choice-label{color:var(--wrong)}.choice-btn:disabled{cursor:default}.explanation{width:100%;max-width:760px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:20px 24px;margin-bottom:20px;font-size:14px;line-height:1.8;color:var(--text2);display:none;animation:fadeIn .3s ease}.explanation.show{display:block}.explanation-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}.btn-row{width:100%;max-width:760px;display:flex;gap:12px}.btn{flex:1;padding:14px 20px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.btn-primary:hover{opacity:.88;transform:translateY(-1px)}.btn-secondary{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}.btn-secondary:hover{border-color:var(--accent);color:var(--text)}.btn:disabled{opacity:.35;cursor:default;transform:none}.result-screen{width:100%;max-width:760px;text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:none;animation:fadeIn .4s ease}.result-screen.show{display:block}.result-title{font-size:28px;font-weight:700;margin-bottom:8px}.result-score{font-family:'DM Mono',monospace;font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:24px 0}.result-sub{font-size:16px;color:var(--text2);margin-bottom:32px}.result-pass{display:inline-block;padding:8px 24px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:32px}.result-pass.pass{background:rgba(61,214,140,.15);color:var(--correct);border:1px solid var(--correct)}.result-pass.fail{background:rgba(245,91,91,.15);color:var(--wrong);border:1px solid var(--wrong)}.mode-screen{width:100%;max-width:760px;text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;animation:fadeIn .4s ease}.mode-title{font-size:24px;font-weight:700;margin-bottom:8px}.mode-sub{font-size:14px;color:var(--text2);margin-bottom:36px}.mode-buttons{display:flex;flex-direction:column;gap:12px}.mode-btn{padding:18px 24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;text-align:left;display:flex;justify-content:space-between;align-items:center}.mode-btn:hover{border-color:var(--accent);background:var(--surface)}.mode-btn-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:3px}.mode-btn-arrow{color:var(--accent);font-size:18px}.gp{width:100%;max-width:760px;display:none;animation:fadeIn .4s ease}.gin{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.gtl{font-size:20px;font-weight:700}.gbk{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;transition:all .15s ease}.gbk:hover{border-color:var(--accent);color:var(--text)}.gl{max-height:70vh;overflow-y:auto;padding-right:4px}.gi{border-bottom:1px solid var(--border);padding:12px 0}.gt{color:var(--accent);font-weight:700;font-size:14px;margin-bottom:3px}.ge{color:var(--text3);font-size:11px;font-weight:400;margin-left:6px}.gd{color:var(--text2);font-size:13px;line-height:1.7}.gs{width:100%;padding:10px 16px;margin-bottom:16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none}.gs:focus{border-color:var(--accent)}.gfb{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;transition:all .15s ease}.gfb:hover{border-color:var(--accent);color:var(--text)}.gfb.active{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:600px){.card{padding:22px 18px}.q-text{font-size:14px}.choice-btn{font-size:14px;padding:14px 16px}.result-score{font-size:48px}}
</style>
</head>
<body>
<div class="header"><div class="logo">ITIL 4 DSV — 模擬試験</div><div class="score-badge" id="scoreBadge">正解 <span id="scoreNum">0</span> / <span id="totalNum">0</span></div></div>
<div class="mode-screen" id="modeScreen"><div class="mode-title">学習モードを選択</div><div class="mode-sub">全80問（模擬試験1：001〜040 / 模擬試験2：041〜080）</div><div id="resumeBanner" style="display:none;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:20px;text-align:left"><div style="font-size:14px;color:var(--text);margin-bottom:10px">📌 前回の続きがあります</div><button class="btn btn-primary" onclick="doResume()" style="width:100%;padding:12px">続きから再開する</button><button style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;margin-top:8px;width:100%" onclick="clearState();document.getElementById('resumeBanner').style.display='none'">破棄して最初から</button></div><div class="mode-buttons"><button class="mode-btn" onclick="startQuiz('all')"><div><div>全問チャレンジ</div><div class="mode-btn-sub">80問すべてに取り組む</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('exam1')"><div><div>模擬試験 1</div><div class="mode-btn-sub">問題001〜040（40問）</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('exam2')"><div><div>模擬試験 2</div><div class="mode-btn-sub">問題041〜080（40問）</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="startQuiz('random')"><div><div>ランダム 20問</div><div class="mode-btn-sub">80問からランダムに20問</div></div><div class="mode-btn-arrow">→</div></button><button class="mode-btn" onclick="toggleGlossary()" style="border-color:var(--accent2)"><div><div>📖 用語集</div><div class="mode-btn-sub">DSV関連のITIL公式用語一覧</div></div><div class="mode-btn-arrow">→</div></button></div></div>
<div class="gp" id="glossaryPanel"><div class="gin"><div class="gh"><div class="gtl">📖 ITIL 4 DSV 用語集</div><button class="gbk" onclick="toggleGlossary()">← モード選択に戻る</button></div><div id="gFB" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><button class="gfb active" onclick="setGCat('all',this)">すべて</button><button class="gfb" onclick="setGCat('DSV',this)">DSV用語</button><button class="gfb" onclick="setGCat('FND',this)">ファンデーション用語</button></div><input class="gs" id="glossarySearch" placeholder="用語を検索..." oninput="filterGlossary(this.value)"><div class="gl" id="glossaryList"></div></div></div>
<div class="progress-wrap" id="progressWrap" style="display:none"><div class="progress-info"><span id="progressText">問題 1 / 80</span><span id="progressPct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
<div class="card" id="questionCard" style="display:none"><div class="q-num" id="qNum">問題 001</div><div class="q-text" id="qText"></div></div>
<div class="choices" id="choicesArea" style="display:none"></div>
<div class="explanation" id="explanation"><div class="explanation-label">解説</div><div id="explanationText"></div></div>
<div class="btn-row" id="btnRow" style="display:none"><button class="btn btn-secondary" id="btnBack" onclick="goBack()">← 戻る</button><button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>次へ →</button></div>
<div class="result-screen" id="resultScreen"><div class="result-title">🎉 完了！</div><div class="result-score" id="resultScore">0/0</div><div id="resultPassBadge"></div><div class="result-sub" id="resultSub"></div><div class="btn-row" style="justify-content:center"><button class="btn btn-secondary" onclick="showMode()" style="max-width:200px">もう一度</button></div></div>
<script>
const ALL_QUESTIONS=[
{n:"001",t:"ユーザはフィードバックが対処されないと考えるため、フィードバックを提供しないことが多い。この状況でユーザにフィードバックの提出を促す最善の方法はどれですか？",c:["フィードバック処理の状況をすべての人に可視化する","ユーザのフィードバックに関する情報を顧客に提供する","ユーザと定期的に対面のフィードバックセッションを実施する","すべてのユーザのフィードバックに自動応答する"],a:0,e:"フィードバックに基づく改善を可視化することが、ユーザの参加を最も効果的に促します。（参照 8.2.6, 表 8.5）"},
{n:"002",t:"サービスの成果とパフォーマンスの報告に関する記述のうち、正しいものはどれですか？",c:["投資収益率（ROI）を顧客の成果にマッピングすべきである","サービスパフォーマンス指標を顧客の成果にマッピングすべきである","ITコンポーネントのスコアカードをサービス・プロバイダの成果にマッピングすべきである","顧客満足度フィードバックをサービス・プロバイダの成果にマッピングすべきである"],a:1,e:"サービスパフォーマンス指標は顧客の成果にマッピングされるべきです。体験、パフォーマンス、アウトプットのデータを成果、リスク、コストと関連付けて評価します。（参照 9.3, 9.2.3）"},
{n:"003",t:"サービス・プロバイダは、サービス・ユーザのモバイルデバイスにインストールされたソフトウェアの更新に、テクノロジー生成型アプローチを使用したいと考えています。最も適切な方法はどれですか？",c:["アップデート利用可能時にユーザに連絡し更新手順を案内するようサービスデスクに指示する","ユーザがサービスデスクにアップデートを依頼するためのセルフサービスポータルを使用する","ユーザのデバイスが接続されるたびにチェックするプッシュ方式を使用する","都合のよいときにデバイスをサービスデスクチームに持参するようユーザに指示する"],a:2,e:"プッシュ方式はテクノロジー生成型アプローチの好例です。サービス・プロバイダが新バージョン利用可能時にユーザのデバイスのソフトウェアを自動的に更新します。（参照 8.2）"},
{n:"004",t:"ある組織が大手サービス・プロバイダの即座に利用開始できるサービスを使用しています。サービス・プロバイダはどのようにしてこの組織のニーズを把握しますか？",c:["事業分析チームが「オファー」段階で組織と詳細な要件を交渉する","マーケティングおよび事業分析チームが特定組織ではなく一般的な市場ニーズを検討する","組織がRfPを提供しニーズを理解しサービスを設計する","サービスレベル管理チームが「共創」段階で詳細な要件を交渉する"],a:1,e:"即座に利用開始できるサービスでは、利用可能なサービスレベルは通常サービス・プロバイダが市場・ビジネスインテリジェンスに基づいて事前定義します。（参照 SLM Practice Guide 2.4.1）"},
{n:"005",t:"サービス・プロバイダが新しいサービスを立ち上げています。ターゲット市場は、インターネットの使用経験が限られ、ソーシャルメディアを使用する可能性が低いユーザです。ユーザサポートを提供する最善の方法はどれですか？",c:["シンプルなオンラインサポートとサービスデスクの連絡先番号を提供する","機械学習チャットボットでユーザのニーズを予測しソリューションを提供する","シフトレフト・アプローチを導入しサポートとヘルプ記事を提供する","人気のネットワーキングサイトでオンラインユーザサポートを宣伝・提供する"],a:0,e:"ターゲット市場のIT習熟度を考慮すると、シンプルなオンラインサポートとサービスデスクの電話サポートの組み合わせが最適です。（参照 7.3, 表 7.7）"},
{n:"006",t:"ある組織の顧客はこれまでサービスの機能性とパフォーマンスに満足していましたが、最近サービスパフォーマンスだけでなく営業やカスタマーサポートについても苦情が寄せられています。苦情に対処するために必要な情報を収集する最善の方法はどれですか？",c:["顧客サービスパフォーマンス指標を収集しSLAにマッピングする","顧客体験とサービスレベルの指標を収集する","サービスインタラクション後に満足度調査を実施する","サービスレビューからのフィードバックで価値実現を評価する"],a:1,e:"顧客体験指標とサービスレベル指標を組み合わせることで、根本原因の分析と継続的改善が可能になります。（参照 9.2.2）"},
{n:"007",t:"サービス・プロバイダが給与サービスのアップグレードをリリースしました。HRシステムから情報をコピーする機能が含まれると伝えていましたが、文書化されておらず設計にも含まれていませんでした。この状況を回避するのに役立つ活動を含むプラクティスはどれですか？",c:["サービスデスク","サービス・カタログ管理","事業分析","ポートフォリオ管理"],a:2,e:"事業分析プラクティスには、ステークホルダーからの情報の引き出しやビジネスニーズの要件への変換が含まれます。（参照 Business Analysis Practice Guide 2.4.1）"},
{n:"008",t:"サービス・プロバイダは通常事業を展開していない国で自社製品に強い需要があることを市場分析で把握しました。今行うべき活動はどれですか？",c:["改善の機会をプロフェッショナルな方法で扱う","必要なすべてのリソースを考慮したコストモデルを作成する","異なるユーザプロファイルの行動を理解し影響を与える","望ましい行動を促進するために価格設定メカニズムを評価する"],a:1,e:"ビジネスケースを確立するために、サービス・プロバイダはサービス提供コストを理解する必要があり、必要なすべてのリソースを考慮したコストモデルが必要です。（参照 5.1.5）"},
{n:"009",t:"サービス消費者組織が従業員の使用技術に大幅な変更を加えており、サービス・プロバイダと話し合っています。サービス・プロバイダが消費者組織のニーズを満たす能力を最もよく実証する方法はどれですか？",c:["変更に伴う需要増加に対応できる十分なキャパシティを確保する","顧客の変更をサポートするための十分な知識とスキルを確保する","顧客の問い合わせにタイムリーに対応する","消費者組織の変更決定に対して敬意を示す"],a:1,e:"十分な知識とスキルを確保することは、新技術をサポートする能力（ケイパビリティ）の実証です。（参照 4.3.2.1, 表 4.9）"},
{n:"010",t:"消費者の行動を追跡することでニーズを理解するのに役立つマーケティング手法はどれですか？",c:["プロファイリング","パンフレット","市場セグメンテーション","価値提案"],a:0,e:"プロファイリングは、消費者のニーズを理解しターゲットを絞ったマーケティングキャンペーンを可能にするために、サービス消費者の行動を追跡する方法です。（参照 3.4.3）"},
{n:"011",t:"エンドツーエンドのカスタマジャーニーに関する記述のうち、正しいものはどれですか？",c:["成果の達成に焦点を当てている","あらかじめ決められたパスを表す","全体的な認識を反映している","タッチポイントの最適化を含む"],a:2,e:"カスタマジャーニーは『サービス消費者とサービス・プロバイダ間のタッチポイントとインタラクションの全体的な認識』を表します。（参照 1.2.4）"},
{n:"012",t:"共通の需要を持つ顧客を特定する手法はどれですか？",c:["継続的改善モデル","PESTLE","市場セグメンテーション","SWOT分析"],a:2,e:"市場セグメンテーションの目的は、サービス・プロバイダがニーズと行動に基づいて顧客をグループ化できるようにすることです。（参照 3.3.1）"},
{n:"013",t:"顧客がサービスを廃止し契約を終了しましたが、サービス・プロバイダは引き続き他のサービスを提供します。サービスのオフボーディング計画に含めるべき活動はどれですか？",c:["すべてのサービスに対するユーザのアクセス権を取り消す","サービスの使用方法についてのユーザ向けトレーニングスケジュールを作成する","サービスデスクへの連絡方法についてユーザに情報を提供する","サービスの未払い金を特定し支払い請求を行う"],a:3,e:"オフボーディング活動には、未払い金額の計算と処理が含まれます。（参照 7.6.1）"},
{n:"014",t:"戦略的パートナーシップの属性はどれですか？",c:["共有される情報は最小限である","信頼関係を構築する必要がある","顧客が容易に離脱できる必要がある","関係は価格によって主導される"],a:1,e:"深い信頼を構築する必要があるのは戦略的パートナーシップの属性です。（参照 4.2, 表 4.3）"},
{n:"015",t:"サービス消費者がサービス・プロバイダからサービスを取得する際の最善のアプローチはどれですか？",c:["サービス・プロバイダに詳細な要件リストを提供する","過去のレガシーソリューションに基づいた詳細な要件を確保する","何を達成すべきかに焦点を当てたニーズのリストを作成する","サービス・プロバイダに要件に合わせたカスタマイズを依頼する"],a:2,e:"サービス消費者は過去の製品に基づく要件リストではなく、実際のニーズに基づいた要件を述べるべきです。（参照 5.4.3）"},
{n:"016",t:"投資銀行がヘルプラインをアウトソーシングし、SLAに体験指標を導入したいと考えています。SLAに含める体験指標の最善の例はどれですか？",c:["ヘルプラインに対する顧客満足度","合意された時間帯におけるヘルプラインの可用性","同時に処理されるコール数","正確に処理された顧客問い合わせの数"],a:0,e:"顧客満足度は体験指標の例です。可用性やキャパシティは保証指標です。（参照 6.2.4.3）"},
{n:"017",t:"個人の消費者をオンボーディングする際の課題は何ですか？",c:["消費者が受けるサービスレベルにスポンサーが合意すること","異なるスキルを持つ多数のサービス消費者に対応すること","消費者の機器を返却しユーザ権限を取り消すこと","サービス要件を特定し文書化すること"],a:1,e:"個人消費者との関係構築の課題には、異なるスキルと背景を持つ多数のサービス消費者への対応が含まれます。（参照 7.2.2, 表 7.6）"},
{n:"018",t:"サービス・プロバイダがユーザにユーザサポートコミュニティの形成を促しています。サービス・プロバイダにとっての潜在的な便益は何ですか？",c:["サービス・プロバイダからのサポート需要の削減","サービスのプロビジョニングに使用できるグループの作成","サービス・プロバイダ組織内のコラボレーションの改善","ユーザ組織間のコラボレーションの低下"],a:0,e:"ピアサポート、ナレッジ記事、ディスカッション、改善イニシアチブがサービス・プロバイダからのサポート需要を減少させます。（参照 8.3）"},
{n:"019",t:"サービスの価格が時間帯によって変動する可能性がある課金メカニズムはどれですか？",c:["コスト","コストプラス","市場価格","差別課金"],a:3,e:"差別課金は、異なる時間帯における同一または類似サービスの利用に対して異なる料金を設定することです。（参照 5.4.1, 表 5.12）"},
{n:"020",t:"リソースの制約により組織の新市場への拡大が遅れています。必要なリソースを確保するために、価値を提供していない製品やサービスの排除を推奨するプラクティスはどれですか？",c:["事業分析","サービスレベル管理","サービス・カタログ管理","ポートフォリオ管理"],a:3,e:"ポートフォリオ管理プラクティスの目的は、組織の戦略を実行するための適切なプログラム、プロジェクト、製品、サービスのミックスを確保することです。（参照 Portfolio Management Practice Guide 2.1, 2.4.2）"},
{n:"021",t:"価値の共創の計画の例はどれですか？",c:["自然に形成されたオンラインユーザコミュニティやグループを支援する","サービス・プロバイダの変更実現プラクティスの評価を実施する","将来の製品変更について内部スタッフに認識させるトレーニングを実施する","ユーザの各連絡方法に対するサービスデスクの応答時間について顧客と合意する"],a:3,e:"サービスのやり取り方法の合意は価値の共創の計画に含まれます。（参照 6.1.2）"},
{n:"022",t:"ある組織にはミスを隠す文化があり、学習と改善の機会が減少しています。この状況の改善に最も役立つプラクティスとその方法はどれですか？",c:["サービスデスク：より多くの内部IT情報をユーザと共有する","関係管理：価値観と原則を策定し伝達する","サービスレベル管理：顧客会議に透明性の議論を含める","サプライヤ管理：サプライヤとのよりオープンなコミュニケーションを促進する"],a:1,e:"関係管理プラクティスは、非難のないコラボレーションを含む、関係の価値観と原則の策定・伝達に使用されます。（参照 Relationship Management Practice Guide 2.1, 2.4.1）"},
{n:"023",t:"ある組織がレガシー情報システムをクラウドサービスに置き換える利点と欠点を評価しています。市場は競争が激しく、すべての要因を考慮したいと考えています。外部要因を最もよく理解できる手法はどれですか？",c:["4つの側面の評価","ステークホルダー分析","PESTLE分析","事業分析"],a:2,e:"PESTLE分析は、政治的、経済的、社会的、技術的、法的、環境的な外部要因を探る手法です。（参照 3.1.2）"},
{n:"024",t:"ユーザがラップトップの不調でインシデントを記録。大きな商談に影響する可能性あり。SLAは8時間以内対応だが、エージェントが例外状況と認識し即エスカレーション。迅速に解決されユーザは大変満足。これは何の例ですか？",c:["真実の瞬間","需要の平準化","デザイン思考","能力の向上"],a:0,e:"真実の瞬間とは、サービス・プロバイダとユーザの間の重要なタッチポイントまたはサービスのやり取りで、ユーザがサービス体験の印象を形成・変更する場面です。（参照 8.2.4）"},
{n:"025",t:"サービス・プロバイダがクラウドベース文書保管サービスの要件を収集しています。有用性要件の例はどれですか？",c:["メニューページは5秒以内に更新される","サービスはユーザがアップロードした項目のリストを表示する","サービスは各ユーザに100GBのストレージスペースを提供する","サービスは毎日24時間利用可能である"],a:1,e:"ユーザにリストを表示する機能は有用性（サービスが何をするか）要件です。パフォーマンス、キャパシティ、可用性は保証です。（参照 5.2.2）"},
{n:"026",t:"ユーザ中心のサービス設計を説明する活動はどれですか？",c:["迅速に作成できる最小限の機能のプロトタイプを構築する","ユーザ要件のセットにMoSCoW手法を適用する","ユーザ体験と技術的・ビジネス要件のバランスをとる","ユーザ要件のセットを特定するためにバリューストリームマッピングを使用する"],a:2,e:"ユーザ中心の設計は、製品とサービスがユーザのニーズとユーザ体験に焦点を当てることを確保します。（参照 5.3.3）"},
{n:"027",t:"社内ITサービス・プロバイダは新サービスに必要なスキルの一部を持っていませんが、時間があれば開発可能です。外部プロバイダも多数あります。内部か外部かを決定するためのアプローチはどれですか？",c:["組織のソーシングポリシーを確認し、重要な基準を特定し、意思決定マトリクスでプロバイダを比較する","内部・外部のサービス調達コストを理解し、見積依頼書を完成させる","詳細なサービス要件を分析・文書化し、外部プロバイダに情報提供依頼書への回答を依頼する","内部プロバイダに必要なスキルの開発を依頼し、新スキルで内部にサービスを作成・提供する"],a:0,e:"まず組織のソーシングポリシーを考慮し、次に意思決定マトリクスでオファリングを比較することが重要です。（参照 3.2）"},
{n:"028",t:"「サービスデザイン思考の5原則」の文脈で、タッチポイントとインタラクションをサービス・モーメントに組み合わせることを含む原則はどれですか？",c:["ユーザ重点であること","共同的であること","インタラクションの連続性","物的証拠"],a:2,e:"インタラクションの連続性の原則は、カスタマジャーニーを個々のタッチポイントとサービスのやり取りに分解し、それらを組み合わせてサービス・モーメントを作成します。（参照 2.4.1）"},
{n:"029",t:"異なるタイプのサービス関係には相互の準備状況を評価するための異なるアプローチが必要です。正しい記述はどれですか？",c:["変更への準備は基本的な関係において重要である","協働への準備はパートナーシップ関係において重要である","能力・成熟度・過去のパフォーマンスの評価はパートナーシップにおいて重要である","協働への準備は基本的な関係において重要である"],a:1,e:"パートナーシップでは、オープンさと信頼が相互成功の鍵であり、協働への準備が重要になります。（参照 4.3.5）"},
{n:"030",t:"サービスへのアクセス前にユーザの権限を確認するための2つのチェックはどれですか？\n1. すべてのユーザに年次IDチェックを実施\n2. サービスデスクへの連絡時にユーザIDを確認\n3. 認証が必要なサービスのトレーニング受講を確認\n4. 必要に応じてセキュリティチェックを実施",c:["1 および 2","2 および 3","3 および 4","1 および 4"],a:2,e:"ユーザのトレーニング・認証の確認（3）とセキュリティチェック（4）がサービス利用前の権限確認に該当します。（参照 7.4）"},
{n:"031",t:"サービス・プロバイダが顧客と「協力的な関係」を構築しています。提供されるサービスを検証するために最も使用される活動はどれですか？",c:["コストと便益のアドホックな合同サービスレビュー","成果、コスト、リスクの継続的な追跡と分析","サービス目標の達成に関する合同サービスレビュー","サービス・プロバイダの技術アップグレードのコストのレビュー"],a:2,e:"協力的な関係の共有活動には、アグリーメントと約束に対する達成の合同サービスレビューが含まれます。（参照 9.1, 表 9.2）"},
{n:"032",t:"ある組織がサービス消費者とのパートナーシップ構築を目指し、組織全体にサービスマインドセットを確立して信頼と満足度を向上させたいと考えています。最善のイニシアチブはどれですか？",c:["優秀な関係マネージャを採用し育成する","すべてのチームで対人スキルとサービスの共感を開発する","詳細なSLAを確立し施行する","能力評価を実施し結果を顧客と共有する"],a:1,e:"サービスマインドセットは、サービス提供に関わるすべての人が共有すべきであり、全チームでの対人スキルとサービスの共感の開発が重要です。（参照 8.1, 表 8.1.1）"},
{n:"033",t:"サービス要求として処理できる2つの例はどれですか？\n1. 顧客がスタッフの休暇申請アプリの設計を依頼\n2. スタッフが社内IT部門に新しいバーコードスキャナを要求\n3. マネージャが従業員のアクセス権の迅速な変更を要求\n4. サービス・プロバイダが緊急変更提出チャネルを確立",c:["1 および 2","2 および 3","3 および 4","1 および 4"],a:1,e:"バーコードスキャナの要求（2）とアクセス権変更（3）は通常のサービス提供の一部として合意されたサービス・アクションであり、サービス要求です。（参照 8.2.1）"},
{n:"034",t:"ある組織がソーシャルメディアサイトのサービスレベルを交渉しています。SLAに含めるべき有用性の測定の例はどれですか？",c:["アップロードにサポートされる写真フォーマットの数","1日あたりのネットワーク障害の数","ソーシャルメディアページの更新にかかる時間","セキュリティ侵害の検出と報告にかかる時間"],a:0,e:"サポートされるフォーマット数は機能性（有用性）の測定です。ネットワーク障害、ページ更新時間、セキュリティは保証です。（参照 6.2.4）"},
{n:"035",t:"サービス消費者が新しい文書保管サービスの開発を依頼しました。予算は限られ、従業員は多くの要件を持っています。要件を収集する最善のアプローチはどれですか？",c:["ユーザとワークショップを開催し要件を特定、開発前に合意を得る","顧客と有用性・保証の要件を特定しユーザに通知する","ユーザと要件を確立し、要件の明確化と合意に顧客を参加させる","顧客とワークショップでソリューションを開発し開発前に合意を得る"],a:2,e:"要件確立における一般的な問題は顧客とユーザの断絶です。両者間の合意を促進することが最善です。（参照 5.2.1）"},
{n:"036",t:"組織がオフィスの代わりに在宅勤務を奨励し、ユーザのサービスアクセスの方法とタイミングが変化しました。「需要と機会の管理」のどの側面がこの状況の理解に役立ちますか？",c:["事業活動パターンを分析する","コンポーネントキャパシティ管理を導入する","顧客のビジネスケースを構築する","差別課金を導入する"],a:0,e:"サービスの利用状況を理解するために、事業活動パターンの分析が有用です。（参照 5.1.1）"},
{n:"037",t:"組織がサービスデスク機能をサプライヤにアウトソーシングする契約を結びました。シームレスなサポートサービスを確保するためにこの段階で最も役立つ活動はどれですか？",c:["リソースのソーシングのための戦略と原則を定義する","サプライヤの活動を組織のバリューストリームに統合する","サプライヤのショートリスト作成時の基準を作成する","契約更新の有効性を改善する"],a:1,e:"組織はサードパーティサービスを組織の製品とサービスに効果的に統合する必要があります。（参照 Supplier Management Practice Guide 2.4.3）"},
{n:"038",t:"サービスデスクに連絡するユーザが、異なる個人やシステムとやり取りする際に情報を繰り返さなければならないと苦情を述べています。スペシャリストも必要な情報を得られないと苦情を述べています。すべてのステークホルダーの問題を解決するものはどれですか？",c:["マルチチャネルサポートを提供する","セルフサービスポータルを提供する","オムニチャネルコミュニケーションを確立する","ユーザメールのログ記録を自動化する"],a:2,e:"オムニチャネルコミュニケーションは、情報を失うことなくチャネル間を切り替えられるシームレスなユーザジャーニーを確保します。（参照 Service Desk Practice Guide 2.4.1）"},
{n:"039",t:"サービス・プロバイダとサービス消費者の両方が実施する、サービスの提供と消費の開始を可能にする活動はどれですか？",c:["信頼の構築","カスタマジャーニーの設計","相互の準備状況の評価","オンボーディング"],a:3,e:"オンボーディングには、サービス消費者がサービスの使用を開始し、サービス・プロバイダがサービスの提供を準備するために必要なすべての活動が含まれます。（参照 7）"},
{n:"040",t:"組織が従業員向けに標準サービスを学び要求できるオンラインポータルを提供しています。ユーザが情報を簡単に見つけられ、情報が最新に保たれることを確保するプラクティスはどれですか？",c:["サービスデスク","サービスレベル管理","サービス・カタログ管理","サービス要求管理"],a:2,e:"サービス・カタログ管理プラクティスは、ユーザ向けサービス・カタログが論理的に構成され、明確な言語で提示されることを確保します。（参照 7.4）"},
{n:"041",t:"サービス・プロバイダと顧客がカスタマジャーニーの「エンゲージ」ステップにあります。サービス・プロバイダが顧客との信頼を構築していることを示す例はどれですか？",c:["顧客とのすべての連絡をオーナーシップを持ちタイムリーかつオープンにフォローアップする","顧客の基本的なニーズを理解せずにサービス提供物の完全なカタログを共有する","サービス消費のリスクを開示する前にサービスレベルが合意されることを確保する","顧客にサービス・プロバイダのニーズへの適応性を示すことを確保する"],a:0,e:"信頼と一貫性を構築するために、サービス・プロバイダはオープンかつタイムリーに顧客に対応すべきです。（参照 4.3.2.1, 表 4.9）"},
{n:"042",t:"内部顧客にサービスをマーケティングすることの潜在的な便益は何ですか？",c:["サービス・カタログにサービスを含める必要性を削減する","サービスをより効果的かつ効率的に活用する","サービス・プロバイダの利益を最大化する","サービスの需要を削減する"],a:1,e:"内部顧客への販売とプロモーションは、既存サービスの活用を強化する便益があります。（参照 5.4.2）"},
{n:"043",t:"大企業のITチームが社内コミュニケーション・コラボレーション用アプリを置き換えています。チームは新アプリに熱心ですが、パイロットユーザは新機能を使わず古い方法を再現しています。サービスマインドセットはどのように改善に役立ちますか？",c:["新アプリの機能と企業目標への貢献をユーザに理解してもらう","ユーザフィードバック処理手順をITチームに理解してもらう","アプリを使用するサードパーティをITチームに認識してもらう","アプリの他システムとの統合とITサポートをユーザに理解してもらう"],a:0,e:"サービスマインドセットは全関係者が共有すべきであり、ユーザがサービス消費の文脈と組織目標への貢献を理解することが重要です。（参照 8.1.3, 表 8.3）"},
{n:"044",t:"限られたリソースの組織で、営業チームが新CRMサービスを、財務チームがサービス統合を、事業部門が新製品ライン導入を希望しています。最善の管理方法はどれですか？",c:["関係管理プラクティスでチーム間の対立を防止する","サプライヤ管理プラクティスでサプライヤ選定基準を確立する","事業分析プラクティスで各チームのハイレベルなニーズを理解する","ポートフォリオ管理プラクティスで組織目標に沿ってイニシアチブを優先順位付けする"],a:3,e:"ポートフォリオ管理は戦略的整合性に基づいて投資の優先順位付けを行い、最も重要なイニシアチブに十分なリソースを配分します。（参照 Portfolio Management Practice Guide 2.4.1）"},
{n:"045",t:"サービス・プロバイダがサービス消費者に影響する可能性のあるサービス障害の可能性を追跡しています。これは何の測定ですか？",c:["価値","成果","アウトプット","リスク"],a:3,e:"サービス障害の可能性はサービス提供リスクです。（参照 9）"},
{n:"046",t:"ユーザがサービスデスクエージェントが話を聞かず問題について憶測すると苦情を述べています。この改善に最善のアクションはどれですか？",c:["提供されるサービスレベルについてユーザに現実的な期待を設定する","サービスデスク機能のスタッフへのトレーニングを改善する","ユーザとサービス・プロバイダ間のコミュニケーションチャネル数を増やす","ユーザコミュニケーションをオンボーディングのバリューストリームに統合する"],a:1,e:"サービスデスクプラクティスは効果的で便利なコミュニケーションを目指し、エージェントの専門能力開発・心の知能指数の向上への投資が重要です。（参照 Service Desk Practice Guide 2.1, 2.4.1）"},
{n:"047",t:"ユーザのサービス利用を可能にする活動の一部はどれですか？",c:["以前のサービス・プロバイダから組織を移行する","毎四半期にユーザ体験のフィードバックを得るようスケジュールする","サービス変更の議論にユーザを参加させる","ユーザが権限のあるサービスのみにアクセスを要求できるようにする"],a:3,e:"ユーザが権限のあるサービスと利用可能なレベルのみを見られるようにすることが重要です。（参照 7.4）"},
{n:"048",t:"銀行が外部ユーザにオンラインバンキングサービスを提供。機能面・非機能面の測定で目標達成していますが、ユーザ満足度が低い。追加で測定すべきサービス側面の最善の例はどれですか？",c:["取引が開始されたが完了しなかった回数","各国の金融サービス規制違反の数","サービス中断を引き起こすネットワーク関連障害の数","大規模中断後のサービス復旧時間"],a:0,e:"未完了の取引はユーザ体験指標の例です。規制違反、ネットワーク障害、復旧時間は非機能面の測定です。（参照 6.2.4.3）"},
{n:"049",t:"ユーザストーリーの例はどれですか？",c:["企業ログイン手順の一部としてユーザIDを検証する必要がある","営業チームのメンバーは任意の場所と承認デバイスからデータにアクセスできる","ユーザが企業ネットワークに接続するたびに接続がすぐに切断される","在宅勤務者は経費精算を提出するために企業ネットワークに接続できる"],a:3,e:"ユーザストーリーは『<ユーザ>として、<要件>が欲しい、なぜなら<便益>のため』の形式で記述されます。在宅勤務者が経費精算のために接続する例がこれに該当します。（参照 5.2.5, 表 5.9）"},
{n:"050",t:"サービス・プロバイダが異なるユーザグループの作業量の時間変動を分析しています。この情報の最善の用途は何ですか？",c:["サービスの需要を影響・支援する方法を計画する","各顧客に対するサービスの課金方法を定義する","各サービス消費者と共創される価値を測定する","トリプルボトムラインの要件を確立する"],a:0,e:"事業活動パターン（PBA）の分析により、需要のピークに対応するための措置を実施できます。（参照 5.1.1）"},
{n:"051",t:"アジャイル開発手法を使用する際の優先事項の有効な記述はどれですか？",c:["ワークフローとツールを個人とインタラクションより優先する","包括的なドキュメントを動作する製品より優先する","契約交渉を顧客とのコラボレーションより優先する","計画に従うことより変化への対応を優先する"],a:3,e:"アジャイル手法は、ワークフロー・ツールより個人・インタラクション、ドキュメントより動作する製品、契約より顧客コラボレーション、計画より変化への対応を優先します。（参照 5.3.2）"},
{n:"052",t:"ある組織に社内IT部門がありますが、事業部門との間に信頼の欠如があります。この改善を支援する方法と技術を含むプラクティスはどれですか？",c:["サービスデスク","関係管理","事業分析","ポートフォリオ管理"],a:1,e:"関係管理プラクティスは、関係の価値観と原則を策定・伝達・維持するために他のプラクティスと連携して適用されます。（参照 Relationship Management Practice Guide 2.4.1）"},
{n:"053",t:"相互の準備状況を説明するものはどれですか？",c:["顧客が複数のプロバイダのオファーを検討し優先するものを選択した","顧客とサービス・プロバイダが適切なチェックを実施し協力関係を形成する準備ができている","サービス・プロバイダが各市場セグメントの価値提案を定義した","顧客がサービス・カタログを確認し適切なサービスを選択した"],a:1,e:"相互の準備状況とは、両当事者が適切なチェックとデューデリジェンスを完了し、初期の信頼を構築し、価値共創のための関係形成の準備ができている状態です。（参照 4.3.5）"},
{n:"054",t:"ターゲット顧客のニーズに対応する価値提案を含む活動はどれですか？",c:["マーケティング","ステークホルダー関係の醸成","顧客とユーザのオンボーディング","価値の共創の確保"],a:0,e:"マーケティングは「探索」ステップの一部であり、よく書かれた価値提案はマーケティングの最も重要な要素の一つです。（参照 3.4.1）"},
{n:"055",t:"組織はカスタマジャーニー全体でポジティブな成果と体験をどのように促進できますか？",c:["サービス消費者のニーズと要望を理解する","主要なリスクが特定され対処されていることを確保する","コストについて公正かつ透明である","サービスライフサイクル中のリソースの使用を最適化する"],a:0,e:"サービス消費者が必要とし望むものを理解することは、成果と体験の促進の一部です。（参照 2, 表 2.1）"},
{n:"056",t:"組織が多くのサプライヤを使用していますが、各サプライヤの価値を十分に理解しておらず活動の重複もあります。この防止に最も役立ったものはどれですか？",c:["各サプライヤのサービスコストの理解","ソーシング戦略の策定と維持","契約やアグリーメントを管理する情報システム","サプライヤのオンボーディングのためのスキルと知識"],a:1,e:"ソーシング戦略はサプライヤの分類、各カテゴリのサプライヤへの要件、関係管理の基本ルールを含みます。（参照 Supplier Management Practice Guide 2.4.1）"},
{n:"057",t:"ITサービス・プロバイダがサービスの開発・改善機会を特定する内部評価を行い、ワークフロー・活動、要員能力、サプライヤ契約を確認しました。他に検討すべき領域はどれですか？",c:["バリューストリームとプロセス","組織と人材","情報と技術","パートナーとサプライヤ"],a:2,e:"4つの側面のうち、ワークフロー（バリューストリーム）、要員（組織と人材）、サプライヤ（パートナー）は確認済みで、残りは情報と技術です。（参照 3.1.3, 表 3.4）"},
{n:"058",t:"オンラインサービスのパフォーマンスについて苦情を受けており、社内従業員からも新消費者のオンボーディング問題が報告されています。リソースが限られています。苦情に対処するための最初のステップはどれですか？",c:["オンラインサービスのキャパシティを増やす","事業活動パターンを分析する","ピーク期間中のサービスへの変更を禁止する","ピーク期間中に差別課金を導入する"],a:1,e:"まずサービスの利用状況を理解するために事業活動パターンを分析する必要があります。（参照 5.1.1）"},
{n:"059",t:"コーヒーショップがテイクアウトコーヒーを3分以内に提供すると約束。カード決済プロバイダとのSLA指標は「20秒以内に処理された支払いの割合」。カード決済サービスのパフォーマンスレベル定義に使用された方法はどれですか？",c:["MoSCoW","サービスレビュー会議からの顧客フィードバック","サービス・アクション","バリューストリームマッピング"],a:2,e:"サービス・アクション方法は、サービス消費中にユーザとプロバイダが実行する主要なサービス・アクションのパフォーマンスに基づいてサービスを記述・評価します。（参照 6.1.1）"},
{n:"060",t:"IT部門とマーケティングチームが新分析ツールを導入中。段階的実装のためサービスレベル目標の合意に苦労しています。「協働し可視性を高める」従うべき原則をどう適用しますか？",c:["要件の変化を予想し定期的レビューを計画する","成果とユーザ体験に焦点を当てる","制約について透明性を保ち期待を管理する","アグリーメントに含める指標数を制限する"],a:2,e:"関連するステークホルダーを議論に参加させ、合意サービスレベルに影響する制約を伝えて現実的な期待を確立することが重要です。（参照 SLM Practice Guide 2.4.1, 表 2.3）"},
{n:"061",t:"組織が従業員向けに標準サービスを学び要求できるオンラインポータルを提供しています。ユーザが情報を簡単に見つけられ最新に保たれることを確保するプラクティスはどれですか？",c:["サービスデスク","サービスレベル管理","サービス・カタログ管理","サービス要求管理"],a:2,e:"サービス・カタログ管理は、ユーザ向けサービス・カタログが論理的に構成され明確に提示されることを確保します。（参照 7.4）"},
{n:"062",t:"組織が従業員にオンラインポータルで限定的なセルフサービスを提供したいと考えています。ログイン時にステータスと権限に応じたサービスのみ表示され、レイアウト調整機能も提供したい。使用すべきサービス提供アプローチはどれですか？",c:["オーダーメイド","プッシュ","プル","手動"],a:0,e:"個々のユーザの要件と好みに合わせて調整されたインタラクションはオーダーメイド・アプローチです。（参照 8.2）"},
{n:"063",t:"価値の実現を評価すべきステークホルダーはどれですか？",c:["サービス消費者のみ","サービス・プロバイダのみ","サービス消費者とサービス・プロバイダの両方","どちらでもない"],a:2,e:"価値実現の追跡・評価の方法と技術は、サービス・プロバイダにもサービス消費者にも有効です。（参照 9.5.1）"},
{n:"064",t:"組織が顧客と協力的な関係を持っています。サービスの価値を検証するために共同で実施する活動はどれですか？",c:["顧客要求時のアドホックなサービスレビュー","サービス・プロバイダの価格設定ポリシーの定期レビュー","アグリーメントに対する達成の定期的なサービスレビュー","コンポーネント可用性とインシデント分析の報告"],a:2,e:"協力的な関係での共有活動には、アグリーメントと約束に対する達成の合同サービスレビューが含まれます。（参照 9.1, 表 9.2）"},
{n:"065",t:"プリンタインシデントの手順：ハードウェア障害確認後サプライヤに連絡。サプライヤは2日以内に修理・交換。ユーザが「プリンタが壊れ、契約書の印刷が急ぎ必要、さもなければ大きな商談を失う」と連絡。サービスデスクエージェントは何をすべきですか？",c:["合意手順に従いサプライヤが2日以内に対応するとユーザに伝える","サプライヤにより迅速なサービスを依頼し通常より早く対応すると伝える","サプライヤにコールをログし別のプリンタで契約書を印刷しユーザに届ける手配もする","サプライヤにコールをログし失われる商談のリスクを経営陣にエスカレーションする"],a:2,e:"サービス・プロバイダは真実の瞬間を認識し、正しい判断を行い適切なサービスを提供するリソースと能力を備えるべきです。（参照 8.2.4, 8.2.5）"},
{n:"066",t:"サービス要求に関する記述のうち、正しいものはどれですか？",c:["サービス要求は合意されたチャネルを通じて提出される","サービス要求のルールはケースバイケースで作成される","サービス要求のタイムフレームはユーザによって指定される","サービス要求は常にサービスデスクチームによって実現される"],a:0,e:"すべてのタイプのサービス要求について、ルールと条件は合意されチャネルと手段を含めて関係者に伝達されるべきです。（参照 8.2.1）"},
{n:"067",t:"非常に多くのユーザに新サービスを立ち上げます。大多数のユーザはソーシャルメディアとオンラインサポートに精通しています。ユーザサポートの最善のソリューションはどれですか？",c:["ウォークインサービスデスクを優先、電話をバックアップ","電話連絡を優先、チャットボットをバックアップ","セルフサービスオプションを優先、電話サポートをバックアップ","チャットボットを優先、セルフサービスをバックアップ"],a:2,e:"大多数がオンラインに精通している場合、セルフサービスが最適です。電話サポートはセルフサービスで解決できないユーザや問題のバックアップとして理想的です。（参照 7.3）"},
{n:"068",t:"クロスファンクショナルチームの組織が財務・HR・営業等を管理する新モジュラーアプリを導入予定。ユーザトレーニングの計画・提供の最善の方法は？",c:["各アプリモジュールごとに個別のトレーニングコースを作成","すべてのモジュールをカバーする単一コースを作成","12か月待ってからユーザに必要なトレーニングを尋ねる","各ユーザの役割またはペルソナごとに個別のトレーニングコースを作成"],a:3,e:"特定のユーザグループ、役割、ペルソナに対してターゲットを絞ったトレーニングを提供し、製品ではなくユーザのニーズに焦点を当てます。（参照 7.5）"},
{n:"069",t:"サービス・プロバイダが合意されたサービスレベルを確実に達成していますが、一部の顧客は期待した成果を達成していないため不満です。最善の対応はどれですか？",c:["顧客にSLAを説明し権利を理解してもらう","サービスレベルの改善方法を特定し改善コストを顧客と話し合う","サービスレベルの測定・報告方法をレビューし報告が達成を公正に反映するか確認する","定期的な顧客調査プロセスを作成し顧客体験を理解する"],a:1,e:"達成とフィードバックに基づいて合意サービスレベルを継続的にレビューし、制約を伝えて現実的な期待を確立することが重要です。（参照 SLM Practice Guide 2.4.1, 表 2.3）"},
{n:"070",t:"デジタルトランスフォーメーション中の組織が顧客ニーズの戦略的分析を行っています。アジャイルとウォーターフォールの両方を使用し、新製品・サービスの導入も検討中。この分析の最善の方法はどれですか？",c:["アナリストが主要顧客の機能要件に焦点を当てる","アナリストが同じタスクを同じ方法で処理する","アナリストが特定のコンテキストに適したタスクを実行するモデルを開発する","アナリストが開発者に適切に表現された要件を提供することに焦点を当てる"],a:2,e:"組織は一貫したアプローチをとりつつ、異なるコンテキスト（新製品、アジャイル、レガシー等）に対応する複数のモデルを含めるべきです。（参照 Business Analysis Practice Guide 2.4.1）"},
{n:"071",t:"顧客は通常サービスレベル達成についてプロバイダを十分に管理していますが、サービス価値の評価に苦労することが多い。このサービス関係の成熟度レベルはどれですか？",c:["協力的な関係","基本的な関係","管理型の関係","パートナーシップ"],a:1,e:"基本的な関係では効率性とトランザクションに重点が置かれますが、信頼関係の構築やサービス価値の評価が困難です。（参照 4.2.1, 表 4.4）"},
{n:"072",t:"ある組織がエコフレンドリーなライフスタイルを選択する消費者に注力しています。これは何の例ですか？",c:["価値提案","市場分析","特性ベースの市場セグメンテーション","関係管理"],a:2,e:"特性ベースの市場セグメンテーションは、特性、態度、行動に基づいてサービス消費者をセグメント化するプロセスです。（参照 3.3.1.1）"},
{n:"073",t:"カスタマジャーニーを設計する際に最初に行うべきことは何ですか？",c:["望ましい成果と価値提案を定義する","顧客組織に存在する認知バイアスの種類を特定する","カスタマジャーニーをサポートするために必要なプラクティスを特定する","サービスのやり取りを定義し文書化する"],a:0,e:"実際のカスタマジャーニーを設計する前に、望ましい成果と顧客・ユーザ体験を定義すべきです。（参照 2.4）"},
{n:"074",t:"チームがコミュニケーション改善のための商用ソフトウェアを評価中。評価プロセスに合意できません。最後に完了すべきステップはどれですか？",c:["製品とサービス・プロバイダのショートリストを作成する","意思決定マトリクスで製品を評価する","製品を構成するための要件を定義する","製品のセキュリティポリシーへの準拠を評価する"],a:2,e:"サービスの構成・カスタマイズ・開発が必要な関係では、最終選定は潜在的なプロバイダとの要件の具体化後に行われます。（参照 3.2）"},
{n:"075",t:"ユーザストーリーの最善の例はどれですか？",c:["サービス消費者として素晴らしいサービスが欲しいので利益を上げられる","サービス・プロバイダとして素晴らしいインフラが欲しいので高品質サービスを提供できる","リモート営業担当者として画面共有機能が欲しいので同僚と協働できる","アプリケーションとして定期的なパッチが欲しいのでセキュリティ脆弱性が低くなる"],a:2,e:"ユーザストーリーは1つのスプリントで開発できる機能を記述し、ユーザの視点からの具体的な機能と便益を含みます。（参照 5.2.5, 表 5.9）"},
{n:"076",t:"サービスのオンボーディングに関する記述のうち、正しいものはどれですか？",c:["オンボーディングはサービスの設計段階で計画されるべきである","オンボーディングはサービス消費者の関与なしにプロバイダが実施する","オンボーディングはサービス消費が開始された後に始まる","オンボーディングにはサービス・プロバイダの資産の除去が含まれる"],a:0,e:"ユーザ中心のアプローチの一部として、オンボーディングアプローチはスムーズなオンボーディングのために設計の一部として定義されるべきです。（参照 5.3.6）"},
{n:"077",t:"サービス・プロバイダが新しい顧客のための新デスクトップサービスをオンボーディング予定。顧客によって実施される活動はどれですか？",c:["デスクトップサービス使用のためのユーザアクセス権を提供する","デスクトップサービスのサポートアクセスの正しい手順についてユーザをトレーニングする","デスクトップサービスの一般的なインシデント解決策情報をサービスデスクに提供する","デスクトップサービス要求のためのセルフヘルプテクノロジーを実装する"],a:1,e:"ユーザトレーニングは顧客リソースのオンボーディングの例です。ユーザはサービスの使用とサポート手順のトレーニングが必要です。（参照 7.1.2, 表 7.2）"},
{n:"078",t:"ユーザのフィードバックが真剣に受け止められ適切に対処されていることを示し、将来的により多くのフィードバックを促す最善の方法は何ですか？",c:["すべてのユーザフィードバックに自動応答を送信する","ユーザフィードバックの結果として行われたサービス改善に関する最新情報を定期的に提供する","サービスレベルの改善を示す月次レポートをすべてのユーザに提供する","ユーザフィードバックと改善提案を求める年次調査を公開する"],a:1,e:"ユーザフィードバックによって開始されたサービス改善の最新ログを維持し、その進捗をすべてのユーザに可視化することが推奨されます。（参照 8.2.6, 表 8.5）"},
{n:"079",t:"組織が、より高いサブスクリプションの外部ユーザによる質問への回答、コンサルテーション、事前定義された変更の実現を行う専任サポートチームを導入しました。これらのサービス・アクションの効果的な実現を確保するプラクティスはどれですか？",c:["サービス要求管理","関係管理","サービスデスク","サービス・カタログ管理"],a:0,e:"サービス要求管理プラクティスは、すべての事前定義されたユーザ開始のサービス要求を効果的かつユーザフレンドリーな方法で処理します。（参照 Service Request Management Practice Guide 2.1, 2.4.1）"},
{n:"080",t:"サービス・プロバイダが新クライアントへのサービス提供を開始。調査ではスタッフの大半が体験に満足ですが、一部のユーザがサービスへのアクセス・利用手順を知らず開始に時間がかかっています。ユーザジャーニー改善の最善の推奨事項はどれですか？",c:["「共創」ステップでサービスデスクスタッフの対人スキルを改善する","「エンゲージ」ステップで関係管理スキルを改善する","「実現」ステップでサービス価値の監視と検証を改善する","「オンボーディング」ステップの一環としてユーザトレーニング資料と方法を改善する"],a:3,e:"ユーザがサービスへのアクセス・利用手順を知らない場合、オンボーディングステップでのトレーニング資料と方法の改善が最善です。（参照 9.4, 表 7.3）"}
];
const GLOSSARY=[{t:"AIOps",en:"",d:"自動化による継続的な修正と改善をもたらす知見を継続的に得るために、機械学習とビッグデータをIT運用に適用すること。"},{t:"ITIL 継続的改善モデル",en:"ITIL continual improvement model",d:"改善を実施するための体系的なアプローチを組織に提供するモデル。"},{t:"ITIL サービスバリューチェーン",en:"ITIL service value chain",d:"製品とサービスを効果的に管理するために必要となる主要な活動すべてを網羅するサービスプロバイダの運用モデル。"},{t:"ITIL サービスバリューチェーン活動",en:"ITIL service value chain activity",d:"組織が価値の創出において実行する、バリューチェーンのステップ。"},{t:"ITILの従うべき原則",en:"ITIL guiding principles",d:"組織の目標、戦略、業務の種類、管理体制が変化したとしても、あらゆる状況で組織を導くことができる推奨事項。"},{t:"RACI",en:"",d:"役割と責任を定義するために使用されるモデル。Responsible（実行責任者）、Accountable（説明責任者）、Consulted（協議先）、Informed（情報先）の略称。"},{t:"運用",en:"operation",d:"活動、製品、サービスまたはその他の構成アイテムを、定型化された方法で実施、管理すること。"},{t:"運用モデル",en:"operating model",d:"組織が顧客およびその他の利害関係者とどのように価値を共創するか、組織がどのように運営するかを表現したもの。"},{t:"エピック",en:"epic",d:"まだ十分に洗練または理解されていない要件定義の概要。最終的にいくつかのユーザストーリーと要件に分解される。"},{t:"改善",en:"improvement",d:"意図的に導入された変更により、一人以上の利害関係者の価値を高めること。"},{t:"可視化の範囲",en:"band of visibility",d:"サービスプロバイダとサービス消費者の双方が閲覧可能な、サービス関係内の活動およびリソース。"},{t:"カスタマジャーニー",en:"customer journey",d:"タッチポイントおよびサービスのやり取りを通じ、サービス顧客が1つ以上のサービスプロバイダまたはその製品に対して持つ、完全なエンドツーエンドの体験。"},{t:"価値",en:"value",d:"認識されている便益、便利さ、何らかの重要性。"},{t:"価値提案",en:"value proposition",d:"サービスプロバイダが顧客に対して、特定の一連の便益を提供するという明示的な約束。"},{t:"ガバナンス",en:"governance",d:"知覚を方向付け、コントロールする方法。"},{t:"カルチャ",en:"culture",d:"人々の集団で共有される一連の価値観。人々のふるまいに対する期待、考え、信念、プラクティスなどが含まれる。"},{t:"カルチャフィット",en:"cultural fit",d:"自分の信念、価値観およびニーズに対応した環境で快適に働ける従業員またはチームの能力。"},{t:"カンバン",en:"Kanban",d:"作業を可視化したり、障害やリソース競合を識別したり、進行中の作業を管理するための手法。"},{t:"機械学習",en:"machine learning",d:"人工知能の応用形態の一つで、システムがデータに反応し、より多くのデータにさらされることでその行動およびアウトプットを適応させる原理に基づく。"},{t:"技術的負債",en:"technical debt",d:"時間のかかるシステムソリューションではなくワークアラウンドを選んだ結果として蓄積された、再作業を必要とするバックログ全体。"},{t:"職務の統合",en:"integration of duties",d:"他のコントロールが適用されていることを理由に、一人の人間が不正もしくはエラーが生じやすいタスクを受け持つこと。"},{t:"ギャップ分析",en:"gap analysis",d:"2つのデータセットを比較し、違いを特定する活動。"},{t:"協働",en:"collaboration",d:"共通の目標を達成するために他者と協力すること。"},{t:"協力",en:"cooperation",d:"自身の目標を達成するために他の人と一緒に働くこと。"},{t:"計画",en:"plan",d:"4つのすべての側面、ならびにすべての製品およびサービスに対するビジョン、現在のステータスおよび改善の方向性に関する理解を組織全体で共有するためのバリューチェーン活動。"},{t:"継続的インテグレーション",en:"continuous integration",d:"ソフトウェア開発環境内でコードを統合し、構築し、テストするためのアプローチ。"},{t:"継続的デリバリ",en:"continuous delivery",d:"ソフトウェアをいつでも本番環境にリリースできるようにするソフトウェア開発へのアプローチ。"},{t:"継続的展開（デプロイメント）",en:"continuous deployment",d:"変更がパイプラインを経由して自動的に本番環境に投入され、1日に複数回の本番展開を可能にするアプローチ。"},{t:"顧客志向",en:"customer orientation",d:"顧客の長期的なニーズおよび要望を満たす支援に重点を置く、営業活動と顧客関係へのアプローチ。"},{t:"顧客体験 (CX)",en:"customer experience",d:"顧客により認識されている、サービスとサービスプロバイダとの実務的および感情的なやり取りの積み重ね。"},{t:"心の知能指数",en:"emotional intelligence",d:"人の気持ちや反応を理解し、そのスキルを使用して適切な判断を下したり、対立を回避または解決したりできる能力。"},{t:"コントロール",en:"control",d:"リスクを管理する手段であり、事業達成目標を確実に実現する手段、またはプロセスに確実に従っているようにする手段。"},{t:"コンプライアンス",en:"compliance",d:"標準または一連の指針に確実に従っているようにする活動および結果の両方のこと。"},{t:"サービスドミナントロジック",en:"service-dominant logic",d:"組織が互いの利益のためにコンピテンシーおよびその他のリソースを適用することによって価値を共創する、交換のメンタルモデル。"},{t:"サービスの共感",en:"service empathy",d:"サービス関係を確立、維持、および改善するために、他の当事者の利益、ニーズ、意図、および経験を認識、理解、予測する能力。"},{t:"サービスの統合および管理",en:"service integration and management",d:"製品とサービスの開発と提供に関わるすべてのサプライヤ間の作業の調整および編成。"},{t:"サービスのやり取り",en:"service interaction",d:"価値を共創するサービスプロバイダとサービス消費者の間の相互作用。"},{t:"サービスバリューシステム (SVS)",en:"service value system",d:"価値創造を促進するために、組織のすべてのコンポーネントと活動がどのように連携して機能するかを表すモデル。"},{t:"サービス品質",en:"service quality",d:"明示的および暗黙的なニーズを満たす能力に関連する、サービスの特性の総体。"},{t:"サービスマインドセット",en:"service mindset",d:"サービス関係における組織の行動を定義するカルチャの重要な要素。組織が採用し、従い、共有する価値および従うべき原則が含まれる。"},{t:"サービスマネジメント",en:"service management",d:"顧客にとっての価値をサービスの形で実現する、組織の専門能力の集まり。"},{t:"サービス要求",en:"service request",d:"通常のサービス提供の一部として合意されたサービス活動を開始する、ユーザまたは権限を与えられたユーザ代理人からの要求。"},{t:"サービスレベル",en:"service level",d:"期待または実現されるサービス品質を定義する1つ以上の測定基準。"},{t:"サービスレベルアグリーメント (SLA)",en:"service level agreement",d:"必要とされるサービスとサービスで期待されるレベルを規定するための、サービスプロバイダと顧客の間で結ばれる合意文書。"},{t:"サイクル時間",en:"cycle time",d:"入力を出力に変換する、個別の作業単位を完了するために必要な時間。"},{t:"サイトリライアビリティエンジニアリング (SRE)",en:"site reliability engineering",d:"拡張性が極めて高く信頼性の高いソフトウェアシステムを構築するために、ソフトウェアエンジニアリングをインフラストラクチャおよび運用の問題に適用する原理原則。"},{t:"事業活動パターン (PBA)",en:"pattern of business activity",d:"一つ以上の事業活動の作業負荷プロファイル。サービスプロバイダがサービス消費者の異なるレベルの活動を理解しサポートするために使用される。"},{t:"事業分析",en:"business analysis",d:"事業の要素を分析し、ビジネス・ニーズを定義して、そのニーズに対処し利害関係者にとっての価値を生み出すためのソリューションを推奨するプラクティス。"},{t:"指標",en:"indicator",d:"何かをアセスメントおよび管理するために用いられる測定基準。"},{t:"初期サポート (ELS)",en:"early-life support",d:"ユーザへのサービスコンポーネントのリリースに関連する期間。ユーザサポートとサービス運用には追加のリソースが割り当てられる。"},{t:"シングルループ学習",en:"single-loop learning",d:"現在の組織構造の中で問題を解決することで、その構造を変更せずにシステムがより良く機能するようにする学習形態。"},{t:"人工知能",en:"artificial intelligence",d:"一般的な推論、学習、および人間のような知能を発揮する高度に先進的な自動化。"},{t:"真実の瞬間",en:"moment of truth",d:"顧客またはユーザが組織のある面に接し、そのサービスの品質についての印象を得るエピソード。"},{t:"スウォーミング",en:"swarming",d:"さまざまな専門家が一つの項目に取り組み、最適な人材が明らかになった時点でその他の人が他の作業に移れるように解放する作業の管理方法。"},{t:"戦略",en:"strategy",d:"組織が目標を達成するために定義した広範なアプローチまたは一連の行動。"},{t:"即座に利用開始できるサービス",en:"out-of-the-box services",d:"サービスの合意成立後すぐに使用でき、導入研修およびセットアップはほとんどまたはまったく必要ないサービス。"},{t:"測定",en:"measurement",d:"定量化可能な単位で表される一つ以上の観測に基づいて、不確実性を減少する手段。"},{t:"測定基準",en:"metric",d:"管理および改善を目的としてモニタリングまたは報告される測定値または計算値。"},{t:"組織",en:"organization",d:"自らの目的を達成するため、責任、権限、相互関係を伴う機能をもつ、個人または人々の集まり。"},{t:"タッチポイント",en:"touchpoint",d:"サービス消費者または潜在的なサービス消費者が、サービスプロバイダまたはその製品とリソースに遭遇するあらゆるイベント。"},{t:"ダブルループ学習",en:"double-loop learning",d:"実施済の仕事の目的と機能を精査する際、既存の組織構造を前提とせずに行われる学習形態。リフレーミングとも呼ばれる。"},{t:"データ",en:"data",d:"移動または処理に効率的な形に変換された情報。"},{t:"適応型システム",en:"adaptive system",d:"エージェントの行動が変化し、イベントの反応を通じてエージェントが自己組織化していくシステム。"},{t:"デザイン思考",en:"design thinking",d:"製品およびサービス設計者が複雑な問題を解決し、組織と顧客のニーズに応える実践的で創造的なソリューションを発見するための人間中心のアプローチ。"},{t:"デジタルトランスフォーメーション",en:"digital transformation",d:"デジタル技術を利用して、デジタル以外の手段では実現不可能だった組織の達成目標の実現を大幅に改善すること。"},{t:"ネットプロモータスコア (NPS)",en:"net promoter score",d:"顧客ロイヤルティを測定するための測定基準で、顧客満足度の代用として利用されることが多い。"},{t:"バリューストリーム",en:"value stream",d:"組織が製品およびサービスを創出し、消費者に提供するために実行する一連のステップ。"},{t:"バリューストリームマッピング",en:"value stream mapping",d:"需要を価値に変えるために必要なステップを可視化し、改善の機会を識別するために用いられるリーン管理技法。"},{t:"バリューストリームマップ",en:"value stream map",d:"作業、情報、およびリソースの流れを示すサービスバリューストリームを視覚的に表現したもの。"},{t:"ビジネスケース",en:"business case",d:"組織のリソースを消費する根拠。コスト、便益、選択肢、リスク、課題に関する情報を示す。"},{t:"ビジョン",en:"vision",d:"組織を将来どのようなものにしたいかという願望を定義したもの。"},{t:"ビッグデータ",en:"big data",d:"さまざまな情報源から得られた膨大な量の構造化データと非構造化データを利用して新しい知見を得ること。"},{t:"複雑性思考",en:"complexity thinking",d:"システムに内在するさまざまなレベルの複雑性と、それを運用する際の背景の認識と理解に基づいたシステム思考のアプローチ。"},{t:"複雑なシステム",en:"complex system",d:"エージェントのやり取りがダイナミックで、しばしば予測不可能なシステム。"},{t:"ブロックチェーン",en:"blockchain",d:"2者間のトランザクションを効率的かつ検証可能で永続的な方法で記録できる、オープンな分散型台帳。"},{t:"ペルソナ",en:"persona",d:"サービスまたは製品の典型的または対象となる顧客またはユーザの架空でありながら現実的な説明。"},{t:"報告",en:"report",d:"トピックまたはイベントに関する情報またはナレッジの詳細な伝達。"},{t:"保証",en:"warranty",d:"製品またはサービスが合意済みの要件を満たすことに対する確約。サービスの可用性、キャパシティ、セキュリティレベル、継続性に対応する。"},{t:"マネジメント（管理）",en:"management",d:"何かを定義、コントロール、監督および改善するための調整された活動。"},{t:"マルチソーシング",en:"multi-sourcing",d:"類似したサービスを提供する複数のサービスプロバイダを利用すること。単一プロバイダへの依存リスクと複数プロバイダの管理オーバーヘッドのバランスを取る。"},{t:"メンタルモデル",en:"mental model",d:"周囲の世界で何がどのように機能するかについての誰かの理解の説明。"},{t:"役割",en:"role",d:"特定の状況下で個人またはチームに付与される一連の責任、活動、および権限。"},{t:"ユーザストーリー",en:"user story",d:"アジャイルソフトウェア開発において、特定のペルソナの観点から望ましい成果および便益を「誰が、何を、なぜ」の形式で説明する技法。"},{t:"ユーザ体験 (UX)",en:"user experience",d:"ユーザにより認識されている、サービスおよびサービスプロバイダとの実務的および感情的なやり取りの積み重ね。"},{t:"有用性",en:"utility",d:"特定のニーズを満たすために製品またはサービスによって提供される機能。「サービスが何を行うか」であると言いかえられる。"},{t:"リードタイム",en:"lead time",d:"プロセスの実行が完了するまでの時間で、通常は特定の観点から測定される。"},{t:"リーンカルチャ",en:"Lean culture",d:"信頼、尊敬、好奇心、探究心、遊び心、そして熱意が共存し、学習と発見をサポートする職場環境。"},{t:"利害関係者",en:"stakeholder",d:"組織、製品、サービス、プラクティスまたはその他のエンティティに関心がある、または関与している個人または組織。"},{t:"利口な不服従",en:"intelligent disobedience",d:"危険な状況を回避する、または正しい行いをするために、故意に規則に従わないまたは規則を無視すること。"},{t:"リスク",en:"risk",d:"損害や損失を引き起こす、または達成目標の実現をより困難にする可能性があるイベント。成果の不確実性と定義することもできる。"},{t:"リフレーミング",en:"reframing",d:"ダブルループ学習を参照。"}];
const GLOSSARY_FND=[{t:"アーキテクチャ管理プラクティス",en:"architecture management practice",d:"組織を構成するあらゆる要素と、これらの要素の相互関係を把握するためのプラクティス。"},{t:"ID",en:"identity",d:"ユーザ、個人、役割に対するシステム・アクセスの権限を識別し付与するために使用される一意の名前。"},{t:"ITインフラストラクチャ",en:"IT infrastructure",d:"ITサービスの開発、テスト、提供、モニタリング、管理、サポートに必要とされるすべてのハードウェア、ソフトウェア、ネットワーク、設備。"},{t:"ITサービス",en:"IT service",d:"情報技術の利用に基づくサービス。"},{t:"IT資産",en:"IT asset",d:"IT製品またはITサービスの提供に利用できる、経済的な価値を持つすべてのコンポーネント。"},{t:"IT資産管理プラクティス",en:"IT asset management practice",d:"すべてのIT資産のライフサイクル全体を計画し管理するプラクティス。"},{t:"ITIL",en:"ITIL",d:"ITサービスマネジメントに関するベストプラクティス・ガイダンス。"},{t:"アウトソーシング",en:"outsourcing",d:"以前は内部で提供していた製品およびサービスを、外部のサプライヤに依頼して提供してもらうプロセス。"},{t:"アウトプット",en:"output",d:"活動の有形または無形の提供物。"},{t:"アジャイル",en:"agile",d:"共同作業、優先度設定、イテレーション型かつインクリメンタル型のデリバリ、タイムボックスなどを特徴とする方法で作業するためのフレームワークや手法の総称。"},{t:"イベント",en:"event",d:"サービスまたはその他の構成アイテムを管理するうえで重要な意味を持つ状態の変更。"},{t:"インシデント",en:"incident",d:"サービスの計画外の中断、またはサービスの品質の低下。"},{t:"インシデント管理",en:"incident management",d:"通常のサービス運用を可能な限り迅速に復旧することでインシデントの悪影響を最小限に抑えるプラクティス。"},{t:"インフラストラクチャおよびプラットフォーム管理プラクティス",en:"infrastructure and platform management practice",d:"組織が使用するインフラストラクチャとプラットフォームを監督するプラクティス。"},{t:"ウォーターフォール手法",en:"waterfall methodology",d:"開発フェーズごとに明確な達成目標を定める、線形的かつ逐次的な開発アプローチ。"},{t:"受け入れ基準",en:"acceptance criteria",d:"サービスまたはサービス・コンポーネントが主要な利害関係者に受け入れられるための最低限の要件。"},{t:"運用技術",en:"operational technology",d:"物理デバイスに対する直接的なモニタリングやコントロールを行うことで、物理プロセスにおける変更を検出したり変更を加えたりするハードウェアおよびソフトウェア・ソリューション。"},{t:"エスカレーション",en:"escalation",d:"課題や作業項目の情報を共有する、またはそのオーナシップを移管する活動。"},{t:"エラー",en:"error",d:"インシデントを引き起こす可能性がある不具合や脆弱性。"},{t:"エラーコントロール",en:"error control",d:"既知のエラーをコントロールするために使用される問題管理活動。"},{t:"エンゲージ",en:"engage",d:"利害関係者のニーズ、透明性、継続的なエンゲージメントについて十分な理解を促し、すべての利害関係者と良好な関係を実現するバリューチェーン活動。"},{t:"解決",en:"resolution",d:"インシデントまたは問題を解決する活動。"},{t:"改善（バリューチェーン活動）",en:"improve",d:"すべてのバリューチェーン活動とサービスマネジメントの4つの側面において、製品、サービスおよびプラクティスを継続的に改善するためのバリューチェーン活動。"},{t:"開発環境",en:"development environment",d:"ITサービスやアプリケーションの作成または修正に使用される環境。"},{t:"外部顧客",en:"external customer",d:"サービス・プロバイダとは異なる組織に属する顧客。"},{t:"課金",en:"charging",d:"サービスの価格を設定する活動。"},{t:"稼働環境",en:"live environment",d:"サービス消費者にITサービスを提供する際に使用されるコントロールされた環境。"},{t:"可用性",en:"availability",d:"ITサービスまたはその他の構成アイテムが、合意された機能を必要なときに実行できる能力。"},{t:"可用性管理プラクティス",en:"availability management practice",d:"サービスが合意されたレベルの可用性を確実に提供するプラクティス。"},{t:"環境",en:"environment",d:"特定の目的に使用される、ITインフラストラクチャの一部。"},{t:"関係管理プラクティス",en:"relationship management practice",d:"戦略レベルおよび戦術レベルで、組織と利害関係者との間につながりを確立し深めるためのプラクティス。"},{t:"完全性",en:"integrity",d:"情報が、承認された要員および活動のみによって確実に修正されるようにするセキュリティ達成目標。"},{t:"既知のエラー",en:"known error",d:"分析済みだが未解決の問題。"},{t:"機密性",en:"confidentiality",d:"情報が許可を受けていないエンティティに確実に提供または公開されないようにするセキュリティの達成目標。"},{t:"キャパシティおよびパフォーマンス管理プラクティス",en:"capacity and performance management practice",d:"サービスが合意済みで期待されたパフォーマンス・レベルを達成し、費用対効果に優れた方法で需要を満たすプラクティス。"},{t:"キャパシティ計画立案",en:"capacity planning",d:"サービスへの需要を満たすためにリソースを管理する計画を策定する活動。"},{t:"緊急の変更",en:"emergency change",d:"可能なかぎり迅速に導入しなければならない変更。"},{t:"クラウド・コンピューティング",en:"cloud computing",d:"管理の手間やプロバイダとのやり取りを最小限に抑えて迅速に提供できる、構成可能なコンピューティング・リソースの共有プールへのオンデマンド・ネットワーク・アクセスを実現するモデル。"},{t:"継続的インテグレーション/継続的デリバリ",en:"CI/CD",d:"開発者のコードを統合し、最終的なソフトウェアを構築・試験した後、展開できるようパッケージ化するための一連の統合されたプラクティスとツール。"},{t:"継続的改善プラクティス",en:"continual improvement practice",d:"製品およびサービスの効果的な管理に関与するすべての要素の継続的な識別と改善を通して、ビジネス・ニーズに組織のプラクティスとサービスを整合させるプラクティス。"},{t:"構成",en:"configuration",d:"製品またはサービスを提供するために連携する構成アイテムまたは他のリソースの配置。"},{t:"構成アイテム (CI)",en:"configuration item",d:"ITサービスを提供するために管理する必要がある、あらゆるコンポーネント。"},{t:"構成管理システム (CMS)",en:"configuration management system",d:"サービス構成管理を支援するために使用される一連のツール、データ、および情報。"},{t:"構成管理データベース (CMDB)",en:"configuration management database",d:"構成レコードのライフサイクルを通して構成レコードを保管するために使用されるデータベース。"},{t:"構成レコード",en:"configuration record",d:"構成アイテムの詳細を含むレコード。各構成レコードには単一のCIのライフサイクルが記録される。"},{t:"効率性",en:"efficiency",d:"プラクティス、サービス、または活動によって適切な量のリソースが使用されているかどうかを表す指標。"},{t:"顧客",en:"customer",d:"サービスの要件を定義し、サービスを消費した成果に対して責任を負う役割。"},{t:"コスト",en:"cost",d:"特定の活動またはリソースに費やされた金銭の額。"},{t:"コスト・センタ",en:"cost centre",d:"コストを帰属させる事業部門またはプロジェクト。"},{t:"サードパーティ",en:"third party",d:"組織外の利害関係者。"},{t:"サービス",en:"service",d:"顧客が特定のコストやリスクを管理することなく、望んでいる成果を得られるようにすることで、価値の共創を可能にする手段。"},{t:"サービス・アーキテクチャ",en:"service architecture",d:"組織によって提供されるすべてのサービスを俯瞰できるようにしたもの。"},{t:"サービス・オーナ",en:"service owner",d:"特定のサービスの提供に関して説明責任を負う役割。"},{t:"サービス・カタログ",en:"service catalogue",d:"特定の対象者に合わせて、サービス・プロバイダのすべてのサービスおよびサービス提供に関する構造化された情報。"},{t:"サービス・カタログ管理プラクティス",en:"service catalogue management practice",d:"すべてのサービスおよびサービス提供に関する一貫した情報の単一の情報源を提供し、関連する対象者に利用可能であることを確実にするプラクティス。"},{t:"サービス活動",en:"service action",d:"サービスのアウトプットをユーザに提供するために必要なすべての活動。"},{t:"サービス関係",en:"service relationship",d:"サービス・プロバイダおよびサービス消費者間の協力関係。サービス供給、サービス消費およびサービス関係管理が含まれる。"},{t:"サービス関係管理",en:"service relationship management",d:"合意済みの利用可能なサービス提供物に基づいて継続的な価値の共創を確実にするために、サービス・プロバイダとサービス消費者が共同で行う活動。"},{t:"サービス供給",en:"service provision",d:"組織がサービスを供給するために実施する活動。"},{t:"サービス継続性管理プラクティス",en:"service continuity management practice",d:"災害の発生時にサービスの可用性とパフォーマンスを十分なレベルで維持することを確実にするプラクティス。"},{t:"サービス構成管理プラクティス",en:"service configuration management practice",d:"サービスの構成およびそれらをサポートする構成アイテムに関する正確で信頼できる情報を、必要なときに利用可能であることを確実にするプラクティス。"},{t:"サービス財務管理プラクティス",en:"service financial management practice",d:"組織の財務リソースと投資が確実に効果的に使用されるようにすることで、サービスマネジメントの戦略と計画を支援するプラクティス。"},{t:"サービス消費",en:"service consumption",d:"組織がサービスを消費するために実施する活動。"},{t:"サービス提供物",en:"service offering",d:"対象とする消費者グループのニーズに対処することを目的とした、1つまたは複数のサービスについての形式的な説明。"},{t:"サービスデザイン・プラクティス",en:"service design practice",d:"目的に適し、使用に適し、組織およびそのエコシステムによって提供できる製品およびサービスを設計するプラクティス。"},{t:"サービスデスク",en:"service desk",d:"サービス・プロバイダとその全ユーザの間に位置するコミュニケーション・ポイント。"},{t:"サービスデスク・プラクティス",en:"service desk practice",d:"インシデント解決とサービス要求の需要を収集するプラクティス。"},{t:"サービスの妥当性確認およびテスト・プラクティス",en:"service validation and testing practice",d:"新規または変更された製品およびサービスが定義された要件を満たすことを確実にするプラクティス。"},{t:"サービス・プロバイダ",en:"service provider",d:"サービス関係の中でサービス消費者にサービスを提供するうえで、組織が果たす役割。"},{t:"サービス・ポートフォリオ",en:"service portfolio",d:"組織によってライフサイクル全体を通して管理されるすべての製品およびサービスを集めたもの。"},{t:"サービスマネジメントの4つの側面",en:"four dimensions of service management",d:"顧客と他の利害関係者に対する価値を、製品およびサービスという形で効果的かつ効率的に高めるために欠かせない4つの視点。"},{t:"サービス要求管理プラクティス",en:"service request management practice",d:"事前に定義されユーザが開始したすべてのサービス要求を効果的かつユーザ・フレンドリーな方法で処理するプラクティス。"},{t:"サービスレベル管理 (SLM) プラクティス",en:"service level management practice",d:"サービス・パフォーマンスの明確な目標値を事業に基づいて設定し、その目標値に対してサービスの提供を適切に評価、モニタリングおよび管理できるようにするプラクティス。"},{t:"災害",en:"disaster",d:"組織に大きな損害や深刻な損失をもたらす、予定外の突然の出来事。"},{t:"災害復旧計画",en:"disaster recovery plan",d:"組織が災害から復旧するだけでなく災害前の状態に戻るための方法を明確に定義した計画。"},{t:"作業指示書",en:"work instruction",d:"活動を実行するために従うことが求められる、詳細な説明。"},{t:"サプライヤ",en:"supplier",d:"組織で使用されるサービスを提供する責任を負った利害関係者。"},{t:"サプライヤ管理プラクティス",en:"supplier management practice",d:"組織のサプライヤとそのパフォーマンス・レベルを適切に管理することで、高品質な製品およびサービスの提供を支援するプラクティス。"},{t:"サポート・チーム",en:"support team",d:"通常運用の維持、ユーザの要求への対応、および特定の製品やサービスに関連するインシデントや問題の解決に責任を負うチーム。"},{t:"事業関係マネージャー (BRM)",en:"business relationship manager",d:"顧客との良好な関係維持を責務とする役割。"},{t:"資産台帳",en:"asset register",d:"資産のデータベースまたはリスト。オーナシップや財務的価値などの主要な属性が記録される。"},{t:"システム",en:"system",d:"1つまたは複数の明確に規定された目的を実現するために組織化され維持されている、相互にやりとりする要素の組み合わせ。"},{t:"システム思考",en:"systems thinking",d:"システムの構成部分が時間の経過とともに他のシステムのコンテキスト内で機能し、相互に関連し相互にやりとりする方法に焦点を当てた分析の総合的なアプローチ。"},{t:"実施後のレビュー (PIR)",en:"post-implementation review",d:"変更の実施後に、変更が成功したかどうかを評価し改善の機会を識別するために行われるレビュー。"},{t:"実用最小限の製品 (MVP)",en:"minimum viable product",d:"初期の顧客を満足させ、今後の製品開発に役立つフィードバックを得るための最低限の機能を備えた製品。"},{t:"重大なインシデント",en:"major incident",d:"重大なビジネス・インパクトを及ぼすため、迅速な解決を目指して組織的に取り組む必要があるインシデント。"},{t:"重要業績評価指標 (KPI)",en:"key performance indicator",d:"達成目標の達成度を評価するために使用される、重要な測定基準。"},{t:"重要成功要因 (CSF)",en:"critical success factor",d:"意図した結果を実現するために必要な前提条件。"},{t:"取得/構築",en:"obtain/build",d:"サービス・コンポーネントが必要なときに必要な場所で確実に利用でき、合意済みの仕様を満たすようにするバリューチェーン活動。"},{t:"需要",en:"demand",d:"内部および外部の利害関係者からの機会やニーズに基づく、サービスバリュー・システムへのインプット。"},{t:"仕様",en:"specification",d:"製品、サービスまたはその他の構成アイテムの特性を記述した文書。"},{t:"障害",en:"failure",d:"仕様に沿って稼働する能力、もしくは要求されるアウトプットまたは成果を提供する能力を失うこと。"},{t:"商品",en:"goods",d:"サービス・プロバイダからサービス消費者に渡される有形リソース。オーナシップに加えて関連付けられている権限と責任もサービス消費者に移管される。"},{t:"情報セキュリティ管理プラクティス",en:"information security management practice",d:"情報の機密性、完全性、可用性へのリスクを把握し管理することで組織を防御するプラクティス。"},{t:"情報セキュリティ方針",en:"information security policy",d:"情報セキュリティ管理に対する組織のアプローチを統制する方針。"},{t:"情報と技術",en:"information and technology",d:"サービスマネジメントの4つの側面の1つ。サービスの提供に使用される情報とナレッジに加え、サービスバリュー・システムのすべての面を管理するために使用される情報と技術。"},{t:"信頼性",en:"reliability",d:"製品、サービスまたはその他の構成アイテムが指定の期間、意図した機能を実行する能力。"},{t:"推進要因",en:"driver",d:"戦略、達成目標、または要件に影響する要因。"},{t:"ステータス",en:"status",d:"1つのエンティティがある時点で持ち得る特定の状態を説明したもの。"},{t:"スポンサ",en:"sponsor",d:"サービスの消費の予算を承認する役割。"},{t:"スループット",en:"throughput",d:"製品、サービス、または他のシステムが一定の時間内に実行する処理の量を表す指標。"},{t:"成果",en:"outcome",d:"1つまたは複数のアウトプットによって可能になる利害関係者にとっての結果。"},{t:"成熟度",en:"maturity",d:"組織、プラクティス、プロセスの信頼性、効率性または有効性を評価する指標。"},{t:"製品",en:"product",d:"サービス消費者に価値を提供できるように設計された、組織のリソースの構成。"},{t:"設計および移行",en:"design and transition",d:"製品およびサービスが品質、コスト、市場投入に要する時間に関する利害関係者の期待に常に応えることを確実にするためのバリューチェーン活動。"},{t:"戦略管理プラクティス",en:"strategy management practice",d:"組織の最終目標を策定し、その達成に必要な一連の活動とリソースの割り当てを決めるプラクティス。"},{t:"ソーシング",en:"sourcing",d:"特定のタイプのソースからリソースを計画して取得する活動。"},{t:"測定および報告",en:"measurement and reporting",d:"不確実性レベルを下げることで正しい意思決定を支援し、継続的な改善を図るプラクティス。"},{t:"組織と人材",en:"organization and people",d:"サービスマネジメントの4つの側面の1つ。組織内の役割、責任、権限と意思伝達のシステムを明確に定義する。"},{t:"組織の対障害弾力性",en:"organizational resilience",d:"組織が外部からの計画外の影響に対して予測、準備、対応、および適応するための能力。"},{t:"組織ベロシティ",en:"organizational velocity",d:"組織が備える速度、有効性、および効率性。市場投入までの期間、品質、安全性、コストおよびリスクに影響する。"},{t:"組織変更の管理プラクティス",en:"organizational change management practice",d:"組織変更を確実に円滑かつ成功裏に実施し、変更の人に関わる側面を管理することで長期的な便益を実現するプラクティス。"},{t:"即効性のある成果（クイック・ウィン）",en:"quick win",d:"比較的少ないコストと労力で、短期間内に投資の回収をもたらすと期待される改善。"},{t:"ソフトウェア開発および管理のプラクティス",en:"software development and management practice",d:"アプリケーションが利害関係者のニーズを機能性、信頼性、保守性、コンプライアンス、監査可能性の観点から満たすことを確実にするプラクティス。"},{t:"ダッシュボード",en:"dashboard",d:"データをリアルタイムでグラフィカルに表現したもの。"},{t:"妥当性確認",en:"validation",d:"システム、製品、サービスまたはその他のエンティティが合意済みの仕様を満たすことの確認。"},{t:"DevOps",en:"DevOps",d:"顧客に対する価値の流れを改善することを目的とした組織のカルチャ。カルチャ、自動化、リーン、測定、共有（CALMS）を重視する。"},{t:"提供およびサポート",en:"deliver and support",d:"合意済みの仕様と利害関係者の期待に従ってサービスが提供されサポートされることを確実にするためのバリューチェーン活動。"},{t:"手順",en:"procedure",d:"活動またはプロセスを実行する方法を文書化したもの。"},{t:"テスト環境",en:"test environment",d:"製品やサービスなどの構成アイテムをテストするために確立された管理された環境。"},{t:"展開",en:"deployment",d:"任意のサービス・コンポーネントを任意の環境に移動すること。"},{t:"展開管理プラクティス",en:"deployment management practice",d:"新規または変更されたハードウェア、ソフトウェア、文書、プロセス、あるいはその他のサービス・コンポーネントを稼働環境に移動するプラクティス。"},{t:"問い合わせ",en:"call",d:"サービスデスクとのやり取り。問い合わせによりインシデントまたはサービス要求が記録されることもある。"},{t:"トランザクション",en:"transaction",d:"複数の参加者またはシステム間のやり取りを構成する作業の単位。"},{t:"内部顧客",en:"internal customer",d:"サービス・プロバイダと同じ組織に属する顧客。"},{t:"ナレッジ管理プラクティス",en:"knowledge management practice",d:"組織全体の情報とナレッジを効果的、効率的、便利に使用できる状態を維持し改善していくためのプラクティス。"},{t:"能力",en:"capability",d:"活動を実行するための組織、人、プロセス、アプリケーション、構成アイテム、またはITサービスの力量。"},{t:"パートナシップ",en:"partnership",d:"共通の目標を実現するために緊密に連携することを伴う、2つの組織の関係。"},{t:"パートナとサプライヤ",en:"partners and suppliers",d:"サービスマネジメントの4つの側面の1つ。サービスの設計、開発、展開、提供、サポート、継続的改善に関与する他の組織との関係性をすべて網羅する。"},{t:"廃止",en:"retire",d:"製品、サービスまたはその他の構成アイテムが永久的に使用されないようにする活動。"},{t:"パイロット",en:"pilot",d:"稼働環境の限られた範囲を対象とした、サービスのテスト実装。"},{t:"パフォーマンス",en:"performance",d:"システム、人、チーム、プラクティス、またはサービスによって達成または提供されたものの尺度。"},{t:"バリューストリームとプロセス",en:"value streams and processes",d:"サービスマネジメントの4つの側面の1つ。合意済みの達成目標を実現するために必要な活動、ワークフロー、コントロール、手順を定義する。"},{t:"ビジネス・インパクト分析 (BIA)",en:"business impact analysis",d:"サービス継続性管理のプラクティスにおいて、重要な事業機能とその依存関係を明らかにする重要な活動。"},{t:"標準",en:"standard",d:"共通認識によって確立され公認団体が承認した文書。必須の要件、指針、または特性が規定される。"},{t:"標準的な変更",en:"standard change",d:"リスクが低く、あらかじめ承認された変更。内容が十分理解され完全に文書化されており、再度承認を得る必要はない。"},{t:"フィードバック・ループ",en:"feedback loop",d:"システムの一部からのアウトプットを、システムの同じ部分へのインプットとして使用する手法。"},{t:"復旧",en:"recovery",d:"障害発生後に構成アイテムを通常の運用に戻す活動。"},{t:"プラクティス",en:"practice",d:"作業を実行するため、または達成目標を実現するために設計された一連の組織のリソース。"},{t:"プログラム",en:"programme",d:"一連の関連するプロジェクトと活動、およびそれらを指示および監督するために構築した組織の仕組み。"},{t:"プロジェクト",en:"project",d:"合意済みのビジネス・ケースに従い、1つまたは複数のアウトプットを提供する目的で構築された一時的な仕組み。"},{t:"プロジェクト管理プラクティス",en:"project management practice",d:"組織のプロジェクトがすべて成功裏に提供されることを確実にするプラクティス。"},{t:"プロセス",en:"process",d:"インプットをアウトプットに変換する、相互につながりがあるまたはやり取りする一連の活動。"},{t:"平均サービス回復時間 (MTRS)",en:"mean time to restore service",d:"障害発生後にサービスが回復されるまでの早さを表す測定基準。"},{t:"平均障害間隔 (MTBF)",en:"mean time between failures",d:"サービスまたはその他の構成アイテムが停止する頻度を表す測定基準。"},{t:"ベースライン",en:"baseline",d:"進捗や変更を評価できる基準として役立つ、レポートまたは測定基準。"},{t:"ベストプラクティス",en:"best practice",d:"複数の組織で成功の実績がある業務の方法。"},{t:"変更",en:"change",d:"サービスに直接的または間接的な影響を及ぼす可能性がある何らかの追加、修正、削除。"},{t:"変更許可委員",en:"change authority",d:"変更を許可する権限を持つ個人またはグループ。"},{t:"変更実現プラクティス",en:"change enablement practice",d:"製品およびサービスの変更の成功数を最大にするために、変更を進めることを許可し変更スケジュールを管理するプラクティス。"},{t:"変更スケジュール",en:"change schedule",d:"計画された変更および変更の履歴を示すカレンダー。"},{t:"変更モデル",en:"change model",d:"特定の種類の変更を管理するための繰り返し可能なアプローチ。"},{t:"方針",en:"policy",d:"マネジメントの期待と意図を正式に文書化したもの。決定および活動を指示するために使用される。"},{t:"ポートフォリオ管理プラクティス",en:"portfolio management practice",d:"組織がプログラム、プロジェクト、製品、サービスを適切に組み合わせて戦略を実行できることを確実にするプラクティス。"},{t:"保守性",en:"maintainability",d:"サービスまたはその他のエンティティを修復または修正する際の容易さ。"},{t:"保証要件",en:"warranty requirements",d:"主要な利害関係者および他のプラクティスからのインプットとして得られる要件。通常は非機能要件となる。"},{t:"マネジメントシステム",en:"management system",d:"方針と達成目標を定め、その達成目標の達成を可能にする、相互に関係またはやり取りする要素。"},{t:"ミッション",en:"mission",d:"簡潔ではあるが完全に組織の目的と意図を記述している説明。"},{t:"目標復旧時間 (RTO)",en:"recovery time objective",d:"サービスの停止後、ビジネス機能の欠落が組織に重大なインパクトを与えるまでに許容される最大の時間。"},{t:"目標復旧時点 (RPO)",en:"recovery point objective",d:"復旧時に活動を再開できるようにするために、情報をどの時点まで復元する必要があるかを表す目標値。"},{t:"モデル",en:"model",d:"システム、プラクティス、プロセス、サービスまたはその他のエンティティを表し、その動作と関係性を把握し予測するために使用できるもの。"},{t:"モニタリング",en:"monitoring",d:"イベントを検出し現在のステータスを確実に把握するために、システム等を繰り返し観察すること。"},{t:"モニタリングおよびイベント管理プラクティス",en:"monitoring and event management practice",d:"サービスおよびサービス・コンポーネントを系統的に観察しイベントとして認識された状態変化を記録し報告するプラクティス。"},{t:"モノのインターネット",en:"Internet of Things",d:"従来はIT資産と見なされなかったデバイスが、コンピューティング能力とネットワーク接続機能を内蔵したことで実現したインターネットを介した相互接続。"},{t:"問題",en:"problem",d:"1つまたは複数のインシデントの原因、または潜在的原因。"},{t:"問題管理プラクティス",en:"problem management practice",d:"インシデントの実際の原因と潜在的原因を識別し、ワークアラウンドと既知のエラーを管理することでインシデントの発生可能性とインパクトを低減するプラクティス。"},{t:"有効性",en:"effectiveness",d:"プラクティス、サービス、または活動の達成目標が実現されたかどうかを表す指標。"},{t:"ユーザ",en:"user",d:"サービスを利用する役割。"},{t:"ユース・ケース",en:"use case",d:"機能の要件を定義しテストを設計するために、現実的で実用的なシナリオを使用する手法。"},{t:"有用性要件",en:"utility requirements",d:"顧客によって定義され、特定の製品に固有の機能的要件。"},{t:"要員およびタレント管理プラクティス",en:"workforce and talent management practice",d:"組織が適切なスキルと知識を備えた人材を確保し、事業達成目標の実現に向けて適切な役割を与えることを確実にするプラクティス。"},{t:"ライフサイクル",en:"lifecycle",d:"サービス、製品、プラクティス等の耐用期間における、すべての段階、移行、関連ステータスを含んだもの。"},{t:"リーン",en:"lean",d:"無駄を排除して価値を最大化することで、ワークフローの改善に注力するアプローチ。"},{t:"リクエスト・カタログ",en:"request catalogue",d:"サービス・カタログのビューの1つ。既存および新規のサービスに対するサービス要求の詳細をユーザに提供する。"},{t:"リスク・アセスメント",en:"risk assessment",d:"リスクを識別し、分析し、評価する活動。"},{t:"リスク管理プラクティス",en:"risk management practice",d:"組織がリスクを把握して効果的に対処することを確実にするプラクティス。"},{t:"リソース",en:"resource",d:"活動の実施または達成目標の実現に必要な要員、資材、財源、その他のエンティティ。"},{t:"リリース",en:"release",d:"新規および変更されたサービスならびに機能を使用可能にすること。"},{t:"リリース管理プラクティス",en:"release management practice",d:"新規および変更されたサービスならびに機能を使用可能にするプラクティス。"},{t:"レコード",en:"record",d:"実現された結果が記述され、実施された活動の証拠となる文書。"},{t:"ワークアラウンド",en:"workaround",d:"まだ完全な解決策がないインシデントまたは問題のインパクトを軽減または排除するソリューション。"}];
let gCat='all';
function setGCat(c,el){gCat=c;var btns=document.querySelectorAll('.gfb');btns.forEach(function(b){b.classList.remove('active')});el.classList.add('active');document.getElementById('glossarySearch').value='';renderGlossary()}
function getGItems(){if(gCat==='DSV')return GLOSSARY;if(gCat==='FND')return GLOSSARY_FND;return GLOSSARY.concat(GLOSSARY_FND)}
function renderGlossary(items){var h='';items=items||getGItems();for(var i=0;i<items.length;i++){var g=items[i];h+='<div class="gi"><div class="gt">'+g.t+(g.en?'<span class="ge">'+g.en+'</span>':'')+'</div><div class="gd">'+g.d+'</div></div>'}document.getElementById('glossaryList').innerHTML=h}
function filterGlossary(q){if(!q){renderGlossary();return}q=q.toLowerCase();var f=getGItems().filter(function(g){return g.t.toLowerCase().indexOf(q)!==-1||(g.en&&g.en.toLowerCase().indexOf(q)!==-1)||g.d.toLowerCase().indexOf(q)!==-1});renderGlossary(f)}
function toggleGlossary(){var p=document.getElementById('glossaryPanel');var m=document.getElementById('modeScreen');if(p.style.display==='block'){p.style.display='none';m.style.display='block'}else{p.style.display='block';m.style.display='none';renderGlossary()}}
let questions=[],current=0,score=0,answered=[],userAnswers=[],shuffledMaps=[],currentMode='';
function saveState(){try{localStorage.setItem('dsvQuiz',JSON.stringify({qn:questions.map(function(q){return q.n}),cur:current,sc:score,ans:answered,ua:userAnswers,sm:shuffledMaps,md:currentMode}))}catch(e){}}
function clearState(){localStorage.removeItem('dsvQuiz')}
function resumeQuiz(){try{var s=JSON.parse(localStorage.getItem('dsvQuiz'));if(!s)return false;questions=s.qn.map(function(n){return ALL_QUESTIONS.find(function(q){return q.n===n})});current=s.cur;score=s.sc;answered=s.ans;userAnswers=s.ua;shuffledMaps=s.sm;currentMode=s.md;return true}catch(e){return false}}
function doResume(){if(resumeQuiz()){document.getElementById('modeScreen').style.display='none';document.getElementById('resumeBanner').style.display='none';document.getElementById('progressWrap').style.display='block';document.getElementById('questionCard').style.display='block';document.getElementById('choicesArea').style.display='flex';document.getElementById('btnRow').style.display='flex';updateScore();renderQuestion()}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function shuffleChoices(q){const idx=[0,1,2,3];for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}return{choices:idx.map(i=>q.c[i]),correctIdx:idx.indexOf(q.a)}}
function startQuiz(mode){currentMode=mode;document.getElementById('resumeBanner').style.display='none';let pool;if(mode==='all')pool=[...ALL_QUESTIONS];else if(mode==='exam1')pool=ALL_QUESTIONS.slice(0,40);else if(mode==='exam2')pool=ALL_QUESTIONS.slice(40,80);else pool=shuffle(ALL_QUESTIONS).slice(0,20);questions=shuffle(pool);current=0;score=0;answered=new Array(questions.length).fill(false);userAnswers=new Array(questions.length).fill(null);shuffledMaps=questions.map(q=>shuffleChoices(q));document.getElementById('modeScreen').style.display='none';document.getElementById('resultScreen').classList.remove('show');document.getElementById('progressWrap').style.display='block';document.getElementById('questionCard').style.display='block';document.getElementById('choicesArea').style.display='flex';document.getElementById('btnRow').style.display='flex';updateScore();saveState();renderQuestion()}
function renderQuestion(){const q=questions[current],sm=shuffledMaps[current],total=questions.length;document.getElementById('qNum').textContent='問題 '+q.n;document.getElementById('qText').textContent=q.t;document.getElementById('progressText').textContent='問題 '+(current+1)+' / '+total;const pct=Math.round(current/total*100);document.getElementById('progressPct').textContent=pct+'%';document.getElementById('progressFill').style.width=pct+'%';const area=document.getElementById('choicesArea');area.innerHTML='';const labels=['A','B','C','D'];sm.choices.forEach((c,i)=>{const btn=document.createElement('button');btn.className='choice-btn';btn.innerHTML='<span class="choice-label">'+labels[i]+'</span><span>'+c+'</span>';btn.onclick=()=>selectAnswer(i,btn);area.appendChild(btn)});const expEl=document.getElementById('explanation');expEl.classList.remove('show');document.getElementById('btnNext').disabled=true;if(answered[current]){const ua=userAnswers[current],ci=sm.correctIdx;const btns=area.querySelectorAll('.choice-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===ci)btn.classList.add('correct');else if(i===ua&&ua!==ci)btn.classList.add('wrong')});document.getElementById('explanationText').textContent=q.e;expEl.classList.add('show');document.getElementById('btnNext').disabled=false}document.getElementById('btnBack').disabled=current===0}
function selectAnswer(idx,clickedBtn){if(answered[current])return;const q=questions[current],sm=shuffledMaps[current];answered[current]=true;userAnswers[current]=idx;const correct=idx===sm.correctIdx;if(correct)score++;updateScore();const btns=document.getElementById('choicesArea').querySelectorAll('.choice-btn');btns.forEach((btn,i)=>{btn.disabled=true;if(i===sm.correctIdx)btn.classList.add('correct');else if(i===idx&&!correct)btn.classList.add('wrong')});document.getElementById('explanationText').textContent=q.e;document.getElementById('explanation').classList.add('show');document.getElementById('btnNext').disabled=false;saveState()}
function goNext(){if(current<questions.length-1){current++;saveState();renderQuestion()}else showResult()}
function goBack(){if(current>0){current--;saveState();renderQuestion()}}
function updateScore(){document.getElementById('scoreNum').textContent=score;document.getElementById('totalNum').textContent=answered.filter(Boolean).length}
function showResult(){clearState();document.getElementById('progressWrap').style.display='none';document.getElementById('questionCard').style.display='none';document.getElementById('choicesArea').style.display='none';document.getElementById('explanation').classList.remove('show');document.getElementById('btnRow').style.display='none';const total=questions.length,pct=Math.round(score/total*100),pass=pct>=70;document.getElementById('resultScore').textContent=score+' / '+total;document.getElementById('resultPassBadge').innerHTML='<div class="result-pass '+(pass?'pass':'fail')+'">'+(pass?'✓ 合格ライン達成':'✗ 合格ライン未達')+'</div>';document.getElementById('resultSub').textContent='正解率 '+pct+'%（合格ライン：70%）';document.getElementById('resultScreen').classList.add('show')}
function showMode(){clearState();document.getElementById('resumeBanner').style.display='none';document.getElementById('glossaryPanel').style.display='none';document.getElementById('resultScreen').classList.remove('show');document.getElementById('modeScreen').style.display='block';document.getElementById('progressWrap').style.display='none';document.getElementById('questionCard').style.display='none';document.getElementById('choicesArea').style.display='none';document.getElementById('btnRow').style.display='none';document.getElementById('explanation').classList.remove('show');document.getElementById('scoreNum').textContent='0';document.getElementById('totalNum').textContent='0'}
if(localStorage.getItem('dsvQuiz')){document.getElementById('resumeBanner').style.display='block'}
</script>
</body>
