<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ITIL 4 DITS 模擬試験（60問）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3347;--accent:#5b8af5;--accent2:#7c5bf5;--correct:#3dd68c;--wrong:#f55b5b;--text:#e8eaf0;--text2:#8b91a8;--text3:#5c6278}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.container{max-width:760px;width:100%;margin:0 auto}
h1{text-align:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:20px;font-size:0.85em}
.mode-select{display:flex;flex-direction:column;gap:12px;margin:20px 0}
.mode-btn{padding:18px 24px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-size:15px;font-weight:bold;cursor:pointer;transition:all .15s;text-align:left;display:flex;justify-content:space-between;align-items:center}
.mode-btn:hover{border-color:var(--accent);background:var(--surface)}
.mode-btn small{font-size:12px;color:var(--text3);font-weight:400;display:block;margin-top:3px}
.progress-bar{height:4px;background:var(--surface2);border-radius:4px;margin:16px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease}
.question-area{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin:16px 0;animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-number{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:14px}
.q-text{font-size:16px;font-weight:600;margin-bottom:20px;line-height:1.8;white-space:pre-wrap}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:16px 20px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:all .15s ease;text-align:left;font-size:15px;line-height:1.6;color:var(--text)}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}
.choice-btn.selected{border-color:var(--accent);background:var(--surface2)}
.choice-btn.correct{border-color:var(--correct);background:rgba(61,214,140,.08)}
.choice-btn.correct .choice-label{color:var(--correct)}
.choice-btn.wrong{border-color:var(--wrong);background:rgba(245,91,91,.08)}
.choice-btn.wrong .choice-label{color:var(--wrong)}
.choice-btn:disabled{cursor:default}
.choice-label{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:20px;padding-top:1px}
.explanation{margin-top:18px;padding:20px 24px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;display:none;font-size:14px;line-height:1.8;color:var(--text2);animation:fadeIn .3s ease}
.explanation.show{display:block}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px}
.nav-btn{flex:1;padding:14px 20px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease}
.nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.nav-btn.primary:hover{opacity:.88;transform:translateY(-1px)}
.nav-btn.secondary{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}
.nav-btn.secondary:hover{border-color:var(--accent);color:var(--text)}
.nav-btn:disabled{opacity:.35;cursor:default;transform:none}
.result-screen{text-align:center;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:none;animation:fadeIn .4s ease}
.result-screen.show{display:block}
.score-display{font-family:'DM Mono',monospace;font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:24px 0}
.score-display.pass{background:linear-gradient(135deg,var(--correct),#2e7d32);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-display.fail{background:linear-gradient(135deg,var(--wrong),#c62828);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-msg{font-size:16px;color:var(--text2);margin-bottom:20px}
@media(max-width:600px){.question-area{padding:22px 18px}.q-text{font-size:14px}.choice-btn{font-size:14px;padding:14px 16px}.score-display{font-size:48px}}
.glossary-section{margin-top:30px}
.glossary-toggle{width:100%;padding:18px 24px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;text-align:left;margin-bottom:8px}
.glossary-toggle:hover{border-color:var(--accent);background:var(--surface)}
.glossary-content{display:none;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-height:500px;overflow-y:auto}
.glossary-content.show{display:block}
.glossary-search{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;margin-bottom:16px}
.glossary-search:focus{border-color:var(--accent)}
.glossary-item{padding:12px 0;border-bottom:1px solid var(--border);font-size:.9em}
.glossary-item .term{font-weight:bold;color:var(--accent);font-size:14px}
.glossary-item .en{color:var(--text3);font-size:11px;margin-left:6px}
.glossary-item .def{color:var(--text2);margin-top:2px;font-size:13px;line-height:1.7}
.status-bar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.hidden{display:none!important}
.save-indicator{position:fixed;top:10px;right:10px;background:var(--correct);color:#fff;padding:6px 14px;border-radius:20px;font-size:.8em;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>📝 ITIL 4 DITS 模擬試験</h1>
<p class="subtitle">ITIL 4 Leader: Digital and IT Strategy — Sample Paper 1 & 2（全60問）<br>出題順・選択肢の順序はランダムです ｜ 合格ライン：70%</p>
<div id="saveIndicator" class="save-indicator">💾 進捗保存しました</div>
<div id="modeScreen">
<div class="mode-select">
<button class="mode-btn" onclick="startQuiz('sp1')">📘 Sample Paper 1<br><small>Q001–Q030（30問）</small></button>
<button class="mode-btn" onclick="startQuiz('sp2')">📗 Sample Paper 2<br><small>Q031–Q060（30問）</small></button>
<button class="mode-btn" onclick="startQuiz('all')">📚 全問チャレンジ<br><small>60問すべて</small></button>
<button class="mode-btn" onclick="startQuiz('random20')">🎲 ランダム20問<br><small>60問から抽出</small></button>
</div>
<div id="resumeArea"></div>
</div>
<div id="quizArea" class="hidden">
<div class="status-bar"><span id="statusLeft"></span><span id="statusRight"></span></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="question-area">
<div class="q-number" id="qNumber"></div>
<div class="q-text" id="qText"></div>
<div class="choices" id="choices"></div>
<div class="explanation" id="explanation"></div>
</div>
<div class="nav-row">
<button class="nav-btn secondary" id="prevBtn" onclick="prevQuestion()">← 前へ</button>
<button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">次へ →</button>
</div>
</div>
<div id="resultScreen" class="result-screen">
<h2>試験結果</h2>
<div class="score-display" id="scoreDisplay"></div>
<div class="result-msg" id="resultMsg"></div>
<div id="resultDetails" style="text-align:left;margin:20px 0;font-size:.9em"></div>
<button class="nav-btn primary" onclick="backToMenu()" style="margin-top:16px">メニューに戻る</button>
</div>
<div class="glossary-section">
<button class="glossary-toggle" onclick="toggleGlossary('dits')">📖 DITS用語集（クリックで展開）</button>
<div class="glossary-content" id="glossaryDits">
<input class="glossary-search" placeholder="用語を検索..." oninput="filterGlossary('dits',this.value)">
<div id="glossaryDitsList"></div>
</div>
<button class="glossary-toggle" onclick="toggleGlossary('fnd')" style="margin-top:8px">📖 ファンデーション用語集（クリックで展開）</button>
<div class="glossary-content" id="glossaryFnd">
<input class="glossary-search" placeholder="用語を検索..." oninput="filterGlossary('fnd',this.value)">
<div id="glossaryFndList"></div>
</div>
</div>
</div>
<script>
const QUESTIONS=[
{n:1,t:"ある組織が新しいオフィスの場所を検討しています。<br>将来の従業員候補が組織全体に容易に溶け込めるようにするためには、どのタイプの外部要因を分析すべきですか？",c:["政治的","経済的","社会的","法的"],a:2,e:"正解：社会的（Social）。PESTLE分析において、社会的要因には『人口の文化、態度、規範、価値観、人口統計（年齢、収入、場所、言語など）、購買動向、移動性など』が含まれます。（参照：4.1.1, 表4.1）"},
{n:2,t:"クラウドストレージ・プロバイダが、ディスラプションに対する高い許容力に基づくイノベーション文化を発展させたいと考えています。<br>採用するのに最も適切なアプローチはどれですか？",c:["財務部門が設定した目標を達成するのに十分な収入増をもたらす新しいコミュニケーション技術を導入する","ストレージアプリに対して頻繁に多くの変更を実施し、一部は失敗するが他は高い市場シェアの維持に役立つことを受け入れる","クラウドストレージ市場でのポジションを失わないように、ストレージアプリの新バージョンに投資する","高可用性で信頼性の高いクラウドストレージサービスを提供する目標を維持するために、新しいデータセンター・インフラストラクチャに投資する"],a:1,e:"正解：B。不確実性を受け入れること＝ディスラプションへの高い許容力。『この変数は、組織が不確実性の中で運営することにどの程度寛容であるかを定義する』（参照：10.5）"},
{n:3,t:"ある組織は、規制要件のために維持する必要のあるレガシーサービスをいくつか持っています。これらのサービスへの改善投資の計画はありません。ビジネスの成長分野を支援するために、いくつかの新しいサービスへの投資を計画しています。<br>サービス・ポートフォリオを作成し維持する最も適切な理由はどれですか？",c:["戦略の要求に応じて新しいサービスに投資を集中させるために、さまざまな新しいサービスのビジネスケースを比較する","レガシーサービスへの投資を含め、投資が必要な場所に向けるために、各サービスのコストと価値を比較する","組織の主要な収益源を保護するために、レガシーサービスの改善を正当化する","改善を計画するために、顧客およびユーザの体験に関する情報を提供する"],a:1,e:"正解：B。『ポートフォリオ管理は、ライフサイクルのすべての段階ですべてのサービスと製品への投資を識別・追跡し、その投資を予測・達成された価値に結びつけます。新しいイニシアチブと既存の運用の間で投資のバランスを取る意思決定を支援する貴重な戦略ツールです。』（参照：5.3.1）"},
{n:4,t:"組織のビジョンを最もよく説明しているのはどれですか？",c:["組織の存在理由を説明するもの","組織が目指して創出する価値を説明するもの","具体的な戦略目標とイニシアチブを説明するもの","組織が将来なりたい姿を説明するもの"],a:3,e:"正解：D。『ビジョンとは、組織が将来なりたい姿についての明確な願望です。』A=目的、B=UVP、C=戦略（参照：3.4.1）"},
{n:5,t:"あるITサービス・プロバイダは、製品とサービスを作成するためのバリューストリームを定義しました。シニアマネージャがこの作業を拡張して運用モデルを作成したいと考えています。<br>ビジネスケースに含めるべき最も重要な便益はどれですか？",c:["運用モデルは、サプライヤが契約を満たすことを確実にする","運用モデルは、製品とサービスを作成するためにどのような組織構造と人材が必要かを理解するのに役立つ","運用モデルは、各製品・サービスを作成するために必要な一連の活動を理解するのに役立つ","運用モデルは、顧客に価値を提供する製品とサービスの機能を説明できるようにする"],a:1,e:"正解：B。運用モデルは『バリューストリームで作業を行うために必要な組織構造、スキルセット、意思決定構造、プロセスとプラクティスのオーナーシップ』を理解するのに役立つ。C=バリューストリーム（既に定義済み）、D=ビジネス・モデル（参照：2.9）"},
{n:6,t:"消費者にアプリを販売する組織が、顧客の関連性に注力して市場をディスラプトする戦略を計画しています。<br>採用するのに最も適切なアプローチはどれですか？",c:["営業部門を支援するための新しいワークフロー管理ツールを導入する","より頻繁なアプリのアップグレードを提供するお得なプランを提示してトレンドに対応する","アプリの開発および展開プロセスを最適化するためにデジタル技術を活用する","サポート時間を増やしユーザのアクセスチャネルを拡大するためにサービスデスクを再編成する"],a:1,e:"正解：B。顧客の関連性に注力する組織は『顧客体験、カスタマ・ジャーニー、顧客の行動を変えようとする』。A、C、D=オペレーショナル・エクセレンス（参照：3.2.1, 3.2.2）"},
{n:7,t:"ある組織は、サービス管理におけるイノベーションを促進してオペレーショナル・エクセレンスを向上させたいと考えています。研究開発チームは革新的ですが新製品に注力。運用チームは高スキルだが資金・人材不足。<br>運用イノベーションのリソースをどう確保すべきですか？",c:["研究開発チームに追加予算を提供する","運用チームに追加予算を提供する","運用チームの一部を研究開発チームに異動させる","追加チームを作成して時間とスタッフを提供する"],a:1,e:"正解：B。『すべての運用予算とすべての従業員の目標には、ある程度のイノベーション活動が含まれるべきです。』運用チームは高スキルなので追加予算でイノベーションに注力可能。（参照：5.1.3.2）"},
{n:8,t:"サービス・プロバイダが既存の資産と少額の投資を活用して市場シェアを拡大するイノベーションへのアプローチはどれですか？",c:["レバレッジ","ディスラプションに対する許容力","イノベーションへのインセンティブ","全体的な推進力"],a:0,e:"正解：A（レバレッジ）。『イノベーションのサイズ（コスト、労力、組織的影響）とその成果の間の比率。』既存資産＋少額投資＝高レバレッジ（参照：10.5）"},
{n:9,t:"サービス・プロバイダが自らの目的とその達成方法を文書化しました。<br>これを説明する用語はどれですか？",c:["デジタル組織","事業戦略","製品およびサービスのポートフォリオ","デジタル・トランスフォーメーション"],a:1,e:"正解：B（事業戦略）。『事業戦略とは、組織がその目的をどのように定義し達成するかである。』（参照：2.7.1）"},
{n:10,t:"外部コンサルタントがデジタル準備状況アセスメントを実施。範囲はガバナンス・マネジメント・カルチャ・技術・人材・プロセス・パートナーシップ。数百の項目の詳細な数値データを含むレポートが作成されたが、戦略実施時にコンサルタントが組織と市場を理解していなかったことが判明。<br>最も可能性の高い原因は？",c:["アセスメントが戦略とリーダーシップを考慮しなかった","アセスメントが単純すぎた","アセスメントが技術に過度に注力していた","アセスメントが複雑すぎた"],a:3,e:"正解：D。『過度に複雑な成熟度モデルは、主観的な基準に疑似的な厳密さを適用することで説得しようとします。』数週間の調査、数百項目の詳細データは複雑すぎる証拠。（参照：4.3.4）"},
{n:11,t:"デジタルまたはIT戦略の成功を評価するためのデータ収集に主に責任を持つプラクティスはどれですか？",c:["『測定およびレポーティング』プラクティス","『戦略管理』プラクティス","『ポートフォリオ管理』プラクティス","『財務管理』プラクティス"],a:0,e:"正解：A。『測定およびレポーティング・プラクティスの目的は、不確実性のレベルを下げることで適切な意思決定と継続的改善を支援すること。関連データを収集することで達成される。』（参照：測定およびレポーティング・プラクティス 2.1）"},
{n:12,t:"組織がデジタル技術の使用を通じてビジョンをどのように達成するかを定義し伝達する方法を説明する用語はどれですか？",c:["デジタル組織","デジタル・トランスフォーメーション","デジタル戦略","デジタル・ビジネス"],a:2,e:"正解：C（デジタル戦略）。『目標と目的を達成するためにデジタル技術を使用することに基づく事業戦略。』（参照：2.7.2, 2.7.1）"},
{n:13,t:"ある組織はビジネスを成長させたいと考えています。リスクを管理しコストを抑えながら効率的にサービスを提供する改善プログラムを実施済み。<br>バランスのとれた戦略のために他に何を考慮すべきですか？",c:["運用をモニタリングし管理する方法","運用を改善する方法","新しい市場や顧客に対応する方法","効率を高めるために異なる方法で作業する方法"],a:2,e:"正解：C。内向き（オペレーショナル・エクセレンス）が強いので外向き（顧客/市場の関連性）が必要。『一部の組織は外向きに目を向け、どの市場に対応するか？成長やディスラプションの機会はあるか？と問います。』（参照：3.2.3）"},
{n:14,t:"デジタル組織の『リスク管理』プラクティスに含めるべきものはどれですか？<br>1. リスクに基づいたターゲット・アーキテクチャの開発<br>2. すべてのリスクを低減するための措置の確保<br>3. リスク管理カルチャの奨励<br>4. リスク管理のためのガバナンスの確保",c:["1と2","2と3","3と4","1と4"],a:2,e:"正解：C（3と4）。リスク管理プラクティスのPSFには『リスク管理のガバナンスの確立』と『リスク管理カルチャの育成とリスクの識別』が含まれる。1=アーキテクチャ管理。2=すべてのリスク低減は不適切（受容・回避・共有・低減がある）。（参照：リスク管理プラクティス 2.4, 11.11）"},
{n:15,t:"不安定なビジネス環境で頻繁にディスラプションに直面する組織。リーダーは不利な事象にもかかわらず運営・進化する能力を向上させたい。<br>注力すべき側面は？",c:["組織のアジリティ","対障害弾力性","ムダの排除","ワークフローの改善"],a:1,e:"正解：B（対障害弾力性）。『内外の不利な事象を予見し、準備し、対応し、克服する組織の能力。』C、D=リーン（参照：8.1.2.2）"},
{n:16,t:"安全で使いやすいビデオ通信サービスが多くの市場・複数の業界で広く採用され、ウェビナー等の専門サービスも置き換えている。<br>競合他社の視点でこのサービス・プロバイダが行っていることを最もよく説明する用語は？",c:["業界のディスラプション","市場のディスラプション","エコシステム・ディスラプション","組織のディスラプション"],a:2,e:"正解：C（エコシステム・ディスラプション）。複数の市場・業界にまたがる変化。『デジタル技術が複数の業界と市場の組織にインパクトを与える変化をもたらすとき発生。』（参照：3.1.1）"},
{n:17,t:"多額の投資が必要で、不確実性が高く失敗すれば高い財務的損失が生じるデジタル・トランスフォーメーション戦略。<br>最も恩恵を受ける組織は？",c:["リスク許容量が低く、リスク選好度が低い組織","リスク許容量が低く、リスク選好度が高い組織","リスク許容量が高く、リスク選好度が低い組織","リスク許容量が高く、リスク選好度が高い組織"],a:3,e:"正解：D。リスク許容量が高い＝失敗しにくい。リスク選好度が高い＝追求する可能性が高い。（参照：11.10.1, 表11.1）"},
{n:18,t:"デジタル・マインドセットの主要な特徴はどれですか？",c:["あらゆる機会を使って技術ベースの変更を行うこと","技術が人々の生活や仕事の方法をどのように変えているかを理解すること","変化する状況で一般的なアクションや意思決定を自動化すること","社会の変化と組織に影響する変化を区別すること"],a:1,e:"正解：B。『技術が人々の生活や仕事の方法をどのように変えているかを理解し、組織の関連性を確保するために他者と協力すること。』A=盲目的に従うことではない。C=インテリジェント・オートメーション。（参照：9.1）"},
{n:19,t:"新たな戦略的リスクを識別するのに最も役立つものは？",c:["カスタマ・ジャーニーの初期ステップでのデュー・ディリジェンスの確認","カスタマ・ジャーニーの後期ステップでのデュー・ディリジェンスの確認","リスク・マトリックスを使用した定性的リスクアセスメント","金銭的計算に基づく定量的リスクアセスメント"],a:0,e:"正解：A。『エンゲージメント・リスクは関係の初期段階でのデュー・ディリジェンスの確認で識別できる。』C=影響と確率の評価。D=金銭的価値の評価。（参照：11.5.1）"},
{n:20,t:"1年前に設立された小規模ITサービス・プロバイダ。ヘルスケア業界に革新的な製品・サービスを提供し急成長中。コストを抑えて品質を維持しつつ新サービスを提供する戦略。<br>最も関連するオペレーショナル・エクセレンスへのアプローチは？",c:["継続的改善","技術リプレースによる近代化","シンプルな自動化","顧客分析"],a:0,e:"正解：A（継続的改善）。『継続的改善はあらゆる戦略の一部であるべき。革新的なディスラプションに依存する組織でさえも長期的に安定したサービスを提供できなければならない。』B=1年の会社には不要。D=顧客/市場の関連性。（参照：5.2.2.1）"},
{n:21,t:"ある組織が事業戦略文書を作成。あるセクションに組織が時間の経過とともにパフォーマンスをどのように監視・評価するかが記述。<br>このセクションに含まれるSVSのコンセプトは？",c:["ガバナンス","戦略管理","価値","プラクティス"],a:0,e:"正解：A（ガバナンス）。『ガバナンスの主要な活動は…評価する…方向付ける…モニタする。』パフォーマンスの監視と評価はガバナンスの機能。（参照：2.10.3）"},
{n:22,t:"あるサービス・プロバイダが、デジタル・コンポーネントを含む製品やサービスを提供して競合他社と差別化。<br>これは何の例ですか？",c:["デジタル技術","デジタル組織","デジタル化","デジタル・トランスフォーメーション"],a:1,e:"正解：B（デジタル組織）。『デジタル組織を他の組織から差別化するのは、自らを差別化するためにデジタル技術をどの程度使用しているか…製品やサービスはしばしばデジタルコンポーネントを含む。』（参照：2.2）"},
{n:23,t:"侵食型の並行運用モデルを説明しているのはどれですか？",c:["既存のビジネス・モデルを補完し消費者に選択肢を提供する新しいデジタル・ビジネス・モデル","既存の資産を活用し現在のビジネス・モデルを迅速に置き換える新しいデジタル・ビジネス・モデル","既存のビジネス・モデルから得た収益で資金を調達する新しいデジタル・ビジネス・モデル","新しい消費者にリーチし市場シェアを拡大するために導入される新しいデジタル・ビジネス・モデル"],a:2,e:"正解：C。『侵食はカニバリズムのより穏やかな形で、既存のまだ収益性のあるビジネス・モデルの収益を使って新しいデジタル・ビジネス・モデルに資金を提供する。』A=シナジー、B=カニバリズム、D=コンカレント（参照：8.2.1.2）"},
{n:24,t:"ビデオ会議ツール開発組織が、医師や患者の関心を確認。中核製品をこのセクター向けに適応可能と判断。<br>この状況を最もよく説明するコンセプトは？",c:["機会","継続的改善","価値","プラクティス"],a:0,e:"正解：A（機会）。『組織が新しい製品やサービスを導入したり、新しい市場に参入したりすることによって既存の運用を拡大できる状況。』（参照：2.10.1.1）"},
{n:25,t:"ロボット導入による作業自動化が組織の目標達成能力を大幅に向上させた。<br>これを説明するコンセプトは？",c:["デジタル技術","デジタル組織","デジタル化","デジタル・トランスフォーメーション"],a:3,e:"正解：D（デジタル・トランスフォーメーション）。『デジタル化、ロボット化、その他の自動化によって達成され、組織が異なることをしたり異なるやり方で行うことを可能にする。』（参照：2.5）"},
{n:26,t:"組織の戦略に顧客の関連性の継続的な維持が含まれている。<br>これを確実に達成する最良の方法は？",c:["製品やサービスに対するフィードバックを評価する","オペレーショナル・エクセレンスを改善する","組織のレジリエンスを改善する","さまざまなユニークなリソースを使用する"],a:0,e:"正解：A。『ほぼリアルタイムのフィードバックと評価を得る能力は、顧客の関連性を維持するために不可欠。』（参照：5.2.1.6）"},
{n:27,t:"小売企業がリポジショニング戦略を持ち、モバイルアプリのビジネスケースが作成済み（未承認）。技術・法務専門家が作成を支援。経営陣が戦略的意思決定に責任。<br>承認前に提示すべき相手は？<br>1.経営陣 2.マーケティングのサービス消費者 3.戦略策定の全関係者 4.ビジネスケース作成の専門家",c:["1と2","2と3","3と4","1と4"],a:3,e:"正解：D（1と4）。『ビジネスケースは戦略を承認・資金提供する利害関係者のみと共有』＝経営陣。『アドバイザー（アーキテクト、財務、法務、技術専門家）も含むべき』＝専門家。（参照：5.3.4, 5.3.4.1）"},
{n:28,t:"最近、競争の激しい市場で事業を開始した小規模サービス・プロバイダ。オペレーショナル・エクセレンスと競争優位のための独自の技術モデルを保有。<br>この戦略的アプローチは？",c:["規模の優位性","先行者の優位性","リソースに基づく優位性","顧客の関連性"],a:2,e:"正解：C（リソースに基づく優位性）。『他の組織がアクセスできないリソースに依存…価値があり、希少で、模倣不可能で、耐久性があり、組織固有のもの。』独自の技術モデル＝模倣困難なリソース。（参照：5.2.2）"},
{n:29,t:"電話、ウェブサイト、アプリ、ソーシャルメディアなど複数のインターフェースで顧客と関わる能力に依存する戦略。<br>この戦略の基盤を最もよく説明するコンセプトは？",c:["オムニチャネルの提供とサポート","カスタマ・ジャーニー","顧客分析","コンテキストに応じた提供とサポート"],a:0,e:"正解：A（オムニチャネル）。『オンラインとオフラインの複数のチャネルにわたって継続的な顧客エンゲージメントを確保し、一貫した肯定的な顧客体験を提供する。』（参照：5.2.1.2）"},
{n:30,t:"デジタル・トランスフォーメーション・プログラムにおけるステップの正しい説明は？",c:["『フィードバックを伴う実施』：まだデジタル化されていないコンポーネントを設計する","『ロードマップの定義』：変更をイニシアチブにグループ化し順序付ける","『ビジョンと目標の策定』：プログラムを開始しリソースが利用可能であることを確認する","『変更のアーキテクト化』：プログラムの目的と目標を定義する"],a:1,e:"正解：B。『デジタルタスクフォースは変更をイニシアチブまたはプロジェクトにグループ化し順序付ける。』A=変更のアーキテクト化の説明、C=フィードバックを伴う実施の説明、D=ビジョンと目標の策定の説明。（参照：6.3.4.1）"},
{n:31,t:"顧客と市場の関連性およびオペレーショナル・エクセレンスに対してバランスのとれた戦略的アプローチを取る組織。<br>これを達成する最良の方法は？",c:["2つの別々の戦略を策定・維持しバランスを取る","単一のバランスのとれた戦略を策定・維持する","まずオペレーショナル・エクセレンスの戦略を策定・実施する","まず顧客と市場の関連性の戦略を策定・実施する"],a:1,e:"正解：B。『最も重要なのは、両方に対処する1つの戦略のみであるべきで、顧客と市場の関連性とオペレーショナル・エクセレンスの別々の戦略ではない。』（参照：3.2.4）"},
{n:32,t:"物理的な文書をスキャンしてコンピュータに保存できるようにする状況を説明する用語は？",c:["デジタル技術","デジタル組織","デジタル化","デジタル・トランスフォーメーション"],a:2,e:"正解：C（デジタル化）。『何かをアナログ形式からデジタル形式に変換するプロセスであり、情報をバイナリ桁で表現する。』（参照：2.4）"},
{n:33,t:"オペレーショナル・エクセレンス向上で市場をディスラプトする積極的な戦略。<br>成功する可能性が最も高いアプローチは？",c:["市場ポジション維持のため継続的改善を使用","パフォーマンス改善のためインテリジェント・オートメーションを使用","潜在的改善識別のためサービス最適化を使用","ブランド・ロイヤルティ向上のため顧客分析を使用"],a:1,e:"正解：B。『自動化戦略はパフォーマンスの向上や運用活動の拡大を目指す…インテリジェント・オートメーション：変化するコンテキストに応じて自動化する能力。』A=改善だけではディスラプティブでない。D=顧客/市場の関連性。（参照：5.2.2.2, 表5.8）"},
{n:34,t:"新しいデジタルソリューションと新興技術を積極的に採用する組織。<br>デジタル技術の使用に関連するリスク要因の正しい説明は？",c:["新興技術ソリューションは通常信頼性が高く安全","新しいデジタルソリューションは低いサイバーセキュリティ・リスクをもたらす","IoTは運用手順の追加保護をもたらす","組織はデータへのより広いアクセスを提供する"],a:3,e:"正解：D。『競争力維持のため、組織はAPIを提供して消費者、デバイス、パートナにデータへのアクセスを提供する。』A=未テストで欠陥の可能性。B=高リスク。C=IoTはリスク増加。（参照：11.2）"},
{n:35,t:"サービスとサービス提供物の関係は？",c:["すべてのサービスには専用のサービス提供物があるべき","すべてのサービス提供物は1つ以上のサービスを説明する","すべてのサービス提供物はサービスの作成と管理方法を説明する","すべてのサービス提供物は組織が提供するすべてのサービスで同じ"],a:1,e:"正解：B。サービス提供物は『1つ以上の製品に基づく1つ以上のサービスを説明する。』D=『同じ製品に基づいて異なるオファリングを作成でき、異なる消費者グループのニーズに対応。』（参照：2.6）"},
{n:36,t:"サービス・プロバイダがイノベーションを検討する際に取るべき最良のアプローチは？",c:["機会を最大化するためにできるだけ革新的であること","競合他社が使用しているイノベーションを採用すること","成功の可能性が最も高いイノベーションを採用すること","確実に成功するようにイノベーションを最小限にすること"],a:2,e:"正解：C。『デジタル・リーダーシップとは…組織に最大の成功機会を与える可能性を選択し、構築または適用する慎重な技術。』（参照：10.2）"},
{n:37,t:"リーダーとマネージャが主要な戦略的リスクの金銭的価値を評価するのに役立つ活動は？",c:["定性的リスク分析","定量的リスク分析","リスク緩和","リスク分類"],a:1,e:"正解：B（定量的リスク分析）。『リスクに金銭的価値を付けようとする…リスクが事前に定義されたしきい値を超えた場合にのみ使用。』A=優先順位付け。C=影響軽減。D=識別の一部。（参照：11.8）"},
{n:38,t:"小規模イニシアチブに投資し、データとフィードバックでアプローチを洗練させて長期的デジタル・トランスフォーメーションを開始したい組織。<br>このアプローチの焦点を説明するSVSの側面は？",c:["継続的改善","機会","プラクティス","ガバナンス"],a:0,e:"正解：A（継続的改善）。『組織自体の改善がその戦略の基盤となりうる。』小規模イニシアチブ＋フィードバックからの学習＝継続的改善。（参照：2.10.5）"},
{n:39,t:"並行運用において、古いソリューションを新しいものに迅速に置き換えるアプローチは？",c:["カニバリズム","侵食","コンカレント","シナジー"],a:0,e:"正解：A（カニバリズム）。『既存のビジネス・モデルの急速な破壊と新しいデジタル・ビジネス・モデルによる置き換えに焦点を当てる。』B=穏やかな置き換え。C=市場シェア拡大。D=相互補完。（参照：8.2.1.1）"},
{n:40,t:"新規顧客獲得時のワークフローを自動化したい組織。ステップは顧客のタイプ・規模・サービス・関係に応じて異なる。<br>最も適切なアプローチは？",c:["シンプルな自動化","複雑な自動化","インテリジェント・オートメーション","デジタル化"],a:2,e:"正解：C。『変化するコンテキストや目標に応じて自動化する能力。』A=変動に対応できない。B=十分でない可能性。D=アナログからデジタルへの変換。（参照：5.2.2.2, 表5.8）"},
{n:41,t:"デジタル・トランスフォーメーションで成功を収めたいリーダーへの正しい推奨事項は？",c:["シニア・エグゼクティブが示す価値観と信念を推進する","組織のビジネスを理解し、関連する経験を持つ人材を採用する","不快感や困難な変化を引き起こさないイニシアチブを優先する","確立された行動・言語・儀式にビジョンと計画を合わせる"],a:1,e:"正解：B。『組織のビジネスを理解し、他の組織で望ましいタイプの変更を行った経験のある人材を採用する。』A=エグゼクティブの好みではなく新しい価値観。C=一時的な不快感を受け入れるべき。D=ビジョンに行動を合わせるべき（逆ではない）。（参照：9.1）"},
{n:42,t:"スタッフ2名の小規模組織がすべてのITサービスにサード・パーティを利用。運用モデルを作成する。<br>運用モデルの必須要素は？",c:["組織構造のデザイン","組織が提供するサービスのポートフォリオ","ITインフラストラクチャのアーキテクチャ","価値がどのように創出されるかを示すバリューストリーム"],a:3,e:"正解：D。『運用モデルの中心にあるのは組織のバリューストリーム。』A=2名なので構造より役割が重要。B=ビジネス・モデルの入力。C=サード・パーティが提供するため範囲外の可能性。（参照：2.9）"},
{n:43,t:"あるサービス・プロバイダが、目標達成方法の基盤としてデジタル技術を使用。<br>これは何と説明できますか？",c:["デジタル・トランスフォーメーション","デジタル戦略","運用技術","情報技術"],a:1,e:"正解：B（デジタル戦略）。『目標と目的を達成するためにデジタル技術を使用することに基づく事業戦略。』すでにデジタル組織であるためトランスフォーメーションは起こっていない。（参照：2.7.2）"},
{n:44,t:"ソーシャルメディア企業が『展開管理』プラクティスの新ツールを導入。競合に先駆けて新機能を定期的に追加可能に。<br>これは何の例ですか？",c:["オペレーショナル・エクセレンスの達成","ポートフォリオ最適化の改善","カスタマ・ジャーニーの最適化","顧客の関連性の向上"],a:0,e:"正解：A（オペレーショナル・エクセレンスの達成）。展開管理ツールの改善はオペレーショナル・エクセレンスの例。『技術を革新的な方法で使用して、より高いレベルのパフォーマンスと品質を得る。』（参照：3.2.2）"},
{n:45,t:"あるデバイスがデジタルデータを処理するために使用されている。<br>これは何の例ですか？",c:["デジタル技術","デジタル組織","デジタル化","デジタル・トランスフォーメーション"],a:0,e:"正解：A（デジタル技術）。『何かをデジタル化する、またはデジタルデータを処理するあらゆる技術。』（参照：2.1）"},
{n:46,t:"デジタル・トランスフォーメーション・イニシアチブを先導するための実行可能なアプローチの例ではないものは？",c:["トランスフォーメーションの規模とステップをその範囲と目標に合わせて調整","『組織変更管理』プラクティスのコンセプトを使用","詳細なユニバーサル実装フレームワークに従う","限定された範囲内で段階的な改善を行う"],a:2,e:"正解：C。『デジタル・トランスフォーメーションを単一の実装フレームワークに還元することは、成功する可能性が非常に低く必然的に失敗につながる。』A、B、D=有効なアプローチ。（参照：6.3.4）"},
{n:47,t:"不安定で不確実な市場で活動するサービス・プロバイダ。内外の変化に素早く適応でき、継続的に改善し、予期しない状況への計画もある。しかし新しい要件を満たすことに時々失敗。<br>注力すべき特性は？",c:["リーン","アジャイル","継続性","対障害弾力性"],a:2,e:"正解：C（継続性）。『消費者に製品やサービスを中断なく提供し、変化するニーズと要件に継続的に対応し、変化する環境に適応できる組織。』A（リーン）=ワークフローの改善とムダの排除に注力→すでに実施済み。B（アジャイル）=素早い適応→すでに実施済み。D（対障害弾力性）=予期しない状況への計画→すでに実施済み。（参照：8.1.2.2）"},
{n:48,t:"何年もかかるデジタル・トランスフォーメーション戦略に合意した組織。最初のイニシアチブのチームがビジネスケースを作成。<br>ビジネスケースの範囲は？",c:["デジタル・トランスフォーメーション全体","このチームに割り当てられた最初のイニシアチブ全体","このチームが提供するすべてのイニシアチブ","当会計年度に完了するすべてのトランスフォーメーション活動"],a:1,e:"正解：B。『戦略がイニシアチブに分割される場合、各イニシアチブにはそのイニシアチブの期間に合わせて設計されたビジネスケースを含めるべき。』（参照：5.3.4.2）"},
{n:49,t:"サービスに対する認識の悪さで市場シェアを失っている組織。効率的な運用に投資済みだがサービス品質への苦情が継続。<br>認識改善に最も役立つコンセプトは？",c:["カスタマ・ジャーニー","オムニチャネルの提供","ポートフォリオ管理","バリューストリーム"],a:0,e:"正解：A（カスタマ・ジャーニー）。『定義されたエンドツーエンドのプロセスを通じた顧客の認識された体験。』認識の問題を理解するにはジャーニー全体を分析する必要がある。（参照：5.2.1.1）"},
{n:50,t:"戦略の測定と評価がビジネス環境と整合していることを確保するために注力すべきは？",c:["戦略的成果","戦略の実施進捗","戦略の妥当性","戦略的ポジショニング"],a:2,e:"正解：C（戦略の妥当性）。『内外の環境の変化を考慮して、戦略がまだ妥当/適切であるかどうかを示す（妥当性）。』A=パフォーマンス測定。B=進捗測定。（参照：7.2.1）"},
{n:51,t:"デジタル・トランスフォーメーション・プログラムを開始する組織が、スタッフのスキル開発・新ツール導入・サプライヤ契約の見直しに投資。<br>投資しているSVSの側面は？",c:["プラクティス","ガバナンス","機会","価値"],a:0,e:"正解：A（プラクティス）。『プラクティスは、プロセス、リソース、パートナ、技術、およびそれらが戦略にどのように貢献するかを活用する。』このシナリオでは価値創出のためのリソースに投資。（参照：2.10.6）"},
{n:52,t:"競争力維持のためイノベーション投資を増やしたい組織。CEOが新イニシアチブの目標達成への貢献を評価するよう要請。<br>経営チームの最良の意思決定アプローチは？",c:["投資が戦略と整合していることを確認","リスク選好度を変更してより多くの実験を可能に","イノベーション投資のインセンティブを確認","イノベーション投資のレバレッジを検討"],a:0,e:"正解：A。『一部のイノベーションは高い財務的リターンを提供するが、組織を既定の目標やポジションから遠ざける可能性がある。この変数はイノベーションが既存の戦略にどの程度挑戦することを許容されるかを定義。』（参照：10.5）"},
{n:53,t:"戦略策定のための内部分析を完了。必要な活動を分析し、スキル・コンピテンシー・自動化を識別済み。<br>まだ考慮されていないサービスマネジメントの側面は？",c:["組織と人材","情報と技術","パートナとサプライヤ","バリューストリームとプロセス"],a:2,e:"正解：C（パートナとサプライヤ）。活動=バリューストリームとプロセス（済）、スキル=組織と人材（済）、自動化=情報と技術（済）。『組織が価値を創出し、製品やサービスを構築・販売・提供できるようにする商品やサービスを供給するもの』が未考慮。（参照：4.1.2, 表4.3）"},
{n:54,t:"セキュリティパッチのために高額なソフトウェア更新が必要な多数のサーバ。ITマネージャがビジネスケースを提出。<br>次に何をすべきですか？",c:["重要なのでさらなる評価なしに迅速に承認・実施","投資が戦略的目標と整合するようポートフォリオ管理で評価","ビジネスケースを承認後にポートフォリオに追加","運用予算から賄い、さらなる承認は不要"],a:1,e:"正解：B。すべてのイニシアチブがポートフォリオ管理で優先順位付けされ、戦略的目標と整合することが確保される。『ポートフォリオ管理は、リソース・製品・サービスのライフサイクル全体にわたって財務的監視を確保する。』（参照：5.1.3.1, ポートフォリオ管理プラクティス 2.1）"},
{n:55,t:"新しい競合（オンラインのみで低コスト）からの競争激化に直面するサービス・プロバイダ。競争力維持のために運営方法を完全に変えようとしている。<br>このサービス・プロバイダが行っていることを最もよく説明する用語は？",c:["エコシステム・ディスラプション","業界のディスラプション","市場のディスラプション","組織のディスラプション"],a:3,e:"正解：D（組織のディスラプション）。『市場や業界へのディスラプションにより、市場でのポジションを回復・維持する必要がある…外部のディスラプションを受け入れ、自らをディスラプトする必要がある。』（参照：3.1.4）"},
{n:56,t:"コンテキストに応じた提供とサポートを活用してソーシャルメディア・プラットフォームを改善したい組織。<br>この目標を最も支援するアクションは？",c:["シンプルな自動化でサービスデスクへの連絡を減らす","フィードバックを使用してユーザの活動に応じて応答を適応させるソフトウェア・インターフェースを作成","ユーザが使用したいサポートチャネルを選択できるソフトウェアを構築","カスタマ・ジャーニーを分析して最も人気のあるインターフェースの効率を改善"],a:1,e:"正解：B。『フィードバック・メカニズムの構築：既存の製品やサービス内にフィードバック・ループを開発することで、顧客のニーズに適応するためのリアルタイムの対応能力を提供。』（参照：5.2.1.3）"},
{n:57,t:"変化する市場トレンドに素早く適応する戦略を策定した組織。投資家は長期的な成功にコミットし適切な資金を提供するが、資金調達方法を理解したい。<br>戦略の資金調達の最良のアプローチは？",c:["複数の需要シナリオをモデル化してイノベーションと運用の財務戦略が戦略と整合することを確保","戦略実施のプロジェクトを作成しプロジェクト開始前に支出を正確に予測","機会と需要に対応するため運用費からクラウドソリューションに資金提供","独立した研究開発チームを設立し資金を提供"],a:0,e:"正解：A。『投資と運用コストの間の資金調達の組み合わせを、複数の需要モデルに合わせて確保するのが最良のアプローチ。』『これらの予測は、異なるレベルの需要がモデル化されるシナリオを使用する。』（参照：5.1.3.3）"},
{n:58,t:"組織の目的は、組織のビジョンとどのように関連しますか？",c:["組織の目的にはビジョン達成に必要なイニシアチブが含まれる","組織のビジョンは存在理由を説明し目的のコンテキストを提供する","組織はビジョンを支援するために定期的に目的を変更する","組織のビジョンは目的達成に必要な目標を支援する"],a:3,e:"正解：D。ビジョンは『組織が達成しようとする目標を包含し、通常は定められた期間内に。』A=イニシアチブは戦略に含まれる。B=ビジョンと目的を混同。C=目的は頻繁に変更されない。（参照：3.4.1）"},
{n:59,t:"リスク回避型の組織のIT部門長がデジタル・トランスフォーメーション戦略のビジネスケースを作成。<br>最も成功する可能性の高い正当化は？",c:["この戦略を採用すれば競合から市場シェアを獲得する機会がある","この戦略を採用すれば市場をディスラプトする機会がある","この戦略を採用しなければ競合に市場シェアを奪われる可能性が非常に高い","この戦略を採用しなければ将来の成長機会を失う可能性がある"],a:2,e:"正解：C。リスク回避型の組織は『市場でのポジションを失う危険がある場合にのみ新しい技術の使用に注力。』市場シェアを失うという脅威が最も説得力のある正当化。（参照：11.10.1）"},
{n:60,t:"デジタル戦略を策定し現在の能力を理解する必要がある組織。<br>デジタル準備状況アセスメントの主な焦点であるべきではないものは？",c:["戦略とポジショニング","ITインフラストラクチャの管理","イノベーションへのアプローチ","リスク管理のアプローチ"],a:1,e:"正解：B（ITインフラストラクチャの管理）。『安定して予測可能な技術はデジタルイニシアチブ成功の前提条件だが、それだけでは十分ではない。ITの役割は技術を管理することではない。』A、C、D=アセスメントの重要な側面。（参照：4.3.4, 4.3.1）"}
];
const GLOSSARY_DITS=[{t:"デジタル化",en:"digitization",d:"何かをアナログ形式からデジタル形式に変換するプロセス。"},{t:"デジタル技術",en:"digital technology",d:"何かをデジタル化する、またはデジタルデータを処理するあらゆる技術。"},{t:"デジタル組織",en:"digital organization",d:"デジタル技術によって大きく異なるビジネスを行うことが可能になった組織。"},{t:"デジタル戦略",en:"digital strategy",d:"デジタル技術を使用することに基づく事業戦略。"},{t:"デジタル・トランスフォーメーション",en:"digital transformation",d:"デジタル化、ロボット化等の自動化により組織が異なるやり方で行うことを可能にする変革。"},{t:"事業戦略",en:"business strategy",d:"組織がその目的をどのように定義し達成するかを示すもの。"},{t:"運用モデル",en:"operating model",d:"組織がどのように自らを運営するかを表現したもの。"},{t:"ビジネス・モデル",en:"business model",d:"組織がどのように価値を創出し捕捉するかを説明するモデル。"},{t:"ガバナンス",en:"governance",d:"組織を方向付け、コントロールする方法。"},{t:"継続的改善",en:"continual improvement",d:"あらゆる戦略の一部であるべき、長期的な改善アプローチ。"},{t:"カスタマ・ジャーニー",en:"customer journey",d:"サービス顧客が持つ完全なエンドツーエンドの体験。"},{t:"サービス提供物",en:"service offering",d:"1つ以上の製品に基づく1つ以上のサービスの説明。"},{t:"サービスバリュー・システム",en:"SVS",d:"価値の創出を促進するために組織のコンポーネントと活動が連携するモデル。"},{t:"カニバリズム",en:"cannibalism",d:"既存ビジネス・モデルの急速な破壊と新デジタルモデルによる置き換え。"},{t:"侵食",en:"erosion",d:"既存ビジネス・モデルの収益で新デジタルモデルに資金を提供。"},{t:"コンカレント",en:"concurrence",d:"市場シェア拡大を目指し新旧モデルを並行運用。"},{t:"シナジー",en:"synergism",d:"相互補完的チャネルで最適な並行運用アプローチ。"},{t:"エコシステム・ディスラプション",en:"ecosystem disruption",d:"複数の業界・市場にインパクトを与える変化。"},{t:"組織のディスラプション",en:"organizational disruption",d:"外部ディスラプションに対応するため自らを変革する必要。"},{t:"リスク許容量",en:"risk capacity",d:"組織が許容できるリスクの総量。"},{t:"リスク選好度",en:"risk appetite",d:"組織が目標追求において受け入れる負のリスクの程度。"},{t:"定性的リスク分析",en:"qualitative risk analysis",d:"リスクの発生可能性と影響を評価する分析手法。"},{t:"定量的リスク分析",en:"quantitative risk analysis",d:"リスクに金銭的価値を付ける分析技法。"},{t:"レバレッジ",en:"leverage",d:"イノベーションのサイズと達成された成果の比率。"},{t:"組織のレジリエンス",en:"organizational resilience",d:"不利な事象を予見・準備・対応・克服する能力。"},{t:"組織のアジリティ",en:"organizational agility",d:"内外の事象に素早く柔軟に対応する能力。"},{t:"オムニチャネル",en:"omnichannel",d:"複数のチャネルで一貫した顧客体験を提供するアプローチ。"},{t:"デジタル・マインドセット",en:"digital mindset",d:"技術が人々の生活・仕事をどう変えているかを理解する考え方。"},{t:"デジタル準備状況アセスメント",en:"digital readiness assessment",d:"組織のデジタル成熟度と変革への準備状況を評価するプロセス。"},{t:"ポートフォリオ管理",en:"portfolio management",d:"投資と価値のバランスを管理するプラクティス。"},{t:"機会",en:"opportunity",d:"組織の既存運用を拡大できる状況。"},{t:"価値",en:"value",d:"認識されている便益、便利さ、および何らかの重要性。"}];
const GLOSSARY_FND=[{t:"サービス",en:"service",d:"顧客が特定のコストやリスクを管理することなく成果の達成を促進する手段。"},{t:"サービス・マネジメント",en:"service management",d:"顧客に対する価値の形で組織の専門能力を可能にするための組織能力のセット。"},{t:"サービス提供物",en:"service offering",d:"1つ以上の製品に基づく1つ以上のサービスの説明。"},{t:"成果",en:"outcome",d:"利害関係者のために可能になった結果。"},{t:"体験",en:"experience",d:"サービス消費者がサービスプロバイダとのやり取りを通じて得る認識。"},{t:"情報と技術",en:"information and technology",d:"サービスマネジメントの4つの側面の1つ。"},{t:"組織と人材",en:"organizations and people",d:"サービスマネジメントの4つの側面の1つ。"},{t:"パートナとサプライヤ",en:"partners and suppliers",d:"サービスマネジメントの4つの側面の1つ。"},{t:"バリューストリームとプロセス",en:"value streams and processes",d:"サービスマネジメントの4つの側面の1つ。"},{t:"継続的改善",en:"continual improvement",d:"すべてのレベルで組織のパフォーマンスを改善する反復的な活動。"},{t:"ガバナンス",en:"governance",d:"組織を方向付け、コントロールする手段。"},{t:"リスク",en:"risk",d:"損害や損失を引き起こす可能性のある事象。"}];
let currentMode='',quizQuestions=[],currentIndex=0,answers={},score=0;const STORAGE_KEY='ditsQuiz';
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(mode){currentMode=mode;localStorage.removeItem(STORAGE_KEY);let pool=[];if(mode==='sp1')pool=QUESTIONS.filter(q=>q.n<=30);else if(mode==='sp2')pool=QUESTIONS.filter(q=>q.n>30);else if(mode==='all')pool=[...QUESTIONS];else if(mode==='random20')pool=shuffle([...QUESTIONS]).slice(0,20);quizQuestions=shuffle(pool).map(q=>{const idx=[0,1,2,3];const sh=shuffle([...idx]);return{...q,c:sh.map(i=>q.c[i]),a:sh.indexOf(q.a)}});currentIndex=0;answers={};score=0;document.getElementById('modeScreen').classList.add('hidden');document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultScreen').classList.remove('show');renderQuestion()}
function renderQuestion(){const q=quizQuestions[currentIndex],total=quizQuestions.length;document.getElementById('statusLeft').textContent=getModeLabel()+' — '+total+'問中'+(currentIndex+1)+'問目';document.getElementById('statusRight').textContent='回答済: '+Object.keys(answers).length+'/'+total;document.getElementById('progressFill').style.width=((currentIndex+1)/total*100)+'%';document.getElementById('qNumber').textContent='Q'+String(q.n).padStart(3,'0');document.getElementById('qText').innerHTML=q.t;const labels=['A','B','C','D'],cd=document.getElementById('choices');cd.innerHTML='';const ua=answers[currentIndex],done=ua!==undefined;q.c.forEach((c,i)=>{const b=document.createElement('button');b.className='choice-btn';if(done){if(i===q.a)b.classList.add('correct');else if(i===ua&&ua!==q.a)b.classList.add('wrong')}btn_html='<span class="choice-label">'+labels[i]+'.</span><span>'+c+'</span>';b.innerHTML=btn_html;if(!done)b.onclick=()=>selectAnswer(i);cd.appendChild(b)});const exp=document.getElementById('explanation');if(done){exp.innerHTML='<strong>【解説】</strong><br>'+q.e;exp.classList.add('show')}else{exp.innerHTML='';exp.classList.remove('show')}document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').textContent=currentIndex===total-1?'結果を見る →':'次へ →'}
function selectAnswer(i){answers[currentIndex]=i;saveProgress();renderQuestion()}
function nextQuestion(){if(currentIndex<quizQuestions.length-1){currentIndex++;renderQuestion()}else showResults()}
function prevQuestion(){if(currentIndex>0){currentIndex--;renderQuestion()}}
function showResults(){document.getElementById('quizArea').classList.add('hidden');const rs=document.getElementById('resultScreen');rs.classList.add('show');score=0;quizQuestions.forEach((q,i)=>{if(answers[i]===q.a)score++});const total=quizQuestions.length,pct=Math.round(score/total*100),passLine=Math.ceil(total*0.7),pass=score>=passLine;const sd=document.getElementById('scoreDisplay');sd.textContent=score+'/'+total+' ('+pct+'%)';sd.className='score-display '+(pass?'pass':'fail');document.getElementById('resultMsg').textContent=pass?'🎉 合格です！おめでとうございます！':'😢 不合格です。合格ライン: '+passLine+'/'+total+'（70%）';let d='<table style="width:100%;border-collapse:collapse"><tr style="background:var(--surface2)"><th style="padding:6px;border:1px solid var(--border);color:var(--text)">問題</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">あなた</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">正解</th><th style="padding:6px;border:1px solid var(--border);color:var(--text)">結果</th></tr>';const lb=['A','B','C','D'];quizQuestions.forEach((q,i)=>{const ua=answers[i]!==undefined?lb[answers[i]]:'未',ca=lb[q.a],ok=answers[i]===q.a;d+='<tr style="background:'+(ok?'rgba(61,214,140,.08)':'rgba(245,91,91,.08)')+'"><td style="padding:4px 8px;border:1px solid var(--border);color:var(--text)">Q'+String(q.n).padStart(3,'0')+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center;color:var(--text)">'+ua+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center;color:var(--text)">'+ca+'</td><td style="padding:4px 8px;border:1px solid var(--border);text-align:center">'+(ok?'✅':'❌')+'</td></tr>'});d+='</table>';document.getElementById('resultDetails').innerHTML=d;localStorage.removeItem(STORAGE_KEY)}
function backToMenu(){document.getElementById('resultScreen').classList.remove('show');document.getElementById('modeScreen').classList.remove('hidden');document.getElementById('quizArea').classList.add('hidden');checkResume()}
function getModeLabel(){if(currentMode==='sp1')return'SP1';if(currentMode==='sp2')return'SP2';if(currentMode==='all')return'全問';return'ランダム20問'}
function saveProgress(){const data={mode:currentMode,questions:quizQuestions.map(q=>q.n),answers,currentIndex,timestamp:Date.now()};localStorage.setItem(STORAGE_KEY,JSON.stringify(data));const si=document.getElementById('saveIndicator');si.classList.add('show');setTimeout(()=>si.classList.remove('show'),1500)}
function checkResume(){const s=localStorage.getItem(STORAGE_KEY),a=document.getElementById('resumeArea');if(!s){a.innerHTML='';return}try{const d=JSON.parse(s),ans=Object.keys(d.answers||{}).length,total=d.questions.length,dt=new Date(d.timestamp).toLocaleString('ja-JP');a.innerHTML='<div style="margin:20px auto;max-width:500px;padding:16px;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;text-align:center"><p style="font-weight:bold;color:var(--text)">💾 前回の続きがあります</p><p style="font-size:.9em;color:var(--text2)">回答済: '+ans+'/'+total+' | '+dt+'</p><button class="nav-btn primary" style="margin-top:12px" onclick="resumeQuiz()">続きから再開</button> <button class="nav-btn secondary" style="margin-top:12px" onclick="clearResume()">破棄</button></div>'}catch(e){a.innerHTML=''}}
function resumeQuiz(){const s=JSON.parse(localStorage.getItem(STORAGE_KEY));currentMode=s.mode;quizQuestions=s.questions.map(n=>{const o=QUESTIONS.find(q=>q.n===n);const idx=[0,1,2,3];const sh=shuffle([...idx]);return{...o,c:sh.map(i=>o.c[i]),a:sh.indexOf(o.a)}});answers=s.answers||{};currentIndex=s.currentIndex||0;document.getElementById('modeScreen').classList.add('hidden');document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultScreen').classList.remove('show');renderQuestion()}
function clearResume(){localStorage.removeItem(STORAGE_KEY);document.getElementById('resumeArea').innerHTML=''}
function toggleGlossary(t){const e=document.getElementById(t==='dits'?'glossaryDits':'glossaryFnd');e.classList.toggle('show');if(e.classList.contains('show')&&!e.dataset.loaded){renderGlossary(t);e.dataset.loaded='1'}}
function renderGlossary(t){const d=t==='dits'?GLOSSARY_DITS:GLOSSARY_FND,l=document.getElementById(t==='dits'?'glossaryDitsList':'glossaryFndList');l.innerHTML=d.map(g=>'<div class="glossary-item"><span class="term">'+g.t+'</span> <span class="en">('+g.en+')</span><div class="def">'+g.d+'</div></div>').join('')}
function filterGlossary(t,v){const d=t==='dits'?GLOSSARY_DITS:GLOSSARY_FND,l=document.getElementById(t==='dits'?'glossaryDitsList':'glossaryFndList');const f=v.toLowerCase();l.innerHTML=d.filter(g=>g.t.toLowerCase().includes(f)||g.en.toLowerCase().includes(f)||g.d.toLowerCase().includes(f)).map(g=>'<div class="glossary-item"><span class="term">'+g.t+'</span> <span class="en">('+g.en+')</span><div class="def">'+g.d+'</div></div>').join('')}
checkResume();
</script>
</body>
</html>
